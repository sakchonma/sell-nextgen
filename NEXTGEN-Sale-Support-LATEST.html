                      {p} <span style={{ fontSize: 10, color: "var(--text3)" }}>— {getZoneFromProvince(p)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="fg" style={{ position: "relative" }}>
              <label className="flabel">อำเภอ</label>
              <input className="finput" value={distSearch}
                onChange={e => { setDistSearch(e.target.value); set("district", e.target.value); setShowDistDrop(true); }}
                onFocus={() => setShowDistDrop(true)}
                placeholder={f.province ? "พิมพ์ชื่ออำเภอ..." : "เลือกจังหวัดก่อน"}
                disabled={!f.province} autoComplete="off" />
              {showDistDrop && distSearch && filteredDists.length > 0 && (
                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 8, zIndex: 100, maxHeight: 160, overflowY: "auto", boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>
                  {filteredDists.map(d => (
                    <div key={d} onMouseDown={() => selectDistrict(d)}
                      style={{ padding: "8px 12px", cursor: "pointer", fontSize: 13 }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg3)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      {d}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* Mode: Dropdown */}
        {geoMode === "dropdown" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <div className="fg">
              <label className="flabel">ภาค</label>
              <select className="fselect" value={f.zone} onChange={e => { set("zone", e.target.value); set("province", ""); set("district", ""); setProvSearch(""); setDistSearch(""); }}>
                <option value="">— เลือกภาค —</option>
                {ZONES.map(z => <option key={z}>{z}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="flabel">จังหวัด</label>
              <select className="fselect" value={f.province} onChange={e => selectProvince(e.target.value)} disabled={!f.zone}>
                <option value="">— เลือกจังหวัด —</option>
                {f.zone && Object.keys(THAILAND_GEO[f.zone] || {}).map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
            <div className="fg">
              <label className="flabel">อำเภอ</label>
              <select className="fselect" value={f.district} onChange={e => set("district", e.target.value)} disabled={!f.province}>
                <option value="">— เลือกอำเภอ —</option>
                {getDistricts(f.province).map(d => <option key={d}>{d}</option>)}
              </select>
            </div>
          </div>
        )}

        {/* Mode: Google Maps */}
        {geoMode === "maps" && (
          <div className="fg">
            <label className="flabel">วาง Google Maps Link หรือ พิกัด</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input className="finput" value={mapsInput} onChange={e => setMapsInput(e.target.value)}
                placeholder="https://maps.google.com/... หรือ 13.7563, 100.5018"
                onKeyDown={e => e.key === "Enter" && parseMapsUrl()} style={{ flex: 1 }} />
              <button className="btn btn-accent btn-sm" onClick={parseMapsUrl} disabled={mapsLoading} style={{ flexShrink: 0 }}>
                {mapsLoading ? "⏳" : "📍 ดึงข้อมูล"}
              </button>
            </div>
            {f.lat && <div style={{ fontSize: 11, color: "var(--accent)", marginTop: 6 }}>✓ พิกัด: {f.lat?.toFixed(5)}, {f.lng?.toFixed(5)}</div>}
            {f.province && <div style={{ fontSize: 11, color: "var(--green)", marginTop: 3 }}>✓ {f.zone} › {f.province} › {f.district}</div>}
          </div>
        )}

        {/* Mode: Manual */}
        {geoMode === "manual" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div className="fg">
              <label className="flabel">ภาค</label>
              <input className="finput" value={f.zone} onChange={e => set("zone", e.target.value)} placeholder="เช่น ภาคเหนือ" />
            </div>
            <div className="fg">
              <label className="flabel">จังหวัด</label>
              <input className="finput" value={f.province} onChange={e => set("province", e.target.value)} placeholder="เช่น เชียงใหม่" />
            </div>
            <div className="fg">
              <label className="flabel">อำเภอ</label>
              <input className="finput" value={f.district} onChange={e => set("district", e.target.value)} placeholder="เช่น เมืองเชียงใหม่" />
            </div>
            <div className="fg">
              <label className="flabel">ตำบล</label>
              <input className="finput" value={f.subdistrict || ""} onChange={e => set("subdistrict", e.target.value)} placeholder="เช่น ช้างเผือก" />
            </div>
          </div>
        )}

        {/* Location summary */}
        {(f.province || f.zone) && (
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
            {[f.zone, f.province, f.district, f.subdistrict].filter(Boolean).map((v, i) => (
              <span key={i} style={{ fontSize: 11, background: "var(--accent-dim)", color: "var(--accent)", padding: "2px 9px", borderRadius: 10, fontWeight: 600 }}>
                {["ภาค", "จังหวัด", "อำเภอ", "ตำบล"][i]}: {v}
              </span>
            ))}
          </div>
        )}

        {/* ── ข้อมูลการขาย ── */}
        <div className="sec-title">ข้อมูลการขาย</div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
          <div className="fg">
            <label className="flabel">สถานะ</label>
            <select className="fselect" value={f.status} onChange={e => set("status", e.target.value)}>
              {LEAD_STATUS.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="fg">
            <label className="flabel">จำนวนนักเรียน</label>
            <input className="finput" type="number" value={f.studentCount} onChange={e => set("studentCount", Number(e.target.value))} placeholder="1000" />
          </div>
          <div className="fg">
            <label className="flabel">งบประมาณ (บาท)</label>
            <input className="finput" type="number" value={f.budget || ""} onChange={e => set("budget", Number(e.target.value))} placeholder="100000" />
          </div>
        </div>

        <div className="frow">
          <div className="fg">
            <label className="flabel">ช่องทางที่มา</label>
            <select className="fselect" value={f.source} onChange={e => set("source", e.target.value)}>
              {LEAD_SOURCES.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="fg">
            <label className="flabel">มอบหมายให้</label>
            <select className="fselect" value={f.assignedTo} onChange={e => set("assignedTo", Number(e.target.value))} disabled={currentUser.role === ROLES.SALES}>
              {USERS.filter(u => u.role === ROLES.SALES).map(u => <option key={u.id} value={u.id}>{u.name} ({u.zone || "-"})</option>)}
            </select>
          </div>
        </div>

        <div className="fg">
          <label className="flabel">สินค้าที่สนใจ</label>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {PRODUCTS.map(p => (
              <button key={p} className="btn btn-xs" onClick={() => toggleProduct(p)} style={{
                background: f.products.includes(p) ? "var(--accent-dim)" : "transparent",
                color: f.products.includes(p) ? "var(--accent)" : "var(--text3)",
                borderColor: f.products.includes(p) ? "rgba(0,229,160,0.3)" : "var(--border)",
                fontWeight: f.products.includes(p) ? 700 : 400,
              }}>{p}</button>
            ))}
          </div>
        </div>

        {/* ── ผู้ติดต่อ ── */}
        <div className="sec-title">ผู้ติดต่อในโรงเรียน</div>

        {contacts.map(c => (
          <div key={c.id} style={{ background: "var(--bg3)", borderRadius: 9, padding: 11, marginBottom: 8, border: "1px solid var(--border)", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 13 }}>{c.name}</div>
              <div style={{ fontSize: 11, color: "var(--accent)", marginBottom: 4 }}>{c.role}</div>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {c.phone && <span style={{ fontSize: 11, color: "var(--text2)" }}>📞 {c.phone}</span>}
                {c.line && <span style={{ fontSize: 11, color: "var(--text2)" }}>💬 LINE: {c.line}</span>}
                {c.email && <span style={{ fontSize: 11, color: "var(--text2)" }}>✉️ {c.email}</span>}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                <span style={{ fontSize: 10, color: "var(--text3)" }}>อิทธิพล: <span style={{ color: "var(--text2)" }}>{c.influence}</span></span>
                <span style={{ fontSize: 10, color: "var(--text3)" }}>ตัดสินใจ: <span style={{ color: "var(--text2)" }}>{c.decision}</span></span>
              </div>
            </div>
            <button className="btn btn-xs btn-red" onClick={() => removeContact(c.id)}>✕</button>

        {addingContact ? (
          <div style={{ background: "var(--bg3)", borderRadius: 10, padding: 14, border: "1px solid var(--border)", marginBottom: 8 }}>
            <div className="frow">
              <div className="fg">
                <label className="flabel">ชื่อ *</label>
                <input className="finput" value={newContact.name} onChange={e => setNewContact(c => ({ ...c, name: e.target.value }))} placeholder="ชื่อ-นามสกุล" />
              </div>
              <div className="fg">
                <label className="flabel">ตำแหน่ง</label>
                <select className="fselect" value={newContact.role} onChange={e => setNewContact(c => ({ ...c, role: e.target.value }))}>
                  {CONTACT_ROLES_LIST.map(r => <option key={r}>{r}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
              <div className="fg">
                <label className="flabel">เบอร์โทร</label>
                <input className="finput" value={newContact.phone} onChange={e => setNewContact(c => ({ ...c, phone: e.target.value }))} placeholder="08x-xxx-xxxx" />
              </div>
              <div className="fg">
                <label className="flabel">LINE ID</label>
                <input className="finput" value={newContact.line} onChange={e => setNewContact(c => ({ ...c, line: e.target.value }))} placeholder="line_id" />

              <div className="fg">
                <label className="flabel">อีเมล</label>
                <input className="finput" value={newContact.email} onChange={e => setNewContact(c => ({ ...c, email: e.target.value }))} placeholder="email@school.th" />

            <div className="frow">
              <div className="fg">
                <label className="flabel">ระดับอิทธิพล</label>

                </select>
              </div>
              <div className="fg">
                <label className="flabel">ระดับการตัดสินใจ</label>
                <select className="fselect" value={newContact.decision} onChange={e => setNewContact(c => ({ ...c, decision: e.target.value }))}>
                  {["สูง", "ปานกลาง", "ต่ำ"].map(v => <option key={v}>{v}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-accent btn-sm" onClick={addContact}>✓ เพิ่มผู้ติดต่อ</button>
              <button className="btn btn-ghost btn-sm" onClick={() => setAddingContact(false)}>ยกเลิก</button>
            </div>
          </div>
        ) : (
          <button className="btn btn-ghost btn-sm" style={{ marginBottom: 12 }} onClick={() => setAddingContact(true)}>

        )}

        {/* ── หมายเหตุ ── */}
        <div className="fg">
          <label className="flabel">หมายเหตุ / โน้ต</label>
          <textarea className="ftextarea" value={f.notes} onChange={e => set("notes", e.target.value)} placeholder="บันทึกข้อมูลเพิ่มเติม..." />
        </div>

        {/* ── นัดหมาย ── */}
        <div className="sec-title" style={{ marginTop: 8 }}>📅 นัดหมาย / ตารางงาน</div>
        <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 10 }}>
          นัดหมายที่เพิ่มจะปรากฏในปฏิทินของ Sales, Manager และ Exec อัตโนมัติ

        {/* แสดงนัดหมายที่เพิ่มแล้ว */}
        {appts.map(a => {
          const tc = a.type.includes("Demo") ? "#8b5cf6" : a.type.includes("ประชุม") ? "#3b82f6" : a.type.includes("โทร") ? "#00e5a0" : "#f59e0b";
          return (
            <div key={a.id} style={{ background:"var(--bg3)", borderRadius:10, padding:"10px 14px", marginBottom:8, border:`1px solid ${tc}30`, display:"flex", gap:10, alignItems:"flex-start" }}>
              <div style={{ flex:1 }}>
                <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:4, flexWrap:"wrap" }}>
                  <span style={{ fontWeight:700, fontSize:13 }}>{a.title}</span>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:tc+"20", color:tc, fontWeight:700 }}>{a.type}</span>
                  <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:PRIORITY_COLOR[a.priority]+"20", color:PRIORITY_COLOR[a.priority], fontWeight:700 }}>{a.priority}</span>

                <div style={{ fontSize:11, color:"var(--text2)" }}>
                  📅 {a.date}{a.time ? ` · ${a.time} น.` : ""}{a.duration ? ` (${a.duration} นาที)` : ""}

                {a.meetingLink && (
                  <div style={{ fontSize:11, color:"#3b82f6", marginTop:2 }}>
                    🔗 {a.platform}: <a href={a.meetingLink} target="_blank" rel="noopener noreferrer" style={{ color:"#3b82f6", textDecoration:"none" }} onClick={e=>e.stopPropagation()}>{a.meetingLink.slice(0,50)}{a.meetingLink.length>50?"…":""}</a>
                  </div>
                )}
                {a.needSupport && <div style={{ fontSize:10, color:"#f59e0b", marginTop:2 }}>🙋 ขอสนับสนุน: {a.supportNote || "ขอความช่วยเหลือ"}</div>}

              <button className="btn btn-xs btn-red" onClick={() => removeAppt(a.id)}>✕</button>

              <div className="fg" style={{ flex:2 }}>
                <label className="flabel">ชื่อนัดหมาย *</label>

              <div className="fg">
                <label className="flabel">ประเภท</label>
                <select className="fselect" value={newAppt.type} onChange={e => setNewAppt(a=>({...a,type:e.target.value,meetingLink:"",locationLink:""}))}>

              </div>
            </div>

            {/* Row 2: วันที่ (date picker) + เวลา (dropdown 24h) + ระยะเวลา */}
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:10 }}>
              <div className="fg">
                <label className="flabel">📅 วันที่ *</label>
                <input className="finput" type="date" value={newAppt.date}
                  onChange={e => setNewAppt(a=>({...a,date:e.target.value}))}

                  <div style={{ fontSize:10, color:"var(--accent)", marginTop:3, fontFamily:"IBM Plex Mono" }}>
                    {new Date(newAppt.date+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                  </div>
                )}
              </div>
              <div className="fg">
                <label className="flabel">🕐 เวลาเริ่ม (24h)</label>
                <select className="fselect" value={newAppt.time} onChange={e => setNewAppt(a=>({...a,time:e.target.value}))}>
                  {TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
                {newAppt.time && newAppt.duration && (
                  <div style={{ fontSize:10, color:"var(--text3)", marginTop:3 }}>
                    ถึง {(() => {
                      const [h,m] = newAppt.time.split(":").map(Number);
                      const end = h*60+m+Number(newAppt.duration);
                      return `${String(Math.floor(end/60)%24).padStart(2,"0")}:${String(end%60).padStart(2,"0")}`;
                    })()}
                  </div>
                )}
              </div>
              <div className="fg">
                <label className="flabel">⏱ ระยะเวลา</label>
                {!durationCustom ? (
                  <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                    {DURATION_PRESETS.map(d => (
                      <button key={d} className="btn btn-xs" onClick={() => setNewAppt(a=>({...a,duration:d}))} style={{
                        background: newAppt.duration===d ? "var(--accent-dim)" : "transparent",
                        color: newAppt.duration===d ? "var(--accent)" : "var(--text3)",
                        borderColor: newAppt.duration===d ? "rgba(0,229,160,0.3)" : "var(--border)",
                        fontWeight: newAppt.duration===d ? 700 : 400,
                        fontSize: 10, padding:"3px 8px",
                      }}>{d<60?`${d}น.`:`${Math.floor(d/60)}${d%60>0?`ชม.${d%60}น.`:"ชม."}`}</button>
                    ))}
                    <button className="btn btn-xs btn-ghost" style={{ fontSize:10 }} onClick={() => setDurationCustom(true)}>✏️ กรอกเอง</button>
                  </div>
                ) : (
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <input className="finput" type="number" min="5" max="480" step="5"
                      value={newAppt.duration} onChange={e => setNewAppt(a=>({...a,duration:e.target.value}))}
                      style={{ width:80, padding:"5px 8px" }} placeholder="นาที" />
                    <span style={{ fontSize:11, color:"var(--text3)" }}>นาที</span>
                    <button className="btn btn-xs btn-ghost" onClick={() => setDurationCustom(false)}>↩</button>
                  </div>
                )}
              </div>
            </div>

            {/* Row 3: Online → Platform + Link */}
            {isOnline(newAppt.type) && (
              <div style={{ padding:"10px 12px", borderRadius:8, background:"rgba(59,130,246,0.06)", border:"1px solid rgba(59,130,246,0.2)", marginBottom:10 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#3b82f6", marginBottom:8 }}>🖥️ นัดหมายออนไลน์</div>
                <div className="frow">
                  <div className="fg">
                    <label className="flabel">แพลตฟอร์ม</label>
                    <select className="fselect" value={newAppt.platform} onChange={e => setNewAppt(a=>({...a,platform:e.target.value}))}>
                      {MEET_PLATFORMS.map(p => <option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="fg" style={{ flex:3 }}>
                    <label className="flabel">Meeting Link</label>
                    <input className="finput" value={newAppt.meetingLink} onChange={e => setNewAppt(a=>({...a,meetingLink:e.target.value}))}
                      placeholder="https://teams.microsoft.com/l/... หรือ zoom.us/j/..." />
                  </div>
                </div>
              </div>
            )}

            {/* Row 3b: Onsite → Google Maps Link */}
            {isOnsite(newAppt.type) && (
              <div style={{ padding:"10px 12px", borderRadius:8, background:"rgba(16,185,129,0.06)", border:"1px solid rgba(16,185,129,0.2)", marginBottom:10 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#10b981", marginBottom:8 }}>📍 นัดหมาย Onsite</div>
                <div className="fg">
                  <label className="flabel">Google Maps Link (ที่ตั้ง)</label>
                  <input className="finput" value={newAppt.locationLink} onChange={e => setNewAppt(a=>({...a,locationLink:e.target.value}))}
                    placeholder="https://maps.google.com/... หรือ https://goo.gl/maps/..." />
                  {newAppt.locationLink && (
                    <a href={newAppt.locationLink} target="_blank" rel="noopener noreferrer"
                      style={{ fontSize:10, color:"#10b981", display:"block", marginTop:4, textDecoration:"none" }}>
                      📍 ดูแผนที่ →
                    </a>
                  )}
                </div>
              </div>
            )}

            {/* Row 4: Priority + Description */}
            <div className="frow">
              <div className="fg">
                <label className="flabel">ความสำคัญ</label>
                <div style={{ display:"flex", gap:5 }}>
                  {["สูง","กลาง","ต่ำ"].map(p => (
                    <button key={p} className="btn btn-xs" onClick={() => setNewAppt(a=>({...a,priority:p}))} style={{
                      background: newAppt.priority===p ? PRIORITY_COLOR[p]+"22" : "transparent",
                      color: newAppt.priority===p ? PRIORITY_COLOR[p] : "var(--text3)",
                      borderColor: newAppt.priority===p ? PRIORITY_COLOR[p]+"60" : "var(--border)",
                      fontWeight: newAppt.priority===p ? 700 : 400,
                    }}>{p}</button>
                  ))}
                </div>
              </div>
              <div className="fg" style={{ flex:3 }}>
                <label className="flabel">รายละเอียด / สิ่งที่ต้องเตรียม</label>
                <input className="finput" value={newAppt.description} onChange={e => setNewAppt(a=>({...a,description:e.target.value}))} placeholder="สิ่งที่ต้องเตรียม, ประเด็นที่จะพูด..." />
              </div>
            </div>

            {/* Row 5: Reminder chips */}
            <div className="fg">
              <label className="flabel">🔔 แจ้งเตือนล่วงหน้า (เลือกได้หลายรายการ)</label>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {APPT_REMINDER_OPTIONS.map(r => (
                  <button key={r} className="btn btn-xs" onClick={() => toggleApptReminder(r)} style={{
                    background: newAppt.reminders.includes(r) ? "var(--accent-dim)" : "transparent",
                    color: newAppt.reminders.includes(r) ? "var(--accent)" : "var(--text3)",
                    borderColor: newAppt.reminders.includes(r) ? "rgba(0,229,160,0.3)" : "var(--border)",
                    fontWeight: newAppt.reminders.includes(r) ? 700 : 400,
                  }}>{r}</button>
                ))}
              </div>
            </div>

            {/* Row 6: ขอสนับสนุน */}
            <div style={{ padding:"10px 12px", borderRadius:8, background:"rgba(245,158,11,0.06)", border:"1px solid rgba(245,158,11,0.2)", marginTop:8 }}>
              <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom: newAppt.needSupport ? 8 : 0 }}>
                <input type="checkbox" id="needSupportAppt" checked={newAppt.needSupport} onChange={e => setNewAppt(a=>({...a,needSupport:e.target.checked}))} style={{ width:14, height:14, cursor:"pointer" }} />
                <label htmlFor="needSupportAppt" style={{ fontSize:12, fontWeight:600, color:"#f59e0b", cursor:"pointer" }}>
                  🙋 ขอสนับสนุนการนำเสนอ (ME Team / Presales)
                </label>
              </div>
              {newAppt.needSupport && (
                <input className="finput" value={newAppt.supportNote} onChange={e => setNewAppt(a=>({...a,supportNote:e.target.value}))}
                  placeholder="เช่น ขอ ME มาช่วย Demo Clever VR, ต้องการ Presales นำเสนอ Spec..." style={{ fontSize:12 }} />
              )}
            </div>

            <div style={{ display:"flex", gap:8, marginTop:12 }}>
              <button className="btn btn-accent btn-sm" onClick={addAppt} disabled={!newAppt.title || !newAppt.date}>
                ✓ เพิ่มนัดหมาย
              </button>
              <button className="btn btn-ghost btn-sm" onClick={() => { setAddingAppt(false); setDurationCustom(false); }}>ยกเลิก</button>
            </div>
          </div>
        ) : (
          <button className="btn btn-ghost btn-sm" style={{ marginBottom:12, borderColor:"rgba(0,229,160,0.25)", color:"var(--accent)" }}
            onClick={() => setAddingAppt(true)}>
            + เพิ่มนัดหมาย
          </button>
        )}

        <div className="modal-ft">
          <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-accent" onClick={() => { if (f.schoolName) onSave({ ...f, contacts, pendingTasks: appts }); }}>
            {isEdit ? "💾 บันทึก" : "🏫 เพิ่ม Lead"}
          </button>
        </div>
      </div>
    </div>
  );
}

// LEADS PAGE
// ============================================================
function LeadsPage({ leads, setLeads, user, notify, catalog, specialOffers, markSeen, tasks, setTasks }) {
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("ทั้งหมด");
  const [filterZone, setFilterZone] = useState("ทั้งหมด");
  const [showForm, setShowForm] = useState(false);
  const [editLead, setEditLead] = useState(null);
  const [viewLead, setViewLead] = useState(null);

  const visible = leads.filter(l => {
    if (user.role === ROLES.SALES && l.assignedTo !== user.id) return false;
    if (filterStatus !== "ทั้งหมด" && l.status !== filterStatus) return false;
    if (filterZone !== "ทั้งหมด" && l.zone !== filterZone) return false;
    if (search && !l.schoolName.toLowerCase().includes(search.toLowerCase()) && !l.province.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).sort((a, b) => b.leadScore - a.leadScore);

  const saveLead = (f) => {
    const today = new Date().toISOString().split("T")[0];
    // แยก pendingTasks ออกก่อน save lead
    const { pendingTasks = [], ...leadData } = f;

    if (leadData.id) {
      setLeads(ls => ls.map(l => l.id === leadData.id ? { ...leadData, updatedAt: today } : l));
      // สร้าง tasks จาก appointments ใหม่ (edit mode)
      if (pendingTasks.length > 0 && setTasks) {
        const newTasks = pendingTasks.map((appt, idx) => ({
          id: Date.now() * 100 + idx + 1,
          leadId: leadData.id,
          title: appt.title,
          description: [appt.description, appt.needSupport ? `🙋 ขอสนับสนุน: ${appt.supportNote || "ME Team/Presales"}` : ""].filter(Boolean).join(" | "),
          assignedTo: leadData.assignedTo || user.id,
          priority: appt.priority,
          dueDate: appt.date,
          dueTime: appt.time,
          duration: appt.duration || "60",
          meetingLink: appt.meetingLink || "",
          locationLink: appt.locationLink || "",
          platform: appt.platform || "",
          apptType: appt.type,
          reminders: appt.reminders || ["1 วัน"],
          needSupport: appt.needSupport || false,
          supportNote: appt.supportNote || "",
          completed: false,
          createdAt: today,
          createdBy: user.id,
          visibleToAll: true,
          joinedBy: [...new Set([leadData.assignedTo || user.id, user.id])],
          acknowledgedBy: [],
        }));
        setTasks(ts => [...ts, ...newTasks]);
        notify(`แก้ไขข้อมูล + เพิ่ม ${newTasks.length} นัดหมายเรียบร้อย ✓`, "ok");
      } else {
        notify("แก้ไขข้อมูลเรียบร้อย", "ok");
      }
    } else {
      const leadId = Date.now();
      const nl = { ...leadData, id: leadId, leadScore: leadData.status === "Hot" ? 60 : leadData.status === "Warm" ? 35 : 10 };
      setLeads(ls => [...ls, nl]);

      // สร้าง tasks จาก appointments ที่เพิ่มในฟอร์ม
      if (pendingTasks.length > 0 && setTasks) {
        const newTasks = pendingTasks.map((appt, idx) => ({
          id: leadId * 100 + idx + 1,
          leadId: leadId,
          title: appt.title,
          description: [appt.description, appt.needSupport ? `🙋 ขอสนับสนุน: ${appt.supportNote || "ME Team/Presales"}` : ""].filter(Boolean).join(" | "),
          assignedTo: leadData.assignedTo || user.id,
          priority: appt.priority,
          dueDate: appt.date,
          dueTime: appt.time,
          duration: appt.duration || "60",
          meetingLink: appt.meetingLink || "",
          locationLink: appt.locationLink || "",
          platform: appt.platform || "",
          apptType: appt.type,
          reminders: appt.reminders || ["1 วัน"],
          needSupport: appt.needSupport || false,
          supportNote: appt.supportNote || "",
          completed: false,
          createdAt: today,
          createdBy: user.id,
          visibleToAll: true,
          joinedBy: [...new Set([leadData.assignedTo || user.id, user.id])],
          acknowledgedBy: [],
        }));
        setTasks(ts => [...ts, ...newTasks]);    notify(`เพิ่ม Lead + ${newTasks.length} นัดหมายเรียบร้อย ✓`, "ok");
      } else {
        notify("เพิ่ม Lead ใหม่เรียบร้อย", "ok");
      }
    }
    setShowForm(false); setEditLead(null);
  };

  const updateLead = (updated) => {
    setLeads(ls => ls.map(l => l.id === updated.id ? updated : l));
    notify("อัปเดตเรียบร้อย", "ok");
  };

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">🏫 Leads & โรงเรียน</div>
          <div className="ph-sub">จัดการ Lead ทั้งหมด · {visible.length} รายการ</div>
        </div>
        <div className="ph-actions">
          <div className="search-wrap">
            <span className="search-ico">🔍</span>
            <input className="finput search-input" value={search} onChange={e => setSearch(e.target.value)} placeholder="ค้นหาโรงเรียน..." />
          </div>
          <select className="fselect" style={{ width: "auto" }} value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option>ทั้งหมด</option>
            {LEAD_STATUS.map(s => <option key={s}>{s}</option>)}
          </select>
          <select className="fselect" style={{ width: "auto" }} value={filterZone} onChange={e => setFilterZone(e.target.value)}>
            <option>ทั้งหมด</option>
            {ZONES.map(z => <option key={z}>{z}</option>)}
          </select>
          <button className="btn btn-accent" onClick={() => { setEditLead(null); setShowForm(true); }}>+ Lead ใหม่</button>
        </div>
      </div>

      <div className="card">
        {visible.length === 0 ? (
          <div className="empty" style={{ padding: 48 }}><div className="empty-ico">🏫</div><div className="empty-txt">ไม่พบ Lead ที่ตรงเงื่อนไข</div></div>
        ) : (
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{ width: 70 }}></th>
                  <th>โรงเรียน</th>
                  <th>ประเภท/จังหวัด</th>
                  <th>สถานะ</th>
                  <th>Lead Score</th>
                  <th>ผลิตภัณฑ์</th>
                  <th>งบประมาณ</th>
                  <th>กิจกรรม</th>
                  <th>รับผิดชอบ</th>
                </tr>
              </thead>
              <tbody>
                {visible.map(l => (
                  <tr key={l.id} style={{ cursor: "pointer" }} onClick={() => setViewLead(l)}>
                    {/* ── Action buttons — คอลัมน์แรก ── */}
                    <td onClick={e => e.stopPropagation()} style={{ whiteSpace: "nowrap" }}>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button
                          className="btn btn-xs"
                          style={{ background: "var(--accent-dim)", color: "var(--accent)", borderColor: "rgba(0,229,160,0.3)", fontWeight: 700 }}
                          onClick={() => { setEditLead(l); setShowForm(true); }}
                          title="แก้ไข"
                        >✏️ แก้ไข</button>
                        <button
                          className="btn btn-ghost btn-xs"

// ============================================================
// PIPELINE PAGE — clickable cards with detail + school info
// ============================================================
function PipelinePage({ opps, setOpps, leads, user, notify }) {
  const isViewer = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role);
  const myOpps = user.role === ROLES.SALES ? opps.filter(o => o.assignedTo === user.id) : opps;
  const [viewOpp, setViewOpp] = useState(null);

  const moveStage = (id, stage) => {
    setOpps(os => os.map(o => o.id === id ? { ...o, stage } : o));
    notify(`ย้ายไป "${stage}"`, "ok");
    if (viewOpp?.id === id) setViewOpp(v => ({ ...v, stage }));
  };

  const getSchool = (leadId) => leads.find(l => l.id === leadId)?.schoolName || "-";
  const totalByStage = (stage) => myOpps.filter(o => o.stage === stage).reduce((s, o) => s + o.value, 0);

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">🔄 Opportunity Pipeline</div>
          <div className="ph-sub">Total Active: {fmtCurrency(myOpps.filter(o => !["Won", "Lost"].includes(o.stage)).reduce((s, o) => s + o.value, 0))}</div>
        </div>
        {!isViewer && (
          <button className="btn btn-accent" onClick={() => {
            const nl = { id: Date.now(), leadId: leads[0]?.id, name: "New Opportunity", stage: "Prospect", value: 0, probability: 20, products: [], closeDate: "", assignedTo: user.id, notes: "" };
            setOpps(os => [...os, nl]);
            notify("สร้าง Opportunity ใหม่", "ok");
          }}>+ Opportunity</button>
        )}
      </div>

      <div className="pipeline">
        {OPP_STAGES.map(stage => {
          const cards = myOpps.filter(o => o.stage === stage);
          const stageVal = totalByStage(stage);
          return (
            <div className="p-col" key={stage}>
              <div className="p-head" style={{ background: OPP_COLORS[stage] + "25", color: OPP_COLORS[stage] }}>
                <span>{stage}</span>
                <span style={{ background: "rgba(0,0,0,0.3)", padding: "1px 7px", borderRadius: 10, fontSize: 10 }}>{cards.length}</span>
              </div>
              <div className="p-body">
                {stageVal > 0 && <div style={{ fontSize: 10, color: "var(--text3)", padding: "2px 2px 6px", fontFamily: "IBM Plex Mono" }}>{fmtCurrency(stageVal)}</div>}
                {cards.length === 0 && <div style={{ fontSize: 11, color: "var(--text3)", textAlign: "center", padding: "20px 0" }}>ว่าง</div>}
                {cards.map(o => (
                  <div className="p-card" key={o.id} onClick={() => setViewOpp(o)}>
                    <div className="p-card-name">{o.name}</div>
                    <div className="p-card-val">{fmtCurrency(o.value)}</div>
                    <div className="p-card-sub">🏫 {getSchool(o.leadId)}</div>
                    <div className="p-card-sub">📅 ปิด: {fmtDate(o.closeDate)} · {o.probability}%</div>
                    <UserBadge userId={o.assignedTo} />
                    {!isViewer && (
                      <div style={{ marginTop: 8, display: "flex", gap: 4, flexWrap: "wrap" }} onClick={e => e.stopPropagation()}>
                        {OPP_STAGES.filter(s => s !== stage).filter(s => {
                          const idx = OPP_STAGES.indexOf(stage);
                          return Math.abs(OPP_STAGES.indexOf(s) - idx) <= 2;
                        }).slice(0, 2).map(s => (
                          <button key={s} className="btn btn-xs btn-ghost" onClick={() => moveStage(o.id, s)} style={{ fontSize: 9 }}>→ {s}</button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {viewOpp && (
        <OppDetailModal
          opp={viewOpp} leads={leads} onClose={() => setViewOpp(null)}
          onMoveStage={(id, s) => { moveStage(id, s); setViewOpp(v => ({ ...v, stage: s })); }}
          readOnly={isViewer}
        />
      )}
    </div>
  );
}

// TASKS PAGE
// ============================================================
function TasksPage({ tasks, setTasks, leads, user, notify, confirm }) {
  const [tab, setTab] = useState("pending");
  const [viewMode, setViewMode] = useState("list"); // "list" | "month" | "week" | "day"
  const [calDate, setCalDate] = useState(new Date()); // anchor date for calendar
  const [showForm, setShowForm] = useState(false);
  const [taskShareMsg, setTaskShareMsg] = useState(null);
  const [selectedCalTask, setSelectedCalTask] = useState(null);
  const TASK_TIME_SLOTS = Array.from({length:48},(_,i)=>{ const h=Math.floor(i/2).toString().padStart(2,"0"); const m=i%2===0?"00":"30"; return `${h}:${m}`; });
  const FORM_EMPTY = { title:"", description:"", leadId:null, assignedTo: user.id, priority:"กลาง", dueDate:"", dueTime:"09:00", duration:"60", meetingLink:"", locationLink:"", reminders:["1 วัน"], completed:false, inviteUsers:[], visibleToAll:false };
  const [form, setForm] = useState({ ...FORM_EMPTY, assignedTo: user.id });
  const toggleFormInvite = id => setForm(f => ({ ...f, inviteUsers: f.inviteUsers.includes(id) ? f.inviteUsers.filter(x=>x!==id) : [...f.inviteUsers, id] }));

  // ── Calendar helpers ──
  const calYear  = calDate.getFullYear();
  const calMonth = calDate.getMonth();
  const calDay   = calDate.getDate();
  const todayStr = new Date().toISOString().split("T")[0];

  const toDateStr = (d) => d.toISOString().split("T")[0];
  const fmtWday   = (d) => d.toLocaleDateString("th-TH", { weekday:"short" });
  const fmtThDate = (d) => d.toLocaleDateString("th-TH", { day:"numeric", month:"short", year:"numeric" });
  const fmtThDateShort = (d) => d.toLocaleDateString("th-TH", { day:"numeric", month:"short" });

  const MONTH_NAMES_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const DAY_SHORT = ["อา","จ","อ","พ","พฤ","ศ","ส"];

  const navPrev = () => {
    const d = new Date(calDate);
    if (viewMode === "month") d.setMonth(d.getMonth()-1);
    else if (viewMode === "week") d.setDate(d.getDate()-7);
    else if (viewMode === "day") d.setDate(d.getDate()-1);
    setCalDate(d);
  };
  const navNext = () => {
    const d = new Date(calDate);
    if (viewMode === "month") d.setMonth(d.getMonth()+1);
    else if (viewMode === "week") d.setDate(d.getDate()+7);
    else if (viewMode === "day") d.setDate(d.getDate()+1);
    setCalDate(d);
  };
  const navToday = () => setCalDate(new Date());

  // header label
  const calLabel = () => {
    if (viewMode === "month") return `${MONTH_NAMES_TH[calMonth]} ${calYear + 543}`;
    if (viewMode === "week") {
      const mon = new Date(calDate); mon.setDate(mon.getDate() - ((mon.getDay()+6)%7));
      const sun = new Date(mon); sun.setDate(sun.getDate()+6);
      return `${fmtThDateShort(mon)} – ${fmtThDateShort(sun)} ${calYear + 543}`;
    }
    if (viewMode === "day") return fmtThDate(calDate);
    return "";
  };

  // Priority color helper
  const pc = (p) => PRIORITY_COLOR[p] || "#888";

  const isManagerUser = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role);
  const myTasks = [ROLES.SALES, ROLES.ACADEMIC, ROLES.PRODUCTION, ROLES.CENTRAL, ROLES.FINANCE].includes(user.role)
    ? tasks.filter(t => t.assignedTo === user.id || t.createdBy === user.id || (t.joinedBy||[]).includes(user.id) || (t.acknowledgedBy||[]).includes(user.id))
    : isManagerUser
      ? tasks.filter(t =>
          t.assignedTo === user.id ||
          (t.joinedBy||[]).includes(user.id) ||
          (t.acknowledgedBy||[]).includes(user.id) ||
          t.createdBy === user.id ||      // ผู้สร้างเห็นงานของตัวเองเสมอ
          t.visibleToAll                  // งานที่ share ให้ทีม
        )
      : tasks;
  const pendingRsvp2 = myTasks.filter(t =>
    t.visibleToAll && !(t.joinedBy||[]).includes(user.id) && !(t.acknowledgedBy||[]).includes(user.id) && t.createdBy !== user.id && !t.completed
  );

  // ── task helpers ที่ต้องใช้ myTasks ──
  const tasksOnDate = (dateStr) => myTasks.filter(t => t.dueDate === dateStr);
  const upcomingTasks = [...myTasks]
    .filter(t => t.dueDate && !t.completed)
    .sort((a, b) => a.dueDate.localeCompare(b.dueDate));
  const jumpToNextAppt = () => {
    const next = upcomingTasks.find(t => t.dueDate >= todayStr);
    if (next) { setCalDate(new Date(next.dueDate + "T12:00:00")); setViewMode("day"); }
    else notify("ไม่มีนัดหมายที่จะมาถึง", "ok");
  };
  const jumpToPrevAppt = () => {
    const past = [...myTasks]
      .filter(t => t.dueDate && t.dueDate < todayStr)
      .sort((a, b) => b.dueDate.localeCompare(a.dueDate));
    if (past[0]) { setCalDate(new Date(past[0].dueDate + "T12:00:00")); setViewMode("day"); }
    else notify("ไม่มีนัดหมายที่ผ่านมา", "ok");
  };

  const filtered = myTasks.filter(t => {
    if (tab === "pending") return !t.completed;
    if (tab === "rsvp")    return t.visibleToAll && !(t.joinedBy||[]).includes(user.id) && !(t.acknowledgedBy||[]).includes(user.id) && t.createdBy !== user.id && !t.completed;
    if (tab === "done") return t.completed;
    if (tab === "overdue") return !t.completed && new Date(t.dueDate) < new Date();
    return true;
  });

  const toggleDone = (id) => setTasks(ts => ts.map(t => t.id === id ? { ...t, completed: !t.completed } : t));
  const deleteTask = async (id) => {
    const t = tasks.find(x=>x.id===id);
    if (!confirm) { setTasks(ts=>ts.filter(t=>t.id!==id)); notify("ลบงานแล้ว","ok"); return; }
    const ok = await confirm({
      msg: "ลบงานนี้?",
      subMsg: t ? `"${t.title}"` : undefined,
      confirmLabel: "🗑 ลบ", danger: true,
    });
    if (ok) { setTasks(ts=>ts.filter(t=>t.id!==id)); notify("ลบงานแล้ว","ok"); }
  };

  // RSVP: เข้าร่วม → เพิ่มตัวเองใน joinedBy (ปฏิทินของตัวเอง)
  const rsvpJoin = (taskId) => {
    setTasks(ts => ts.map(t => {
      if (t.id !== taskId) return t;
      const joined = [...new Set([...(t.joinedBy||[]), user.id])];
      const acked  = (t.acknowledgedBy||[]).filter(id => id !== user.id);
      return { ...t, joinedBy: joined, acknowledgedBy: acked };
    }));
    notify("✅ รับทราบและเข้าร่วมแล้ว — ปรากฏในปฏิทินของคุณ", "ok");
  };
  // RSVP: รับทราบอย่างเดียว → activity สีเทา ไม่ขึ้นปฏิทิน
  const rsvpAck = (taskId) => {
    setTasks(ts => ts.map(t => {
      if (t.id !== taskId) return t;
      const acked  = [...new Set([...(t.acknowledgedBy||[]), user.id])];
      const joined = (t.joinedBy||[]).filter(id => id !== user.id);
      return { ...t, acknowledgedBy: acked, joinedBy: joined };
    }));
    notify("📋 รับทราบแล้ว — ปรากฏในรายงานกิจกรรม", "ok");
  };

  const saveTask = () => {
    if (!form.title) return;
    const today = new Date().toISOString().split("T")[0];
    // รวม inviteUsers + ผู้รับผิดชอบ → joinedBy เริ่มต้น = ผู้สร้าง
    const allInvited = [...new Set([...form.inviteUsers])].filter(id => id !== user.id);
    const newTask = {
      ...form,
      id: Date.now(),
      createdAt: today,
      createdBy: user.id,
      invitedUsers: allInvited,
      joinedBy: [user.id],   // ผู้สร้างเข้าร่วมอัตโนมัติ
      acknowledgedBy: [],
      declinedBy: [],
      declineReasons: {},    // { userId: "เหตุผล..." }
      rsvpLog: [{ userId: user.id, action:"join", ts: new Date().toISOString() }],
      comments: [],  // { id, userId, text, ts } — สื่อสารระหว่างผู้สร้าง + ผู้ถูกเชิญ
      visibleToAll: allInvited.length > 0,
    };
    setTasks(ts => [...ts, newTask]);
    setShowForm(false);
    setForm({ ...FORM_EMPTY, assignedTo: user.id });
    const inviteCount = allInvited.length;
    notify(inviteCount > 0
      ? `✅ สร้างงานและส่งคำเชิญ ${inviteCount} คนเรียบร้อย`
      : "เพิ่มงานใหม่เรียบร้อย", "ok");
  };

  const REMINDER_OPTIONS = ["30 วัน", "7 วัน", "3 วัน", "1 วัน", "6 ชั่วโมง", "2 ชั่วโมง", "1 ชั่วโมง"];
  const toggleReminder = (r) => setForm(f => ({ ...f, reminders: f.reminders.includes(r) ? f.reminders.filter(x => x !== r) : [...f.reminders, r] }));

  const counts = {
    pending: myTasks.filter(t => !t.completed).length,
    rsvp: pendingRsvp2.length,
    done: myTasks.filter(t => t.completed).length,
    overdue: myTasks.filter(t => !t.completed && new Date(t.dueDate) < new Date()).length,
    all: myTasks.length,
  };

  // ── Task detail popup (calendar click) ──
  const TaskPopup = ({ t, onClose }) => {
    if (!t) return null;
    const school2 = leads.find(l => l.id === t.leadId)?.schoolName;
    const dd2 = daysDiff(t.dueDate);
    return (
      <div className="overlay" onClick={onClose} style={{ zIndex:900 }}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:420 }}>
          <div className="modal-hd">
            <div>
              <div className="modal-title">{t.title}</div>
              {t.apptType && <div style={{ fontSize:11, color:"#a78bfa", marginTop:2 }}>{t.apptType}</div>}
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6, fontSize:12 }}>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <span style={{ padding:"2px 9px", borderRadius:8, background:pc(t.priority)+"22", color:pc(t.priority), fontWeight:700, fontSize:10 }}>{t.priority}</span>
              {t.completed && <span style={{ padding:"2px 9px", borderRadius:8, background:"rgba(0,229,160,0.12)", color:"#00e5a0", fontWeight:700, fontSize:10 }}>✓ เสร็จแล้ว</span>}
            </div>
            {t.dueDate && <div style={{ color:"var(--text2)" }}>📅 {fmtDate(t.dueDate)}{t.dueTime ? ` · ${t.dueTime} น.` : ""}{t.duration ? ` (${t.duration} นาที)` : ""}</div>}
            {school2 && <div style={{ color:"var(--text3)" }}>🏫 {school2}</div>}
            {t.description && <div style={{ color:"var(--text2)", lineHeight:1.6 }}>{t.description}</div>}

            <button className="btn btn-accent btn-sm" onClick={() => { toggleDone(t.id); onClose(); }}>

      </div>

  return (
    <div className="page fade-up">
      {taskShareMsg && <LineShareModal msg={taskShareMsg} onClose={() => setTaskShareMsg(null)} title="แชร์นัดประชุมไปยัง LINE" />}

      {/* ── Header ── */}
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">✅ งาน & นัดหมาย</div>

        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          {/* View mode toggle */}
          <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:"1px solid var(--border)" }}>
            {[["list","☰ รายการ"],["month","📅 เดือน"],["week","📆 สัปดาห์"],["day","🗓 วัน"]].map(([v,l]) => (

      {viewMode !== "list" && (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
          <button className="btn btn-ghost btn-sm" onClick={navPrev}>‹</button>
          <div style={{ flex:1, textAlign:"center", fontWeight:700, fontSize:15 }}>{calLabel()}</div>
          <button className="btn btn-ghost btn-sm" onClick={navNext}>›</button>
          <button className="btn btn-ghost btn-sm" onClick={navToday}
            style={{ color:"var(--accent)", borderColor:"rgba(0,229,160,0.3)" }}>วันนี้</button>
          <button className="btn btn-ghost btn-sm" onClick={jumpToPrevAppt}

          <button className="btn btn-ghost btn-sm" onClick={jumpToNextAppt}
            style={{ color:"#f59e0b", borderColor:"rgba(245,158,11,0.3)", fontSize:11 }} title="ข้ามไปนัดถัดไป">นัดถัดไป ›</button>

          <select className="fselect" style={{ width:"auto", padding:"4px 8px", fontSize:11 }}

            onChange={e => { const d=new Date(calDate); d.setFullYear(Number(e.target.value)); setCalDate(d); }}>
            {Array.from({length:101},(_,i)=> new Date().getFullYear()-100+i).map(y=>(
              <option key={y} value={y}>{y+543} ({y})</option>
            ))}
          </select>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════ */}
      {/* VIEW: LIST */}
      {/* ══════════════════════════════════════════════════════ */}
      {viewMode === "list" && (<>
      <div className="tabs">
        {[
          ...(isManagerUser && counts.rsvp > 0 ? [["rsvp", "📅 รอตอบรับ"]] : []),
          ["pending", "รอดำเนินการ"],
          ["overdue", "⚠️ เกินกำหนด"],
          ["done", "เสร็จแล้ว"],
          ["all", "ทั้งหมด"],
        ].map(([v, l]) => (
          <button key={v} className={`tab ${tab === v ? "active" : ""}`} onClick={() => setTab(v)}
            style={v==="rsvp" ? { color: tab===v ? undefined : "#f59e0b" } : {}}>
            {l} {counts[v] > 0 && <span style={{ opacity: 0.6, color: v==="rsvp"?"#f59e0b":undefined }}>({counts[v]})</span>}
          </button>
        ))}
      </div>

      <div className="card" style={{ padding: 0 }}>
        {filtered.length === 0 ? (
          <div className="empty"><div className="empty-ico">✅</div><div className="empty-txt">ไม่มีงานในหมวดนี้</div></div>
        ) : (
          filtered.map(t => {
            const dd = daysDiff(t.dueDate);

            const school = leads.find(l => l.id === t.leadId)?.schoolName;
            return (
              <div className="task-item" key={t.id} style={{
                padding: "13px 18px",
                opacity: (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id) ? 0.6 : 1,

              }}>
                <div className={`task-check ${t.completed ? "done" : ""}`} onClick={() => toggleDone(t.id)}>
                  {t.completed && <span style={{ color: "#000", fontSize: 10 }}>✓</span>}
                </div>
                <div className="task-body">
                  <div className={`task-title ${t.completed ? "done" : ""}`}>{t.title}</div>
                  {t.description && <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 2 }}>{t.description}</div>}
                  <div className="task-meta">
                    <span className={`task-date ${overdue ? "overdue" : ""}`}>
                      {overdue ? `⚠️ เกิน ${Math.abs(dd)} วัน` : dd === 0 ? "⚡ วันนี้" : dd > 0 ? `อีก ${dd} วัน` : ""}

                      {t.dueTime && ` ${t.dueTime} น.`}

                    <span className="task-pri" style={{ background: PRIORITY_COLOR[t.priority] + "25", color: PRIORITY_COLOR[t.priority] }}>

                    {t.apptType && (
                      <span style={{ fontSize: 9, padding: "2px 7px", borderRadius: 8,

                        {t.apptType}
                      </span>
                    )}
                    {school && <span style={{ fontSize: 10, color: "var(--text3)" }}>🏫 {school}</span>}
                    {t.needSupport && <span style={{ fontSize: 10, color: "#f59e0b" }}>🙋 ขอสนับสนุน</span>}
                    {t.reminders?.length > 0 && <span style={{ fontSize: 10, color: "var(--text3)" }}>🔔 {t.reminders.join(", ")}</span>}

                      <a href={t.meetingLink} target="_blank" rel="noopener noreferrer"

                  {t.visibleToAll && t.createdBy !== user.id && (() => {

                    return (<>
                      <button className="btn btn-xs" style={{ background:"rgba(0,229,160,0.12)", color:"#00e5a0", borderColor:"rgba(0,229,160,0.4)", fontWeight:700, fontSize:9, whiteSpace:"nowrap", width:"100%" }}
                        onClick={() => rsvpJoin(t.id)}>✅ เข้าร่วม</button>
                      <button className="btn btn-xs btn-ghost" style={{ fontSize:9, color:"var(--text3)", width:"100%" }}
                        onClick={() => rsvpAck(t.id)}>📋 รับทราบ</button>
                    </>);
                  })()}
                  {/* RSVP summary สำหรับเจ้าของ task */}
                  {t.visibleToAll && t.createdBy === user.id && ((t.joinedBy||[]).length + (t.acknowledgedBy||[]).length) > 1 && (
                    <div style={{ fontSize:9, color:"var(--text3)", textAlign:"center" }}>
                      ✅{(t.joinedBy||[]).length} 📋{(t.acknowledgedBy||[]).length}
                    </div>

                  {/* แชร์ LINE */}
                  {(t.meetingLink || t.locationLink) && (
                    <button className="btn btn-xs" style={{ background:"rgba(0,200,81,0.12)", color:"#00c851", borderColor:"rgba(0,200,81,0.3)", fontWeight:700, whiteSpace:"nowrap", fontSize:9 }}
                      onClick={() => {
                        const school2 = leads.find(l => l.id === t.leadId)?.schoolName || "";
                        const dateStr = t.dueDate ? `📅 ${fmtDate(t.dueDate)}${t.dueTime ? ` เวลา ${t.dueTime} น.` : ""}` : "";
                        const msg = [
                          `📅 *นัดหมาย — ${t.title}*`,
                          t.apptType ? `ประเภท: ${t.apptType}` : null,
                          school2 ? `🏫 ${school2}` : null,
                          dateStr,
                          t.duration ? `⏱ ระยะเวลา: ${t.duration} นาที` : null,
                          ``,
                          t.description ? `📋 รายละเอียด: ${t.description}` : null,
                          t.meetingLink ? `🔗 ${t.platform || "Meeting"}: ${t.meetingLink}` : null,
                          t.locationLink ? `📍 ที่ตั้ง: ${t.locationLink}` : null,
                          ``,
                          `— Nextgen Education`,
                        ].filter(l => l !== null).join("\n");
                        setTaskShareMsg(msg);
                      }}>
                      💚 แชร์ LINE
                    </button>
                  )}
                  <UserBadge userId={t.assignedTo} />
                  <button className="btn btn-ghost btn-xs btn-icon" title="ลบ" onClick={()=>deleteTask(t.id)}>🗑</button>
                </div>
              </div>
            );
          })
        )}
      </div>
      </>)}

      {/* ══════════════════════════════════════════════════════ */}
      {/* VIEW: MONTH */}
      {/* ══════════════════════════════════════════════════════ */}
      {viewMode === "month" && (() => {
        const firstDay   = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
        const daysInMon  = new Date(calYear, calMonth+1, 0).getDate();
        return (
          <div className="card card-p">
            {/* Day headers */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
              {DAY_SHORT.map((d,i) => (
                <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, paddingBottom:6,
                  color: i===0||i===6 ? "var(--red)" : "var(--text3)" }}>{d}</div>
              ))}
            </div>
            {/* Grid */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
              {Array.from({length: firstDay}).map((_,i) => <div key={"e"+i} />)}
              {Array.from({length: daysInMon}).map((_,i) => {
                const day = i+1;
                const ds = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                const dayTasks = tasksOnDate(ds);
                const isToday = ds === todayStr;
                const isSelected = ds === toDateStr(calDate) && calDay !== new Date().getDate() || (isToday);
                const dow = new Date(calYear, calMonth, day).getDay();
                const isWeekend = dow===0||dow===6;
                return (
                  <div key={day}
                    onClick={() => { setCalDate(new Date(calYear,calMonth,day)); setViewMode("day"); }}
                    style={{ minHeight:80, borderRadius:8, padding:"5px 6px", cursor:"pointer",
                      border:`1px solid ${isToday?"rgba(0,229,160,0.4)":"var(--border)"}`,
                      background: isToday?"rgba(0,229,160,0.05)":"var(--bg3)",
                      transition:"background 0.1s" }}
                    onMouseEnter={e=>e.currentTarget.style.background="var(--bg2)"}
                    onMouseLeave={e=>e.currentTarget.style.background=isToday?"rgba(0,229,160,0.05)":"var(--bg3)"}>
                    <div style={{ fontSize:11, fontWeight:700, marginBottom:3,
                      color: isToday?"var(--accent)":isWeekend?"var(--red)":"var(--text2)" }}>{day}</div>
                    {dayTasks.slice(0,3).map(t => {
                      const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
                      return (
                        <div key={t.id}
                          onClick={e => { e.stopPropagation(); setSelectedCalTask(t); }}
                          style={{ fontSize:9, padding:"2px 5px", borderRadius:4, marginBottom:2,
                            background: isAck ? "var(--bg2)" : pc(t.priority)+"22",
                            color: isAck ? "var(--text3)" : pc(t.priority),
                            border: `1px solid ${isAck?"var(--border)":pc(t.priority)+"44"}`,
                            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                            opacity: t.completed ? 0.5 : 1,
                            textDecoration: t.completed ? "line-through" : "none",
                          }} title={t.title}>
                          {t.dueTime ? t.dueTime.slice(0,5)+" " : ""}{t.title}
                        </div>
                      );
                    })}
                    {dayTasks.length>3 && <div style={{ fontSize:8, color:"var(--text3)" }}>+{dayTasks.length-3} อื่น</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ══════════════════════════════════════════════════════ */}
      {/* VIEW: WEEK */}
      {/* ══════════════════════════════════════════════════════ */}
      {viewMode === "week" && (() => {
        // หา Monday ของสัปดาห์นั้น
        const mon = new Date(calDate);
        mon.setDate(mon.getDate() - ((mon.getDay()+6)%7));
        const weekDays = Array.from({length:7}, (_,i) => {
          const d = new Date(mon); d.setDate(mon.getDate()+i); return d;
        });
        // เวลาที่จะแสดง 06:00–22:00
        const HOURS = Array.from({length:17}, (_,i) => i+6);
        return (
          <div className="card card-p" style={{ padding:"12px 0" }}>
            {/* Day headers */}
            <div style={{ display:"grid", gridTemplateColumns:"48px repeat(7,1fr)", gap:0, marginBottom:4 }}>
              <div />
              {weekDays.map((d,i) => {
                const ds = toDateStr(d);
                const isToday = ds===todayStr;
                return (
                  <div key={i} style={{ textAlign:"center", padding:"4px 2px",
                    background: isToday?"rgba(0,229,160,0.08)":"transparent",
                    borderRadius:6 }}>
                    <div style={{ fontSize:10, color: isToday?"var(--accent)":([0,6].includes(d.getDay())?"var(--red)":"var(--text3)"), fontWeight:700 }}>{DAY_SHORT[d.getDay()]}</div>
                    <div style={{ fontSize:16, fontWeight:700, color: isToday?"var(--accent)":"var(--text2)" }}
                      onClick={() => { setCalDate(d); setViewMode("day"); }}
                      onMouseEnter={e=>e.currentTarget.style.cursor="pointer"}>
                      {d.getDate()}
                    </div>
                    {tasksOnDate(ds).length>0 && <div style={{ width:6, height:6, borderRadius:"50%", background:"var(--accent)", margin:"0 auto" }} />}
                  </div>
                );
              })}
            </div>
            {/* Time grid */}
            <div style={{ overflowY:"auto", maxHeight:520 }}>
              {HOURS.map(h => (
                <div key={h} style={{ display:"grid", gridTemplateColumns:"48px repeat(7,1fr)", gap:0, minHeight:56, borderTop:"1px solid var(--border)" }}>
                  <div style={{ fontSize:9, color:"var(--text3)", padding:"4px 6px", textAlign:"right", paddingTop:2 }}>{String(h).padStart(2,"0")}:00</div>
                  {weekDays.map((d,i) => {
                    const ds = toDateStr(d);
                    const isToday = ds===todayStr;
                    const hourTasks = tasksOnDate(ds).filter(t => {
                      if (!t.dueTime) return false;
                      const th = parseInt(t.dueTime.split(":")[0]);
                      return th === h;
                    });
                    // งานที่ไม่มีเวลา → แสดงใน row แรก (h=6)
                    const noTimeTasks = h===6 ? tasksOnDate(ds).filter(t => !t.dueTime) : [];
                    return (
                      <div key={i} style={{ padding:"2px 3px", borderLeft:"1px solid var(--border)",
                        background: isToday?"rgba(0,229,160,0.02)":"transparent" }}>
                        {[...noTimeTasks.map(t=>({...t,_noTime:true})), ...hourTasks].map(t => {
                          const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
                          return (
                            <div key={t.id}
                              onClick={() => setSelectedCalTask(t)}
                              style={{ fontSize:9, padding:"2px 5px", borderRadius:4, marginBottom:2, cursor:"pointer",
                                background: isAck?"var(--bg2)":pc(t.priority)+"22",
                                color: isAck?"var(--text3)":pc(t.priority),
                                border:`1px solid ${isAck?"var(--border)":pc(t.priority)+"44"}`,
                                opacity: t.completed?0.5:1,
                                textDecoration: t.completed?"line-through":"none",
                                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                              }} title={t.title}>
                              {t._noTime ? "📌 " : t.dueTime?.slice(0,5)+" "}{t.title}
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ══════════════════════════════════════════════════════ */}
      {/* VIEW: DAY */}
      {/* ══════════════════════════════════════════════════════ */}
      {viewMode === "day" && (() => {
        const ds = toDateStr(calDate);
        const dayTasks = tasksOnDate(ds);
        const noTimeTasks = dayTasks.filter(t => !t.dueTime);
        const timedTasks  = dayTasks.filter(t => t.dueTime);
        const HOURS_DAY = Array.from({length:18}, (_,i) => i+6); // 06:00–23:00
        const isToday = ds === todayStr;
        return (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 260px", gap:16, alignItems:"start" }}>
            {/* Time column */}
            <div className="card card-p" style={{ padding:"10px 0" }}>
              <div style={{ padding:"8px 16px 4px", borderBottom:"1px solid var(--border)", marginBottom:4 }}>
                <div style={{ fontWeight:700, fontSize:13, color: isToday?"var(--accent)":"var(--text)" }}>
                  {fmtThDate(calDate)}{isToday?" (วันนี้)":""}
                </div>
                {noTimeTasks.length > 0 && (
                  <div style={{ marginTop:8 }}>
                    <div style={{ fontSize:10, color:"var(--text3)", marginBottom:4 }}>📌 ทั้งวัน</div>
                    {noTimeTasks.map(t => {
                      const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
                      return (
                        <div key={t.id} onClick={() => setSelectedCalTask(t)} style={{ fontSize:11, padding:"5px 10px", borderRadius:6, marginBottom:4, cursor:"pointer",
                          background: isAck?"var(--bg3)":pc(t.priority)+"18", color: isAck?"var(--text3)":pc(t.priority),
                          border:`1px solid ${isAck?"var(--border)":pc(t.priority)+"40"}`,
                          opacity: t.completed?0.5:1, textDecoration: t.completed?"line-through":"none" }}>
                          {t.title}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{ overflowY:"auto", maxHeight:560 }}>
                {HOURS_DAY.map(h => {
                  const hStr = String(h).padStart(2,"0");
                  const hTasks = timedTasks.filter(t => parseInt(t.dueTime?.split(":")[0]||"-1") === h);
                  const isCurrentHour = isToday && new Date().getHours() === h;
                  return (
                    <div key={h} style={{ display:"flex", gap:0, minHeight:52, borderTop:"1px solid var(--border)",
                      background: isCurrentHour?"rgba(0,229,160,0.03)":"transparent" }}>
                      <div style={{ width:52, fontSize:10, color: isCurrentHour?"var(--accent)":"var(--text3)", padding:"6px 8px", flexShrink:0, fontFamily:"IBM Plex Mono", fontWeight: isCurrentHour?700:400 }}>
                        {hStr}:00
                      </div>
                      <div style={{ flex:1, padding:"4px 8px", borderLeft:"1px solid var(--border)" }}>
                        {hTasks.map(t => {
                          const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
                          const dur = Number(t.duration||60);
                          const endMin = parseInt(t.dueTime?.split(":")[1]||"0") + dur;
                          const endH = h + Math.floor(endMin/60);
                          const endM = endMin % 60;
                          return (
                            <div key={t.id} onClick={() => setSelectedCalTask(t)} style={{
                              padding:"6px 10px", borderRadius:8, marginBottom:4, cursor:"pointer",
                              background: isAck?"var(--bg3)":pc(t.priority)+"18",
                              border:`1px solid ${isAck?"var(--border)":pc(t.priority)+"40"}`,
                              borderLeft:`3px solid ${isAck?"var(--text3)":pc(t.priority)}`,

                            </div>
                          );
