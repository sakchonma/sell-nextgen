// SHARED CALENDAR PAGE
// ============================================================
function SharedCalendarPage({ events, setEvents, tasks, setTasks, leads, user, notify, confirm }) {
  const today    = new Date();
  const todayStr = today.toISOString().split("T")[0];

  const isManager = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role);
  const isStaff   = [ROLES.SALES, ROLES.ACADEMIC, ROLES.PRODUCTION, ROLES.CENTRAL, ROLES.FINANCE].includes(user.role);
  const isFinance = user.role === ROLES.FINANCE;
  const isCentral = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(user.role);

  // ── State ──
  const [viewMode,      setViewMode]      = useState("month");
  const [calDate,       setCalDate]       = useState(new Date());
  const [showForm,      setShowForm]      = useState(false);
  const [selectedEvent, setSelectedEvent] = useState(null);

  // สำหรับ Manager/Exec: เลือกเห็นของใคร (checked = แสดง)
  const allOtherUsers = USERS.filter(u => u.id !== user.id);
  // ใช้ Array แทน Set เพื่อให้ React detect การเปลี่ยนแปลง
  const [visibleUserIds, setVisibleUserIds] = useState(
    () => allOtherUsers.map(u => u.id)
  );
  const isVisible = id => visibleUserIds.includes(id);
  const toggleUser = id => setVisibleUserIds(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );
  const toggleDept = (role) => {
    const deptIds = USERS.filter(u => u.role === role && u.id !== user.id).map(u => u.id);
    const allOn   = deptIds.every(id => visibleUserIds.includes(id));
    setVisibleUserIds(prev =>
      allOn ? prev.filter(id => !deptIds.includes(id))
            : [...new Set([...prev, ...deptIds])]
    );
  };

  const calYear  = calDate.getFullYear();
  const calMonth = calDate.getMonth();
  const MONTH_TH = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const DAY_TH   = ["อา","จ","อ","พ","พฤ","ศ","ส"];
  const toDS = d => {
    // ใช้ local date เพื่อหลีกเลี่ยง timezone offset ทำให้วันคลาดเคลื่อน
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  };

  const navPrev = () => { const d=new Date(calDate); if(viewMode==="month")d.setMonth(d.getMonth()-1); else d.setDate(d.getDate()-1); setCalDate(d); };
  const navNext = () => { const d=new Date(calDate); if(viewMode==="month")d.setMonth(d.getMonth()+1); else d.setDate(d.getDate()+1); setCalDate(d); };

  // ── กำหนด "owner" ของแต่ละ item เพื่อใช้สีประจำตัว ──
  const itemOwner = item => {
    if (!item) return 0;
    if (item._src === "task") return item.assignedTo || item.createdBy || 0;
    return item.createdBy || 0;
  };
  const itemColor = item => uc(itemOwner(item));

  // ── Build allItems ──
  const buildItems = () => {
    const fromEvents = events.map(e => ({ ...e, _src:"event" }));
    const fromTasks  = tasks
      .filter(t => t.dueDate && !t.completed)
      .map(t => ({
        id:"t"+t.id, _src:"task",
        title:t.title, date:t.dueDate, time:t.dueTime||"",
        duration:t.duration||"60", type:t.apptType||"นัดหมาย",
        createdBy:t.createdBy||0, assignedTo:t.assignedTo||0,
        joinedBy:t.joinedBy||[], acknowledgedBy:t.acknowledgedBy||[], declinedBy:t.declinedBy||[],
        invitedUsers:t.invitedUsers||[],
        rsvpLog:t.rsvpLog||[], declineReasons:t.declineReasons||{},
        visibleToAll:t.visibleToAll||false,
        priority:t.priority, meetingLink:t.meetingLink, locationLink:t.locationLink,
        leadId:t.leadId,
        description:t.description, needSupport:t.needSupport, supportNote:t.supportNote,
        comments:t.comments||[],
      }));
    return [...fromEvents, ...fromTasks];
  };

  const allItems = buildItems().filter(item => {
    const owner = itemOwner(item);

    // declined โดยตัวเอง → ไม่แสดงในปฏิทินเลย (หายออกทันที)
    if ((item.declinedBy||[]).includes(user.id)) return false;

    if (isStaff) {
      // ── Staff: เห็นเฉพาะที่เกี่ยวกับตัวเอง ──
      return owner === user.id ||
        item.createdBy === user.id ||
        (item.joinedBy||[]).includes(user.id) ||
        (item.acknowledgedBy||[]).includes(user.id) ||
        (item.invitedUsers||[]).includes(user.id);
    }

    // ── Manager/Exec: filter by visibleUserIds ──
    // 1. งานของตัวเอง → แสดงเสมอ
    const isMyOwn = owner === user.id || item.createdBy === user.id;
    if (isMyOwn) return true;

    // 2. งานที่ join/ack แล้ว → แสดงก็ต่อเมื่อ owner ยัง tick อยู่
    //    (uncheck owner → งานที่ join แล้วก็หายออกจากปฏิทินด้วย)
    const ownerVisible = visibleUserIds.includes(owner);
    const iJoined = (item.joinedBy||[]).includes(user.id);
    const iAcked  = (item.acknowledgedBy||[]).includes(user.id);
    if (iJoined || iAcked) return ownerVisible || isMyOwn;

    // 3. งานของคนอื่น → แสดงก็ต่อเมื่อ owner ถูก tick
    return ownerVisible;
  });

  const itemsOnDate = ds => allItems.filter(e => e.date === ds);

  // ── RSVP ──
  const rsvpAction = (itemId, action, reason="") => {
    const update = obj => {
      const log = [...(obj.rsvpLog||[]), { userId:user.id, action, reason, ts:new Date().toISOString() }];
      const reasons = { ...(obj.declineReasons||{}) };
      if (reason) reasons[user.id] = reason;
      if (action==="join")    return { ...obj, joinedBy:[...new Set([...(obj.joinedBy||[]),user.id])],    acknowledgedBy:(obj.acknowledgedBy||[]).filter(i=>i!==user.id), declinedBy:(obj.declinedBy||[]).filter(i=>i!==user.id), rsvpLog:log, declineReasons:reasons };
      if (action==="ack")     return { ...obj, acknowledgedBy:[...new Set([...(obj.acknowledgedBy||[]),user.id])], joinedBy:(obj.joinedBy||[]).filter(i=>i!==user.id), declinedBy:(obj.declinedBy||[]).filter(i=>i!==user.id), rsvpLog:log, declineReasons:reasons };
      if (action==="decline") return { ...obj, declinedBy:[...new Set([...(obj.declinedBy||[]),user.id])],  joinedBy:(obj.joinedBy||[]).filter(i=>i!==user.id), acknowledgedBy:(obj.acknowledgedBy||[]).filter(i=>i!==user.id), rsvpLog:log, declineReasons:reasons };
      return obj;
    };
    if (itemId.startsWith("t")) {
      const tid = Number(itemId.slice(1));
      setTasks && setTasks(ts => ts.map(t => t.id===tid ? update(t) : t));
    } else {
      setEvents(es => es.map(e => e.id===itemId ? update(e) : e));
    }
    notify({ join:"✅ เข้าร่วมแล้ว", ack:"📋 รับทราบแล้ว", decline:"❌ ปฏิเสธนัดหมายแล้ว" }[action], "ok");
    setSelectedEvent(null);
  };

  // ── Add Event Form ──
  const EMPTY_EVT = { title:"", type:"นัดหมาย", date:"", time:"09:00", duration:"60", description:"", meetingLink:"", locationLink:"", priority:"กลาง", inviteRoles:[], inviteUsers:[] };
  const [evtForm, setEvtForm] = useState(EMPTY_EVT);
  const setEF = (k,v) => setEvtForm(f=>({...f,[k]:v}));
  const toggleInviteRole = r => setEvtForm(f=>({ ...f, inviteRoles:f.inviteRoles.includes(r)?f.inviteRoles.filter(x=>x!==r):[...f.inviteRoles,r] }));
  const toggleInviteUser = id => setEvtForm(f=>({ ...f, inviteUsers:f.inviteUsers.includes(id)?f.inviteUsers.filter(x=>x!==id):[...f.inviteUsers,id] }));

  const saveEvent = () => {
    if (!evtForm.title || !evtForm.date) return;
    const invitedUserIds = [...new Set([
      ...evtForm.inviteUsers,
      ...USERS.filter(u=>evtForm.inviteRoles.includes(u.role)).map(u=>u.id),
    ])];
    const newEvt = {
      id:"ev"+Date.now(), ...evtForm,
      createdBy:user.id, createdAt:todayStr,
      joinedBy:[user.id], acknowledgedBy:[], declinedBy:[],
      invitedUsers:invitedUserIds,
      rsvpLog:[{ userId:user.id, action:"join", ts:new Date().toISOString() }],
    };
    setEvents(es=>[...es,newEvt]);
    notify(`✅ สร้างกิจกรรม "${evtForm.title}" พร้อมส่งคำเชิญ ${invitedUserIds.length} คน`, "ok");
    setEvtForm(EMPTY_EVT);
    setShowForm(false);
    setCalDate(new Date(evtForm.date+"T12:00:00"));
    setViewMode("day");
  };

  // pending RSVPs
  // pending RSVP ต้องมาจาก buildItems() โดยตรง (ก่อน filter declinedBy)
  // เพราะ allItems ตอนนี้ filter declined ออกแล้ว
  const pendingMyRsvp = buildItems().filter(e =>
    e.createdBy !== user.id &&
    (
      (e.invitedUsers||[]).includes(user.id) ||
      e.visibleToAll ||
      (e._src==="task" && (e.assignedTo===user.id || (e.joinedBy||[]).length>0))
    ) &&
    !(e.joinedBy||[]).includes(user.id) &&
    !(e.acknowledgedBy||[]).includes(user.id) &&
    !(e.declinedBy||[]).includes(user.id)
  );

  // ════════════════════════════════════════════════
  // SUB-COMPONENTS
  // ════════════════════════════════════════════════

  // ── Event chip ──
  const EventChip = ({ item }) => {
    const col      = itemColor(item);
    const owner    = USERS.find(u=>u.id===itemOwner(item));
    const isJoined   = (item.joinedBy||[]).includes(user.id);
    const isDeclined = (item.declinedBy||[]).includes(user.id);
    const isAcked    = (item.acknowledgedBy||[]).includes(user.id) && !isJoined;
    // ถ้า Manager join → แสดง border double เพื่อบอกว่าเราอยู่ด้วย
    const myMark = isJoined?"✅ ":isAcked?"📋 ":isDeclined?"❌ ":"";
    return (
      <div onClick={e=>{e.stopPropagation();setSelectedEvent(item);}}
        style={{ fontSize:9, padding:"2px 6px", borderRadius:5, marginBottom:2, cursor:"pointer",
          background: isDeclined?"var(--bg2)":col.light,
          color: isDeclined?"var(--text3)":col.label,
          border:`1px solid ${col.bg}55`,
          outline: isJoined?`2px solid ${col.bg}66`:"none",
          opacity: isDeclined?0.35:isAcked?0.65:1,
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
          borderLeft:`3px solid ${isDeclined?"var(--text3)":col.bg}`,
          fontWeight: isJoined?700:400,
        }} title={`${item.title} — ${owner?.name||""} ${isJoined?"(คุณเข้าร่วม)":""}`}>
        {myMark}{item.time?item.time.slice(0,5)+" ":""}{item.title}
      </div>
    );
  };

  // ── Event Detail Modal ──
  const EventDetailModal = ({ item, onClose }) => {
    if (!item) return null;
    const creator = USERS.find(u=>u.id===item.createdBy);
    const owner   = USERS.find(u=>u.id===itemOwner(item));
    const col     = itemColor(item);
    const myStatus = (item.joinedBy||[]).includes(user.id)?"join":(item.acknowledgedBy||[]).includes(user.id)?"ack":(item.declinedBy||[]).includes(user.id)?"decline":null;
    const isOwner = item.createdBy===user.id;
    const lead    = leads.find(l=>l.id===item.leadId);
    return (
      <div className="overlay" onClick={onClose} style={{ zIndex:900 }}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:500 }}>
          <div className="modal-hd">
            <div>
              <div className="modal-title">{item.title}</div>
              <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:col.light, color:col.label, fontWeight:700 }}>{item.type}</span>
                {owner && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:col.light, color:col.label }}>👤 {owner.name.split(" ")[0]}</span>}
                {item.priority && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:"var(--bg3)", color:"var(--text3)" }}>{item.priority}</span>}
              </div>
            </div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:8, fontSize:12 }}>
            <div style={{ padding:"10px 12px", borderRadius:8, background:col.light, borderLeft:`3px solid ${col.bg}` }}>
              <div style={{ fontWeight:700, color:col.label }}>📅 {item.date}{item.time?` · ${item.time} น.`:""}{item.duration?` (${item.duration} นาที)`:""}</div>
              {item.date && <div style={{ fontSize:11, color:"var(--text3)", marginTop:2 }}>
                {new Date(item.date+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
              </div>}
            </div>
            {lead && <div style={{ fontSize:12, color:"var(--text2)" }}>🏫 {lead.schoolName}</div>}
            {item.description && <div style={{ color:"var(--text2)", lineHeight:1.6 }}>{item.description}</div>}
            {item.meetingLink && <a href={item.meetingLink} target="_blank" rel="noopener noreferrer" style={{ color:"#3b82f6", textDecoration:"none" }}>🔗 เข้าร่วม Online →</a>}
            {item.locationLink && <a href={item.locationLink} target="_blank" rel="noopener noreferrer" style={{ color:"#10b981", textDecoration:"none" }}>📍 ดูแผนที่ →</a>}
            {item.needSupport && <div style={{ color:"#f59e0b" }}>🙋 ขอสนับสนุน: {item.supportNote||"ME Team/Presales"}</div>}
            {/* RSVP summary */}
            <div style={{ background:"var(--bg3)", borderRadius:8, padding:"10px 12px" }}>
              <div style={{ fontSize:11, fontWeight:700, marginBottom:8, color:"var(--text2)" }}>สถานะการตอบรับ</div>
              <div style={{ display:"flex", gap:12, marginBottom:8 }}>
                {[[(item.joinedBy||[]),"✅","#00e5a0"], [(item.acknowledgedBy||[]),"📋","var(--text3)"], [(item.declinedBy||[]),"❌","var(--red)"]].map(([arr,icon,c],i)=>(
                  <div key={i} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:18, fontWeight:800, color:c, fontFamily:"IBM Plex Mono" }}>{arr.length}</div>
                    <div style={{ fontSize:9, color:"var(--text3)" }}>{icon}</div>
                  </div>
                ))}
              </div>
              {[
                { arr:(item.joinedBy||[]),   label:"✅ เข้าร่วม", c:"#00e5a0" },
                { arr:(item.acknowledgedBy||[]), label:"📋 รับทราบ",  c:"var(--text3)" },
                { arr:(item.declinedBy||[]),  label:"❌ ปฏิเสธ",   c:"var(--red)" },
              ].filter(({arr})=>arr.length>0).map(({arr,label,c},i)=>(
                <div key={i} style={{ fontSize:10, marginBottom:3 }}>
                  <span style={{ color:c, fontWeight:700 }}>{label}</span>: {arr.slice(0,4).map(id=>USERS.find(u=>u.id===id)?.name?.split(" ")[0]||id).join(", ")}
                  {arr.length>4&&` +${arr.length-4}`}
                </div>
              ))}
              {/* rsvpLog history */}
              {(item.rsvpLog||[]).length > 1 && (
                <div style={{ marginTop:8, borderTop:"1px solid var(--border)", paddingTop:6 }}>
                  <div style={{ fontSize:10, fontWeight:700, color:"var(--text3)", marginBottom:4 }}>📋 ประวัติการตอบรับ</div>
                  {[...(item.rsvpLog||[])].reverse().slice(0,6).map((log,i)=>{
                    const lu=USERS.find(u=>u.id===log.userId);
                    const lc=uc(log.userId);
                    const al={join:"✅ เข้าร่วม",ack:"📋 รับทราบ",decline:"❌ ปฏิเสธ"}[log.action]||log.action;
                    const reasonTxt = log.reason ? ` — "${log.reason}"` : "";
                    return (
                      <div key={i} style={{ fontSize:10, marginBottom:3, display:"flex", gap:6, alignItems:"center" }}>
                        <span style={{ width:6, height:6, borderRadius:"50%", background:lc.bg, flexShrink:0, display:"inline-block" }}/>
                        <span style={{ color:lc.label, fontWeight:600 }}>{lu?.name?.split(" ")[0]||"?"}</span>
                        <span style={{ color:"var(--text3)" }}>→ {al}{reasonTxt}</span>
                        <span style={{ color:"var(--text3)", marginLeft:"auto" }}>{new Date(log.ts).toLocaleString("th-TH",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
                      </div>
                    );

              )}
            </div>
            <div style={{ fontSize:10, color:"var(--text3)" }}>
              สร้างโดย: <span style={{ fontWeight:700, color:uc(item.createdBy||0).label }}>{creator?.name||"?"}</span>

                  if(ok){ if(item._src==="event") setEvents(es=>es.filter(e=>e.id!==item.id)); onClose(); notify("ลบกิจกรรมแล้ว","ok"); }

                🗑 ลบ

              <button className="btn btn-ghost btn-sm" onClick={onClose}>ปิด</button>

          )}
        </div>

    );
  };

  // ── Month View ──
  const MonthView = () => {
    const firstDay = new Date(calYear, calMonth, 1).getDay();
