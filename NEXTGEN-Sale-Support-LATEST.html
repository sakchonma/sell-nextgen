              </div>
            ))}
          </div>
        </div>

        {/* ── Right panel: selected date / upcoming ── */}
        <div>
          {/* Selected date tasks */}
          {selected && (
            <div className="card card-p" style={{ marginBottom:14 }}>
              <div style={{ fontWeight:700, fontSize:13, color:"var(--accent)", marginBottom:10 }}>
                📅 {new Date(selected+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long"})}
              </div>
              {selectedReqs.length === 0 ? (
                <div style={{ fontSize:12, color:"var(--text3)" }}>ไม่มีงานวันนี้</div>
              ) : selectedReqs.map(item => {
                const isTask = item._type === "task";
                const lead = leads.find(l => l.id === item.leadId);
                const assignedUser = USERS.find(u => u.id === item.assignedTo);
                const taskColor = isTask ? (salesColorMap[item.assignedTo] || "#00e5a0") : null;
                const bdrColor = isTask ? taskColor : (statusColor[item.status]||"#6b7280");
                return (
                  <div key={item._type+item.id} style={{ padding:"10px 12px", borderRadius:9,
                    border:`1px solid ${bdrColor}40`,
                    background:`${bdrColor}0a`,
                    marginBottom:10, cursor: isTask ? "default" : "pointer" }}
                    onClick={() => { if(!isTask) setViewReq(item); }}>
                    <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:5 }}>
                      <span style={{ fontSize:14 }}>{isTask ? "🎯" : (REQ_TYPES[item.type]?.icon || "📋")}</span>
                      <span style={{ fontWeight:700, fontSize:12 }}>{item.title}</span>
                      {isTask && <span style={{ fontSize:9, padding:"1px 6px", borderRadius:8,
                        background: (taskColor||"#888888")+"22", color: taskColor, fontWeight:700 }}>งาน Sales</span>}
                    </div>
                    {!isTask && (
                      <div style={{ fontSize:10, color:"var(--text3)", marginBottom:3 }}>
                        {REQ_TYPES[item.type]?.label} · {item.subtype}
                      </div>
                    )}
                    {isTask && item.dueTime && (
                      <div style={{ fontSize:10, color:"var(--text3)", marginBottom:3 }}>⏰ {item.dueTime} น.</div>
                    )}
                    {isTask && item.description && (
                      <div style={{ fontSize:10, color:"var(--text3)", marginBottom:3 }}>{item.description.slice(0,60)}{item.description.length>60?"…":""}</div>
                    )}
                    {lead && <div style={{ fontSize:10, color:"var(--text3)" }}>🏫 {lead.schoolName}</div>}
                    {!isTask && item.location && <div style={{ fontSize:10, color:"var(--text3)" }}>📍 {item.location}</div>}
                    {assignedUser && (
                      <div style={{ fontSize:10, color: isTask ? taskColor : "#8b5cf6", marginTop:2 }}>
                        {isTask ? "🎯" : "🔧"} {assignedUser.name}
                        {isTask && assignedUser.zone ? ` (${assignedUser.zone})` : ""}
                      </div>
                    )}
                    {!isTask && <div style={{ marginTop:6 }}><ReqStatusBadge status={item.status} /></div>}
                    {isTask && (
                      <div style={{ marginTop:6, display:"flex", gap:6 }}>
                        <span style={{ fontSize:9, padding:"1px 6px", borderRadius:6,
                          background: (PRIORITY_COLOR[item.priority]||"#888888")+"22", color: PRIORITY_COLOR[item.priority]||"var(--text3)", fontWeight:700 }}>
                          {item.priority}
                        </span>
                        {item.reminders?.length > 0 && (
                          <span style={{ fontSize:9, color:"var(--text3)" }}>🔔 {item.reminders[0]}</span>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Upcoming 14 days */}
          <div className="card card-p">
            <div style={{ fontWeight:700, fontSize:12, marginBottom:10, color:"var(--text2)" }}>
              🗓️ ภารกิจที่จะมาถึง (14 วัน)
            </div>
            {upcoming.length === 0 ? (
              <div style={{ fontSize:12, color:"var(--text3)" }}>ไม่มีงานที่กำลังจะมาถึง</div>
            ) : upcoming.map(item => {
              const isTask = item._type === "task";
              const lead = leads.find(l => l.id === item.leadId);
              const assignedUser = USERS.find(u => u.id === item.assignedTo);
              const dateStr = isTask ? item.dueDate : item.eventDate;
              const daysLeft = Math.ceil((new Date(dateStr) - today) / 86400000);
              const taskColor = isTask ? (salesColorMap[item.assignedTo]||"#00e5a0") : null;
              return (
                <div key={item._type+item.id}
                  onClick={() => { if(!isTask) setViewReq(item); }}
                  style={{ padding:"9px 11px", borderRadius:9, marginBottom:8,
                    cursor: isTask ? "default" : "pointer",
                    border:`1px solid ${daysLeft <= 3 ? "rgba(239,68,68,0.35)" : isTask ? (taskColor||"#888888")+"22" : "var(--border)"}`,
                    background: daysLeft <= 3 ? "rgba(239,68,68,0.05)" : isTask ? (taskColor||"#888888")+"22" : "var(--bg3)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                    <span style={{ fontSize:11, fontWeight:700 }}>
                      {isTask ? "🎯 " : "📋 "}{(item.title||"?").substring(0,24)}{(item.title||"?").length>24?"…":""}
                    </span>
                    <span style={{ fontSize:10, fontWeight:700, fontFamily:"IBM Plex Mono",
                      color: daysLeft <= 3 ? "var(--red)" : daysLeft <= 7 ? "#f59e0b" : "var(--text3)" }}>
                      {daysLeft === 0 ? "วันนี้!" : daysLeft < 0 ? `${-daysLeft}วันที่แล้ว` : `${daysLeft}วัน`}
                    </span>
                  </div>
                  <div style={{ fontSize:10, color: isTask ? taskColor : "var(--accent)", fontFamily:"IBM Plex Mono" }}>{fmtDate(dateStr)}</div>
                  {lead && <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>🏫 {lead.schoolName}</div>}
                  {assignedUser && (
                    <div style={{ fontSize:10, color: isTask ? taskColor : "#8b5cf6", marginTop:1 }}>
                      {isTask ? "🎯" : "🔧"} {assignedUser.name}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Request detail modal (reuse) */}
      {viewReq && (
        <RequestDetailModal req={viewReq} leads={leads} currentUser={currentUser}
          onUpdate={r => { setViewReq(null); }}
          onClose={() => setViewReq(null)} />
      )}
    </div>
  );
}


// ============================================================
// LINE SHARE MODAL — reusable, with copy feedback
// ============================================================
function LineShareModal({ msg, onClose, title = "แชร์ข้อความไปยัง LINE" }) {
  const [copied, setCopied] = React.useState(false);

  const handleCopy = () => {
    copyToClipboard(msg, () => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    });
  };

  const handleLineOpen = () => {
    handleCopy(); // copy ไปด้วยเลย
    window.open(`https://line.me/R/share?text=${encodeURIComponent(msg)}`, "_blank");
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 500 }}>
        <div className="modal-hd">
          <div className="modal-title">💚 {title}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div style={{ padding: "12px 0" }}>
          {/* ข้อความที่จะแชร์ */}
          <div style={{
            background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 10,
            padding: 14, fontFamily: "monospace", fontSize: 12, whiteSpace: "pre-wrap",
            color: "#065f46", marginBottom: 12, maxHeight: 320, overflowY: "auto",
            lineHeight: 1.75, userSelect: "all",
          }}>
            {msg}
          </div>

          {/* feedback */}
          {copied && (
            <div style={{
              textAlign: "center", fontSize: 12, color: "#059669", fontWeight: 700,
              marginBottom: 10, padding: "6px", background: "#f0fdf4",
              borderRadius: 8, border: "1px solid #bbf7d0",
            }}>
              ✅ คัดลอกข้อความแล้ว — วางใน LINE ได้เลย
            </div>
          )}

          {/* buttons */}
          <div style={{ display: "flex", gap: 8 }}>
            <button
              className="btn btn-accent"
              style={{ flex: 2, background: "#00b900", borderColor: "#00b900", color: "#fff", fontWeight: 700 }}
              onClick={handleLineOpen}>
              💚 เปิด LINE แล้วแชร์
            </button>
            <button
              className="btn btn-ghost"
              style={{ flex: 1, fontWeight: copied ? 700 : 400, color: copied ? "#059669" : undefined }}
              onClick={handleCopy}>
              {copied ? "✅ คัดลอกแล้ว" : "📋 คัดลอก"}
            </button>
          </div>

          <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 10, textAlign: "center", lineHeight: 1.6 }}>
            ปุ่มเขียว: เปิด LINE app แล้วเลือกส่งถึงใคร (deep link){"\n"}
            ปุ่มคัดลอก: คัดลอกข้อความ แล้ววางเองใน LINE ได้เลย
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// FINANCE PAGE — ดูและออกใบเสนอราคาทุก Sales
// ============================================================
function FinancePage({ leads, currentUser, onUpdate, markSeen }) {
  const isFinance  = currentUser.role === ROLES.FINANCE;
  const isManager  = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isExec     = [ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const canApprove = isManager || isExec;
  const today = new Date().toISOString().split("T")[0];

  const isSales    = currentUser.role === ROLES.SALES;
  const defaultTab = canApprove ? "pending_my" : isSales ? "issued" : "pending_finance";

  // Sales เปิดหน้านี้ → mark issued/rejected quotes ว่าดูแล้ว
  useEffect(() => {
    if (!isSales || !markSeen) return;
    const myQuotes = leads.flatMap(l => (l.quotes||[]).map(q=>({...q,lead:l})))
      .filter(q => q.createdBy === currentUser.id &&
        ["issued","rejected"].includes(q.approvalStatus));
    if (myQuotes.length > 0)
      markSeen(myQuotes.map(q => `q:${q.id}:${q.approvalStatus}`));
  }, []); // eslint-disable-line
  const [filterStatus, setFilterStatus] = useState(defaultTab);
  const [search,       setSearch]       = useState("");
  const [rejectModal,  setRejectModal]  = useState(null);
  const [approveModal, setApproveModal] = useState(null);
  const [shareMsg,     setShareMsg]     = useState(null);
  const [printQ,       setPrintQ]       = useState(null);

  const allQuotes = leads.flatMap(lead =>
    (lead.quotes || []).map(q => ({ ...q, lead: lead || {} }))
  ).filter(q =>
    // Sales เห็นเฉพาะ quote ที่ตัวเองสร้าง, role อื่นเห็นทั้งหมด
    currentUser.role !== ROLES.SALES || q.createdBy === currentUser.id
  );

  const pendingMyCount  = canApprove ? allQuotes.filter(q =>
    (isExec    && (q.approvalStatus==="pending_exec" || q.approvalStatus==="pending_manager")) ||
    (isManager && q.approvalStatus==="pending_manager")
  ).length : 0;
  const pendingFinCount = allQuotes.filter(q => q.approvalStatus==="pending_finance").length;

  const QPRI = { pending_manager:0, pending_exec:1, pending_finance:2, draft:3, issued:4, rejected:5 };

  const filtered = allQuotes.filter(q => {
    const st = q.approvalStatus;
    if (filterStatus==="pending_my") {
      if (isExec)    return st==="pending_exec" || st==="pending_manager";
      if (isManager) return st==="pending_manager";
      return false;
    }
    if (filterStatus!=="all" && st!==filterStatus) return false;
    if (search) {
      const s = search.toLowerCase();
      if (!(q.lead?.schoolName||'').toLowerCase().includes(s) && !String(q.id).includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>{
    const pa=QPRI[a.approvalStatus]??9, pb=QPRI[b.approvalStatus]??9;
    return pa!==pb ? pa-pb : new Date(b.createdAt)-new Date(a.createdAt);
  });

  const updateQ = (q, patch) => {
    // ใช้ fresh lead จาก leads state ล่าสุดเสมอ (ป้องกัน stale closure)
    const freshLead = leads.find(l => l.id === (q.lead?.id ?? q.leadId)) || q.lead || {};
    onUpdate({
      ...freshLead,
      quotes: (freshLead.quotes || []).map(x => x.id === q.id ? { ...x, ...patch } : x),
    });
  };

  const doManagerApprove = (q, note="") => {
    const maxD     = Math.max(...(q.items||[]).map(it=>it.discountPct||0), 0);
    const needExec = maxD > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20);
    updateQ(q, { approvalStatus: needExec?"pending_exec":"pending_finance",
      managerApprovedBy:currentUser.id, managerApprovedAt:today, managerNote:note });
    setApproveModal(null);
  };
  const doExecApprove = (q, note="") => {
    updateQ(q, { approvalStatus:"pending_finance",
      execApprovedBy:currentUser.id, execApprovedAt:today, execNote:note });
    setApproveModal(null);
  };
  const doReject = (q, note) => {
    updateQ(q, { approvalStatus:"rejected", rejectedBy:currentUser.id, rejectedAt:today, rejectNote:note });
    setRejectModal(null); setApproveModal(null);
  };
  const doIssue = (q) => {
    updateQ(q, { approvalStatus:"issued", issuedBy:currentUser.id, issuedAt:today });
    // หลังออกใบ → เปิด share modal พร้อม q.lead ที่ครบถ้วน
    const issuedQ = { ...q, approvalStatus:"issued", issuedBy:currentUser.id, issuedAt:today };
    setTimeout(() => setShareMsg(buildShareMsg(issuedQ)), 150);
  };

  const buildShareMsg = (q) => {
    const total = (q.items||[]).reduce((s,it)=>s+it.finalTotal,0);
    const issuerUser = USERS.find(u => u.id === (q.issuedBy || currentUser.id));
    return [
      `📄 *ใบเสนอราคา #${String(q.id).slice(-6)}*`,
      `🏫 ${q.lead?.schoolName || ""}`,
      `📅 วันที่ออก: ${fmtDate(q.quoteDate||q.createdAt)}`,
      q.validUntil ? `⏱ ใช้ได้ถึง: ${fmtDate(q.validUntil)}${q.validDays ? ` (${q.validDays} วัน)` : ""}` : null,
      ``,
      `📦 รายการสินค้า:`,
      ...(q.items||[]).map(it => {
        const d = it.discountPct + (it.offerDiscountPct || 0);
        return `  • ${it.productName}${it.billingLabel ? ` (${it.billingLabel})` : ""} × ${fmt(it.qty)} ${it.unit}${d > 0 ? ` (-${d}%)` : ""} = ${fmtCurrency(it.finalTotal)}`;
      }),
      ``,
      `💰 *รวมทั้งหมด (ไม่รวม VAT): ${fmtCurrency(total)}*`,
      q.note ? `📝 หมายเหตุ: ${q.note}` : null,
      ``,
      `✅ ออกใบโดย: ${issuerUser?.name || "Nextgen Education"}`,
      `— Nextgen Education Co., Ltd.`,
    ].filter(l => l !== null).join("\n");
  };

  if (printQ) return (
    <div className="page fade-up">
      <QuotePrint quote={printQ} lead={printQ.lead || {}} onBack={()=>setPrintQ(null)} />
    </div>
  );

  const issuedCount = allQuotes.filter(q=>q.approvalStatus==="issued").length;
  const STATUS_TABS = [
    ...(canApprove?[{v:"pending_my",l:`${isExec?"👑":"📊"} รอฉันอนุมัติ`,count:pendingMyCount,alert:true}]:[]),
    ...(isFinance ?[{v:"pending_finance",l:"🔵 รอออกใบ",count:pendingFinCount,alert:true}]:[]),
    ...(isSales   ?[{v:"issued",l:"📄 ออกแล้ว — พร้อมแชร์",count:issuedCount,alert:issuedCount>0}]:[]),
    {v:"all",l:"ทั้งหมด",count:allQuotes.length},
    ...(!isSales?[
      {v:"pending_manager",l:"🟡 รอ Manager",count:allQuotes.filter(q=>q.approvalStatus==="pending_manager").length},
      {v:"pending_exec",   l:"🟣 รอ Exec",   count:allQuotes.filter(q=>q.approvalStatus==="pending_exec").length},
      {v:"pending_finance",l:"🔵 รอออกใบ",   count:pendingFinCount},
      {v:"issued",         l:"✅ ออกแล้ว",   count:issuedCount},
    ]:[
      {v:"pending_manager",l:"🟡 รออนุมัติ",count:allQuotes.filter(q=>["pending_manager","pending_exec"].includes(q.approvalStatus)).length},
    ]),
    {v:"rejected",l:"❌ ปฏิเสธ",count:allQuotes.filter(q=>q.approvalStatus==="rejected").length},
  ].filter((t,i,arr)=>arr.findIndex(x=>x.v===t.v)===i);

  return (
    <div className="page fade-up">

      {/* ── Reject Modal ── */}
      {rejectModal && (
        <div className="overlay" onClick={()=>setRejectModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
            <div className="modal-hd">
              <div className="modal-title">✕ ไม่อนุมัติใบ #{String(rejectModal.q.id).slice(-6)}</div>
              <button className="modal-close" onClick={()=>setRejectModal(null)}>✕</button>
            </div>
            <div style={{padding:"4px 0 12px"}}>
              <div style={{background:"var(--bg3)",borderRadius:8,padding:10,marginBottom:12,fontSize:11,color:"var(--text2)"}}>
                🏫 {rejectModal.q.lead?.schoolName || ''} · {fmtCurrency((rejectModal.q.items||[]).reduce((s,it)=>s+it.finalTotal,0))}
                {rejectModal.q.discountReason&&<div style={{color:"#f59e0b",marginTop:4,fontStyle:"italic"}}>💬 "{rejectModal.q.discountReason}"</div>}
              </div>
              <label className="flabel" style={{color:"var(--red)"}}>เหตุผลที่ไม่อนุมัติ *</label>
              <textarea className="ftextarea" autoFocus
                value={rejectModal.note||""}
                onChange={e=>setRejectModal(m=>({...m,note:e.target.value}))}
                placeholder="เช่น ส่วนลดสูงเกินไป ให้ Sales ปรับใหม่, เปลี่ยน package..."
                style={{minHeight:80}}/>
            </div>
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={()=>setRejectModal(null)}>ยกเลิก</button>
              <button className="btn btn-red" disabled={!rejectModal.note?.trim()}
                onClick={()=>doReject(rejectModal.q,rejectModal.note)}>✕ ยืนยันไม่อนุมัติ</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Approve Modal ── */}
      {approveModal && (
        <div className="overlay" onClick={()=>setApproveModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:520}}>
            <div className="modal-hd">
              <div className="modal-title">
                {approveModal.role==="exec"?"👑 Exec":"📊 Manager"} — พิจารณาใบเสนอราคา
              </div>
              <button className="modal-close" onClick={()=>setApproveModal(null)}>✕</button>
            </div>
            <div style={{background:"var(--bg3)",borderRadius:10,padding:14,margin:"8px 0 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontWeight:700,fontSize:13}}>ใบ #{String(approveModal.q.id).slice(-6)} · 🏫 {approveModal.q.lead?.schoolName || ''}</span>
                <span style={{fontFamily:"IBM Plex Mono",fontWeight:700,color:"var(--accent)"}}>
                  {fmtCurrency((approveModal.q.items||[]).reduce((s,it)=>s+it.finalTotal,0))}
                </span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:10}}>
                {(approveModal.q.items||[]).map((it,i)=>{
                  const d=it.discountPct+(it.offerDiscountPct||0);
                  return(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text2)"}}>
                      <span>{it.productName}{it.billingLabel?` (${it.billingLabel})`:""} × {it.qty} {it.unit}</span>
                      <span>{d>0&&<span style={{color:"#f87171",marginRight:6}}>-{d}%</span>}{fmtCurrency(it.finalTotal)}</span>
                    </div>
                  );
                })}
              </div>
              {(()=>{
                const aq=approveModal.q;
                const maxD=Math.max(...(aq.items||[]).map(it=>it.discountPct||0), 0);
                const mgrLim=DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20;
                const salLim = (PER_USER_LIMITS[aq.createdBy] != null)
                  ? PER_USER_LIMITS[aq.createdBy]
                  : (DISCOUNT_LIMITS[ROLES.SALES]?.max ?? 10);
                if(maxD===0) return null;
                return(
                  <div style={{padding:"6px 10px",borderRadius:6,marginBottom:8,
                    background:maxD>mgrLim?"rgba(139,92,246,0.12)":"rgba(245,158,11,0.10)",
                    border:`1px solid ${maxD>mgrLim?"rgba(139,92,246,0.3)":"rgba(245,158,11,0.25)"}`}}>
                    <span style={{fontSize:11,color:maxD>mgrLim?"#a78bfa":"#f59e0b",fontWeight:700}}>
                      ⚠️ ส่วนลดสูงสุด {maxD}%{maxD>mgrLim?` (เกิน Manager limit ${mgrLim}% → ต้อง Exec อนุมัติ)`:` (เกิน Sales limit ${salLim}%)`}
                    </span>
                  </div>
                );
              })()}
              {approveModal.q.discountReason&&(
                <div style={{fontSize:11,color:"#f59e0b",fontStyle:"italic",marginBottom:6}}>
                  💬 เหตุผลของ Sales: "{approveModal.q.discountReason}"
                </div>
              )}
              {approveModal.q.managerApprovedAt&&(
                <div style={{fontSize:10,color:"var(--text3)"}}>
                  ✓ Manager: {USERS.find(u=>u.id===approveModal.q.managerApprovedBy)?.name} · {fmtDate(approveModal.q.managerApprovedAt)}
                  {approveModal.q.managerNote&&` — "${approveModal.q.managerNote}"`}
                </div>
              )}
            </div>
            <div className="fg">
              <label className="flabel">หมายเหตุ / เงื่อนไข (ไม่บังคับ)</label>
              <textarea className="ftextarea"
                value={approveModal.note||""}
                onChange={e=>setApproveModal(m=>({...m,note:e.target.value}))}
                placeholder="เช่น อนุมัติตามที่ขอ, ต้องปิดดีลภายใน Q1..."
                style={{minHeight:64}}/>
            </div>
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={()=>setApproveModal(null)}>ยกเลิก</button>
              <button className="btn btn-red btn-sm"
                onClick={()=>{setRejectModal({q:approveModal.q,note:""});setApproveModal(null);}}>
                ✕ ไม่อนุมัติ
              </button>
              <button className="btn btn-accent"
                onClick={()=>{
                  if(approveModal.role==="exec") doExecApprove(approveModal.q,approveModal.note||"");
                  else doManagerApprove(approveModal.q,approveModal.note||"");
                }}>
                ✓ {approveModal.role==="exec"?"Exec อนุมัติ → Finance":(()=>{
                  const maxD=Math.max(...(approveModal.q.items||[]).map(it=>it.discountPct||0), 0);
                  return maxD>(DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20)?"ส่งให้ Exec อนุมัติ":"Manager อนุมัติ → Finance";
                })()}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── LINE share modal ── */}
      {shareMsg&&(
        <LineShareModal msg={shareMsg} onClose={()=>setShareMsg(null)} />
      )}

      {/* ── Header ── */}
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">💼 {canApprove ? "อนุมัติ & ใบเสนอราคา" : "ใบเสนอราคา"}</div>
          <div className="ph-sub">{canApprove?"พิจารณาอนุมัติส่วนลด และติดตามสถานะใบเสนอราคาทั้งหมด":"ตรวจสอบและออกใบเสนอราคาให้ Sales"}</div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {pendingMyCount>0&&canApprove&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(245,158,11,0.12)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:8,padding:"6px 12px"}}>
              <span style={{fontSize:12,color:"#f59e0b",fontWeight:700}}>⏳ รอฉันอนุมัติ {pendingMyCount} ใบ</span>
            </div>
          )}
          {pendingFinCount>0&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"rgba(59,130,246,0.12)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:8,padding:"6px 12px"}}>
              <span style={{fontSize:12,color:"#3b82f6",fontWeight:700}}>📋 รอออกใบ {pendingFinCount} ใบ</span>
            </div>
          )}
        </div>
      </div>

      {/* ── Summary ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:20}}>
        {[
          {l:"รอ Manager",n:allQuotes.filter(q=>q.approvalStatus==="pending_manager").length,c:"#f59e0b"},
          {l:"รอ Exec",   n:allQuotes.filter(q=>q.approvalStatus==="pending_exec").length,   c:"#8b5cf6"},
          {l:"รอออกใบ",  n:pendingFinCount,                                                  c:"#3b82f6"},
          {l:"ออกแล้ว",  n:allQuotes.filter(q=>q.approvalStatus==="issued").length,           c:"#00e5a0"},
          {l:"ปฏิเสธ",   n:allQuotes.filter(q=>q.approvalStatus==="rejected").length,         c:"#ef4444"},
        ].map((s,i)=>(
          <div key={i} className="stat" style={{cursor:"default"}}>
            <div className="stat-accent" style={{background:s.c}}/>
            <div className="stat-val" style={{fontSize:22,color:s.c,fontWeight:800}}>{s.n}</div>
            <div className="stat-lbl">{s.l}</div>
          </div>
        ))}
      </div>

      {/* ── Tabs + search ── */}
      <div style={{display:"flex",gap:10,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
        <div className="tabs" style={{marginBottom:0,flexWrap:"wrap"}}>
          {STATUS_TABS.map(t=>(
            <button key={t.v} className={`tab ${filterStatus===t.v?"active":""}`} onClick={()=>setFilterStatus(t.v)}
              style={t.alert&&filterStatus!==t.v&&t.count>0?{color:t.v==="pending_my"?"#f59e0b":"#3b82f6",fontWeight:700}:{}}>
              {t.l}
              {t.count>0&&<span style={{marginLeft:4,fontSize:10,opacity:0.65}}>({t.count})</span>}
            </button>
          ))}
        </div>
        <input className="finput" style={{width:180,padding:"5px 10px",fontSize:12}}
          placeholder="🔍 ค้นหาโรงเรียน..." value={search} onChange={e=>setSearch(e.target.value)}/>
      </div>

      {/* ── Quote list ── */}
      {filtered.length===0 ? (
        <div className="card">
          <div className="empty">
            <div className="empty-ico">{filterStatus==="pending_my"?"✅":"📄"}</div>
            <div className="empty-txt">{filterStatus==="pending_my"?"ไม่มีใบที่รอการพิจารณา":"ไม่มีใบเสนอราคาในหมวดนี้"}</div>
          </div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {filtered.map(q=>{
            const total   = (q.items||[]).reduce((s,it)=>s+it.finalTotal,0);
            const creator = USERS.find(u=>u.id===q.createdBy);
            const maxDisc = Math.max(...(q.items||[]).map(it=>it.discountPct),0);
            const mgrLim  = DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20;
            const isPMgr  = q.approvalStatus==="pending_manager";
            const isPExec = q.approvalStatus==="pending_exec";
            const isPFin  = q.approvalStatus==="pending_finance";
            const isIss   = q.approvalStatus==="issued";
            const isRej   = q.approvalStatus==="rejected";
            const qColor  = isPMgr?"#f59e0b":isPExec?"#8b5cf6":isPFin?"#3b82f6":isIss?"#00e5a0":isRej?"#ef4444":"#6b7280";
            const canMgrApprove  = (isManager&&isPMgr) || (isExec&&isPMgr);
            const canExecApprove = isExec && isPExec;
            const canDoApprove   = canMgrApprove || canExecApprove;
            const canFinIssue    = isFinance && isPFin;
            return(
              <div key={q.id} style={{background:"var(--bg2)",borderRadius:12,padding:16,
                border:`1px solid var(--border)`,borderLeft:`4px solid ${qColor}`}}>
                <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginBottom:5}}>
                      <span style={{fontWeight:700,fontSize:14}}>#{String(q.id).slice(-6)}</span>
                      <QuoteStatusBadge q={q}/>
                      <span style={{fontSize:11,color:"var(--text2)"}}>🏫 {q.lead?.schoolName || ""}</span>
                      {maxDisc>0&&(
                        <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:10,
                          color:maxDisc>mgrLim?"#a78bfa":"#f59e0b",
                          background:maxDisc>mgrLim?"rgba(139,92,246,0.1)":"rgba(245,158,11,0.1)"}}>
                          ส่วนลด {maxDisc}%{maxDisc>mgrLim?" ⚠️ต้อง Exec":""}
                        </span>
                      )}
                    </div>
                    <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:4}}>
                      <span style={{fontSize:11,color:"var(--text3)"}}>
                        {fmtDate(q.createdAt)} · Sales: {creator?.name?.split(" ")[0]}
                      </span>
                      <span style={{fontSize:11,color:"var(--text3)"}}>{(q.items||[]).length} รายการ</span>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--accent)",fontFamily:"IBM Plex Mono"}}>{fmtCurrency(total)}</span>
                    </div>
                    {q.validUntil&&<div style={{fontSize:10,color:"var(--text3)"}}>⏱ ใช้ได้ถึง {fmtDate(q.validUntil)}</div>}
                    {q.discountReason&&(
                      <div style={{fontSize:10,color:"#f59e0b",marginTop:4,fontStyle:"italic"}}>
                        💬 เหตุผลส่วนลด: "{q.discountReason}"
                      </div>
                    )}
                    <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
                      {q.managerApprovedBy&&(
                        <span style={{fontSize:9,color:"var(--text3)"}}>
                          ✓ Mgr: {USERS.find(u=>u.id===q.managerApprovedBy)?.name?.split(" ")[0]} · {fmtDate(q.managerApprovedAt)}{q.managerNote&&` — "${q.managerNote}"`}
                        </span>
                      )}
                      {q.execApprovedBy&&(
                        <span style={{fontSize:9,color:"var(--text3)"}}>
                          ✓ Exec: {USERS.find(u=>u.id===q.execApprovedBy)?.name?.split(" ")[0]} · {fmtDate(q.execApprovedAt)}{q.execNote&&` — "${q.execNote}"`}
                        </span>
                      )}
                      {isIss&&<span style={{fontSize:9,color:"var(--accent)"}}>✓ ออกใบ: {USERS.find(u=>u.id===q.issuedBy)?.name?.split(" ")[0]} · {fmtDate(q.issuedAt)}</span>}
                      {isRej&&q.rejectNote&&<span style={{fontSize:9,color:"var(--red)"}}>✕ {q.rejectNote}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0,minWidth:128}}>
                    {/* ดู PDF ทุก status */}
                    <button className="btn btn-xs btn-ghost" onClick={()=>setPrintQ(q)}>🖨️ ดู/พิมพ์ PDF</button>
                    {/* Manager/Exec อนุมัติ */}
                    {canDoApprove&&(
                      <button className="btn btn-xs" style={{
                        background:isExec?"rgba(139,92,246,0.15)":"rgba(16,185,129,0.12)",
                        color:isExec?"#c084fc":"#34d399",
                        borderColor:isExec?"rgba(139,92,246,0.5)":"#059669",fontWeight:700}}
                        onClick={()=>setApproveModal({q,role:isExec&&isPExec?"exec":"manager",note:""})}>
                        {isExec?"👑 พิจารณา":"📊 พิจารณา"}
                      </button>
                    )}
                    {canDoApprove&&(
                      <button className="btn btn-xs btn-red" onClick={()=>setRejectModal({q,note:""})}>
                        ✕ ไม่อนุมัติ
                      </button>
                    )}
                    {/* Finance ออกใบ */}
                    {canFinIssue&&(
                      <button className="btn btn-xs" style={{background:"rgba(59,130,246,0.15)",color:"#3b82f6",borderColor:"rgba(59,130,246,0.4)",fontWeight:700}}
                        onClick={()=>doIssue(q)}>✅ ออกใบจริง → แจ้ง Sales</button>
                    )}
                    {/* issued: ทุก role แชร์/print ได้ */}
                    {isIss&&(<>
                      <button className="btn btn-xs" style={{background:"rgba(0,200,81,0.12)",color:"#00c851",borderColor:"rgba(0,200,81,0.3)",fontWeight:700}}
                        onClick={()=>setShareMsg(buildShareMsg(q))}>💚 แชร์ LINE</button>
                      <button className="btn btn-xs btn-ghost"
                        onClick={()=>setPrintQ(q)}>🖨️ Print PDF</button>
                    </>)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
// PERSISTENT STORAGE HELPERS
// ============================================================
const STORE_KEY = "nextgen_crm_v3"; // v3: tasks updated with dueTime/visibleToAll/joinedBy

// Safe storage — fallback to memory if localStorage blocked (file://, Edge Tracking Prevention)
const _memStore = {};
const safeStorage = {
  getItem: (k) => {
    try { return localStorage.getItem(k); } catch(e) { return _memStore[k] ?? null; }
  },
  setItem: (k, v) => {
    try { localStorage.setItem(k, v); } catch(e) { _memStore[k] = v; }
  },
};

const loadStore = () => {
  try {
    const raw = safeStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return null;
};

    const to = new Date(); to.setHours(23,59,59,999);

      from: customFrom ? new Date(customFrom) : new Date(0),
      to: customTo ? (() => { const d=new Date(customTo); d.setHours(23,59,59,999); return d; })() : to,

    return { from, to };

// ============================================================
// HELPERS — Tier Pricing + Special Offers
// ============================================================
function getTierPrice(product, studentCount) {
  const n = Number(studentCount) || 0;
  const sorted = [...(product.tiers || [])].sort((a, b) => a.minStudents - b.minStudents);
  let price = product.pricePerUnit;
  for (const t of sorted) { if (n >= t.minStudents) price = t.pricePerUnit; }
  return price;
}
function getActiveOffer(specialOffers, productId, dateStr) {
  const d = dateStr ? new Date(dateStr) : new Date();
  return (specialOffers || []).find(o =>
    o.active &&
    new Date(o.dateFrom) <= d && d <= new Date(o.dateTo + "T23:59:59") &&
    (o.productOverrides || []).some(x => x.productId === productId)
  ) || null;
}
function getOfferDiscount(offer, productId) {
  return offer?.productOverrides?.find(x => x.productId === productId)?.extraDiscountPct || 0;
}
