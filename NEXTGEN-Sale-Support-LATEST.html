// REDIRECT REQUEST PANEL — ส่งต่อ request ไปแผนกที่ถูกต้อง
// ============================================================
function RedirectRequestPanel({ req, onUpdate, currentUser }) {
  const [showForm, setShowForm] = useState(false);
  const [newDept, setNewDept]   = useState("");
  const [newUser, setNewUser]   = useState(null);
  const [note, setNote]         = useState("");

  const deptUsers = newDept
    ? USERS.filter(u => TARGET_DEPTS.find(d=>d.id===newDept)?.roles.includes(u.role))
    : [];

  const doRedirect = () => {
    if (!newDept) return;
    const today = new Date().toISOString().split("T")[0];
    const histEntry = {
      from: req.routedDept || req.targetDept || "ไม่ระบุ",
      to: newDept, toUser: newUser,
      by: currentUser.id, note, date: today,
    };
    onUpdate({
      ...req,
      routedDept: newDept,
      routedUserId: newUser || null,
      redirectHistory: [...(req.redirectHistory||[]), histEntry],
      redirectNote: note,
      redirectedAt: today,
      updatedAt: today,
      // แจ้งต้นทาง
      redirectedBy: currentUser.id,
    });
    setShowForm(false);
    setNote(""); setNewDept(""); setNewUser(null);
  };

  if (!showForm) return (
    <div style={{ marginBottom:14 }}>
      <button className="btn btn-sm btn-ghost"
        style={{ borderColor:"rgba(245,158,11,0.4)", color:"#f59e0b" }}
        onClick={() => setShowForm(true)}>
        🔀 ส่งต่อไปแผนกอื่น
      </button>
      {(req.redirectHistory||[]).length > 0 && (
        <div style={{ marginTop:6, fontSize:10, color:"var(--text3)" }}>
          📋 ส่งต่อแล้ว {req.redirectHistory.length} ครั้ง
          {" — "}ล่าสุด: {TARGET_DEPTS.find(d=>d.id===req.redirectHistory.at(-1)?.to)?.label}
        </div>
      )}
    </div>
  );

  return (
    <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.3)",
      borderRadius:10, padding:14, marginBottom:14 }}>
      <div style={{ fontSize:12, fontWeight:700, color:"#f59e0b", marginBottom:10 }}>
        🔀 ส่งต่อ Request ไปแผนกที่ถูกต้อง
      </div>
      <div className="fg">
        <label className="flabel">เลือกแผนกปลายทางใหม่ *</label>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
          {TARGET_DEPTS.filter(d=>d.id!=="manager_decide").map(d => (
            <button key={d.id} type="button" onClick={() => { setNewDept(d.id); setNewUser(null); }}
              style={{ padding:"5px 12px", borderRadius:16, cursor:"pointer", fontSize:11,
                fontWeight:newDept===d.id?700:400,
                border:`2px solid ${newDept===d.id?d.color:"var(--border)"}`,
                background:newDept===d.id?d.color+"22":"transparent",
                color:newDept===d.id?d.color:"var(--text3)" }}>
              {d.icon} {d.label}{newDept===d.id?" ✓":""}
            </button>
          ))}
        </div>
        {/* เลือกบุคคล */}
        {deptUsers.length > 1 && (
          <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
            <button type="button" onClick={() => setNewUser(null)}
              style={{ padding:"3px 10px", borderRadius:12, fontSize:10, cursor:"pointer",
                border:`1px solid ${!newUser?"var(--accent)":"var(--border)"}`,
                background:!newUser?"var(--accent-dim)":"transparent",
                color:!newUser?"var(--accent)":"var(--text3)" }}>
              ทั้งแผนก
            </button>
            {deptUsers.map(u => {
              const col=USER_COLORS[u.id]||{bg:"#6b7280",light:"rgba(107,114,128,0.12)",label:"#9ca3af"};
              return (
                <button key={u.id} type="button" onClick={() => setNewUser(u.id)}
                  style={{ display:"flex",alignItems:"center",gap:5,padding:"3px 10px",
                    borderRadius:12,fontSize:10,cursor:"pointer",
                    border:`1.5px solid ${newUser===u.id?col.bg:"var(--border)"}`,
                    background:newUser===u.id?col.light:"transparent",
                    color:newUser===u.id?col.label:"var(--text3)" }}>
                  <span style={{ width:16,height:16,borderRadius:"50%",background:col.bg,
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#000" }}>
                    {u.avatar}
                  </span>
                  {u.name.split(" ")[0]}
                </button>
              );
            })}
          </div>
        )}
      </div>
      <div className="fg">
        <label className="flabel">หมายเหตุ / เหตุผลที่ส่งต่อ</label>
        <textarea className="ftextarea" style={{ minHeight:60 }}
          value={note} onChange={e=>setNote(e.target.value)}
          placeholder="เช่น งานนี้เป็นเรื่องวิชาการ ควรส่งให้ทีมวิชาการดำเนินการ..." />
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <button className="btn btn-sm" style={{ background:"rgba(245,158,11,0.15)",
          color:"#f59e0b", borderColor:"rgba(245,158,11,0.4)", fontWeight:700 }}
          onClick={doRedirect} disabled={!newDept}>
          🔀 ยืนยันส่งต่อ
        </button>
        <button className="btn btn-ghost btn-sm" onClick={() => setShowForm(false)}>ยกเลิก</button>
      </div>
    </div>
  );
}


function RequestDetailModal({ req, leads, currentUser, onUpdate, onClose }) {
  const [note, setNote]               = useState(req.managerNote || "");
  const [actualBudget, setActualBudget] = useState(req.budgetActual || "");
  const [replyText, setReplyText]     = useState("");  // sales ตอบกลับ
  const isApprover = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST, ROLES.FINANCE].includes(currentUser.role);
  const isCentral  = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(currentUser.role);
  const isOwner    = req.requestedBy === currentUser.id;
  // Flow: ผู้สร้าง (Sales/Finance) → Manager อนุมัติ
  //        ผู้สร้าง (Manager) → ต้องให้ Exec อนุมัติเท่านั้น (ห้ามอนุมัติตัวเอง)
  //        ผู้สร้าง (Exec) → Manager หรือ Exec คนอื่นอนุมัติ
  const requesterRole = USERS.find(u=>u.id===req.requestedBy)?.role;
  const canApprove = (() => {
    if (!isApprover) return false;
    // Manager/Exec/Exec_asst สร้างเอง → auto-approved แล้ว ไม่ต้องมีผู้อนุมัติ
    if ([ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(requesterRole)) return false;
    // ห้ามอนุมัติ request ตัวเอง
    if (req.requestedBy === currentUser.id) return false;
    // Sales สร้าง → Manager/Exec อนุมัติได้
    return true;
  })();
  const typeInfo   = REQ_TYPES[req.type];
  const lead       = leads.find(l => l.id === req.leadId);
  const requester  = USERS.find(u => u.id === req.requestedBy);
  const approver   = USERS.find(u => u.id === req.approvedBy);

  const changeStatus = (newStatus, extraData = {}) => {
    onUpdate({
      ...req,
      status: newStatus,
      managerNote: note,
      approvedBy:  ["approved","rejected"].includes(newStatus) ? currentUser.id : req.approvedBy,
      approvedAt:  ["approved","rejected"].includes(newStatus) ? new Date().toISOString().split("T")[0] : req.approvedAt,
      assignedTo:  newStatus === "in_progress" && isCentral ? currentUser.id : req.assignedTo,
      acceptedAt:  newStatus === "in_progress" && isCentral ? new Date().toISOString().split("T")[0] : req.acceptedAt,
      budgetActual: actualBudget ? Number(actualBudget) : req.budgetActual,
      completedAt: newStatus === "completed" ? new Date().toISOString().split("T")[0] : req.completedAt,
      updatedAt: new Date().toISOString().split("T")[0],
      ...extraData,
    });
    onClose();
  };

  // Manager ขอข้อมูลเพิ่ม พร้อมบันทึก message ลงใน thread
  const requestMoreInfo = () => {
    if (!note.trim()) return;
    const msg = { id: Date.now(), authorId: currentUser.id, role: currentUser.role, text: note.trim(), ts: new Date().toISOString() };
    onUpdate({
      ...req,
      status: "need_info",
      managerNote: note,
      messages: [...(req.messages || []), msg],
      updatedAt: new Date().toISOString().split("T")[0],
    });
    onClose();
  };

  // Sales ตอบกลับและ re-submit
  const replyAndResubmit = () => {
    if (!replyText.trim()) return;
    const msg = { id: Date.now(), authorId: currentUser.id, role: currentUser.role, text: replyText.trim(), ts: new Date().toISOString() };
    onUpdate({
      ...req,
      status: "submitted",
      messages: [...(req.messages || []), msg],
      updatedAt: new Date().toISOString().split("T")[0],
    });
    onClose();
  };

  const timeline = [
    { label: "ส่ง Request",           date: req.createdAt,   done: true },
    { label: "หัวหน้าพิจารณา",         date: null,            done: ["manager_review","approved","need_info","rejected","in_progress","completed"].includes(req.status) },
    { label: "อนุมัติ",                date: req.approvedAt,  done: ["approved","in_progress","completed"].includes(req.status) },
    { label: "Admin รับงาน",           date: req.acceptedAt,  done: ["in_progress","completed"].includes(req.status) },
    { label: "เสร็จสิ้น",              date: req.completedAt, done: req.status === "completed" },
  ];

  const messages = req.messages || [];
  const assigned = USERS.find(u => u.id === req.assignedTo);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 700, maxHeight: "90vh", overflowY: "auto" }}>
        <div className="modal-hd">
          <div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <span style={{ fontSize:20 }}>{typeInfo?.icon}</span>
              <span className="modal-title" style={{ fontSize:15 }}>{req.title}</span>
              <ReqStatusBadge status={req.status} />
            </div>
            {lead && <div style={{ fontSize:11, color:"var(--text3)", marginTop:3 }}>🏫 {lead.schoolName}</div>}
          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* Timeline */}
        <div style={{ display:"flex", gap:0, alignItems:"center", padding:"12px 0", marginBottom:14, overflowX:"auto" }}>
          {timeline.map((t,i) => (
            <React.Fragment key={i}>
              <div style={{ textAlign:"center", minWidth:80 }}>
                <div style={{ width:28, height:28, borderRadius:"50%", margin:"0 auto 5px",
                  background: t.done ? "var(--accent)" : "var(--bg3)",
                  border: `2px solid ${t.done ? "var(--accent)" : "var(--border)"}`,
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:12,
                  color: t.done ? "#000" : "var(--text3)" }}>
                  {t.done ? "✓" : (i+1)}
                </div>
                <div style={{ fontSize:9, color: t.done ? "var(--accent)" : "var(--text3)", fontWeight: t.done ? 700 : 400, lineHeight:1.3 }}>{t.label}</div>
                {t.date && <div style={{ fontSize:9, color:"var(--text3)", marginTop:2 }}>{fmtDate(t.date)}</div>}
              </div>
              {i < timeline.length-1 && <div style={{ flex:1, height:2, background: timeline[i+1].done ? "var(--accent)" : "var(--border)", minWidth:20, marginBottom:16 }} />}
            </React.Fragment>
          ))}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          {/* Left: request details */}
          <div>
            <div style={{ background:"var(--bg3)", borderRadius:10, padding:14, marginBottom:14 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"var(--text3)", marginBottom:8, textTransform:"uppercase", letterSpacing:"0.8px" }}>รายละเอียด</div>
              {[
                ["ประเภท",     `${typeInfo?.label} · ${req.subtype}`],
                ["📅 วันที่/เวลา", `${fmtDate(req.eventDate)}${req.eventTime ? ` · ${req.eventTime} น.` : ""}`],
                ["📍 สถานที่", req.location],
                ["👥 ผู้เข้าร่วม", req.participants],
                ["🎯 เป้าหมาย", req.expectedOutcome],
                req.budgetEstimate > 0 ? ["💰 งบประมาณ", fmtCurrency(req.budgetEstimate)] : null,
                req.budgetActual   > 0 ? ["💳 ค่าใช้จ่ายจริง", fmtCurrency(req.budgetActual)] : null,
                ["👤 ผู้ขอ",   requester?.name],
                assigned ? ["🔧 Admin รับผิดชอบ", assigned.name] : null,
              ].filter(Boolean).map(([label, val], i) => val ? (
                <div key={i} style={{ marginBottom:8 }}>
                  <div style={{ fontSize:9, color:"var(--text3)", textTransform:"uppercase", letterSpacing:"0.7px" }}>{label}</div>
                  <div style={{ fontSize:12, color:"var(--text2)", marginTop:2 }}>{val}</div>
                </div>
              ) : null)}
            </div>

            {/* เหตุผล */}
            <div style={{ background:"var(--bg3)", borderRadius:10, padding:14 }}>
              <div style={{ fontSize:11, fontWeight:700, color:"var(--text3)", marginBottom:6, textTransform:"uppercase" }}>เหตุผล / รายละเอียดเพิ่มเติม</div>
              <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.7 }}>{req.reason}</div>
            </div>
          </div>

          {/* Right: action + message thread */}
          <div>
            {/* ── Message Thread (ขอข้อมูลเพิ่ม) ── */}
            {messages.length > 0 && (
              <div style={{ background:"var(--bg3)", borderRadius:10, padding:14, marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#f59e0b", marginBottom:10, textTransform:"uppercase", letterSpacing:"0.8px" }}>💬 ประวัติการสื่อสาร</div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {messages.map(m => {
                    const author = USERS.find(u => u.id === m.authorId);
                    const isMe = m.authorId === currentUser.id;
                    const isMgr = [ROLES.MANAGER, ROLES.EXEC].includes(m.role);
                    return (
                      <div key={m.id} style={{
                        padding:"9px 12px", borderRadius:10,
                        background: isMgr ? "rgba(245,158,11,0.08)" : "rgba(0,229,160,0.06)",
                        border: `1px solid ${isMgr ? "rgba(245,158,11,0.2)" : "rgba(0,229,160,0.15)"}`,
                        alignSelf: isMe ? "flex-end" : "flex-start",
                        maxWidth:"90%",
                      }}>
                        <div style={{ display:"flex", gap:6, alignItems:"center", marginBottom:4 }}>
                          <span style={{ fontSize:10, fontWeight:700, color: isMgr ? "#f59e0b" : "var(--accent)" }}>
                            {isMgr ? "🔑" : "📤"} {author?.name?.split(" ")[0]}
                          </span>
                          <span style={{ fontSize:9, color:"var(--text3)" }}>{new Date(m.ts).toLocaleDateString("th-TH", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" })}</span>
                        </div>
                        <div style={{ fontSize:12, color:"var(--text2)", lineHeight:1.6 }}>{m.text}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* ── Manager: พิจารณา ── */}
            {/* ── Auto-approved: แจ้ง Manager/Exec รับทราบ ── */}
            {req.autoApproved && [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role) && (
              <div style={{ background:"rgba(0,229,160,0.07)", border:"1px solid rgba(0,229,160,0.3)",
                borderRadius:10, padding:12, marginBottom:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"var(--accent)", marginBottom:6 }}>
                  ✅ อนุมัติอัตโนมัติ — รอ Admin/Finance รับงาน
                </div>
                <div style={{ fontSize:11, color:"var(--text2)", marginBottom:10, lineHeight:1.6 }}>
                  Request นี้สร้างโดย {requester?.name?.split(" ")[0]} ({ROLE_LABELS[requesterRole]||requesterRole})
                  — อนุมัติอัตโนมัติแล้ว ไม่ต้องรอผู้อนุมัติ
                </div>
                {/* ปุ่ม ack — แต่ละคนกดแยกกันได้อิสระ */}
                <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                  {!(req.ackedBy||[]).includes(currentUser.id) ? (
                    <button className="btn btn-sm btn-accent"
                      onClick={() => {
                        const newAcked = [...new Set([...(req.ackedBy||[]), currentUser.id])];
                        // ถ้า Exec+ExecAsst ทุกคน ack แล้ว → clear needsAck
                        const execUsers = USERS.filter(u=>[ROLES.EXEC,ROLES.EXEC_ASST].includes(u.role));
                        const allAcked  = execUsers.every(u=>newAcked.includes(u.id));
                        onUpdate({ ...req,
                          ackedBy: newAcked,
                          needsAck: allAcked ? false : req.needsAck,
                          updatedAt: new Date().toISOString().split("T")[0]
                        });
                      }}>
                      📋 รับทราบ Request นี้
                    </button>
                  ) : (
                    <div style={{ fontSize:11, color:"var(--accent)", fontWeight:700 }}>✓ คุณรับทราบแล้ว</div>
                  )}
                  {(req.ackedBy||[]).length > 0 && (
                    <div style={{ fontSize:10, color:"var(--text3)" }}>
                      รับทราบโดย: {(req.ackedBy||[]).map(id=>USERS.find(u=>u.id===id)?.name?.split(" ")[0]||id).join(", ")}
                    </div>
                  )}
                </div>
              </div>
            )}

            {canApprove && ["submitted","manager_review","need_info"].includes(req.status) && (
              <div style={{ background:"var(--bg3)", borderRadius:10, padding:14, marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:"var(--text3)", marginBottom:10, textTransform:"uppercase" }}>การพิจารณา</div>
                {/* Route selector — Manager กำหนด/เปลี่ยนแผนก */}
                <div className="fg">
                  <label className="flabel">
                    📨 กำหนดแผนกปลายทาง
                    {req.targetDept === "manager_decide" && <span style={{ color:"#f59e0b", marginLeft:6 }}>← Sales ขอให้ Manager กำหนด</span>}
                  </label>
                  <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
                    {TARGET_DEPTS.filter(d=>d.id!=="manager_decide").map(d => (
                      <button key={d.id} type="button"
                        onClick={() => onUpdate({ ...req, routedDept: d.id, routedUserId: null,
                          updatedAt: new Date().toISOString().split("T")[0] })}
                        style={{ display:"flex", alignItems:"center", gap:5, padding:"5px 12px",
                          borderRadius:16, cursor:"pointer", fontSize:11, fontWeight:req.routedDept===d.id?700:400,
                          border:`2px solid ${req.routedDept===d.id?d.color:"var(--border)"}`,
                          background:req.routedDept===d.id?d.color+"22":"transparent",
                          color:req.routedDept===d.id?d.color:"var(--text3)" }}>
                        {d.icon} {d.label}
                        {req.routedDept===d.id && " ✓"}
                      </button>
                    ))}
                  </div>
                  {req.routedDept && (
                    <div style={{ fontSize:10, color:"var(--accent)", marginBottom:6 }}>
                      ✓ Route ไปยัง: {TARGET_DEPTS.find(d=>d.id===req.routedDept)?.label}
                      {req.routedUserId && ` → ${USERS.find(u=>u.id===req.routedUserId)?.name?.split(" ")[0]}`}
                    </div>
                  )}
                </div>
                <div className="fg">
                  <label className="flabel">
                    หมายเหตุ / คำถามเพิ่มเติม
                    {req.status === "need_info" && <span style={{ color:"#f59e0b", marginLeft:6 }}>← กรุณาระบุสิ่งที่ต้องการเพิ่ม</span>}
                  </label>
                  <textarea className="ftextarea" value={note} onChange={e => setNote(e.target.value)}
                    placeholder="เช่น ระบุจำนวนชิ้น / ยืนยัน contact person / แนบไฟล์ใบเสนอราคา..."
                    style={{ minHeight:80 }} />
                </div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  <button className="btn btn-sm" style={{ background:"#064e3b", color:"#34d399", borderColor:"#059669" }}
                    onClick={() => changeStatus("approved")}>✓ อนุมัติ</button>
                  <button className="btn btn-sm" style={{ background:"#3d2a00", color:"#fbbf24", borderColor:"#d97706" }}
                    disabled={!note.trim()}
                    onClick={requestMoreInfo}>❓ ขอข้อมูลเพิ่ม</button>
                  <button className="btn btn-sm btn-red"
                    onClick={() => changeStatus("rejected")}>✕ ไม่อนุมัติ</button>
                </div>
                {!note.trim() && <div style={{ fontSize:9, color:"#f59e0b", marginTop:6 }}>⚠️ กรอกหมายเหตุก่อนกด "ขอข้อมูลเพิ่ม"</div>}
              </div>
            )}

            {/* ── Manager note display (ถ้าไม่ใช่ approver ดู) ── */}
            {req.managerNote && !canApprove && (
              <div style={{ background:"rgba(251,191,36,0.08)", border:"1px solid rgba(251,191,36,0.2)", borderRadius:9, padding:12, marginBottom:14 }}>
                <div style={{ fontSize:10, color:"#fbbf24", fontWeight:700, marginBottom:5 }}>💬 หมายเหตุจากหัวหน้า</div>
                <div style={{ fontSize:13, color:"var(--text2)", lineHeight:1.6 }}>{req.managerNote}</div>
                {approver && <div style={{ fontSize:11, color:"var(--text3)", marginTop:6 }}>— {approver.name} · {fmtDate(req.approvedAt)}</div>}
              </div>
            )}

            {/* ── Owner (Sales): ตอบกลับ + re-submit เมื่อ need_info ── */}
            {isOwner && req.status === "need_info" && (
              <div style={{ background:"rgba(239,68,68,0.07)", border:"1px solid rgba(239,68,68,0.25)", borderRadius:10, padding:14, marginBottom:14 }}>
                <div style={{ fontSize:12, color:"var(--red)", fontWeight:700, marginBottom:8 }}>⚠️ หัวหน้าขอข้อมูลเพิ่มเติม</div>
                {req.managerNote && (
                  <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)", borderRadius:8, padding:"8px 12px", marginBottom:10, fontSize:12, color:"var(--text2)" }}>
                    💬 "{req.managerNote}"
                  </div>
                )}
                <label className="flabel">ตอบกลับ / ข้อมูลเพิ่มเติม *</label>
                <textarea className="ftextarea" value={replyText} onChange={e => setReplyText(e.target.value)}
                  placeholder="ตอบคำถามหรือเพิ่มข้อมูลที่ขอมา..."
                  style={{ minHeight:80, marginBottom:10 }} />
                <div style={{ display:"flex", gap:8 }}>
                  <button className="btn btn-accent btn-sm" disabled={!replyText.trim()}
                    onClick={replyAndResubmit}>📤 ตอบกลับ & ส่ง Request ใหม่</button>
                  <div style={{ fontSize:10, color:"var(--text3)", alignSelf:"center" }}>ระบบจะส่งกลับให้หัวหน้าพิจารณาอีกครั้ง</div>
                </div>
              </div>
            )}

            {/* ── Owner: submit draft ── */}
            {isOwner && req.status === "draft" && (
              <button className="btn btn-accent btn-sm" onClick={() => changeStatus("submitted")}>📤 ส่ง Request</button>
            )}

            {/* ── Admin Support: รับงาน ── */}
             {isCentral && req.status === "approved" && (
              <div style={{ borderRadius:10, padding:14, marginBottom:14,
                background: req.assignedTo ? "rgba(107,114,128,0.08)" : "rgba(6,182,212,0.08)",
                border: `1px solid ${req.assignedTo ? "rgba(107,114,128,0.25)" : "rgba(6,182,212,0.3)"}` }}>
                {!req.assignedTo ? (
                  <>
                    <div style={{ fontSize:12, color:"#06b6d4", fontWeight:700, marginBottom:8 }}>
                      🆕 อนุมัติแล้ว — กดรับงานเพื่อดำเนินการ
                    </div>
                    <button className="btn btn-sm"
                      style={{ background:"rgba(6,182,212,0.15)", color:"#06b6d4", borderColor:"rgba(6,182,212,0.4)", fontWeight:700 }}
                      onClick={() => changeStatus("in_progress")}>
                      🙋 รับงาน — เริ่มดำเนินการ
                    </button>
                  </>
                ) : currentUser.id === req.assignedTo ? (
                  <div style={{ fontSize:12, color:"var(--accent)", fontWeight:700 }}>
                    ✅ คุณรับงานนี้แล้ว — กำลังดำเนินการ
                  </div>
                ) : (
                  <div>
                    <div style={{ fontSize:12, color:"var(--text3)", fontWeight:700, marginBottom:4 }}>
                      📌 รับงานแล้วโดย {USERS.find(u=>u.id===req.assignedTo)?.name?.split(" ")[0]||"ผู้ดูแล"}
                    </div>
                    <div style={{ fontSize:11, color:"var(--text3)" }}>
                      งานนี้กำลังดำเนินการอยู่ ไม่สามารถรับซ้ำได้
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── ปุ่ม "ส่งต่อ" — route ผิดแผนก ── */}
            {isCentral && ["approved"].includes(req.status) && !req.assignedTo && (
              <RedirectRequestPanel req={req} onUpdate={onUpdate} currentUser={currentUser} />
            )}

            {/* ── Admin Support: กำลังทำ → เสร็จ ── */}
            {(isCentral || isOwner) && req.status === "in_progress" && (
              <div style={{ marginBottom:14 }}>
                {req.type === "expense" && (
                  <div className="fg">
                    <label className="flabel">ค่าใช้จ่ายจริง (บาท)</label>
                    <input className="finput" type="number" value={actualBudget} onChange={e => setActualBudget(e.target.value)} placeholder="0" />
                  </div>
                )}
                <button className="btn btn-sm" style={{ background:"#064e3b", color:"#00e5a0", borderColor:"#059669" }}
                  onClick={() => changeStatus("completed")}>✓ ทำเสร็จแล้ว</button>
              </div>
            )}

            {/* Created timestamp */}
            <div style={{ marginTop:8, fontSize:10, color:"var(--text3)" }}>สร้างเมื่อ {fmtDate(req.createdAt)}</div>
            {/* Route info */}
            {(req.routedDept || req.targetDept) && (
              <div style={{ marginTop:6, fontSize:11, color:"var(--text2)" }}>
                📨 ส่งถึง: {(() => {
                  const dept = TARGET_DEPTS.find(d=>d.id===(req.routedDept||req.targetDept));
                  return dept?.label || req.targetDept;
                })()}
                {(req.routedUserId||req.targetUserId) && ` → ${USERS.find(u=>u.id===(req.routedUserId||req.targetUserId))?.name?.split(" ")[0]}`}
                {req.targetDept==="manager_decide" && !req.routedDept && <span style={{ color:"#f59e0b" }}> (รอ Manager กำหนด)</span>}
              </div>
            )}
            {/* Redirect history */}
            {(req.redirectHistory||[]).length > 0 && (
              <div style={{ marginTop:8, padding:"8px 12px", borderRadius:8,
                background:"rgba(245,158,11,0.07)", border:"1px solid rgba(245,158,11,0.2)" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#f59e0b", marginBottom:6 }}>🔀 ประวัติการส่งต่อ</div>
                {req.redirectHistory.map((h,i)=>{
                  const fromD=TARGET_DEPTS.find(d=>d.id===h.from); const toD=TARGET_DEPTS.find(d=>d.id===h.to);
                  const byUser=USERS.find(u=>u.id===h.by);
                  return (
                    <div key={i} style={{ fontSize:10, color:"var(--text3)", marginBottom:3, display:"flex", gap:6, alignItems:"center" }}>
                      <span>{fromD?.icon||"?"} {fromD?.label||h.from}</span>
                      <span>→</span>
                      <span style={{ color:"#f59e0b" }}>{toD?.icon||"?"} {toD?.label||h.to}</span>
                      <span style={{ marginLeft:"auto" }}>โดย {byUser?.name?.split(" ")[0]}</span>
                      {h.note && <span style={{ color:"var(--text3)", fontStyle:"italic" }}>"{h.note.slice(0,30)}"</span>}
                    </div>
                  );
                })}
              </div>
            )}
            {req.acceptedAt && (
              <div style={{ marginTop:4, fontSize:10, color:"#06b6d4" }}>✅ รับงานแล้ว {fmtDate(req.acceptedAt)} — เพิ่มลงปฏิทินแล้ว</div>
            )}
            {req.rejectReason && (
              <div style={{ marginTop:8, padding:"8px 12px", borderRadius:8, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.25)" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"var(--red)", marginBottom:3 }}>❌ เหตุผลที่ปฏิเสธ</div>
                <div style={{ fontSize:12, color:"var(--text2)", lineHeight:1.6 }}>{req.rejectReason}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// REQUESTS PAGE — FULL
// ============================================================
function RequestsPage({ requests, setRequests, leads, user, notify, setTasks, tasks=[], events=[] }) {
  const [tab, setTab] = useState("all");
  const [typeFilter, setTypeFilter] = useState("all");
  const [showForm, setShowForm] = useState(false);
  const [viewReq, setViewReq] = useState(null);
  // inline reject form: { reqId, reason }
  const [rejectForm, setRejectForm] = useState(null);

  const isApprover = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST, ROLES.FINANCE].includes(user.role);
  // auto-approved requests ที่รอรับทราบ
  const autoApprovedAck = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role)
    ? requests.filter(r =>
        r.autoApproved &&
        r.requestedBy !== user.id &&
        !(r.ackedBy||[]).includes(user.id))
    : [];
  const isCentral  = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(user.role);
  const canCreate  = true; // ทุกตำแหน่งสร้าง request ได้

  // ── Filter: Sales เห็นของตัวเอง, Central เห็นทุก request ยกเว้น draft ของคนอื่น ──
  // helper: ตรวจว่า request นี้ route มาถึง user คนนี้ไหม
  const isRoutedToMe = (r) => {
    if (!r.routedDept && !r.targetDept) return true; // ไม่ระบุ → เห็นทุกคน (legacy)
    const dept = r.routedDept || (r.targetDept !== "manager_decide" ? r.targetDept : null);
    if (!dept) return true; // manager_decide ที่ยังไม่ route → เห็นทุกคน
    const deptDef = TARGET_DEPTS.find(d => d.id === dept);
    if (!deptDef) return false;
    const isMyDept = deptDef.roles.includes(user.role);
    if (!isMyDept) return false;
    // ถ้า route มาถึงบุคคลเฉพาะ
    const routedUser = r.routedUserId || r.targetUserId;
    if (routedUser) return routedUser === user.id;
    return true; // ทั้งแผนก
  };

  const visibleRaw = requests.filter(r => {
    if (user.role === ROLES.SALES && r.requestedBy !== user.id) return false;
    if (isCentral && r.status === "draft" && r.assignedTo !== user.id) return false;
    // Central/Academic/Production — เห็นเฉพาะที่ route มาถึงตัวเอง
    if (isCentral && ["approved","in_progress"].includes(r.status)) {
      if (r.assignedTo && r.assignedTo !== user.id) return tab !== "new_tasks"; // ของคนอื่น ไม่แสดงใน new_tasks
      if (!r.assignedTo && !isRoutedToMe(r)) return false; // route ไม่ใช่แผนกเรา
    }
    if (tab === "mine")             return r.requestedBy === user.id || r.assignedTo === user.id;
    if (tab === "pending_approval") return ["submitted","manager_review"].includes(r.status);
    if (tab === "new_tasks")        return r.status === "approved" && !r.assignedTo;
    if (tab === "my_tasks")         return r.assignedTo === user.id && ["approved","in_progress"].includes(r.status);
    if (tab === "in_progress")      return r.status === "in_progress";
    if (tab === "done")             return ["completed","rejected"].includes(r.status);
    return true;
  }).filter(r => typeFilter === "all" || r.type === typeFilter);
  const visible = sortRequests(visibleRaw);

  const saveRequest = (req) => {
    setRequests(rs => [...rs, req]);
    setShowForm(false);
    notify(`${req.status === "draft" ? "บันทึก Draft" : "ส่ง Request"} เรียบร้อย`, "ok");
  };

  const updateRequest = (updated) => {
    setRequests(rs => rs.map(r => r.id === updated.id ? updated : r));
    notify("อัปเดตเรียบร้อย", "ok");
    if (viewReq?.id === updated.id) setViewReq(updated);
  };

  const acceptTask = (r, e) => {
    e.stopPropagation();
    const today = new Date().toISOString().split("T")[0];
    updateRequest({ ...r, assignedTo: user.id, status: "in_progress",
      acceptedAt: today, updatedAt: today });
    // เพิ่ม task ลงปฏิทินของ Admin Support/Finance อัตโนมัติ
    if (setTasks && r.eventDate) {
      const lead = leads.find(l => l.id === r.leadId);
      const newTask = {
        id: Date.now(),
        title: `[Request] ${r.title}`,
        description: `${r.subtype} — ${r.reason || r.expectedOutcome || ""}`,
        leadId: r.leadId || null,
        assignedTo: user.id,
        createdBy: user.id,
        priority: "สูง",
        dueDate: r.eventDate,
        dueTime: r.eventTime || "09:00",
        duration: "60",
        apptType: r.subtype || r.type,
        meetingLink: "",
        locationLink: "",
        location: r.location,
        reminders: ["1 วัน"],
        completed: false,
        createdAt: today,
        visibleToAll: false,
        joinedBy: [user.id],
        acknowledgedBy: [], declinedBy: [], declineReasons: {},
        rsvpLog: [{ userId: user.id, action:"join", ts: new Date().toISOString() }],
        comments: [], invitedUsers: [],
        _fromRequest: r.id,
      };
      setTasks(ts => [...ts, newTask]);
    }
    notify("✅ รับงานแล้ว — เพิ่มลงปฏิทินของคุณแล้ว", "ok");
  };

  const rejectTask = (r, reason) => {
    const today = new Date().toISOString().split("T")[0];
    updateRequest({ ...r, status: "rejected",
      rejectedBy: user.id, rejectedAt: today, updatedAt: today,
      rejectReason: reason });
    setRejectForm(null);
    notify("❌ ปฏิเสธ Request แล้ว — ผู้ขอจะได้รับแจ้ง", "ok");
  };

  const markDone = (r, e) => {
    e.stopPropagation();
    updateRequest({ ...r, status: "completed",
      completedAt: new Date().toISOString().split("T")[0],
      updatedAt:   new Date().toISOString().split("T")[0] });
    notify("มาร์กเสร็จแล้ว ✓", "ok");
  };

  const pendingApproval  = requests.filter(r => ["submitted","manager_review"].includes(r.status)).length;
  const newTasksForAdmin = requests.filter(r => r.status === "approved" && !r.assignedTo).length;
  const myActiveTasks    = requests.filter(r => r.assignedTo === user.id && r.status === "in_progress").length;

  const tabConfig = [
    { v: "all", l: "ทั้งหมด",
      n: user.role === ROLES.SALES
          ? requests.filter(r => r.requestedBy === user.id).length
          : isCentral ? requests.filter(r => r.status !== "draft" || r.assignedTo === user.id).length
          : requests.length },
    ...(isApprover ? [{ v: "pending_approval", l: "🔴 รออนุมัติ", n: pendingApproval, alert: pendingApproval > 0 }] : []),
    ...(isCentral  ? [{ v: "new_tasks",  l: "🆕 งานใหม่รอรับ", n: newTasksForAdmin, alert: newTasksForAdmin > 0 }] : []),
    ...(isCentral  ? [{ v: "my_tasks",   l: "📌 งานของฉัน",   n: myActiveTasks }] : []),
    { v: "in_progress", l: "กำลังดำเนินการ", n: requests.filter(r => r.status === "in_progress").length },
    { v: "done",        l: "เสร็จ/ปฏิเสธ",   n: requests.filter(r => ["completed","rejected"].includes(r.status)).length },
    ...(!isApprover && !isCentral ? [{ v: "mine", l: "ของฉัน", n: requests.filter(r => r.requestedBy === user.id).length }] : []),
  ];

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">📋 Request System</div>
          <div className="ph-sub">ขอสนับสนุน Admin Support · ค่าใช้จ่าย · ของสนับสนุน</div>
        </div>
        <div className="ph-actions">
          {isApprover && pendingApproval > 0 && (
            <div style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(239,68,68,0.12)", border:"1px solid rgba(239,68,68,0.3)", borderRadius:8, padding:"6px 12px" }}>
              <span style={{ fontSize:12, color:"var(--red)", fontWeight:700 }}>🔔 รออนุมัติ {pendingApproval} รายการ</span>
            </div>
          )}
          {isCentral && newTasksForAdmin > 0 && (
            <div style={{ display:"flex", alignItems:"center", gap:6, background:"rgba(6,182,212,0.12)", border:"1px solid rgba(6,182,212,0.35)", borderRadius:8, padding:"6px 12px" }}>
              <span style={{ fontSize:12, color:"#06b6d4", fontWeight:700 }}>🆕 งานอนุมัติแล้วรอรับ {newTasksForAdmin} รายการ</span>
            </div>
          )}
          {canCreate && <button className="btn btn-accent" onClick={() => setShowForm(true)}>+ สร้าง Request</button>}
        </div>
      </div>

      {/* Auto-approved notifications for Manager/Exec */}
      {[ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role) && autoApprovedAck.length > 0 && (
        <div style={{ background:"rgba(0,229,160,0.07)", border:"1px solid rgba(0,229,160,0.25)",
          borderRadius:10, padding:"10px 16px", marginBottom:14,
          display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:18 }}>✅</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:12, color:"var(--accent)" }}>
              มี {autoApprovedAck.length} Request ใหม่ที่อนุมัติอัตโนมัติแล้ว รอรับทราบ
            </div>
            <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>
              สร้างโดย Manager/Exec — ไม่ต้องอนุมัติเพิ่ม แต่ควรรับทราบเพื่อติดตามงาน
            </div>
          </div>
          <button className="btn btn-xs btn-accent"
            onClick={() => { setTab("new_tasks"); setTypeFilter("all"); }}>
            ดูรายการ →
          </button>
        </div>
      )}

      {/* Summary cards — Approver */}
      {isApprover && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:20 }}>
          {[
            { label:"รออนุมัติ",      n: pendingApproval, color:"#3b82f6" },
            { label:"ขอข้อมูลเพิ่ม", n: requests.filter(r => r.status==="need_info").length, color:"#f59e0b" },
            { label:"กำลังดำเนินการ",n: requests.filter(r => r.status==="in_progress").length, color:"#06b6d4" },
            { label:"เสร็จแล้ว",     n: requests.filter(r => r.status==="completed").length, color:"#00e5a0" },
          ].map((s,i) => (
            <div key={i} className="card card-p" style={{ padding:14 }}>
              <div style={{ fontSize:20, fontWeight:700, color:s.color, fontFamily:"IBM Plex Mono" }}>{s.n}</div>
              <div style={{ fontSize:11, color:"var(--text3)", marginTop:3 }}>{s.label}</div>
            </div>
          ))}
        </div>
      )}

      {/* Summary cards — Admin Support */}
      {isCentral && (
        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:20 }}>
          {[
            { label:"งานใหม่ (รออนุมัติ + อนุมัติแล้ว)", n: requests.filter(r => ["submitted","manager_review","approved"].includes(r.status)).length, color:"#06b6d4" },
            { label:"กำลังทำอยู่ (ของฉัน)",               n: myActiveTasks, color:"#8b5cf6" },
            { label:"เสร็จแล้ว (ของฉัน)",                 n: requests.filter(r => r.status==="completed" && r.assignedTo===user.id).length, color:"#00e5a0" },
          ].map((s,i) => (
            <div key={i} className="card card-p" style={{ padding:14, borderColor: s.n>0&&i===0 ? "rgba(6,182,212,0.35)" : undefined }}>
              <div style={{ fontSize:20, fontWeight:700, color:s.color, fontFamily:"IBM Plex Mono" }}>{s.n}</div>
              <div style={{ fontSize:11, color:"var(--text3)", marginTop:3 }}>{s.label}</div>
            </div>
          ))}
        </div>
      )}

      {/* Tabs + Type filter */}
      <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center", flexWrap:"wrap" }}>
        <div className="tabs" style={{ marginBottom:0 }}>
          {tabConfig.map(({ v, l, n, alert }) => (
            <button key={v} className={`tab ${tab===v?"active":""}`} onClick={() => setTab(v)}
              style={alert && tab!==v ? { color:"var(--red)" } : {}}>
              {l} <span style={{ opacity:0.6, fontSize:10 }}>({n||0})</span>
            </button>
          ))}
        </div>
        <div style={{ display:"flex", gap:6 }}>
          {[["all","ทุกประเภท"], ...Object.entries(REQ_TYPES).map(([k,v]) => [k, v.icon+" "+v.label])].map(([k,l]) => (
            <button key={k} className="btn btn-xs" onClick={() => setTypeFilter(k)} style={{
              background: typeFilter===k ? "var(--accent-dim)" : "transparent",
              color: typeFilter===k ? "var(--accent)" : "var(--text3)",
              borderColor: typeFilter===k ? "rgba(0,229,160,0.3)" : "var(--border)",
            }}>{l}</button>
          ))}
        </div>
      </div>

      {/* Request cards */}
      {visible.length === 0 ? (
        <div className="card"><div className="empty"><div className="empty-ico">📭</div><div className="empty-txt">ไม่มี Request ในหมวดนี้</div></div></div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {visible.map(r => {
            const typeInfo = REQ_TYPES[r.type];
            const lead = leads.find(l => l.id === r.leadId);
            const requester   = USERS.find(u => u.id === r.requestedBy);
            const assignedUser = USERS.find(u => u.id === r.assignedTo);
            const isPendingApproval    = ["submitted","manager_review"].includes(r.status);
            const isApprovedUnassigned = r.status === "approved" && !r.assignedTo;
            const isMyTask = r.assignedTo === user.id;
            return (
              <div key={r.id} onClick={() => setViewReq(r)}
                style={{
                  background:"var(--bg2)",
                  border:`1px solid ${
                    isApprovedUnassigned && isCentral ? "rgba(6,182,212,0.45)" :
                    isPendingApproval && isApprover   ? "rgba(59,130,246,0.4)" :
                    isMyTask                          ? "rgba(139,92,246,0.3)" :
                    "var(--border)"
                  }`,
                  borderRadius:12, padding:16, cursor:"pointer", transition:"all 0.12s",
                  borderLeft:`4px solid ${typeInfo.color}`,
                }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--bg3)"}
                onMouseLeave={e => e.currentTarget.style.background = "var(--bg2)"}
              >
                <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                  <div style={{ fontSize:22, flexShrink:0, marginTop:2 }}>{typeInfo.icon}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:5, flexWrap:"wrap" }}>
                      <span style={{ fontWeight:700, fontSize:14 }}>{r.title}</span>
                      <ReqStatusBadge status={r.status} />
                      {isApprovedUnassigned && isCentral && (
                        <span style={{ fontSize:9, fontWeight:800, color:"#fff", background:"#06b6d4", padding:"2px 10px", borderRadius:10, animation:"badgePulse 1.5s infinite" }}>🆕 รอรับงาน</span>
                      )}
                      {r.autoApproved && [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role) && r.requestedBy !== user.id && !(r.ackedBy||[]).includes(user.id) && (
                        <span style={{ fontSize:9, fontWeight:700, color:"var(--accent)", background:"rgba(0,229,160,0.12)", padding:"2px 8px", borderRadius:10, border:"1px solid rgba(0,229,160,0.3)" }}>📋 รอรับทราบ</span>
                      )}
                      {r.status === "rejected" && r.rejectReason && (
                        <span style={{ fontSize:9, color:"var(--red)", background:"rgba(239,68,68,0.1)", padding:"2px 8px", borderRadius:10, border:"1px solid rgba(239,68,68,0.25)" }}>❌ ปฏิเสธ</span>
                      )}
                      {isMyTask && r.status === "in_progress" && <span style={{ fontSize:9, color:"#a78bfa", background:"rgba(139,92,246,0.1)", padding:"2px 8px", borderRadius:10 }}>📌 งานของฉัน</span>}
                    </div>
                    <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, color:typeInfo.color, fontWeight:600 }}>{typeInfo.label} · {r.subtype}</span>
                      {(r.routedDept || (r.targetDept && r.targetDept!=="manager_decide")) && (() => {
                        const dept = TARGET_DEPTS.find(d=>d.id===(r.routedDept||r.targetDept));
                        return dept ? <span style={{ fontSize:10, color:dept.color, background:dept.color+"18",
                          padding:"1px 7px", borderRadius:10, border:`1px solid ${dept.color}30` }}>
                          {dept.icon} {dept.label}</span> : null;
                      })()}
                      {r.targetDept === "manager_decide" && !r.routedDept && (
                        <span style={{ fontSize:10, color:"#f59e0b", background:"rgba(245,158,11,0.12)",
                          padding:"1px 7px", borderRadius:10, border:"1px solid rgba(245,158,11,0.3)" }}>
                          📋 รอ Manager กำหนดแผนก
                        </span>
                      )}
                      {(r.redirectHistory||[]).length > 0 && (
                        <span style={{ fontSize:9, color:"var(--text3)" }}>🔀 ส่งต่อ {r.redirectHistory.length}x</span>
                      )}
                      {lead && <span style={{ fontSize:11, color:"var(--text3)" }}>🏫 {lead.schoolName}</span>}
                      <span style={{ fontSize:11, color:"var(--text3)" }}>📅 {fmtDate(r.eventDate)}</span>
                      <span style={{ fontSize:11, color:"var(--text3)" }}>👤 {requester?.name?.split(" ")[0]}</span>
                      {assignedUser && <span style={{ fontSize:11, color:"#8b5cf6" }}>🔧 {assignedUser.name?.split(" ")[0]}</span>}
                      {r.budgetEstimate > 0 && <span style={{ fontSize:11, color:"var(--accent)", fontFamily:"IBM Plex Mono" }}>💰 {fmtCurrency(r.budgetEstimate)}</span>}
                    </div>
                    {r.managerNote && (
                      <div style={{ marginTop:6, fontSize:11, color:"#fbbf24", background:"rgba(251,191,36,0.08)", padding:"4px 8px", borderRadius:5, display:"inline-block" }}>
                        💬 {r.managerNote.substring(0,60)}{r.managerNote.length>60?"...":""}
                      </div>
                    )}
                    {r.rejectReason && (
                      <div style={{ marginTop:6, fontSize:11, color:"var(--red)", background:"rgba(239,68,68,0.08)", padding:"4px 8px", borderRadius:5, display:"inline-block" }}>
                        ❌ เหตุผล: {r.rejectReason.substring(0,80)}{r.rejectReason.length>80?"...":""}
                      </div>
                    )}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:5, flexShrink:0, alignItems:"stretch", minWidth:120 }}>
                    {/* Manager/Exec: อนุมัติ/ปฏิเสธ */}
                    {(() => {
                      // ตรวจสิทธิ์อนุมัติตาม flow
                      const reqRole = USERS.find(u=>u.id===r.requestedBy)?.role;
                      // Manager/Exec สร้างเอง → auto-approved ไม่ต้องมีผู้อนุมัติ
                      const canApproveCard = isApprover &&
                        r.requestedBy !== user.id &&
                        ![ROLES.MANAGER, ROLES.EXEC].includes(reqRole);
                      return canApproveCard && isPendingApproval && (
                        <div style={{ display:"flex", gap:4 }}>
                          <button className="btn btn-xs" style={{ background:"#064e3b", color:"#34d399", borderColor:"#059669", fontWeight:700 }}
                            onClick={e => { e.stopPropagation(); updateRequest({ ...r, status:"approved", approvedBy:user.id, approvedAt:new Date().toISOString().split("T")[0], updatedAt:new Date().toISOString().split("T")[0] }); }}>✓ อนุมัติ</button>
                          <button className="btn btn-xs btn-red"
                            onClick={e => { e.stopPropagation(); setRejectForm({ reqId:r.id, reason:"" }); }}>✕ ปฏิเสธ</button>
                        </div>
                      );
                    })()}
                    {/* Admin Support: รับงาน + ปฏิเสธ / แสดงผู้รับงาน */}
                    {isCentral && r.status === "approved" && (
                      isApprovedUnassigned ? (
                        <div style={{ display:"flex", gap:4, flexDirection:"column" }}>
                          <button className="btn btn-xs" style={{ background:"rgba(6,182,212,0.15)", color:"#06b6d4", borderColor:"rgba(6,182,212,0.4)", fontWeight:700, whiteSpace:"nowrap" }}
                            onClick={e => acceptTask(r, e)}>🙋 รับงาน + ลงปฏิทิน</button>
                          <button className="btn btn-xs btn-ghost" style={{ color:"var(--red)", borderColor:"rgba(239,68,68,0.3)", fontSize:10, whiteSpace:"nowrap" }}
                            onClick={e => { e.stopPropagation(); setRejectForm({ reqId:r.id, reason:"" }); }}>❌ ไม่สามารถทำได้</button>
                        </div>
                      ) : r.assignedTo && r.assignedTo !== user.id ? (
                        <div style={{ fontSize:10, color:"var(--text3)", textAlign:"center", lineHeight:1.4 }}>
                          <div>📌 รับงานแล้ว</div>
                          <div style={{ color:"#8b5cf6" }}>{USERS.find(u=>u.id===r.assignedTo)?.name?.split(" ")[0]||"ผู้ดูแล"}</div>
                        </div>
                      ) : null
                    )}
                    {/* Admin Support: เสร็จแล้ว */}
                    {isCentral && isMyTask && r.status === "in_progress" && (
                      <button className="btn btn-xs" style={{ background:"rgba(0,229,160,0.12)", color:"var(--accent)", borderColor:"rgba(0,229,160,0.3)" }}
                        onClick={e => markDone(r, e)}>✓ เสร็จแล้ว</button>
                    )}
                    <span style={{ fontSize:10, color:"var(--text3)", textAlign:"center" }}>{fmtDate(r.createdAt)}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Reject Modal ── */}
      {rejectForm && (() => {
        const targetReq = requests.find(r => r.id === rejectForm.reqId);
        return (
          <div className="overlay" onClick={() => setRejectForm(null)}>
            <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth:420 }}>
              <div className="modal-hd">
                <div>
                  <div className="modal-title" style={{ color:"var(--red)" }}>❌ ปฏิเสธ Request</div>
                  <div style={{ fontSize:11, color:"var(--text3)", marginTop:3 }}>"{targetReq?.title}"</div>
                </div>
                <button className="modal-close" onClick={() => setRejectForm(null)}>✕</button>
              </div>
              <div className="fg">
                <label className="flabel">เหตุผลที่ไม่สามารถดำเนินการ *</label>
                <textarea className="ftextarea" style={{ minHeight:90 }}
                  value={rejectForm.reason}
                  onChange={e => setRejectForm(f => ({ ...f, reason: e.target.value }))}
                  placeholder="เช่น ติดคิวงานอื่น / ต้องการรายละเอียดเพิ่มเติม / นอกขอบเขตงาน..."
                  autoFocus
                />
                {!rejectForm.reason.trim() && (
                  <div style={{ fontSize:10, color:"var(--red)", marginTop:3 }}>* กรุณาระบุเหตุผลก่อนปฏิเสธ</div>
                )}
              </div>
              <div className="modal-ft">
                <button className="btn btn-ghost" onClick={() => setRejectForm(null)}>ยกเลิก</button>
                <button className="btn btn-red" style={{ fontWeight:700 }}
                  disabled={!rejectForm.reason.trim()}
                  onClick={() => rejectTask(targetReq, rejectForm.reason.trim())}>
                  ยืนยันปฏิเสธ
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {showForm && <RequestFormModal leads={leads} currentUser={user} onSave={saveRequest} onClose={() => setShowForm(false)} tasks={tasks||[]} requests={requests} events={events||[]} />}
      {viewReq  && <RequestDetailModal req={viewReq} leads={leads} currentUser={user} onUpdate={updateRequest} onClose={() => setViewReq(null)} />}
    </div>
  );
}


// ============================================================
// ADMIN CALENDAR PAGE
// ============================================================
function AdminCalendarPage({ requests, currentUser, leads, tasks = [], setTasks }) {
  const today     = new Date();
  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth()); // 0-indexed
  const [selected, setSelected] = useState(null); // selected date string YYYY-MM-DD
  const [viewReq, setViewReq]   = useState(null);

  const isCentral   = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(currentUser.role);
  const isExecLevel = [ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isManager   = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isReadOnly  = currentUser.role === ROLES.MANAGER; // Manager เห็นได้แต่แก้ไขไม่ได้
  const [adminFilter, setAdminFilter] = useState("all");

  // ── Sales filter ──
  const salesUsers = USERS.filter(u => u.role === ROLES.SALES);
  const [salesFilter, setSalesFilter] = useState("all"); // "all" or userId

  // สร้าง set ของ requests ที่มี eventDate (approved+in_progress+completed)
  const calRequests = requests.filter(r => {
    if (!r.eventDate) return false;
    if (!["approved","in_progress","completed"].includes(r.status)) return false;
    if (isCentral) return r.assignedTo === currentUser.id;
    if (isExecLevel || isManager) {
      // Exec/Exec_asst: เห็นทุกอย่าง, Manager: เห็นแต่แก้ไขไม่ได้
      if (adminFilter !== "all") return r.assignedTo === Number(adminFilter);
      return true;
    }
    return false;
  });

  // ── Sales tasks → calendar events ──
  // Sales tasks ที่มี dueDate (ทุก role ที่เป็น Manager เห็นได้)
  const salesColors = ["#00e5a0","#3b82f6","#f59e0b","#ec4899","#8b5cf6","#06b6d4"];
  const salesColorMap = {};
  salesUsers.forEach((u, i) => { salesColorMap[u.id] = salesColors[i % salesColors.length]; });

  const calTasks = isManager ? tasks.filter(t => {
    if (!t.dueDate) return false;
    if (t.completed) return false;
    if (salesFilter !== "all") {
      const uid = Number(salesFilter);
      return t.assignedTo === uid || (t.joinedBy||[]).includes(uid);
    }
    // tasks ที่ visibleToAll=true หรือ tasks ของ Sales หรือ Manager เข้าร่วมแล้ว
    return t.visibleToAll || salesUsers.some(u => u.id === t.assignedTo) || (t.joinedBy||[]).includes(currentUser.id);
  }) : tasks.filter(t => {
    // Sales เห็นงานของตัวเองที่เข้าร่วม
    if (!t.dueDate || t.completed) return false;
    return t.assignedTo === currentUser.id || (t.joinedBy||[]).includes(currentUser.id);
  });

  // Group by date — รวม requests และ tasks
  const byDate = {};
  calRequests.forEach(r => {
    const d = r.eventDate;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({ _type: "request", ...r });
  });
  calTasks.forEach(t => {
    const d = t.dueDate;
    if (!byDate[d]) byDate[d] = [];
    byDate[d].push({ _type: "task", ...t });
  });

  // Calendar grid
  const firstDay  = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const prevMonth = () => { if (month === 0) { setYear(y => y-1); setMonth(11); } else setMonth(m => m-1); };
  const nextMonth = () => { if (month === 11) { setYear(y => y+1); setMonth(0); } else setMonth(m => m+1); };

  const monthNames = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                      "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const dayNames   = ["อา","จ","อ","พ","พฤ","ศ","ส"];

  const statusColor = { approved:"#3b82f6", in_progress:"#06b6d4", completed:"#00e5a0" };

  // Admins list for manager filter
  const adminUsers = USERS.filter(u => u.role === ROLES.CENTRAL);

  // Selected date requests — sort ด้วย priority (ค้างอยู่ขึ้นก่อน)
  const selectedItems = selected ? (byDate[selected] || []) : [];
  const selectedReqs = selectedItems; // alias for compatibility

  // Upcoming — next 14 days (requests + sales tasks)
  const todayStr = today.toISOString().split("T")[0];
  const next14Str = new Date(Date.now() + 14*86400000).toISOString().split("T")[0];
  const upcoming = [
    ...calRequests
      .filter(r => r.eventDate >= todayStr && r.status !== "completed")
      .map(r => ({ _type:"request", _date: r.eventDate, ...r })),
    ...calTasks
      .filter(t => t.dueDate >= todayStr && t.dueDate <= next14Str)
      .map(t => ({ _type:"task", _date: t.dueDate, ...t })),
  ].sort((a,b) => a._date.localeCompare(b._date)).slice(0, 10);

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div className="ph-title">📅 ปฏิทินภาพรวมองค์กร</div>
              {isReadOnly && (
                <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8,
                  background:"rgba(107,114,128,0.15)", color:"var(--text3)",
                  border:"1px solid var(--border)", fontWeight:600 }}>
                  👁 ดูอย่างเดียว
                </span>
              )}
            </div>
          <div className="ph-sub">
            {isCentral
              ? `ภารกิจของ ${currentUser.name}`
              : isReadOnly
              ? "ภาพรวมทุกแผนก — Manager ดูได้แต่ไม่สามารถแก้ไขได้"
              : "ภาพรวมทุกแผนก — Exec/Exec_asst จัดการได้เต็มที่"}
          </div>
        </div>
        {isManager && (
          <div className="ph-actions" style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {adminUsers.length > 1 && (
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:11, color:"var(--text3)" }}>Admin:</span>
                <select className="fselect" style={{ width:"auto", padding:"5px 10px", fontSize:12 }}
                  value={adminFilter} onChange={e => setAdminFilter(e.target.value)}>
                  <option value="all">ทุกคน</option>
                  {adminUsers.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                </select>
              </div>

              <select className="fselect" style={{ width:"auto", padding:"5px 10px", fontSize:12 }}
                value={salesFilter} onChange={e => setSalesFilter(e.target.value)}>

                  <option key={u.id} value={u.id}>{u.name.split(" ")[0]} ({u.zone || "-"})</option>

      {/* ── Admin Team Summary (Manager only) ── */}
      {isManager && (
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"var(--text2)", marginBottom:10 }}>📊 ภาระงานแต่ละ Admin</div>
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${adminUsers.length},1fr)`, gap:12 }}>
            {adminUsers.map(admin => {
              const myReqs = requests.filter(r => r.assignedTo === admin.id && ["approved","in_progress"].includes(r.status));
              const myDone = requests.filter(r => r.assignedTo === admin.id && r.status === "completed").length;
              const upcoming2 = myReqs.filter(r => r.eventDate >= todayStr).sort((a,b)=>a.eventDate.localeCompare(b.eventDate));
              return (
                <div key={admin.id} className="card card-p" style={{ padding:14,
                  borderColor: myReqs.length > 3 ? "rgba(239,68,68,0.3)" : "var(--border)" }}>
                  <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
                    <span className="av av-sm">{admin.avatar}</span>
                    <div>
                      <div style={{ fontWeight:700, fontSize:13 }}>{admin.name}</div>
                      <div style={{ fontSize:10, color:"var(--text3)" }}>Admin Support</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:10, marginBottom:10 }}>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:20, fontWeight:700, color:"#06b6d4", fontFamily:"IBM Plex Mono" }}>{myReqs.length}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>กำลังทำ</div>
                    </div>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:20, fontWeight:700, color:"#00e5a0", fontFamily:"IBM Plex Mono" }}>{myDone}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>เสร็จแล้ว</div>
                    </div>
                  </div>
                  {/* ภารกิจใกล้ถึง */}
                  {upcoming2.slice(0,3).map(r => (
                    <div key={r.id} style={{ fontSize:10, padding:"4px 8px", marginBottom:4, borderRadius:6,
                      background:`${statusColor[r.status] || "#6b7280"}15`,
                      border:`1px solid ${statusColor[r.status] || "#6b7280"}30`, color:"var(--text2)" }}>
                      <span style={{ color: statusColor[r.status], fontWeight:700 }}>
                        {fmtDate(r.eventDate)}
                      </span> — {r.title.substring(0,28)}{r.title.length>28?"...":""}
                    </div>
                  ))}
                  {myReqs.length === 0 && <div style={{ fontSize:10, color:"var(--text3)" }}>ไม่มีงานที่กำลังดำเนินการ</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Sales Task Summary (Manager only) ── */}
      {isManager && salesUsers.length > 0 && (
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"var(--text2)", marginBottom:10 }}>🎯 งานของ Sales แต่ละคน</div>
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${Math.min(salesUsers.length,4)},1fr)`, gap:10 }}>
            {salesUsers.map(u => {
              const myTasks = tasks.filter(t => t.assignedTo === u.id && !t.completed);
              const overdue = myTasks.filter(t => t.dueDate && t.dueDate < todayStr).length;
              const dueToday = myTasks.filter(t => t.dueDate === todayStr).length;
              const color = salesColorMap[u.id] || "#00e5a0";
              return (
                <div key={u.id} className="card card-p" style={{ padding:12,
                  borderColor: overdue > 0 ? "rgba(239,68,68,0.3)" : color+"30",
                  borderLeft:`3px solid ${color}` }}>
                  <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
                    <span className="av av-sm" style={{ background:color+"20", color }}>{u.avatar}</span>
                    <div>
                      <div style={{ fontWeight:700, fontSize:12 }}>{u.name.split(" ")[0]}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>{u.zone || "-"}</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:8 }}>
                    <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:700, color, fontFamily:"IBM Plex Mono" }}>{myTasks.length}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>งานค้างอยู่</div>
                    </div>
                    {dueToday > 0 && <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:700, color:"#f59e0b", fontFamily:"IBM Plex Mono" }}>{dueToday}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>วันนี้</div>
                    </div>}
                    {overdue > 0 && <div style={{ textAlign:"center" }}>
                      <div style={{ fontSize:18, fontWeight:700, color:"var(--red)", fontFamily:"IBM Plex Mono" }}>{overdue}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>เกินกำหนด</div>
                    </div>}
                  </div>
                  {myTasks.slice(0,2).map(t => (
                    <div key={t.id} style={{ marginTop:6, fontSize:9, color:"var(--text2)",
                      padding:"3px 7px", borderRadius:5, background:color+"10", border:`1px solid ${color}20` }}>

                    </div>

          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
            <button className="btn btn-ghost btn-sm" onClick={prevMonth}>‹ เดือนก่อน</button>
            <div style={{ fontWeight:700, fontSize:15 }}>{monthNames[month]} {year + 543}</div>
            <button className="btn btn-ghost btn-sm" onClick={nextMonth}>เดือนถัดไป ›</button>
          </div>

          {/* Day headers */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4, marginBottom:4 }}>
            {dayNames.map(d => (
              <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700,
                color: d==="อา"||d==="ส" ? "var(--red)" : "var(--text3)", paddingBottom:6 }}>{d}</div>

          {/* Grid */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:4 }}>
            {/* Empty cells */}
            {Array.from({ length: firstDay }).map((_, i) => <div key={"e"+i} />)}

              const day  = i + 1;
              const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const dayReqs = byDate[dateStr] || [];
              const isToday = dateStr === todayStr;
              const isSel   = dateStr === selected;
              const dayOfWeek = new Date(year, month, day).getDay();
              const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
              return (
                <div key={day}
                  onClick={() => setSelected(isSel ? null : dateStr)}
                  style={{
                    minHeight:62, borderRadius:8, padding:"5px 6px", cursor:"pointer",
                    border:`1px solid ${isSel ? "var(--accent)" : isToday ? "rgba(0,229,160,0.3)" : "var(--border)"}`,
                    background: isSel ? "var(--accent-dim)" : isToday ? "rgba(0,229,160,0.04)" : "var(--bg3)",
                    transition:"all 0.1s",
                  }}
                  onMouseEnter={e => { if(!isSel) e.currentTarget.style.background="var(--bg2)"; }}
                  onMouseLeave={e => { if(!isSel) e.currentTarget.style.background=isToday?"rgba(0,229,160,0.04)":"var(--bg3)"; }}

                  <div style={{ fontSize:11, fontWeight:700, marginBottom:3,
                    color: isToday ? "var(--accent)" : isWeekend ? "var(--red)" : "var(--text2)" }}>
                    {day}
                  </div>
                  {dayReqs.slice(0,3).map(item => {
                    const isTask = item._type === "task";
                    const salesOwner = isTask ? USERS.find(u => u.id === item.assignedTo) : null;
                    const taskColor = isTask ? (salesColorMap[item.assignedTo] || "#00e5a0") : null;
                    const bg    = isTask ? taskColor + "22" : (statusColor[item.status]||"#6b7280")+"22";
                    const clr   = isTask ? taskColor : (statusColor[item.status]||"var(--text3)");
                    const bdr   = isTask ? taskColor + "55" : (statusColor[item.status]||"#6b7280")+"40";
                    return (
                      <div key={item._type+item.id}
                        onClick={e => { e.stopPropagation(); if(!isTask) setViewReq(item); }}
                        style={{ fontSize:9, padding:"2px 5px", borderRadius:4, marginBottom:2,
                          background: bg, color: clr,
                          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                          cursor: isTask ? "default" : "pointer",
                          border:`1px solid ${bdr}`,
                        }}
                        title={`${isTask ? "🎯" : "📋"} ${item.title}${isTask && salesOwner ? " — "+salesOwner.name.split(" ")[0] : ""}`}>

                      </div>
                    );
                  })}
                  {dayReqs.length > 3 && (
                    <div style={{ fontSize:8, color:"var(--text3)" }}>+{dayReqs.length-3} อื่น</div>
                  )}

          </div>

          {/* Legend */}
          <div style={{ display:"flex", gap:10, marginTop:12, flexWrap:"wrap" }}>
            {[["approved","อนุมัติแล้ว"],["in_progress","กำลังดำเนินการ"],["completed","เสร็จแล้ว"]].map(([s,l])=>(
              <div key={s} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:"var(--text3)" }}>
                <div style={{ width:8, height:8, borderRadius:2, background:statusColor[s] }} />

              </div>
            ))}
            {isManager && salesUsers.map(u => (
              <div key={u.id} style={{ display:"flex", alignItems:"center", gap:5, fontSize:10, color:"var(--text3)" }}>
                <div style={{ width:8, height:8, borderRadius:2, background:salesColorMap[u.id] }} />
