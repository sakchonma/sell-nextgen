                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Right summary */}
            <div>
              <div className="card card-p" style={{ marginBottom:12 }}>
                <div style={{ fontWeight:700, fontSize:12, marginBottom:10, color:"var(--text2)" }}>สรุปวันนี้</div>
                {dayTasks.length === 0 ? (
                  <div style={{ fontSize:12, color:"var(--text3)" }}>ไม่มีงานในวันนี้</div>
                ) : (
                  <>
                    <div style={{ display:"flex", gap:12, marginBottom:10 }}>
                      {[["ทั้งหมด", dayTasks.length, "var(--text2)"],
                        ["เสร็จแล้ว", dayTasks.filter(t=>t.completed).length, "#00e5a0"],
                        ["เหลือ", dayTasks.filter(t=>!t.completed).length, "#f59e0b"]
                      ].map(([l,n,c])=>(
                        <div key={l} style={{ textAlign:"center" }}>
                          <div style={{ fontSize:20, fontWeight:800, color:c, fontFamily:"IBM Plex Mono" }}>{n}</div>
                          <div style={{ fontSize:9, color:"var(--text3)" }}>{l}</div>
                        </div>
                      ))}
                    </div>
                    {dayTasks.map(t => (
                      <div key={t.id} style={{ display:"flex", gap:8, alignItems:"center", padding:"6px 0", borderBottom:"1px solid var(--border)", cursor:"pointer" }}
                        onClick={() => setSelectedCalTask(t)}>
                        <div style={{ width:10, height:10, borderRadius:"50%", background:pc(t.priority), flexShrink:0 }} />
                        <div style={{ flex:1, fontSize:11, textDecoration:t.completed?"line-through":"none", color:t.completed?"var(--text3)":"var(--text)" }}>
                          {t.dueTime && <span style={{ fontFamily:"IBM Plex Mono", fontSize:9, color:"var(--text3)", marginRight:4 }}>{t.dueTime}</span>}
                          {t.title}
                        </div>
                        <div style={{ width:8, height:8, borderRadius:2, background:t.completed?"#00e5a0":"var(--border)" }} />
                      </div>
                    ))}
                  </>
                )}
              </div>
              {/* Mini month nav */}
              <div className="card card-p">
                <div style={{ fontWeight:700, fontSize:11, marginBottom:8, color:"var(--text3)" }}>{MONTH_NAMES_TH[calMonth]} {calYear+543}</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
                  {DAY_SHORT.map(d=><div key={d} style={{ textAlign:"center", fontSize:8, color:"var(--text3)" }}>{d}</div>)}
                  {Array.from({length: new Date(calYear,calMonth,1).getDay()}).map((_,i)=><div key={"e"+i}/>)}
                  {Array.from({length: new Date(calYear,calMonth+1,0).getDate()}).map((_,i)=>{
                    const day=i+1;
                    const dss=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                    const isT=dss===todayStr, isSel=dss===ds, hasTasks=tasksOnDate(dss).length>0;
                    return (
                      <div key={day} onClick={()=>{setCalDate(new Date(calYear,calMonth,day));}}
                        style={{ textAlign:"center", fontSize:9, padding:"2px 0", borderRadius:4, cursor:"pointer",
                          background: isSel?"var(--accent)":isT?"rgba(0,229,160,0.15)":"transparent",
                          color: isSel?"#000":isT?"var(--accent)":"var(--text3)",
                          fontWeight: isSel||isT?700:400,
                          position:"relative" }}>
                        {day}
                        {hasTasks && !isSel && <div style={{ width:3, height:3, borderRadius:"50%", background:isT?"var(--accent)":"var(--text3)", margin:"0 auto" }}/>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>
        );
      })()}


      {/* ══ VIEW: MONTH ══ */}
      {viewMode === "month" && (() => {
        const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const TaskChip = ({ t }) => {
          const col = pc(t.priority);
          const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
          return (
            <div onClick={() => setSelectedCalTask(t)}
              style={{ fontSize:9, padding:"2px 5px", borderRadius:4, marginBottom:2,
                background: isAck ? "var(--bg2)" : col+"20",
                color: isAck ? "var(--text3)" : col,
                border:`1px solid ${isAck ? "var(--border)" : col+"50"}`,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                cursor:"pointer", opacity: t.completed ? 0.45 : 1,
                textDecoration: t.completed ? "line-through" : "none",
              }}>
              {t.completed ? "✓ " : ""}{t.dueTime ? t.dueTime+" " : ""}{t.title}
            </div>
          );
        };
        return (
          <div className="card card-p">
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2, marginBottom:6 }}>
              {["อา","จ","อ","พ","พฤ","ศ","ส"].map((d,i) => (
                <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, paddingBottom:6,
                  color: i===0||i===6 ? "var(--red)" : "var(--text3)" }}>{d}</div>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
              {Array.from({length: firstDay}).map((_,i) => <div key={"e"+i} style={{ minHeight:80 }} />)}
              {Array.from({length: daysInMonth}).map((_,i) => {
                const day = i+1;
                const ds = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                const dayTasks = tasksOnDate(ds);
                const isToday = ds === todayStr;
                const isSel   = ds === toDateStr(calDate);
                const dow = new Date(calYear, calMonth, day).getDay();
                const isWE = dow===0||dow===6;
                return (
                  <div key={day} onClick={() => { setCalDate(new Date(calYear, calMonth, day)); }}
                    style={{ minHeight:80, borderRadius:7, padding:"4px 5px", cursor:"pointer",
                      border:`1px solid ${isSel?"var(--accent)":isToday?"rgba(0,229,160,0.35)":"var(--border)"}`,
                      background: isSel?"var(--accent-dim)":isToday?"rgba(0,229,160,0.04)":"var(--bg3)",
                    }}>
                    <div style={{ fontSize:11, fontWeight:700, marginBottom:3,
                      color: isToday?"var(--accent)":isWE?"var(--red)":"var(--text2)" }}>
                      {day}
                      {dayTasks.length > 0 && (
                        <span style={{ marginLeft:4, fontSize:9, background:"var(--accent)", color:"#000",
                          borderRadius:8, padding:"0 5px", fontWeight:800 }}>{dayTasks.length}</span>
                      )}
                    </div>
                    {dayTasks.slice(0,3).map(t => <TaskChip key={t.id} t={t} />)}
                    {dayTasks.length > 3 && <div style={{ fontSize:8, color:"var(--text3)" }}>+{dayTasks.length-3} อื่น</div>}
                  </div>
                );
              })}
            </div>
            {/* Legend */}
            <div style={{ display:"flex", gap:10, marginTop:10, flexWrap:"wrap" }}>
              {Object.entries(PRIORITY_COLOR).map(([p,c]) => (
                <div key={p} style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"var(--text3)" }}>
                  <div style={{ width:8, height:8, borderRadius:2, background:c }} />{p}
                </div>
              ))}
              <div style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"var(--text3)" }}>
                <div style={{ width:8, height:8, borderRadius:2, background:"var(--border)" }} />รับทราบ
              </div>
            </div>
          </div>
        );
      })()}

      {/* ══ VIEW: WEEK ══ */}
      {viewMode === "week" && (() => {
        // จุดเริ่มต้นสัปดาห์ = วันจันทร์
        const mon = new Date(calDate);
        mon.setDate(mon.getDate() - ((mon.getDay()+6)%7));
        const weekDays = Array.from({length:7}, (_,i) => {
          const d = new Date(mon); d.setDate(mon.getDate()+i);
          return d;
        });
        const HOURS = Array.from({length:24}, (_,i) => i); // 0-23
        // group tasks by date+hour for timeline
        const TaskChip = ({ t, compact }) => {
          const col = pc(t.priority);
          const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
          return (
            <div onClick={() => setSelectedCalTask(t)}
              style={{ fontSize:compact?8:10, padding:"3px 6px", borderRadius:5, marginBottom:2,
                background: isAck ? "var(--bg2)" : col+"20", color: isAck ? "var(--text3)" : col,
                border:`1px solid ${isAck ? "var(--border)" : col+"50"}`,
                cursor:"pointer", opacity: t.completed ? 0.5 : 1,
                textDecoration: t.completed ? "line-through" : "none",
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
              }}>
              {t.dueTime ? t.dueTime+" " : ""}{t.title}
            </div>
          );
        };
        return (
          <div className="card card-p" style={{ overflowX:"auto" }}>
            {/* Header row */}
            <div style={{ display:"grid", gridTemplateColumns:"48px repeat(7,1fr)", gap:3, marginBottom:8, position:"sticky", top:0, background:"var(--bg2)", zIndex:2, paddingBottom:6, borderBottom:"1px solid var(--border)" }}>
              <div />
              {weekDays.map((d,i) => {
                const ds = toDateStr(d);
                const isT = ds===todayStr;
                const dow = d.getDay();
                const isWE = dow===0||dow===6;
                const cnt = tasksOnDate(ds).length;
                return (
                  <div key={i} style={{ textAlign:"center" }}>
                    <div style={{ fontSize:10, color: isWE?"var(--red)":"var(--text3)", fontWeight:700 }}>
                      {["อา","จ","อ","พ","พฤ","ศ","ส"][dow]}
                    </div>
                    <div style={{ fontSize:isT?18:15, fontWeight:isT?800:600,
                      color:isT?"var(--accent)":isWE?"var(--red)":"var(--text2)",
                      background:isT?"rgba(0,229,160,0.12)":"transparent",
                      borderRadius:8, padding:"2px 4px", display:"inline-block" }}>
                      {d.getDate()}
                    </div>
                    {cnt>0 && <div style={{ fontSize:9, color:"var(--accent)", fontWeight:700 }}>{cnt}</div>}
                  </div>
                );
              })}
            </div>
            {/* All-day row (tasks without time) */}
            {weekDays.some(d => tasksOnDate(toDateStr(d)).filter(t => !t.dueTime).length > 0) && (
              <div style={{ display:"grid", gridTemplateColumns:"48px repeat(7,1fr)", gap:3, marginBottom:8, paddingBottom:8, borderBottom:"1px solid var(--border)" }}>
                <div style={{ fontSize:9, color:"var(--text3)", paddingTop:4 }}>ทั้งวัน</div>
                {weekDays.map((d,i) => {
                  const allDay = tasksOnDate(toDateStr(d)).filter(t => !t.dueTime);
                  return (
                    <div key={i} style={{ minHeight:20 }}>
                      {allDay.map(t => <TaskChip key={t.id} t={t} compact />)}
                    </div>
                  );
                })}
              </div>
            )}
            {/* Hourly grid 06-22 */}
            <div style={{ maxHeight:520, overflowY:"auto" }}>
              {HOURS.filter(h => h>=6&&h<=22).map(h => {
                const hStr = String(h).padStart(2,"0")+":";
                return (
                  <div key={h} style={{ display:"grid", gridTemplateColumns:"48px repeat(7,1fr)", gap:3, minHeight:52, borderTop:"1px solid rgba(255,255,255,0.04)" }}>
                    <div style={{ fontSize:9, color:"var(--text3)", paddingTop:3, fontFamily:"IBM Plex Mono" }}>{hStr}00</div>
                    {weekDays.map((d,i) => {
                      const ds = toDateStr(d);
                      const hTasks = tasksOnDate(ds).filter(t => t.dueTime && t.dueTime.startsWith(String(h).padStart(2,"0")));
                      return (
                        <div key={i} style={{ background: toDateStr(d)===todayStr ? "rgba(0,229,160,0.02)" : "transparent", borderRadius:4 }}>
                          {hTasks.map(t => <TaskChip key={t.id} t={t} compact />)}
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* ══ VIEW: DAY ══ */}
      {viewMode === "day" && (() => {
        const ds = toDateStr(calDate);
        const dayTasks = tasksOnDate(ds);
        const withTime = dayTasks.filter(t => t.dueTime).sort((a,b) => a.dueTime.localeCompare(b.dueTime));
        const allDay   = dayTasks.filter(t => !t.dueTime);
        const HOURS = Array.from({length:24},(_,i)=>i);
        const TaskBlock = ({ t }) => {
          const col = pc(t.priority);
          const isAck = (t.acknowledgedBy||[]).includes(user.id) && !(t.joinedBy||[]).includes(user.id);
          const school = leads.find(l=>l.id===t.leadId)?.schoolName;
          return (
            <div onClick={() => setSelectedCalTask(t)} style={{ padding:"8px 12px", borderRadius:8, marginBottom:6,
              background: isAck?"var(--bg3)":col+"18", border:`1px solid ${isAck?"var(--border)":col+"50"}`,
              borderLeft:`3px solid ${isAck?"var(--text3)":col}`,
              cursor:"pointer", opacity: t.completed ? 0.5 : 1 }}>
              <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:13, color: isAck?"var(--text3)":col,
                    textDecoration: t.completed?"line-through":"none" }}>{t.title}</div>
                  {t.dueTime && (
                    <div style={{ fontSize:11, color:"var(--text3)", marginTop:2 }}>
                      ⏰ {t.dueTime} น.{t.duration ? ` (${t.duration} นาที)` : ""}
                    </div>
                  )}
                  {school && <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>🏫 {school}</div>}
                  {t.description && <div style={{ fontSize:11, color:"var(--text2)", marginTop:3, lineHeight:1.5 }}>{t.description.slice(0,80)}{t.description.length>80?"…":""}</div>}
                  <div style={{ display:"flex", gap:6, marginTop:4, flexWrap:"wrap" }}>
                    <span style={{ fontSize:9, padding:"1px 7px", borderRadius:6, background:col+"22", color:col, fontWeight:700 }}>{t.priority}</span>
                    {t.apptType && <span style={{ fontSize:9, padding:"1px 7px", borderRadius:6, background:"rgba(139,92,246,0.12)", color:"#a78bfa", fontWeight:700 }}>{t.apptType}</span>}
                    {t.meetingLink && <a href={t.meetingLink} target="_blank" rel="noopener noreferrer" style={{ fontSize:9, color:"#3b82f6", textDecoration:"none", fontWeight:700 }}>🔗 {t.platform||"Meeting"}</a>}
                    {t.locationLink && <a href={t.locationLink} target="_blank" rel="noopener noreferrer" style={{ fontSize:9, color:"#10b981", textDecoration:"none", fontWeight:700 }}>📍 แผนที่</a>}
                    {t.needSupport && <span style={{ fontSize:9, color:"#f59e0b", fontWeight:700 }}>🙋 ขอสนับสนุน</span>}
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:4, flexShrink:0 }}>
                  <button className="btn btn-xs" style={{ background:col+"22", color:col, borderColor:col+"50", fontSize:9 }}
                    onClick={e=>{e.stopPropagation();toggleDone(t.id);}}>
                    {t.completed?"↩":"✓"}
                  </button>
                  <button className="btn btn-xs btn-ghost" style={{ fontSize:9, color:"var(--red)" }}
                    onClick={e=>{e.stopPropagation();deleteTask(t.id);}}>🗑</button>
                </div>
              </div>
            </div>
          );
        };
        return (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 220px", gap:16, alignItems:"start" }}>
            {/* Timeline */}
            <div className="card card-p">
              {/* All-day */}
              {allDay.length > 0 && (
                <div style={{ marginBottom:12, paddingBottom:12, borderBottom:"1px solid var(--border)" }}>
                  <div style={{ fontSize:10, fontWeight:700, color:"var(--text3)", marginBottom:6 }}>ทั้งวัน ({allDay.length})</div>
                  {allDay.map(t => <TaskBlock key={t.id} t={t} />)}
                </div>
              )}
              {/* Hourly timeline */}
              <div style={{ maxHeight:600, overflowY:"auto" }}>
                {HOURS.filter(h=>h>=6&&h<=22).map(h => {
                  const hStr = String(h).padStart(2,"0");
                  const hTasks = withTime.filter(t => t.dueTime.startsWith(hStr));
                  const isNowH = new Date().getHours()===h && ds===todayStr;
                  return (
                    <div key={h} style={{ display:"flex", gap:10, minHeight:56, borderTop:`1px solid ${isNowH?"rgba(0,229,160,0.25)":"rgba(255,255,255,0.04)"}` }}>
                      <div style={{ width:44, fontSize:10, color:isNowH?"var(--accent)":"var(--text3)",
                        fontFamily:"IBM Plex Mono", paddingTop:4, flexShrink:0, fontWeight:isNowH?700:400 }}>
                        {hStr}:00
                        {isNowH && <div style={{ width:6, height:6, borderRadius:"50%", background:"var(--accent)", marginTop:2 }} />}
                      </div>
                      <div style={{ flex:1, paddingTop:4 }}>
                        {hTasks.map(t => <TaskBlock key={t.id} t={t} />)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
            {/* Day summary */}
            <div>
              <div className="card card-p" style={{ marginBottom:12 }}>
                <div style={{ fontSize:12, fontWeight:700, marginBottom:8 }}>
                  📊 {new Date(ds+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                  {[
                    {l:"ทั้งหมด",n:dayTasks.length,c:"var(--text2)"},
                    {l:"เสร็จแล้ว",n:dayTasks.filter(t=>t.completed).length,c:"var(--accent)"},
                    {l:"มีเวลา",n:withTime.length,c:"#3b82f6"},
                    {l:"ทั้งวัน",n:allDay.length,c:"#8b5cf6"},
                  ].map(({l,n,c})=>(
                    <div key={l} style={{ textAlign:"center", padding:"8px 4px", background:"var(--bg3)", borderRadius:8 }}>
                      <div style={{ fontSize:20, fontWeight:800, color:c, fontFamily:"IBM Plex Mono" }}>{n}</div>
                      <div style={{ fontSize:9, color:"var(--text3)" }}>{l}</div>
                    </div>
                  ))}
                </div>
              </div>
              {/* Quick add */}
              <div className="card card-p">
                <div style={{ fontSize:11, fontWeight:700, color:"var(--text3)", marginBottom:8 }}>⚡ เพิ่มงานในวันนี้</div>
                <button className="btn btn-accent btn-sm" style={{ width:"100%" }}
                  onClick={() => { setForm(f=>({...f, dueDate:ds})); setShowForm(true); }}>
                  + เพิ่มงาน {fmtDate(ds)}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

            {/* ── Agenda Strip (calendar views) ── */}
      {viewMode !== "list" && (() => {
        const next7 = new Date(Date.now() + 7*86400000).toISOString().split("T")[0];
        const agendaTasks = upcomingTasks.filter(t => t.dueDate >= todayStr && t.dueDate <= next7).slice(0, 8);
        if (agendaTasks.length === 0) return null;
        return (
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"var(--text3)", marginBottom:8 }}>📋 นัดหมายใน 7 วันข้างหน้า</div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              {agendaTasks.map(t => {
                const school = leads.find(l => l.id === t.leadId)?.schoolName;
                const isToday2 = t.dueDate === todayStr;
                return (
                  <div key={t.id}
                    onClick={() => { setCalDate(new Date(t.dueDate+"T12:00:00")); setViewMode("day"); setSelectedCalTask(t); }}
                    style={{ display:"flex", gap:10, alignItems:"center", padding:"8px 12px",
                      borderRadius:8, cursor:"pointer",
                      background: isToday2 ? "rgba(0,229,160,0.06)" : "var(--bg3)",
                      border:`1px solid ${isToday2?"rgba(0,229,160,0.25)":pc(t.priority)+"30"}`,
                      borderLeft:`3px solid ${pc(t.priority)}` }}>
                    <div style={{ width:52, flexShrink:0 }}>
                      <div style={{ fontSize:10, fontWeight:700, color: isToday2?"var(--accent)":"var(--text3)", fontFamily:"IBM Plex Mono" }}>
                        {isToday2 ? "วันนี้" : new Date(t.dueDate+"T12:00:00").toLocaleDateString("th-TH",{day:"numeric",month:"short"})}
                      </div>
                      {t.dueTime && <div style={{ fontSize:9, color:"var(--text3)", fontFamily:"IBM Plex Mono" }}>{t.dueTime}</div>}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:600, fontSize:12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.title}</div>
                      <div style={{ display:"flex", gap:6, marginTop:2, flexWrap:"wrap" }}>
                        {t.apptType && <span style={{ fontSize:9, color:"#a78bfa" }}>{t.apptType}</span>}
                        {school && <span style={{ fontSize:9, color:"var(--text3)" }}>🏫 {school}</span>}
                        {t.meetingLink && <span style={{ fontSize:9, color:"#3b82f6" }}>🔗 {t.platform||"Online"}</span>}
                        {t.locationLink && <span style={{ fontSize:9, color:"#10b981" }}>📍 Onsite</span>}
                      </div>
                    </div>
                    <div style={{ flexShrink:0 }}>
                      <span style={{ fontSize:9, padding:"2px 7px", borderRadius:6,
                        background:pc(t.priority)+"22", color:pc(t.priority), fontWeight:700 }}>{t.priority}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {showForm && (
        <div className="overlay" onClick={() => setShowForm(false)}>
          <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth:580 }}>
            <div className="modal-hd">
              <div className="modal-title">📋 เพิ่มงาน / นัดประชุม</div>
              <button className="modal-close" onClick={() => setShowForm(false)}>✕</button>
            </div>

            {/* ชื่องาน */}
            <div className="fg">
              <label className="flabel">ชื่องาน / หัวข้อประชุม *</label>
              <input className="finput" value={form.title} autoFocus
                onChange={e => setForm(f => ({ ...f, title: e.target.value }))}

                onChange={e => setForm(f => ({ ...f, description: e.target.value }))}

                <label className="flabel">📅 วันที่ *</label>

                  onChange={e => setForm(f => ({ ...f, dueDate: e.target.value }))} />
                {form.dueDate && <div style={{ fontSize:10, color:"var(--accent)", marginTop:3, fontFamily:"IBM Plex Mono" }}>

              </div>
              <div className="fg">
                <label className="flabel">🕐 เวลาเริ่ม (24h)</label>
                <select className="fselect" value={form.dueTime} onChange={e => setForm(f => ({ ...f, dueTime: e.target.value }))}>
                  {TASK_TIME_SLOTS.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
                {form.dueTime && form.duration && (
                  <div style={{ fontSize:10, color:"var(--text3)", marginTop:3 }}>
                    ถึง {(() => { const [h,m]=form.dueTime.split(":").map(Number); const e=h*60+m+Number(form.duration); return `${String(Math.floor(e/60)%24).padStart(2,"0")}:${String(e%60).padStart(2,"0")}`; })()}
                  </div>
                )}
              </div>
              <div className="fg">
                <label className="flabel">⏱ ระยะเวลา</label>
                <select className="fselect" value={form.duration||"60"} onChange={e => setForm(f => ({ ...f, duration: e.target.value }))}>
                  {["30","45","60","90","120","180","240"].map(d => <option key={d} value={d}>{Number(d)<60?d+"น.":`${Math.floor(Number(d)/60)}${Number(d)%60>0?`ชม.${Number(d)%60}น.`:"ชม."}`}</option>)}
                </select>
              </div>
            </div>

            {/* ความสำคัญ + โรงเรียน */}
            <div className="frow">
              <div className="fg">
                <label className="flabel">ความสำคัญ</label>
                <div style={{ display:"flex", gap:6 }}>
                  {["สูง","กลาง","ต่ำ"].map(p => (
                    <button key={p} className="btn btn-xs" onClick={() => setForm(f=>({...f,priority:p}))} style={{
                      background: form.priority===p ? (PRIORITY_COLOR[p]||"#888")+"22" : "transparent",
                      color: form.priority===p ? PRIORITY_COLOR[p]||"#888" : "var(--text3)",
                      borderColor: form.priority===p ? (PRIORITY_COLOR[p]||"#888")+"60" : "var(--border)",
                      fontWeight: form.priority===p ? 700 : 400,
                    }}>{p}</button>
                  ))}
                </div>
              </div>
              <div className="fg">
                <label className="flabel">โรงเรียนที่เกี่ยวข้อง</label>
                <select className="fselect" value={form.leadId || ""} onChange={e => setForm(f => ({ ...f, leadId: Number(e.target.value)||null }))}>
                  <option value="">- ไม่ระบุ -</option>
                  {leads.map(l => <option key={l.id} value={l.id}>{l.schoolName}</option>)}
                </select>
              </div>
            </div>

            {/* Meeting Link + Location */}
            <div className="frow">
              <div className="fg">
                <label className="flabel">🔗 Meeting Link (Online)</label>
                <input className="finput" type="url" value={form.meetingLink || ""}
                  onChange={e => setForm(f => ({ ...f, meetingLink: e.target.value }))}
                  placeholder="https://meet.google.com/... หรือ zoom.us/j/..." />
              </div>
              <div className="fg">
                <label className="flabel">📍 Google Maps (Onsite)</label>
                <input className="finput" value={form.locationLink || ""}
                  onChange={e => setForm(f => ({ ...f, locationLink: e.target.value }))}
                  placeholder="https://maps.google.com/..." />
              </div>
            </div>

            {/* เชิญผู้เข้าร่วม */}
            <div style={{ background:"var(--bg3)", borderRadius:10, padding:12, marginBottom:10 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"var(--text2)", marginBottom:10 }}>
                📨 เชิญผู้เข้าร่วม
                {form.inviteUsers.length > 0 &&
                  <span style={{ marginLeft:8, fontSize:10, color:"var(--accent)", fontWeight:400 }}>({form.inviteUsers.length} คน)</span>}
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                {USERS.filter(u => u.id !== user.id).map(u => {
                  const col = USER_COLORS[u.id] || { bg:"#00e5a0", light:"rgba(0,229,160,0.12)", label:"#00e5a0" };
                  const on  = form.inviteUsers.includes(u.id);
                  return (
                    <button key={u.id} onClick={() => toggleFormInvite(u.id)}
                      style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 12px", borderRadius:20, cursor:"pointer",
                        border: on ? deptBorder(u.id) : "2px solid var(--border)",
                        background: on ? col.light : "transparent",
                        transition:"all 0.15s" }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background: on ? col.bg : "var(--border)", flexShrink:0 }}/>
                      <span style={{ fontSize:11, fontWeight: on ? 700 : 400, color: on ? col.label : "var(--text3)" }}>
                        {u.avatar} {u.name.split(" ")[0]}
                        <span style={{ fontSize:9, opacity:0.7 }}> · {({executive:"ผบห.",sales_manager:"Mgr.",sales_rep:"Sales",central_support:"Admin",finance_admin:"Finance"})[u.role]||u.role}</span>
                      </span>
                    </button>
                  );
                })}
              </div>
              {form.inviteUsers.length > 0 && (
                <div style={{ fontSize:10, color:"var(--text3)", marginTop:8 }}>
                  ผู้ถูกเชิญจะได้รับการแจ้งเตือนและต้องตอบรับ (เข้าร่วม / รับทราบ / ปฏิเสธ)
                </div>
              )}
            </div>

            {/* มอบหมายให้ (ผู้รับผิดชอบหลัก) */}
            <div className="frow">
              <div className="fg">
                <label className="flabel">มอบหมายให้ (รับผิดชอบหลัก)</label>
                <select className="fselect" value={form.assignedTo} disabled={user.role === ROLES.SALES}
                  onChange={e => setForm(f => ({ ...f, assignedTo: Number(e.target.value) }))}>
                  {USERS.filter(u => u.role !== ROLES.EXEC)
                    .map(u => <option key={u.id} value={u.id}>{u.name} ({ROLE_LABELS[u.role]||u.role})</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="flabel">🔔 แจ้งเตือนล่วงหน้า</label>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                  {REMINDER_OPTIONS.map(r => (
                    <button key={r} className="btn btn-xs" style={{
                      background: form.reminders.includes(r) ? "var(--accent-dim)" : "transparent",
                      color: form.reminders.includes(r) ? "var(--accent)" : "var(--text3)",
                      borderColor: form.reminders.includes(r) ? "rgba(0,229,160,0.3)" : "var(--border)",
                      fontSize:10,
                    }} onClick={() => toggleReminder(r)}>{r}</button>
                  ))}
                </div>
              </div>
            </div>

            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={() => setShowForm(false)}>ยกเลิก</button>
              <button className="btn btn-accent" onClick={saveTask} disabled={!form.title}>
                {form.inviteUsers.length > 0 ? `📨 สร้างและส่งคำเชิญ ${form.inviteUsers.length} คน` : "+ เพิ่มงาน"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// AI INPUT PAGE
// ============================================================
function AIInputPage({ leads, setLeads, tasks, setTasks, user, notify }) {
  const [msgs, setMsgs] = useState([
    { role: "bot", text: `สวัสดีครับ คุณ${user.name.split(" ")[0]}! 🤖\n\nผมช่วยบันทึกข้อมูลลงระบบได้เลยครับ ลองพิมพ์เช่น:\n\n**• "โทรหาโรงเรียนวัดสันป่าเปา ครูแอนสนใจ VR Sci Lab นัด Demo พุธหน้าบ่าย 2"**\n**• "เพิ่ม Lead ใหม่: โรงเรียนดอยสะเก็ด เชียงใหม่ รัฐบาล ได้มาจากงาน Edtech Fair"**\n**• "สรุปการเข้าพบวันนี้: ผอ.สนใจ AI Platform งบ 200,000 ขอใบเสนอราคาภายในสัปดาห์"**` }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const msgEnd = useRef(null);

  useEffect(() => { msgEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs]);

  const parseAndAct = async (text) => {
    setLoading(true);
    await new Promise(r => setTimeout(r, 900));

    let reply = "";
    let actions = [];

    const lower = text.toLowerCase();

    // Detect: new lead
    if (lower.includes("เพิ่ม lead") || lower.includes("โรงเรียนใหม่") || (lower.includes("lead") && lower.includes("ใหม่"))) {
      const schoolMatch = text.match(/(?:Lead|lead|โรงเรียน)[:\s]*([ก-๙a-zA-Z\s]+?)(?:\s+[กก-๙]{2,}|$|\n|,)/);
      const school = schoolMatch?.[1]?.trim() || "โรงเรียนที่ระบุ";
      const province = PROVINCES.find(p => text.includes(p)) || "กรุงเทพฯ";
      const zone = ZONES.find(z => text.includes(z)) || "ภาคกลาง";
      const type = SCHOOL_TYPES.find(t => text.includes(t)) || "รัฐบาล";
      const source = LEAD_SOURCES.find(s => text.includes(s)) || "อื่นๆ";

      const nl = { id: Date.now(), schoolName: school, schoolType: type, province, zone, status: "Cold", leadScore: 10, source, assignedTo: user.id, studentCount: 0, budget: null, products: [], contacts: [], activities: [], notes: text, createdAt: new Date().toISOString().split("T")[0], updatedAt: new Date().toISOString().split("T")[0] };
      setLeads(ls => [...ls, nl]);
      actions.push(`✅ สร้าง Lead ใหม่: **${school}** (${type}, ${province})`);
      reply = `ผมสร้าง Lead ใหม่ให้แล้วครับ:\n\n${actions.join("\n")}\n\n📌 **Next Step แนะนำ:** ติดตามหาผู้ติดต่อและนัดหมายเบื้องต้นครับ`;
    }

    // Detect: activity/call log
    else if (lower.includes("โทร") || lower.includes("เข้าพบ") || lower.includes("ประชุม") || lower.includes("สรุปการ")) {
      const schoolMatch = leads.find(l => text.includes(l.schoolName.substring(0, 5)));
      const actType = lower.includes("โทร") ? "โทร" : lower.includes("ประชุม") ? "ประชุม" : lower.includes("demo") ? "Demo" : "ติดตาม";
      const hasDemo = lower.includes("demo") || lower.includes("เดโม่");
      const hasProposal = lower.includes("ใบเสนอราคา") || lower.includes("proposal");
      const budget = text.match(/(\d[\d,]+)\s*บาท/)?.[1]?.replace(",", "");

      if (schoolMatch) {
        const newAct = { id: Date.now(), type: actType, date: new Date().toISOString().split("T")[0], summary: text, nextStep: hasDemo ? "เตรียม Demo" : hasProposal ? "จัดทำใบเสนอราคา" : "ติดตามผล", by: user.id };
        let newStatus = schoolMatch.status;
        let newScore = schoolMatch.leadScore;
        if (hasDemo || hasProposal) { newStatus = "Hot"; newScore = Math.min(95, newScore + 25); }
        else if (actType === "โทร" && schoolMatch.status === "Cold") { newStatus = "Warm"; newScore = Math.min(50, newScore + 15); }

        setLeads(ls => ls.map(l => l.id === schoolMatch.id ? { ...l, activities: [...(l.activities || []), newAct], status: newStatus, leadScore: newScore, updatedAt: new Date().toISOString().split("T")[0] } : l));

        if (hasDemo || hasProposal) {
          const taskTitle = hasDemo ? `เตรียม Demo - ${schoolMatch.schoolName}` : `จัดทำใบเสนอราคา - ${schoolMatch.schoolName}`;
          const newTask = { id: Date.now() + 1, title: taskTitle, description: `จากการบันทึก: ${text.substring(0, 80)}...`, leadId: schoolMatch.id, assignedTo: user.id, priority: "สูง", dueDate: new Date(Date.now() + 7 * 86400000).toISOString().split("T")[0], reminders: ["1 วัน", "2 ชั่วโมง"], completed: false, createdAt: new Date().toISOString().split("T")[0] };
          setTasks(ts => [...ts, newTask]);
          actions.push(`📋 สร้างงาน: **${taskTitle}** (กำหนด 7 วัน)`);
        }

        actions.push(`📝 บันทึกกิจกรรม ${actType} ให้ **${schoolMatch.schoolName}**`);
        if (newStatus !== schoolMatch.status) actions.push(`🔄 เปลี่ยนสถานะ: ${schoolMatch.status} → **${newStatus}** (Score: ${newScore})`);
        if (budget) actions.push(`💰 บันทึกงบประมาณ: **฿${budget}**`);

        reply = `บันทึกให้แล้วครับ:\n\n${actions.join("\n")}\n\n📌 **Next Step:** ${newAct.nextStep}`;
      } else {
        reply = `ผมยังไม่พบโรงเรียนในระบบครับ ช่วยระบุชื่อโรงเรียนที่ชัดเจนขึ้นได้ไหมครับ? หรือถ้าเป็นโรงเรียนใหม่ พิมพ์ว่า "เพิ่ม Lead ใหม่: ชื่อโรงเรียน" ได้เลยครับ`;
      }
    }

    // Detect: reminder/task
    else if (lower.includes("เตือน") || lower.includes("นัด") || lower.includes("task") || lower.includes("งาน")) {
      reply = `ให้ผมสร้างงานหรือนัดหมายให้ไหมครับ? กรุณาระบุ:\n1. ชื่องานหรือนัดหมาย\n2. โรงเรียนที่เกี่ยวข้อง\n3. วันกำหนด\n4. ต้องการเตือนล่วงหน้ากี่วัน?\n\nตัวอย่าง: "สร้างงาน ติดตาม ผอ.ประสิทธิ์ โรงเรียนขอนแก่น วันศุกร์นี้ เตือน 1 วัน"`;
    }

    // Default
    else {
      reply = `ผมเข้าใจข้อความแต่ยังไม่แน่ใจว่าต้องการทำอะไรครับ ลองพิมพ์ในรูปแบบเหล่านี้:\n\n**บันทึกการคุย:** "โทรหา/เข้าพบ [ชื่อโรงเรียน] [สรุป]"\n**เพิ่ม Lead ใหม่:** "เพิ่ม Lead ใหม่: [ชื่อโรงเรียน] [จังหวัด]"\n**สร้างงาน:** "นัด [กิจกรรม] [โรงเรียน] [วันที่]"`;
    }

    setMsgs(m => [...m, { role: "bot", text: reply }]);
    setLoading(false);
  };

  const send = async () => {
    if (!input.trim() || loading) return;
    const txt = input.trim();
    setInput("");
    setMsgs(m => [...m, { role: "user", text: txt }]);
    await parseAndAct(txt);
  };

  const renderText = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) => p.startsWith("**") ? <strong key={i}>{p.slice(2, -2)}</strong> : p);
  };

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">🤖 AI บันทึกด้วยการคุย</div>
          <div className="ph-sub">พิมพ์บอก AI แล้วระบบจะกรอกข้อมูลให้อัตโนมัติ</div>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 320px", gap: 16 }}>
        <div className="ai-wrap">
          <div className="ai-msgs">
            {msgs.map((m, i) => (
              <div key={i} className={`ai-msg ${m.role}`} style={{ whiteSpace: "pre-line" }}>
                {m.role === "bot" && <div style={{ fontSize: 10, color: "var(--accent)", fontWeight: 700, marginBottom: 4 }}>⚡ Nextgen AI</div>}
                {renderText(m.text)}
              </div>
            ))}
            {loading && (
              <div className="ai-msg bot">
                <div className="ai-typing">
                  <div className="ai-dot" /><div className="ai-dot" /><div className="ai-dot" />
                  <span style={{ fontSize: 11, color: "var(--text3)", marginLeft: 6 }}>กำลังประมวลผล...</span>
                </div>
              </div>
            )}
            <div ref={msgEnd} />
          </div>
          <div className="ai-input-row">
            <textarea
              className="ai-input"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
              placeholder="พิมพ์บอก AI เช่น 'โทรหาโรงเรียน ABC ครูสมใจสนใจ Digital Classroom นัด Demo อาทิตย์หน้า...'"
              rows={2}
            />
            <button className="btn btn-accent" onClick={send} disabled={loading}>
              {loading ? "⏳" : "ส่ง"}
            </button>
          </div>
        </div>

        <div>
          <div className="card card-p" style={{ marginBottom: 12 }}>
            <div className="card-title" style={{ marginBottom: 12 }}>💡 ตัวอย่างคำสั่ง</div>
            {[
              { label: "บันทึกการโทร", cmd: "โทรหาโรงเรียนวัดสันป่าเปา ครูแอนยืนยันนัด Demo วันพุธที่ 14 บ่าย 2" },
              { label: "เพิ่ม Lead ใหม่", cmd: "เพิ่ม Lead ใหม่: โรงเรียนดอยสะเก็ด เชียงใหม่ รัฐบาล งานแฟร์" },
              { label: "สรุปการเข้าพบ", cmd: "สรุปการเข้าพบวันนี้: ผอ.สนใจ AI Platform งบ 200,000 บาท ขอใบเสนอราคา" },
            ].map((ex, i) => (
              <div key={i} style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: "var(--text3)", marginBottom: 3 }}>{ex.label}</div>
                <div
                  style={{ fontSize: 11, color: "var(--text2)", background: "var(--bg3)", padding: "7px 10px", borderRadius: 7, cursor: "pointer", border: "1px solid var(--border)", lineHeight: 1.5 }}
                  onClick={() => setInput(ex.cmd)}
                >
                  {ex.cmd}
                </div>
              </div>
            ))}
          </div>

          <div className="card card-p">
            <div className="card-title" style={{ marginBottom: 12 }}>📊 สิ่งที่ AI ทำได้</div>
            {[
              "บันทึกกิจกรรม/การคุย",
              "ปรับสถานะ Lead อัตโนมัติ",
              "อัปเดต Lead Score",
              "สร้างงานติดตาม",
              "เพิ่ม Lead ใหม่",
              "บันทึก Next Step",
            ].map((c, i) => (
              <div key={i} style={{ fontSize: 12, color: "var(--text2)", marginBottom: 5, display: "flex", gap: 6 }}>
                <span style={{ color: "var(--accent)" }}>✓</span> {c}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Priority sort: "ค้างอยู่" ขึ้นบนสุดเสมอ ──
// ลำดับ: need_info (ต้องตอบกลับ) → submitted → manager_review → approved (รอรับงาน)
//        → in_progress → draft → completed → rejected
const REQ_STATUS_PRIORITY = {
  need_info:      0,
  submitted:      1,
  manager_review: 2,
  approved:       3,
  in_progress:    4,
  draft:          5,
  completed:      6,
  rejected:       7,
};
const sortRequests = (arr) => [...arr].sort((a, b) => {
  const pa = REQ_STATUS_PRIORITY[a.status] ?? 9;
  const pb = REQ_STATUS_PRIORITY[b.status] ?? 9;
  if (pa !== pb) return pa - pb;
  // status เท่ากัน → ล่าสุด (updatedAt) ขึ้นก่อน
  return new Date(b.updatedAt || b.createdAt) - new Date(a.updatedAt || a.createdAt);
});

// AVAILABILITY CHECKER — ตรวจสอบว่าง/ไม่ว่างของแผนก/บุคคล
// ============================================================
function AvailabilityChecker({ targetDept, targetUserId, eventDate, eventTime, tasks, requests, events }) {
  if (!targetDept || targetDept === "manager_decide" || !eventDate) return null;

  const dept = TARGET_DEPTS.find(d => d.id === targetDept);
  if (!dept) return null;

  // หา users ในแผนกนั้น
  const deptUsers = targetUserId
    ? USERS.filter(u => u.id === targetUserId)
    : USERS.filter(u => dept.roles.includes(u.role));

  // ตรวจ busy slots สำหรับแต่ละ user ในวันที่เลือก
  const getBusySlots = (userId) => {
    const busy = [];
    // จาก tasks
    tasks.filter(t => t.dueDate === eventDate &&
      (t.assignedTo === userId || t.createdBy === userId || (t.joinedBy||[]).includes(userId)))
      .forEach(t => busy.push({ time: t.dueTime||"09:00", title: t.title, duration: t.duration||60, src:"task" }));
    // จาก requests
    requests.filter(r => r.eventDate === eventDate &&
      (r.assignedTo === userId) && ["approved","in_progress"].includes(r.status))
      .forEach(r => busy.push({ time: r.eventTime||"09:00", title: r.title, duration: 120, src:"request" }));
    // จาก events
    events.filter(e => e.date === eventDate &&
      ([...(e.joinedBy||[]), e.createdBy].includes(userId)))
      .forEach(e => busy.push({ time: e.time||"09:00", title: e.title, duration: e.duration||60, src:"event" }));
    return busy;
  };

  // ตรวจว่า time slot ซ้อนทับกัน
  const isTimeConflict = (busySlots, checkTime, checkDuration = 90) => {
    const [ch, cm] = checkTime.split(":").map(Number);
    const checkStart = ch * 60 + cm;
    const checkEnd   = checkStart + checkDuration;
    return busySlots.some(b => {
      const [bh, bm] = b.time.split(":").map(Number);
      const bStart = bh * 60 + bm;
      const bEnd   = bStart + Number(b.duration||60);
      return checkStart < bEnd && checkEnd > bStart;
    });
  };

  // หา time slots ที่ว่าง (08:00–17:00, ทุก 30 นาที)
  const getSuggestedSlots = (busySlots) => {
    const slots = [];
    for (let h = 8; h < 17; h++) {
      for (let m = 0; m < 60; m += 30) {
        const time = `${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}`;
        if (!isTimeConflict(busySlots, time)) slots.push(time);
      }
    }
    return slots.slice(0, 6); // แสดงแค่ 6 slot แรก
  };

  // หา 3 วันใกล้ที่สุดที่ว่าง
  const getSuggestedDates = () => {
    const suggestions = [];
    let d = new Date(eventDate + "T12:00:00");
    d.setDate(d.getDate() + 1);
    for (let i = 0; i < 14 && suggestions.length < 3; i++) {
      const dateStr = d.toISOString().split("T")[0];
      const allBusy = deptUsers.map(u => getBusySlots(u.id)).flat();
      const freePct = getSuggestedSlots(allBusy).length / 18; // 18 = total slots 08-17
      if (freePct > 0.5) suggestions.push({ date: dateStr, freePct });
      d.setDate(d.getDate() + 1);
    }
    return suggestions;
  };

  // สรุปสถานะรวม
  const userStatuses = deptUsers.map(u => {
    const busy = getBusySlots(u.id);
    const hasConflict = eventTime ? isTimeConflict(busy, eventTime) : busy.length > 0;
    const freeSlots = getSuggestedSlots(busy);
    return { user: u, busy, hasConflict, freeSlots };
  });

  const allBusy    = userStatuses.every(s => s.hasConflict);
  const someBusy   = userStatuses.some(s => s.hasConflict);
  const allFree    = !someBusy;
  const suggestDates = allBusy ? getSuggestedDates() : [];

  const statusColor = allFree ? "#00e5a0" : allBusy ? "#ef4444" : "#f59e0b";
  const statusIcon  = allFree ? "✅" : allBusy ? "❌" : "⚠️";
  const statusText  = allFree
    ? "ว่างในช่วงเวลาที่เลือก"
    : allBusy
    ? "ไม่ว่างทั้งหมด — กรุณาเลือกวัน/เวลาใหม่"
    : "ว่างบางส่วน — มีบางคนที่มีนัดแล้ว";

  return (
    <div style={{ marginTop:8, padding:"12px 14px", borderRadius:10,
      background:`${statusColor}10`, border:`1px solid ${statusColor}40` }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <span style={{ fontSize:18 }}>{statusIcon}</span>
        <div>
          <div style={{ fontWeight:700, fontSize:12, color:statusColor }}>{statusText}</div>
          <div style={{ fontSize:10, color:"var(--text3)" }}>
            {dept.icon} {dept.label}{targetUserId ? ` — ${USERS.find(u=>u.id===targetUserId)?.name?.split(" ")[0]}` : ` (${deptUsers.length} คน)`}
            {" · "}วันที่ {new Date(eventDate+"T12:00:00").toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"})}
            {eventTime && ` เวลา ${eventTime} น.`}
          </div>
        </div>
      </div>

      {/* User-level detail */}
      {deptUsers.length > 0 && (
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:allBusy||someBusy?8:0 }}>
          {userStatuses.map(({ user, hasConflict, freeSlots }) => {
            const col = USER_COLORS[user.id] || { bg:"#6b7280", light:"rgba(107,114,128,0.12)", label:"#9ca3af" };
            return (
              <div key={user.id} style={{ display:"flex", alignItems:"center", gap:5,
                padding:"4px 10px", borderRadius:16, fontSize:10,
                background:hasConflict?"rgba(239,68,68,0.1)":"rgba(0,229,160,0.1)",
                border:`1px solid ${hasConflict?"rgba(239,68,68,0.3)":"rgba(0,229,160,0.3)"}` }}>
                <div style={{ width:18,height:18,borderRadius:"50%",background:col.bg,
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,color:"#000" }}>
                  {user.avatar}
                </div>
                <span style={{ color:hasConflict?"var(--red)":"var(--accent)" }}>
                  {user.name.split(" ")[0]}
                </span>
                <span style={{ fontSize:9 }}>{hasConflict?"❌":"✅"}</span>
                {!hasConflict && freeSlots.length > 0 && (
                  <span style={{ fontSize:8, color:"var(--text3)" }}>
                    {freeSlots.slice(0,3).join(" / ")} น.
                  </span>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Free time slots สำหรับ user ที่ว่าง */}
      {someBusy && !allBusy && (
        <div style={{ fontSize:10, color:"var(--text3)", marginBottom:6 }}>
          💡 ช่วงที่ว่าง (ทั้งทีม): {(() => {
            const allSlots = userStatuses
              .filter(s=>!s.hasConflict)
              .flatMap(s=>s.freeSlots);
            const unique = [...new Set(allSlots)].slice(0,6);
            return unique.length ? unique.join(" / ")+" น." : "ไม่พบ";
          })()}
        </div>
      )}

      {/* Suggest วันว่างถ้าไม่ว่างทั้งวัน */}
      {allBusy && suggestDates.length > 0 && (
        <div>
          <div style={{ fontSize:10, color:"var(--text3)", marginBottom:4 }}>
            📅 วันที่แนะนำ (ว่างมากกว่า 50%):
          </div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {suggestDates.map(({ date, freePct }) => (
              <div key={date} style={{ padding:"3px 10px", borderRadius:10, fontSize:10,
                background:"rgba(59,130,246,0.12)", border:"1px solid rgba(59,130,246,0.3)",
                color:"#60a5fa" }}>
                📅 {new Date(date+"T12:00:00").toLocaleDateString("th-TH",{weekday:"short",day:"numeric",month:"short"})}
                <span style={{ fontSize:8, marginLeft:4, opacity:0.7 }}>
                  (ว่าง {Math.round(freePct*100)}%)
                </span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
