          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {salesUsers.map(u => {
              const val      = Number(personalDraft[u.id]) || 0;
              const roleDefault = discountLimits[ROLES.SALES]?.max ?? 10;
              const isOverride  = perUserLimits[u.id] != null && perUserLimits[u.id] !== roleDefault;
              const draftChanged = personalDraft[u.id] !== String(perUserLimits[u.id] ?? roleDefault);
              const overMgr     = val > mgrLimVal;
              return (
                <div key={u.id} style={{ display: "flex", gap: 12, alignItems: "center", padding: "12px 14px", background: "var(--bg3)", borderRadius: 10,
                  border: `1px solid ${overMgr ? "rgba(239,68,68,0.4)" : isOverride ? "rgba(0,229,160,0.25)" : "var(--border)"}` }}>
                  {/* Avatar */}
                  <div className="av av-sm" style={{ flexShrink: 0, background: "#00e5a020", color: "#00e5a0", border: "1px solid #00e5a040" }}>{u.avatar}</div>
                  {/* Info */}
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 13 }}>{u.name}</div>
                    <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1 }}>
                      {u.zone || "ไม่ระบุโซน"}
                      {isOverride && <span style={{ color: "var(--accent)", marginLeft: 6 }}>⚡ override</span>}
                      {!isOverride && <span style={{ color: "var(--text3)", marginLeft: 6 }}>• ใช้ Role default ({roleDefault}%)</span>}
                    </div>
                    {overMgr && <div style={{ fontSize: 10, color: "var(--red)", marginTop: 2, fontWeight: 600 }}>⚠️ เกิน Manager limit ({mgrLimVal}%) — ต้องขออนุมัติ Manager ทุกครั้ง</div>}
                  </div>
                  {/* Input */}
                  {canEditSales ? (
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                      <div style={{ position: "relative" }}>
                        <input className="finput" type="text" inputMode="numeric"
                          value={personalDraft[u.id]}
                          onChange={e => setPersonalVal(u.id, e.target.value)}
                          style={{ width: 64, padding: "5px 20px 5px 8px", fontSize: 15, fontWeight: 700, fontFamily: "IBM Plex Mono", textAlign: "right",
                            borderColor: overMgr ? "rgba(239,68,68,0.5)" : draftChanged ? "rgba(0,229,160,0.5)" : "rgba(0,229,160,0.2)",
                            color: overMgr ? "var(--red)" : "#00e5a0",
                            background: "rgba(0,229,160,0.05)" }} />
                        <span style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", fontSize: 12, color: overMgr ? "var(--red)" : "#00e5a0", fontWeight: 700, pointerEvents: "none" }}>%</span>
                      </div>
                      {/* Slider */}
                      <input type="range" min="0" max={mgrLimVal} value={Math.min(mgrLimVal, val)}
                        onChange={e => setPersonalVal(u.id, e.target.value)}
                        style={{ width: 80, accentColor: "#00e5a0" }} />
                      {/* Reset to role default */}
                      {isOverride && (
                        <button className="btn btn-xs btn-ghost" onClick={() => handleResetPersonal(u.id)} title="รีเซ็ตเป็น Role default">↩</button>
                      )}
                    </div>
                  ) : (
                    <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "IBM Plex Mono", color: "#00e5a0", flexShrink: 0 }}>
                      {val}%
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Save personal */}
          {canEditSales && (
            <div style={{ marginTop: 14, display: "flex", gap: 8, alignItems: "center", justifyContent: "space-between" }}>
              <button className="btn btn-ghost btn-sm" style={{ color: "var(--red)" }} onClick={handleClearAllPersonal}>
                ↩ รีเซ็ตทุกคนเป็น Role default
              </button>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {personalSaved && <span style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700 }}>✓ บันทึกแล้ว</span>}
                <button className="btn btn-accent btn-sm" onClick={handleSavePersonal}>✓ บันทึกสิทธิ์รายบุคคล</button>
              </div>
            </div>
          )}
          {!canEditSales && (
            <div style={{ marginTop: 10, padding: "7px 12px", background: "rgba(245,158,11,0.08)", borderRadius: 8, fontSize: 11, color: "#f59e0b" }}>
              🔒 เฉพาะ Manager และ Exec เท่านั้นที่ตั้งค่าสิทธิ์รายบุคคลได้
            </div>
          )}
        </div>
      )}
    </div>
  );
}






// ============================================================
// NOTIF ITEM — แต่ละรายการใน Manager RSVP Notification Panel
// แยกออกมาเป็น component เพื่อรองรับ useState (Rules of Hooks)
// ============================================================
function NotifItem({ n, tasks, setTasks, user, notify, markSeen }) {
  const [showReply, setShowReply] = useState(false);
  const [replyText, setReplyText] = useState("");

  const taskObj = n.task || null;
  // หา live task จาก store (มี comments ล่าสุด)
  const liveTask = taskObj ? tasks.find(t => t.id === taskObj.id) : null;
  const existComments = liveTask?.comments || [];

  const sendReply = () => {
    if (!replyText.trim() || !liveTask) return;
    const comment = { id: Date.now(), userId: user.id, text: replyText.trim(), ts: new Date().toISOString() };
    setTasks(ts => ts.map(t => t.id === liveTask.id
      ? { ...t, comments: [...(t.comments||[]), comment] }
      : t));
    setReplyText("");
    setShowReply(false);
    notify("💬 ส่งข้อความแล้ว", "ok");
    markSeen([n.key]);
  };

  return (
    <div style={{
      background:"var(--bg3)", borderRadius:10, padding:12, marginBottom:8,
      borderLeft:`3px solid ${n.color}`,
    }}>
      <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
        <span style={{ fontSize:18, flexShrink:0 }}>{n.icon}</span>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:700, fontSize:12, color:n.color }}>{n.title}</div>
          <div style={{ fontSize:11, color:"var(--text2)", marginTop:2, lineHeight:1.5 }}>{n.body}</div>

          {/* Comment thread */}
          {existComments.length > 0 && (
            <div style={{ marginTop:8, borderTop:"1px solid var(--border)", paddingTop:6 }}>
              {existComments.slice(-3).map(cm => {
                const cmUser = USERS.find(u => u.id === cm.userId);
                const cmCol  = uc(cm.userId || 0);
                return (
                  <div key={cm.id} style={{ marginBottom:4, fontSize:10, display:"flex", gap:6 }}>
                    <span style={{ color:cmCol.label, fontWeight:700, flexShrink:0 }}>
                      {cmUser?.name?.split(" ")[0] || "?"}:
                    </span>
                    <span style={{ color:"var(--text2)" }}>{cm.text}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Reply button */}
          {taskObj && (
            <div style={{ display:"flex", gap:6, marginTop:6 }}>
              <button className="btn btn-xs" style={{
                fontSize:9, background:"rgba(59,130,246,0.12)",
                color:"#60a5fa", borderColor:"rgba(59,130,246,0.3)"
              }} onClick={() => setShowReply(v => !v)}>
                💬 {showReply ? "ยกเลิก" : "ส่งข้อความ"}
              </button>
            </div>
          )}

          {/* Reply input */}
          {showReply && (
            <div style={{ marginTop:8 }}>
              <textarea
                value={replyText}
                onChange={e => setReplyText(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendReply(); } }}
                placeholder="พิมพ์ข้อความ... (Enter ส่ง)"
                style={{
                  width:"100%", minHeight:60, padding:"6px 8px", borderRadius:6,
                  background:"var(--bg2)", border:"1px solid var(--border)",
                  color:"var(--text)", fontSize:11, resize:"none", fontFamily:"inherit"
                }}
                autoFocus
              />
              <div style={{ display:"flex", gap:6, marginTop:4 }}>
                <button className="btn btn-xs btn-accent" style={{ fontSize:10 }}
                  onClick={sendReply} disabled={!replyText.trim()}>ส่ง</button>
                <button className="btn btn-xs btn-ghost" style={{ fontSize:10 }}
                  onClick={() => { setShowReply(false); setReplyText(""); }}>ยกเลิก</button>
              </div>
            </div>
          )}
        </div>

        {/* Mark seen */}
        <button className="btn btn-xs btn-ghost" style={{ padding:"2px 6px", flexShrink:0 }}
          onClick={() => markSeen([n.key])}>✕</button>
      </div>
    </div>
  );
}

// ============================================================
// COMMENT INPUT — reusable comment box สำหรับ task/event
// ============================================================
function CommentInput({ taskId, setTasks, user, notify, uc }) {
  const [text, setText] = React.useState("");
  const send = () => {
    if (!text.trim() || !setTasks) return;
    const c = { id:Date.now(), userId:user.id, text:text.trim(), ts:new Date().toISOString() };
    setTasks(ts => ts.map(t => t.id===taskId ? {...t, comments:[...(t.comments||[]),c]} : t));
    setText("");
    if (notify) notify("💬 ส่งข้อความแล้ว","ok");
  };
  return (
    <div style={{ display:"flex", gap:6, marginTop:6 }}>
      <input value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>{ if(e.key==="Enter"){e.preventDefault();send();} }}
        placeholder="พิมพ์ข้อความ... (Enter ส่ง)"
        style={{ flex:1, padding:"5px 8px", fontSize:11, borderRadius:6,
          background:"var(--bg3)", border:"1px solid var(--border)", color:"var(--text)", fontFamily:"inherit" }}
        autoFocus />
      <button onClick={send} disabled={!text.trim()}
        style={{ padding:"5px 12px", borderRadius:6, border:"1px solid rgba(0,229,160,0.3)",
          background: text.trim()?"var(--accent-dim)":"transparent", color:"var(--accent)",
          fontSize:11, fontWeight:700, cursor:"pointer" }}>ส่ง</button>
    </div>
  );
}

            className="btn"

// ============================================================
// RSVP MODAL COMPONENT — แยกออกจาก App เพื่อหลีกเลี่ยง scope issues
// ============================================================
function RsvpModal({ rsvpModal, setRsvpModal, tasks, setTasks, leads, user, pendingRsvpTasks, notify, fmtDate, PRIORITY_COLOR }) {
  const [declineReason, setDeclineReason] = React.useState("");
  const [showDeclineForm, setShowDeclineForm] = React.useState(false);
  const t = rsvpModal.task;
  if (!t) return null;

  const lead = leads.find(l => l.id === t.leadId);
  const creator = USERS.find(u => u.id === t.createdBy);
  const salesColors = ["#00e5a0","#3b82f6","#f59e0b","#ec4899","#8b5cf6","#06b6d4"];
  const salesUsersR = USERS.filter(u => u.role === ROLES.SALES);
  const sColorMap = {}; salesUsersR.forEach((u,i)=>{ sColorMap[u.id]=salesColors[i%salesColors.length]; });
  const accentColor = sColorMap[t.createdBy] || "#00e5a0";
  const tc = t.apptType?.includes("Demo") ? "#8b5cf6" : t.apptType?.includes("ประชุม") ? "#3b82f6" : "#f59e0b";
  const pc = (p) => PRIORITY_COLOR[p] || "#888";

  // Conflict detection
  const conflictTasks = tasks.filter(tx =>
    tx.id !== t.id &&
    tx.dueDate === t.dueDate &&
    ((tx.joinedBy||[]).includes(user.id) || tx.assignedTo === user.id) &&
    !tx.completed &&
    (() => {
      if (!t.dueTime || !tx.dueTime) return false;
      const toMin = s => { const [h,m]=s.split(":").map(Number); return h*60+m; };
      const aStart = toMin(t.dueTime); const aDur = Number(t.duration||60);
      const bStart = toMin(tx.dueTime); const bDur = Number(tx.duration||60);
      return aStart < bStart+bDur && bStart < aStart+aDur;
    })()
  );

  const getRemaining = () => pendingRsvpTasks.filter(tx => tx.id !== t.id);

  const doJoin = () => {
    if (conflictTasks.length > 0 && rsvpModal.step === "rsvp") {
      setRsvpModal(m => ({ ...m, step: "conflict", conflictTasks }));
      return;
    }
    setTasks(ts => ts.map(tx => tx.id === t.id
      ? { ...tx,
          joinedBy: [...new Set([...(tx.joinedBy||[]), user.id])],
          acknowledgedBy: (tx.acknowledgedBy||[]).filter(id=>id!==user.id),
          declinedBy: (tx.declinedBy||[]).filter(id=>id!==user.id),
          rsvpLog: [...(tx.rsvpLog||[]), { userId: user.id, action:"join", ts: new Date().toISOString() }]
        }
      : tx));
    const remaining = getRemaining();
    setRsvpModal(remaining.length > 0 ? { task: remaining[0], step: "rsvp" } : null);
    notify("✅ เข้าร่วมนัดหมายแล้ว — ปรากฏในปฏิทินของคุณ", "ok");
  };

  const doAck = () => {
    setTasks(ts => ts.map(tx => tx.id === t.id
      ? { ...tx,
          acknowledgedBy: [...new Set([...(tx.acknowledgedBy||[]), user.id])],
          joinedBy: (tx.joinedBy||[]).filter(id=>id!==user.id),
          declinedBy: (tx.declinedBy||[]).filter(id=>id!==user.id),
          rsvpLog: [...(tx.rsvpLog||[]), { userId: user.id, action:"ack", ts: new Date().toISOString() }]
        }
      : tx));
    const remaining = getRemaining();
    setRsvpModal(remaining.length > 0 ? { task: remaining[0], step: "rsvp" } : null);
    notify("📋 รับทราบแล้ว — ขึ้นในตารางงานของคุณ (สีเทา)", "ok");
  };

  const doDecline = (reason="") => {
    setTasks(ts => ts.map(tx => tx.id === t.id
      ? { ...tx,
          declinedBy: [...new Set([...(tx.declinedBy||[]), user.id])],
          joinedBy: (tx.joinedBy||[]).filter(id=>id!==user.id),
          acknowledgedBy: (tx.acknowledgedBy||[]).filter(id=>id!==user.id),
          declineReasons: { ...(tx.declineReasons||{}), [user.id]: reason },
          rsvpLog: [...(tx.rsvpLog||[]), { userId: user.id, action:"decline", reason, ts: new Date().toISOString() }]
        }
      : tx));
    const remaining = getRemaining();
    setRsvpModal(remaining.length > 0 ? { task: remaining[0], step: "rsvp" } : null);
    setDeclineReason(""); setShowDeclineForm(false);
    notify("❌ ปฏิเสธนัดหมายแล้ว", "ok");
  };
  // ตรวจสอบว่าผู้เชิญเป็นหัวหน้า/ผบห. หรือไม่
  const creatorRole = USERS.find(u=>u.id===t.createdBy)?.role;
  const creatorRank  = ROLE_RANK[creatorRole] || 1;
  const userRank     = ROLE_RANK[user.role]    || 1;
  // ผู้ใต้บังคับบัญชา (rank ต่ำกว่า) ปฏิเสธ → บังคับใส่เหตุผลเสมอ
  const requireReason = userRank < creatorRank;
  const creatorIsHigher = requireReason; // backward compat alias

  const doSkip = () => {
    const remaining = getRemaining();
    setRsvpModal(remaining.length > 0 ? { task: remaining[0], step: "rsvp" } : null);
  };

  return (
    <div className="overlay" onClick={() => setRsvpModal(null)} style={{ zIndex: 1100 }}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 480, zIndex: 1101 }}>

        {/* ── Step: Conflict ── */}
        {rsvpModal.step === "conflict" && (
          <>
            <div className="modal-hd">
              <div className="modal-title" style={{ color:"#ef4444" }}>⚠️ นัดหมายซ้อนทับ!</div>
              <button className="modal-close" onClick={() => setRsvpModal(null)}>✕</button>
            </div>
            <div style={{ padding:"4px 0 12px" }}>
              <div style={{ fontSize:12, color:"var(--text2)", marginBottom:12 }}>
                <strong>"{t.title}"</strong> วันที่ {fmtDate(t.dueDate)} เวลา {t.dueTime} น. ซ้อนทับกับ:
              </div>
              {(rsvpModal.conflictTasks || conflictTasks).map(cx => (
                <div key={cx.id} style={{ padding:"8px 12px", borderRadius:8, background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)", marginBottom:8 }}>
                  <div style={{ fontWeight:700, fontSize:12 }}>{cx.title}</div>
                  <div style={{ fontSize:11, color:"var(--text3)" }}>⏰ {cx.dueTime} น. · {cx.duration||60} นาที · {cx.priority}</div>
                  {leads.find(l=>l.id===cx.leadId) && <div style={{ fontSize:10, color:"var(--text3)" }}>🏫 {leads.find(l=>l.id===cx.leadId)?.schoolName}</div>}
                </div>
              ))}
              <div style={{ display:"flex", flexDirection:"column", gap:8, marginTop:12 }}>
                <button className="btn btn-accent" onClick={doJoin} style={{ textAlign:"left", padding:"10px 14px" }}>
                  <div style={{ fontWeight:700 }}>✅ เข้าร่วมทั้งคู่</div>
                  <div style={{ fontSize:10, opacity:0.7 }}>ยืนยันแม้จะซ้อนทับ — ปรากฏทั้งสองนัดในปฏิทิน</div>
                </button>
                <button className="btn btn-ghost" onClick={doAck} style={{ textAlign:"left", padding:"10px 14px" }}>
                  <div style={{ fontWeight:700 }}>📋 รับทราบเท่านั้น</div>
                  <div style={{ fontSize:10, opacity:0.7 }}>ขึ้นตารางสีเทา ไม่นับว่าเข้าร่วม</div>
                </button>
                <button className="btn btn-ghost" style={{ color:"var(--text3)" }} onClick={() => setRsvpModal(m => ({ ...m, step:"rsvp" }))}>← กลับ</button>
              </div>
            </div>
          </>
        )}

        {/* ── Step: RSVP ── */}
        {rsvpModal.step === "rsvp" && (
          <>
            <div className="modal-hd">
              <div>
                <div className="modal-title">📅 นัดหมายใหม่ — โปรดตอบรับ</div>
                {pendingRsvpTasks.length > 1 && (
                  <div style={{ fontSize:10, color:"var(--text3)", marginTop:3 }}>ยังมีอีก {pendingRsvpTasks.length - 1} นัดที่รอตอบ</div>
                )}
              </div>
              <button className="modal-close" onClick={() => setRsvpModal(null)}>✕</button>
            </div>

            {/* Task card */}
            <div style={{ background:"var(--bg3)", borderRadius:10, padding:14, marginBottom:14,
              border:`1px solid ${tc}30`, borderLeft:`3px solid ${tc}` }}>
              <div style={{ fontWeight:800, fontSize:15, marginBottom:6 }}>{t.title}</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
                {t.apptType && <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:tc+"20", color:tc, fontWeight:700 }}>{t.apptType}</span>}
                <span style={{ fontSize:10, padding:"2px 8px", borderRadius:8, background:pc(t.priority)+"20", color:pc(t.priority), fontWeight:700 }}>{t.priority}</span>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:5, fontSize:12 }}>
                <div>📅 {fmtDate(t.dueDate)}{t.dueTime ? ` · ${t.dueTime} น.` : ""}{t.duration ? ` (${t.duration} นาที)` : ""}</div>
                {t.dueDate && <div style={{ fontSize:11, color:"var(--accent)", fontFamily:"IBM Plex Mono" }}>
                  {new Date(t.dueDate+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
                </div>}
                {lead && <div style={{ color:"var(--text3)" }}>🏫 {lead.schoolName}</div>}
                {t.description && <div style={{ color:"var(--text2)", lineHeight:1.5 }}>{t.description}</div>}
                {t.meetingLink && <a href={t.meetingLink} target="_blank" rel="noopener noreferrer" style={{ color:"#3b82f6", textDecoration:"none" }}>🔗 {t.platform||"Meeting"}: เข้าร่วม →</a>}
                {t.locationLink && <a href={t.locationLink} target="_blank" rel="noopener noreferrer" style={{ color:"#10b981", textDecoration:"none" }}>📍 ดูแผนที่ →</a>}
                {t.needSupport && <div style={{ color:"#f59e0b" }}>🙋 ขอสนับสนุน: {t.supportNote||"ME Team/Presales"}</div>}
                <div style={{ fontSize:10, color:"var(--text3)", borderTop:"1px solid var(--border)", paddingTop:6, marginTop:4 }}>
                  สร้างโดย: <span style={{ color:accentColor, fontWeight:700 }}>{creator?.name||"ทีมงาน"}</span>
                  {" · "}เข้าร่วมแล้ว {(t.joinedBy||[]).length} คน
                  {(t.acknowledgedBy||[]).length > 0 && ` · รับทราบ ${(t.acknowledgedBy||[]).length} คน`}
                </div>
              </div>
            </div>

            {/* Conflict warning */}
            {conflictTasks.length > 0 && (
              <div style={{ padding:"8px 12px", borderRadius:8, background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.3)", marginBottom:12 }}>
                <div style={{ fontSize:11, color:"#f59e0b", fontWeight:700 }}>⚠️ ตรวจพบนัดซ้อนทับ {conflictTasks.length} รายการ</div>
                <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>
                  {conflictTasks.map(cx => `"${cx.title}" ${cx.dueTime||""}`).join(" · ")}
                </div>
              </div>
            )}

            {/* 3 action buttons */}
            <div style={{ display:"flex", gap:8 }}>
              <button className="btn btn-accent" style={{ flex:1 }} onClick={doJoin}>✅ เข้าร่วม</button>
              <button className="btn btn-ghost" style={{ flex:1 }} onClick={doAck}>📋 รับทราบ</button>
              <button className="btn btn-ghost" style={{ flex:1, color:"var(--red)", borderColor:"rgba(239,68,68,0.3)" }} onClick={doDecline}>❌ ปฏิเสธ</button>
            </div>
            {/* Decline reason form */}
            {showDeclineForm && (
              <div style={{ marginTop:10, padding:"10px 12px", borderRadius:8, background:"rgba(239,68,68,0.06)", border:"1px solid rgba(239,68,68,0.25)" }}>
                <div style={{ fontSize:11, fontWeight:700, color:"var(--red)", marginBottom:6 }}>
                  {creatorIsHigher ? "❌ ปฏิเสธ — กรุณาระบุเหตุผล *" : "❌ ปฏิเสธ — ระบุเหตุผล (ถ้ามี)"}
                </div>
                <textarea
                  value={declineReason}
                  onChange={e => setDeclineReason(e.target.value)}
                  placeholder={creatorIsHigher ? "กรุณาระบุเหตุผลที่ไม่สามารถเข้าร่วม..." : "เหตุผล (ไม่บังคับ)..."}
                  style={{ width:"100%", minHeight:70, padding:"8px 10px", borderRadius:6,
                    background:"var(--bg3)", border:"1px solid rgba(239,68,68,0.35)",
                    color:"var(--text)", fontSize:12, resize:"vertical", fontFamily:"inherit" }}
                  autoFocus
                />
                <div style={{ display:"flex", gap:8, marginTop:8 }}>
                  <button className="btn btn-xs" style={{ background:"rgba(239,68,68,0.15)", color:"var(--red)", borderColor:"rgba(239,68,68,0.4)", fontWeight:700 }}
                    onClick={() => { if(creatorIsHigher && !declineReason.trim()){ return; } doDecline(declineReason.trim()); }}
                    disabled={creatorIsHigher && !declineReason.trim()}>
                    ยืนยันปฏิเสธ
                  </button>
                  <button className="btn btn-xs btn-ghost" onClick={() => { setShowDeclineForm(false); setDeclineReason(""); }}>
                    ยกเลิก
                  </button>
                </div>
                {creatorIsHigher && !declineReason.trim() && (
                  <div style={{ fontSize:10, color:"var(--red)", marginTop:4, opacity:0.7 }}>* กรุณาระบุเหตุผลก่อนปฏิเสธ</div>
                )}
              </div>
            )}
            {pendingRsvpTasks.length > 1 && (
              <button className="btn btn-ghost btn-sm" style={{ width:"100%", marginTop:8, color:"var(--text3)" }} onClick={doSkip}>ข้าม (ตอบภายหลัง)</button>
            )}
          </>
        )}
      </div>
    </div>
  );
}

function App() {
  useEffect(() => injectCSS(), []);

  const saved = loadStore();

  const [user, setUser] = useState(null);
  // ── User & Role Management ──
  const [customUsers, setCustomUsers] = useState(() => saved?.customUsers || INIT_CUSTOM_USERS);
  const [customRoles, setCustomRoles] = useState(() => saved?.customRoles || INIT_CUSTOM_ROLES);
  const [page, setPage] = useState("dashboard");
  const [leads, setLeadsRaw] = useState(saved?.leads || INIT_LEADS);
  const [opps, setOppsRaw] = useState(saved?.opps || INIT_OPPORTUNITIES);
  // Normalize tasks เพื่อรองรับ field ใหม่ที่เพิ่มภายหลัง
  const normalizeTasks = (ts) => (ts||[]).map(t => ({
    joinedBy:[], acknowledgedBy:[], declinedBy:[], declineReasons:{},
    rsvpLog:[], comments:[], invitedUsers:[],
    ...t,
  }));
  const [tasks, setTasksRaw] = useState(() => normalizeTasks(saved?.tasks || INIT_TASKS));
  const normalizeEvents = (es) => (es||[]).map(e => ({
    joinedBy:[], acknowledgedBy:[], declinedBy:[], declineReasons:{},
    rsvpLog:[], invitedUsers:[],
    ...e,
  }));
  const [events, setEventsRaw] = useState(() => normalizeEvents(saved?.events || []));  // shared calendar events
  const [requests, setRequestsRaw] = useState(saved?.requests || INIT_REQUESTS);
  const [catalog, setCatalogRaw] = useState(saved?.catalog || INIT_PRODUCT_CATALOG);
  const [specialOffers, setSpecialOffersRaw] = useState(saved?.specialOffers || INIT_SPECIAL_OFFERS);
  const [discountLimits, setDiscountLimitsRaw] = useState(saved?.discountLimits || INIT_DISCOUNT_LIMITS);
  // perUserLimits: { [userId]: maxPct } — override ต่อคน สำหรับ Sales เท่านั้น
  const [perUserLimits, setPerUserLimitsRaw] = useState(saved?.perUserLimits || {});
  const perUserLimitsRef = useRef(perUserLimits);
  const [notif, setNotif] = useState(null);
  const [globalViewLead, setGlobalViewLeadRaw] = useState(null);
  const [globalViewOpp, setGlobalViewOpp] = useState(null);
  // ── Notification seen-tracking (key = "quoteId:status" หรือ "reqId:status") ──
  const [seenNotifs, setSeenNotifs] = useState(() => {
    try { return JSON.parse(localStorage.getItem("seen_notifs") || "{}"); } catch(e) { return {}; }
  });
  const [showNotifPanel, setShowNotifPanel] = useState(false);
  const [showManagerNotifPanel, setShowManagerNotifPanel] = useState(false);
  // RSVP Modal — Manager/Exec รับการแจ้งเตือนนัดหมายใหม่
  const [rsvpModal, setRsvpModal] = useState(null);
  // ── Global Confirm Dialog ──
  const [confirmDlg, setConfirmDlg] = useState(null);
  // { msg, subMsg, confirmLabel, danger, onConfirm }
  const confirm = (opts) => new Promise(resolve => {
    setConfirmDlg({
      ...opts,
      onConfirm: () => { setConfirmDlg(null); resolve(true); },
      onCancel:  () => { setConfirmDlg(null); resolve(false); },
    });
  });
  // { task, conflictTasks, step: "rsvp" | "conflict" }
  const markSeen = (keys) => setSeenNotifs(prev => {
    const next = { ...prev };
    keys.forEach(k => { next[k] = true; });
    try { localStorage.setItem("seen_notifs", JSON.stringify(next)); } catch(e) {}
    return next;
  });

  // Refs to always have latest values for localStorage writes
  const leadsRef = useRef(leads);
  const oppsRef = useRef(opps);
  const tasksRef = useRef(tasks);
  const eventsRef = useRef(events);
  const requestsRef = useRef(requests);
  const catalogRef = useRef(catalog);
  const specialOffersRef = useRef(specialOffers);
  const discountLimitsRef = useRef(discountLimits);
  useEffect(() => { leadsRef.current = leads; }, [leads]);
  useEffect(() => { oppsRef.current = opps; }, [opps]);
  useEffect(() => { tasksRef.current = tasks; }, [tasks]);
  useEffect(() => { eventsRef.current = events; }, [events]);
  useEffect(() => { requestsRef.current = requests; }, [requests]);
  useEffect(() => { catalogRef.current = catalog; }, [catalog]);
  useEffect(() => { specialOffersRef.current = specialOffers; }, [specialOffers]);
  // sync global DISCOUNT_LIMITS ให้ components ที่ใช้ direct reference ได้ค่าล่าสุด
  useEffect(() => { discountLimitsRef.current = discountLimits; Object.assign(DISCOUNT_LIMITS, discountLimits); }, [discountLimits]);
  useEffect(() => { perUserLimitsRef.current = perUserLimits; Object.assign(PER_USER_LIMITS, perUserLimits); }, [perUserLimits]);

  const persist = (patch = {}) => {
    try {
      safeStorage.setItem(STORE_KEY, JSON.stringify({
        leads: patch.leads ?? leadsRef.current,
        opps: patch.opps ?? oppsRef.current,
        tasks: patch.tasks ?? tasksRef.current,
        customUsers: patch.customUsers ?? customUsers,
        customRoles: patch.customRoles ?? customRoles,
        events: patch.events ?? eventsRef.current,
        requests: patch.requests ?? requestsRef.current,
        catalog: patch.catalog ?? catalogRef.current,
        specialOffers: patch.specialOffers ?? specialOffersRef.current,
        discountLimits: patch.discountLimits ?? discountLimitsRef.current,
        perUserLimits: patch.perUserLimits ?? perUserLimitsRef.current,
      }));
    } catch (e) {}
  };

  const setCatalog = (fn) => setCatalogRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    catalogRef.current = next; persist({ catalog: next }); return next;
  });
  const setSpecialOffers = (fn) => setSpecialOffersRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    specialOffersRef.current = next; persist({ specialOffers: next }); return next;
  });
  const setDiscountLimits = (fn) => setDiscountLimitsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    discountLimitsRef.current = next;
    Object.assign(DISCOUNT_LIMITS, next);
    persist({ discountLimits: next });
    return next;
  });
  const setPerUserLimits = (fn) => setPerUserLimitsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    perUserLimitsRef.current = next;
    Object.assign(PER_USER_LIMITS, next);
    persist({ perUserLimits: next });
    return next;
  });

  const setLeads = (fn) => setLeadsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    leadsRef.current = next;
    persist({ leads: next });
    return next;
  });
  const setOpps = (fn) => setOppsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    oppsRef.current = next;
    persist({ opps: next });
    return next;
  });
  const setEvents = (fn) => setEventsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    eventsRef.current = next;
    persist({ events: next });
    return next;
  });

  const setTasks = (fn) => setTasksRaw(prev => {
    const next = normalizeTasks(typeof fn === "function" ? fn(prev) : fn);
    tasksRef.current = next;
    persist({ tasks: next });
    return next;
  });
  const setRequests = (fn) => setRequestsRaw(prev => {
    const next = typeof fn === "function" ? fn(prev) : fn;
    requestsRef.current = next;
    persist({ requests: next });
    return next;
  });

  // Update a single lead (including coaching) — persists immediately
  const updateLead = (updated) => {
    setLeads(ls => ls.map(l => l.id === updated.id ? updated : l));
    setGlobalViewLeadRaw(v => v?.id === updated.id ? updated : v);
  };

  const notify = (msg, type = "ok") => setNotif({ msg, type, k: Date.now() });
  // readOnly = ห้ามแก้ข้อมูล Lead/Activity เท่านั้น — ไม่ block การ approve quote
  const isLeadInfoReadOnly = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user?.role);

  if (!user) return <Login onLogin={u => { setUser(u); setPage("dashboard"); }} />;

  // คำนวณ badge สำหรับแต่ละ role
  const quoteBadge = (() => {
    const allQuotes = leads.flatMap(l => (l.quotes || []).map(q => ({ ...q, lead: l })));
    if (user.role === ROLES.FINANCE)
      return allQuotes.filter(q => q.approvalStatus === "pending_finance").length;
    if ([ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role))
      return allQuotes.filter(q => ["pending_manager","pending_exec"].includes(q.approvalStatus)).length;
    if (user.role === ROLES.SALES)
      // badge = จำนวน quote ของ Sales คนนี้ที่ issued/rejected แล้วยังไม่ได้ดู
      return allQuotes.filter(q =>
        q.createdBy === user.id &&
        ["issued","rejected"].includes(q.approvalStatus) &&
        !seenNotifs[`q:${q.id}:${q.approvalStatus}`]
      ).length;
    return 0;
  })();

  // ── pendingRsvpTasks: tasks ที่ Manager/Exec ยังไม่ตอบ RSVP ──
  const pendingRsvpTasks = (() => {
    if (!user || ![ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role)) return [];
    return tasks.filter(t =>
      t.visibleToAll &&
      !(t.joinedBy||[]).includes(user.id) &&
      !(t.acknowledgedBy||[]).includes(user.id) &&
      t.createdBy !== user.id &&
      !t.completed
    );
  })();

  // ── calCentralBadge: events + tasks ที่รอตอบรับ ──
  const calCentralBadge = (() => {
    if (!user) return 0;
    const pendingEvents = events.filter(e =>
      e.createdBy !== user.id &&
      (e.invitedUsers||[]).includes(user.id) &&
      !(e.joinedBy||[]).includes(user.id) &&
      !(e.acknowledgedBy||[]).includes(user.id) &&
      !(e.declinedBy||[]).includes(user.id)
    ).length;
    // tasks ที่ visibleToAll และถูก invite แต่ยังไม่ตอบ
    const pendingTasks2 = tasks.filter(t =>
      t.visibleToAll &&
      t.createdBy !== user.id &&
      !(t.joinedBy||[]).includes(user.id) &&
      !(t.acknowledgedBy||[]).includes(user.id) &&
      !(t.declinedBy||[]).includes(user.id) &&
      !t.completed
    ).length;
    return pendingEvents + pendingTasks2;
  })();

  // ── coachBadge: coaching message ที่ยังไม่อ่าน (รวมทุก lead) ──
  const coachBadge = (() => {
    if (!user) return 0;
    let count = 0;
    leads.forEach(l => {
      (l.coaching || []).forEach(t => {
        if (t.authorId === user.id) return; // ข้ามข้อความของตัวเอง
        if ((t.readBy || []).includes(user.id)) return; // อ่านแล้ว
        count++;
      });
    });
    return count;
  })();

  // ── salesAllNotifs: ALL notifications (read + unread) — เหมือน inbox email ──
  const salesAllNotifs = (() => {
    if (!user || user.role !== ROLES.SALES) return [];
    const items = [];
    const push = (obj) => items.push({ ...obj, read: !!seenNotifs[obj.key] });

    // quotes
    leads.forEach(l => {
      (l.quotes || []).forEach(q => {
        if (q.createdBy !== user.id) return;
        const key = `q:${q.id}:${q.approvalStatus}`;
        if (q.approvalStatus === "issued")
          push({ key, type:"quote_issued", icon:"📄", color:"#00e5a0",
            title:"ใบเสนอราคาออกแล้ว", body:`${l.schoolName||l.id} — Finance ออกใบให้แล้ว พร้อมส่งลูกค้า`, lead:l, quote:q });
        if (q.approvalStatus === "rejected")
          push({ key, type:"quote_rejected", icon:"❌", color:"#ef4444",
            title:"ใบเสนอราคาถูกปฏิเสธ", body:`${l.schoolName||l.id}${q.rejectNote?` — "${q.rejectNote}"`:""}`, lead:l, quote:q });
        if (q.approvalStatus === "pending_exec")
          push({ key, type:"quote_escalated", icon:"👑", color:"#8b5cf6",
            title:"ส่งต่อให้ Exec พิจารณา", body:`${l.schoolName||l.id} — Manager ส่งต่อให้ Exec อนุมัติส่วนลด`, lead:l, quote:q });
      });
    });
    // coaching
    leads.forEach(l => {
      (l.coaching || []).forEach(t => {
        if (t.authorId === user.id) return;
        if ((t.readBy || []).includes(user.id)) return;
        const author = USERS.find(u => u.id === t.authorId);
        const key = `coach:${t.id}:unread`;
        push({ key, type:"coaching_new", icon:"💬", color:"#8b5cf6",
          title:`คำแนะนำใหม่จาก ${author?.name?.split(" ")[0]||"Manager"}`,
          body:`${l.schoolName||""} — "${t.text?.slice(0,50)}${t.text?.length>50?"…":""}"`,
          lead:l });
      });
    });
    // requests
    // redirect notifications — เมื่อ request ถูกส่งต่อแผนก
    requests.filter(r => r.requestedBy === user.id && (r.redirectHistory||[]).length > 0)
      .forEach(r => {
        r.redirectHistory.forEach((h, idx) => {
          const key = `redirect:${r.id}:${idx}`;
          if (seenNotifs[key]) return;
          const toD = TARGET_DEPTS.find(d=>d.id===h.to);
          const byU = USERS.find(u=>u.id===h.by);
          push({ key, type:"redirect", icon:"🔀", color:"#f59e0b",
            title:`Request ถูกส่งต่อ → ${toD?.label||h.to}`,
            body:`"${r.title}"${h.note?` — "${h.note}"`:""}  โดย ${byU?.name?.split(" ")[0]||"?"}`,
            req: r });
        });
      });

    requests.forEach(r => {
      if (r.requestedBy !== user.id) return;
      const key = `r:${r.id}:${r.status}`;
      if (r.status === "approved")
        push({ key, type:"req_approved", icon:"✅", color:"#00e5a0", title:"Request ได้รับอนุมัติ", body:`"${r.title}"` });
      if (r.status === "rejected")
        push({ key, type:"req_rejected", icon:"✕", color:"#ef4444", title:"Request ไม่ได้รับอนุมัติ", body:`"${r.title}"${r.managerNote?` — ${r.managerNote}`:""}` });
      if (r.status === "need_info")
        push({ key, type:"req_need_info", icon:"💬", color:"#f59e0b", title:"Request ต้องการข้อมูลเพิ่ม", body:`"${r.title}" — กรุณาตอบกลับ` });
      if (r.status === "in_progress")
        push({ key, type:"req_progress", icon:"🔧", color:"#3b82f6", title:"Request กำลังดำเนินการ", body:`"${r.title}"` });
    });
    // sort: unread ก่อน, read ทีหลัง
    return items.sort((a,b) => (a.read?1:0)-(b.read?1:0));
  })();

  // salesNotifs = unread only (สำหรับ badge count)
  const salesNotifs = salesAllNotifs.filter(n => !n.read);
  const salesNotifCount = salesNotifs.length;

  // ── Manager/Exec RSVP response notifications ──
  const managerRsvpNotifs = (() => {
    if (!user || ![ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role)) return [];
    const items = [];
    tasks.forEach(t => {
      if (t.createdBy !== user.id) return;
      (t.rsvpLog||[]).forEach((log, idx) => {
        if (log.userId === user.id) return;
        const key = `rsvp:${t.id}:${log.userId}:${log.action}:${idx}`;
        if (seenNotifs[key]) return;
        const responder = USERS.find(u => u.id === log.userId);
        const actionLabel = { join:"✅ ตอบรับเข้าร่วม", ack:"📋 รับทราบ", decline:"❌ ปฏิเสธ" }[log.action] || log.action;
        const color = { join:"#00e5a0", ack:"#6b7280", decline:"#ef4444" }[log.action] || "#888";
        items.push({
          key, read: false,
          type:"rsvp_response",
          icon: { join:"✅", ack:"📋", decline:"❌" }[log.action] || "📋",
          color,
          title: `${actionLabel} — ${responder?.name?.split(" ")[0]||"?"}`,
          body: `"${t.title}"${log.reason ? ` — เหตุผล: "${log.reason}"` : ""}`,
          task: t,
        });
      });
    });
    // events ที่ user สร้าง
    events.forEach(e => {
      if (e.createdBy !== user.id) return;
      (e.rsvpLog||[]).forEach((log, idx) => {
        if (log.userId === user.id) return;
        const key = `rsvp:${e.id}:${log.userId}:${log.action}:${idx}`;
        if (seenNotifs[key]) return;
        const responder = USERS.find(u => u.id === log.userId);
        const actionLabel = { join:"✅ ตอบรับเข้าร่วม", ack:"📋 รับทราบ", decline:"❌ ปฏิเสธ" }[log.action] || log.action;
        const color = { join:"#00e5a0", ack:"#6b7280", decline:"#ef4444" }[log.action] || "#888";
        items.push({
          key, read: false, type:"rsvp_response",
          icon: { join:"✅", ack:"📋", decline:"❌" }[log.action] || "📋",
          color,
          title: `${actionLabel} — ${responder?.name?.split(" ")[0]||"?"}`,
          body: `"${e.title}"${log.reason ? ` — เหตุผล: "${log.reason}"` : ""}`,
          event: e,
        });
      });
    });
    return items;
  })();
  const managerRsvpCount = managerRsvpNotifs.length;

  // ── autoApproved requests ที่ Manager/Exec ควรรับทราบ ──
  const autoApprovedAck = requests.filter(r =>
    r.autoApproved &&
    r.requestedBy !== user?.id &&            // ไม่ใช่ request ของตัวเอง
    [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user?.role) &&
    !(r.ackedBy||[]).includes(user?.id)      // ยังไม่ได้รับทราบ
  );

  const pages = {
    dashboard: <Dashboard user={user} leads={leads} opps={opps} tasks={tasks}
      onViewLead={l => setGlobalViewLeadRaw(leadsRef.current.find(x => x.id === l.id) || l)}
      onViewOpp={o => setGlobalViewOpp(o)} />,
    leads: <LeadsPage leads={leads} setLeads={setLeads} user={user} notify={notify} catalog={catalog} specialOffers={specialOffers} markSeen={markSeen} tasks={tasks} setTasks={setTasks} confirm={confirm} />,
    pipeline: <PipelinePage opps={opps} setOpps={setOpps} leads={leads} user={user} notify={notify} />,
    tasks: <TasksPage tasks={tasks} setTasks={setTasks} leads={leads} user={user} notify={notify} confirm={confirm} />,
    ai_input: <AIInputPage leads={leads} setLeads={setLeads} tasks={tasks} setTasks={setTasks} user={user} notify={notify} />,
    team: <TeamPage leads={leads} tasks={tasks} opps={opps} currentUser={user}
      onViewLead={l => setGlobalViewLeadRaw(leadsRef.current.find(x => x.id === l.id) || l)}
      onViewOpp={o => setGlobalViewOpp(o)}
      catalog={catalog} specialOffers={specialOffers}
      onUpdateLead={updated => updateLead(updated)} notify={notify} />,
    activity_report: <ActivityReportPage leads={leads} requests={requests} user={user}
      onViewLead={l => setGlobalViewLeadRaw(leadsRef.current.find(x => x.id === l.id) || l)} />,
    catalog: <ProductCatalogPage catalog={catalog} setCatalog={setCatalog} specialOffers={specialOffers} setSpecialOffers={setSpecialOffers} currentUser={user} />,
    settings: <SettingsPage discountLimits={discountLimits} setDiscountLimits={setDiscountLimits} perUserLimits={perUserLimits} setPerUserLimits={setPerUserLimits} currentUser={user} notify={notify} />,
    user_management: <UserManagementPage customUsers={customUsers} setCustomUsers={setCustomUsers} customRoles={customRoles} setCustomRoles={setCustomRoles} currentUser={user} notify={notify} />,
    admin_calendar: <AdminCalendarPage requests={requests} currentUser={user} leads={leads} tasks={tasks} setTasks={setTasks} />,
    shared_calendar: <SharedCalendarPage events={events} setEvents={setEvents} tasks={tasks} setTasks={setTasks} leads={leads} user={user} notify={notify} confirm={confirm} />,
    finance: <FinancePage leads={leads} currentUser={user} onUpdate={updated => updateLead(updated)} markSeen={markSeen} />,
    requests: <RequestsPage requests={requests} setRequests={setRequests} leads={leads} user={user} notify={notify} setTasks={setTasks} tasks={tasks} events={events} />,
  };

  return (
    <div className="layout">
      <Sidebar user={user} active={page} setActive={setPage} requests={requests} quoteBadge={quoteBadge}
        salesNotifCount={salesNotifCount}
        totalNotifCount={salesAllNotifs.length}
        onNotifClick={() => setShowNotifPanel(v => !v)}
        coachBadge={coachBadge}
        rsvpBadge={pendingRsvpTasks.length}
        onRsvpClick={() => pendingRsvpTasks.length > 0 && setRsvpModal({ task: pendingRsvpTasks[0], step: "rsvp" })}
        calCentralBadge={calCentralBadge}
        onCalCentralClick={() => { setPage("shared_calendar"); }}
        managerRsvpCount={managerRsvpCount}
        onManagerNotifClick={() => setShowManagerNotifPanel(v=>!v)}
        onLogout={() => { setUser(null); setGlobalViewLeadRaw(null); setGlobalViewOpp(null); }}
        onSwitchUser={(u) => { setUser(u); setPage("dashboard"); }} />
      <div className="main">{pages[page] || pages.dashboard}</div>
      {notif && <Notif key={notif.k} msg={notif.msg} type={notif.type} onDone={() => setNotif(null)} />}

      {/* ── Sales Notification Panel ── */}
      {showNotifPanel && user?.role === ROLES.SALES && (
        <div style={{ position:"fixed", top:0, right:0, bottom:0, width:360, background:"var(--bg2)",
          borderLeft:"1px solid var(--border)", zIndex:1000, display:"flex", flexDirection:"column",
          boxShadow:"-8px 0 40px rgba(0,0,0,0.5)" }}>

          {/* ── Header ── */}
          <div style={{ padding:"14px 16px 10px", borderBottom:"1px solid var(--border)" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontWeight:800, fontSize:15 }}>🔔 การแจ้งเตือน</span>
                {salesNotifCount > 0 && (
                  <span style={{ minWidth:20, height:20, borderRadius:10, background:"#ef4444", color:"#fff",
                    fontSize:11, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center",
                    padding:"0 5px", animation:"badgePulse 1.5s infinite" }}>
                    {salesNotifCount}
                  </span>
                )}
              </div>
              <div style={{ display:"flex", gap:6 }}>
                {salesNotifCount > 0 && (
                  <button className="btn btn-xs btn-ghost"
                    onClick={() => markSeen(salesAllNotifs.filter(n=>!n.read).map(n=>n.key))}>
                    อ่านทั้งหมด
                  </button>
                )}
                <button className="btn btn-xs btn-ghost" onClick={() => setShowNotifPanel(false)}>✕</button>
              </div>
            </div>
            {/* Stats bar */}
            <div style={{ display:"flex", gap:12, fontSize:10, color:"var(--text3)" }}>
              <span>ทั้งหมด <strong style={{ color:"var(--text2)" }}>{salesAllNotifs.length}</strong></span>
              <span style={{ color: salesNotifCount>0?"#ef4444":"#00e5a0", fontWeight:700 }}>
                ยังไม่อ่าน <strong>{salesNotifCount}</strong>
              </span>
              <span>อ่านแล้ว <strong style={{ color:"var(--text3)" }}>{salesAllNotifs.length - salesNotifCount}</strong></span>
            </div>
          </div>

          {/* ── Notification list ── */}
          <div style={{ flex:1, overflowY:"auto", padding:10 }}>
            {salesAllNotifs.length === 0 ? (
              <div style={{ textAlign:"center", padding:"48px 20px" }}>
                <div style={{ fontSize:36, marginBottom:10 }}>✅</div>
                <div style={{ color:"var(--text3)", fontSize:13, fontWeight:600 }}>ไม่มีการแจ้งเตือน</div>
              </div>
            ) : salesAllNotifs.map(n => {
              const isRead = n.read;
              return (
                <div key={n.key}
                  onClick={() => {
                    if (!isRead) markSeen([n.key]);
                    if (n.lead) {
                      const freshLead = leadsRef.current.find(x=>x.id===n.lead.id)||n.lead;
                      setGlobalViewLeadRaw({ ...freshLead, _defaultTab: n.type==="coaching_new"?"coaching":"info" });
                      setShowNotifPanel(false);
                    }
                  }}
                  style={{
                    borderRadius:10, padding:"10px 12px", marginBottom:6,
                    cursor: n.lead ? "pointer" : "default",
                    background: isRead ? "transparent" : "var(--bg3)",
                    border: isRead ? "1px solid var(--border)" : `1px solid ${n.color}30`,
                    borderLeft: isRead ? `3px solid var(--border)` : `3px solid ${n.color}`,
                    opacity: isRead ? 0.6 : 1,
                    transition:"opacity 0.2s",
                    position:"relative",
                  }}
                  onMouseEnter={e => e.currentTarget.style.opacity="1"}
                  onMouseLeave={e => e.currentTarget.style.opacity=isRead?"0.6":"1"}>
                  <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                    {/* Unread dot */}
                    <div style={{ position:"relative", flexShrink:0, paddingTop:2 }}>
                      <span style={{ fontSize:isRead?14:18 }}>{n.icon}</span>
                      {!isRead && (
                        <div style={{ position:"absolute", top:-2, right:-2, width:8, height:8,
                          borderRadius:"50%", background:"#ef4444", border:"1.5px solid var(--bg2)" }} />
                      )}
                    </div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:2 }}>
                        <span style={{ fontWeight: isRead?600:800, fontSize:12,
                          color: isRead?"var(--text2)":n.color }}>
                          {n.title}
                        </span>
                        {!isRead && (
                          <span style={{ fontSize:8, padding:"1px 5px", borderRadius:6,
                            background:n.color+"22", color:n.color, fontWeight:800,
                            flexShrink:0 }}>ใหม่</span>
                        )}
                      </div>
                      <div style={{ fontSize:11, color: isRead?"var(--text3)":"var(--text2)",
                        lineHeight:1.5, overflow:"hidden", textOverflow:"ellipsis",
                        display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>
                        {n.body}
                      </div>
                      {n.lead && !isRead && (
                        <div style={{ fontSize:10, color:"var(--text3)", marginTop:3 }}>
                          แตะเพื่อดูรายละเอียด →
                        </div>
                      )}
                      {isRead && (
                        <div style={{ fontSize:9, color:"var(--text3)", marginTop:2 }}>✓ อ่านแล้ว</div>
                      )}
                    </div>
                    {!isRead && (
                      <button className="btn btn-xs btn-ghost" style={{ padding:"2px 6px", flexShrink:0, opacity:0.6 }}
                        onClick={e => { e.stopPropagation(); markSeen([n.key]); }}
                        title="ทำเครื่องหมายว่าอ่านแล้ว">✓</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Footer ── */}
          {salesAllNotifs.some(n=>n.read) && (
            <div style={{ padding:"8px 16px", borderTop:"1px solid var(--border)", textAlign:"center" }}>
              <button className="btn btn-xs btn-ghost" style={{ fontSize:10, color:"var(--text3)" }}
                onClick={() => {
                  // clear seenNotifs ทั้งหมด → ทุกอย่างกลับมาเป็น unread
                  const allKeys = salesAllNotifs.map(n=>n.key);
                  setSeenNotifs(prev => {
                    const next={...prev};
                    allKeys.forEach(k=>{ delete next[k]; });
                    try { localStorage.setItem("seen_notifs", JSON.stringify(next)); } catch(e){}
                    return next;
                  });
                }}>
                ↩ ทำเครื่องหมายทั้งหมดว่ายังไม่อ่าน
              </button>
            </div>
          )}
        </div>
      )}

      {/* ══ Manager RSVP Response Panel ══ */}
      {showManagerNotifPanel && [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user?.role) && (
        <div style={{ position:"fixed", top:0, right:0, bottom:0, width:360, background:"var(--bg2)",
          borderLeft:"1px solid var(--border)", zIndex:1000, display:"flex", flexDirection:"column",
          boxShadow:"-8px 0 40px rgba(0,0,0,0.5)" }}>
          <div style={{ padding:"16px 16px 12px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ fontWeight:800, fontSize:14 }}>📬 การตอบรับกิจกรรม</div>
              <div style={{ fontSize:11, color:"var(--text3)", marginTop:2 }}>
                {managerRsvpCount > 0 ? `${managerRsvpCount} รายการใหม่` : "ทันสมัยแล้ว ✓"}
              </div>
            </div>
            <div style={{ display:"flex", gap:8 }}>
              {managerRsvpCount > 0 && (
                <button className="btn btn-xs btn-ghost"
                  onClick={() => markSeen(managerRsvpNotifs.map(n=>n.key))}>
                  อ่านทั้งหมด
                </button>
              )}
              <button className="btn btn-xs btn-ghost" onClick={() => setShowManagerNotifPanel(false)}>✕</button>
            </div>
          </div>
          <div style={{ flex:1, overflowY:"auto", padding:12 }}>
            {managerRsvpNotifs.length === 0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px" }}>
                <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
                <div style={{ color:"var(--text3)", fontSize:13 }}>ไม่มีการแจ้งเตือนใหม่</div>
              </div>
            ) : managerRsvpNotifs.map(n => (
              <NotifItem key={n.key} n={n} tasks={tasks} setTasks={setTasks} user={user} notify={notify} markSeen={markSeen} />
            ))}
          </div>
        </div>
      )}

      {/* ══ Global Confirm Dialog ══ */}
      {confirmDlg && (
        <ConfirmDialog
          msg={confirmDlg.msg}
          subMsg={confirmDlg.subMsg}
          confirmLabel={confirmDlg.confirmLabel}
          danger={confirmDlg.danger !== false}
          onConfirm={confirmDlg.onConfirm}
          onCancel={confirmDlg.onCancel}
        />
      )}

      {/* ══ RSVP Modal — Manager/Exec ══ */}
      {rsvpModal && (
        <RsvpModal
          rsvpModal={rsvpModal}
          setRsvpModal={setRsvpModal}
          tasks={tasks}
          setTasks={setTasks}
          leads={leads}
          user={user}
          pendingRsvpTasks={pendingRsvpTasks}
          notify={notify}
          fmtDate={fmtDate}
          PRIORITY_COLOR={PRIORITY_COLOR}
        />
      )}

      {/* Global Lead detail modal
          coaching เขียนได้ทุก role, lead data แก้ได้เฉพาะ Sales */}
      {globalViewLead && (
        <LeadDetailModal
          lead={globalViewLead}
          onClose={() => setGlobalViewLeadRaw(null)}
          onUpdate={updated => updateLead(updated)}
          currentUser={user}
          readOnly={isLeadInfoReadOnly}
          catalog={catalog}
          specialOffers={specialOffers}
          notify={notify}
          markSeen={markSeen}
        />
      )}

      {/* Global Opp detail modal */}
      {globalViewOpp && (
        <OppDetailModal
          opp={globalViewOpp}
          leads={leads}
          onClose={() => setGlobalViewOpp(null)}
          onMoveStage={(id, s) => {
            if (!isLeadInfoReadOnly) {
              setOpps(os => os.map(o => o.id === id ? { ...o, stage: s } : o));
              setGlobalViewOpp(v => ({ ...v, stage: s }));
              notify(`ย้ายไป "${s}"`, "ok");
            }
          }}
          readOnly={isLeadInfoReadOnly}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
