// ── Clipboard helper: modern API + textarea fallback ──────────
function copyToClipboard(text, onDone) {
  const doFallback = () => {
    const el = document.createElement("textarea");
    el.value = text;
    el.style.cssText = "position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none";
    document.body.appendChild(el);
    el.focus(); el.select();
    try { document.execCommand("copy"); } catch(e) {}
    document.body.removeChild(el);
    onDone && onDone();
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => onDone && onDone()).catch(doFallback);
  } else {
    doFallback();
  }
}

.act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg3)}
.act-body{flex:1}
.act-sum{font-size:13px;font-weight:500}
.act-meta{font-size:11px;color:var(--text3);margin-top:2px}
.act-next{font-size:11px;color:var(--accent);margin-top:4px;font-weight:600}

/* TASK ITEM */
.task-item{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.12s}
.task-check.done{background:var(--green);border-color:var(--green)}
.task-body{flex:1}
.task-title{font-size:13px;font-weight:500}
.task-title.done{text-decoration:line-through;color:var(--text3)}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;align-items:center}
.task-date{font-size:10px;color:var(--text3)}
.task-date.overdue{color:var(--red)}
.task-pri{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:9px;margin-bottom:18px;width:fit-content}
.tab{padding:6px 14px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text2);transition:all 0.12s;border:none;background:none;font-family:inherit;font-weight:500}
.tab.active{background:var(--bg2);color:var(--text);font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,0.4)}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-ico{font-size:32px;margin-bottom:10px}
.empty-txt{font-size:13px}

/* SEARCH */
.search-wrap{position:relative}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.search-input{padding-left:33px!important;width:240px}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(0,229,160,0.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:40px;width:380px;position:relative;z-index:1}
.login-logo{font-size:24px;font-weight:800;color:var(--accent);margin-bottom:2px;letter-spacing:-0.5px}
.login-tagline{font-size:12px;color:var(--text3);margin-bottom:32px;font-family:'IBM Plex Mono',monospace}
.login-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:var(--red);padding:9px 13px;border-radius:8px;font-size:12px;margin-bottom:14px}
.demo-accounts{margin-top:18px;padding:12px;background:var(--bg3);border-radius:8px;font-size:10px;color:var(--text3)}
.demo-accounts code{color:var(--accent);font-family:'IBM Plex Mono',monospace}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp 0.22s ease}

/* NOTIFICATION */
.notif{position:fixed;top:18px;right:18px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 18px;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:notifIn 0.25s ease;max-width:320px}
.notif.ok{border-left:3px solid var(--green)}
.notif.err{border-left:3px solid var(--red)}
@keyframes notifIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:16px 0}

/* DETAIL PANEL */
.detail-panel{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px}
.detail-field{margin-bottom:14px}
.detail-field-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
.detail-field-value{font-size:13px;font-weight:500}

/* CONTACT CARD */
.contact-card{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:8px}
.contact-name{font-size:13px;font-weight:600}
.contact-role{font-size:11px;color:var(--accent)}
.contact-row{display:flex;gap:16px;margin-top:6px}
.contact-info{font-size:11px;color:var(--text2)}

/* FUNNEL */
.funnel{display:flex;flex-direction:column;gap:7px}
.funnel-row{display:flex;align-items:center;gap:10px}
.funnel-label{font-size:11px;color:var(--text2);width:80px;text-align:right;flex-shrink:0}
.funnel-track{flex:1;background:var(--bg3);border-radius:3px;height:24px;overflow:hidden}
.funnel-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:9px;font-size:11px;font-weight:700;color:#000;transition:width 0.5s ease}
.funnel-n{font-size:11px;color:var(--text2);width:20px;flex-shrink:0;font-family:'IBM Plex Mono',monospace}

/* SECTION DIVIDER */
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* SCORE BADGE */
.score-badge{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;padding:4px 10px;border-radius:7px}

/* AI CHAT */
.ai-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ai-msgs{padding:16px;max-height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.ai-msg{padding:10px 13px;border-radius:9px;font-size:13px;line-height:1.55;max-width:85%}
.ai-msg.user{background:var(--accent-dim);border:1px solid rgba(0,229,160,0.2);align-self:flex-end;color:var(--text)}
.ai-msg.bot{background:var(--bg2);border:1px solid var(--border);align-self:flex-start}
.ai-msg.bot strong{color:var(--accent)}
.ai-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border);background:var(--bg2)}
.ai-input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 13px;font-size:13px;font-family:inherit;outline:none;resize:none;max-height:100px}
.ai-input:focus{border-color:var(--accent)}
.ai-typing{display:flex;gap:4px;align-items:center;padding:8px}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite}
.ai-dot:nth-child(2){animation-delay:0.2s}
.ai-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,60%,100%{opacity:0.2}30%{opacity:1}}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── PRINT STYLES ── */
@media print {
  body { background: #fff !important; color: #111 !important; margin: 0; }
  .sidebar, .no-print, button.no-print { display: none !important; }
  .main { margin-left: 0 !important; padding: 0 !important; }
  .quote-print-doc { box-shadow: none !important; border: none !important; margin: 0 !important; padding: 20mm !important; max-width: 100% !important; width: 100% !important; border-radius: 0 !important; }
  .quote-print-wrap { background: white !important; }
  @page { margin: 15mm; size: A4 portrait; }
}
`;

function injectCSS() {
  if (document.getElementById("ngcrm-css")) return;
  const el = document.createElement("style");
  el.id = "ngcrm-css";
  el.textContent = CSS;
  document.head.appendChild(el);
}

// ============================================================
// SMALL COMPONENTS
// ============================================================
function Notif({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div className={`notif ${type === "ok" ? "ok" : "err"}`}>{msg}</div>;
}

function StatusBadge({ status }) {
  const c = STATUS_COLORS[status] || STATUS_COLORS.Cold;
  return (
    <span className="badge" style={{ background: c.bg, color: c.text, borderColor: c.border }}>
      <span className="status-dot" style={{ background: c.text }} />
      {status}
    </span>
  );
}

function LeadScore({ score }) {
  const color = score >= 75 ? "#ef4444" : score >= 45 ? "#f59e0b" : "#3b82f6";
  return (
    <div>
      <span className="score-badge" style={{ background: color + "20", color }}>{score}</span>
      <div className="score-bar" style={{ width: 60, marginTop: 4 }}>
        <div className="score-fill" style={{ width: `${score}%`, background: color }} />
      </div>
    </div>
  );
}

function UserBadge({ userId }) {
  const u = USERS.find(x => x.id === userId);
  if (!u) return null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <span className="av av-sm">{u.avatar}</span>
      <span style={{ fontSize: 12, color: "var(--text2)" }}>{u.name.split(" ")[0]}</span>
    </div>
  );
}

// ============================================================
// LOGIN
// ============================================================
function Login({ onLogin }) {
  const [email, setEmail] = useState("");
  const [pw, setPw]       = useState("");
  const [err, setErr]     = useState("");

  const doLogin = () => {
    const u = USERS.find(x => x.email.trim() === email.trim() && x.password === pw.trim());
    if (u) { onLogin(u); }
    else { setErr("อีเมลหรือรหัสผ่านไม่ถูกต้อง — หรือคลิกบัญชีด้านล่างเพื่อทดลองใช้"); }
  };

  const loginAs = (u) => { setErr(""); onLogin(u); };

  // จัดกลุ่มตาม role
  const groups = [
    { label:"🏢 ผู้บริหาร",         roles:[ROLES.EXEC, ROLES.EXEC_ASST],                       color:"#7c3aed" },
    { label:"📊 ผู้จัดการ",          roles:[ROLES.MANAGER],                                     color:"#0ea5e9" },
    { label:"🎯 ทีมขาย",            roles:[ROLES.SALES],                                        color:"#00e5a0" },
    { label:"🛠 ทีมสนับสนุน",       roles:[ROLES.CENTRAL, ROLES.FINANCE],                       color:"#f59e0b" },
    { label:"📚 วิชาการ & Production", roles:[ROLES.ACADEMIC, ROLES.PRODUCTION],               color:"#ec4899" },
  ];

  return (
    <div className="login-page">
      <div className="login-box fade-up" style={{ maxWidth:480, width:"100%" }}>
        <div className="login-logo">NEXTGEN Sale & Support</div>
        <div className="login-tagline">Education Sales Management System</div>

        {/* Email/Password form */}
        {err && <div className="login-err">⚠️ {err}</div>}
        <div className="fg">
          <label className="flabel">อีเมล</label>
          <input className="finput" type="text" value={email}
            onChange={e => setEmail(e.target.value)}
            onKeyDown={e => e.key==="Enter" && doLogin()}
            placeholder="you@nextgen.co.th" autoComplete="off" />
        </div>
        <div className="fg">
          <label className="flabel">รหัสผ่าน</label>
          <input className="finput" type="password" value={pw}
            onChange={e => setPw(e.target.value)}
            onKeyDown={e => e.key==="Enter" && doLogin()}
            placeholder="••••••••" />
        </div>
        <button className="btn btn-accent"
          onClick={doLogin}
          style={{ width:"100%", justifyContent:"center", padding:"10px", marginBottom:20 }}>
          เข้าสู่ระบบ
        </button>

        {/* Quick user switcher */}
        <div style={{ borderTop:"1px solid var(--border)", paddingTop:16 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"var(--accent)", marginBottom:12, textAlign:"center" }}>
            ⚡ ทดลองใช้ — คลิกเพื่อเข้าระบบทันที (รหัส: 1234)
          </div>
          {groups.map(({ label, roles, color }) => {
            const groupUsers = USERS.filter(u => roles.includes(u.role));
            if (!groupUsers.length) return null;
            return (
              <div key={label} style={{ marginBottom:12 }}>
                <div style={{ fontSize:10, fontWeight:700, color, marginBottom:5,
                  textTransform:"uppercase", letterSpacing:"0.8px" }}>{label}</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                  {groupUsers.map(u => {
                    const col = USER_COLORS[u.id] || { bg:color, light:`rgba(0,0,0,0.1)`, label:color };
                    return (
                      <button key={u.id} onClick={() => loginAs(u)}
                        style={{
                          display:"flex", alignItems:"center", gap:6,
                          padding:"6px 12px", borderRadius:20, cursor:"pointer",
                          border:`2px solid ${col.bg}`,
                          background:col.light,
                          transition:"all 0.12s",
                          fontFamily:"inherit",
                        }}
                        onMouseEnter={e => { e.currentTarget.style.transform="scale(1.04)"; e.currentTarget.style.boxShadow=`0 0 0 2px ${col.bg}66`; }}
                        onMouseLeave={e => { e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.boxShadow="none"; }}>
                        <div style={{ width:22, height:22, borderRadius:"50%",
                          background:col.bg, color:"#000", fontSize:8, fontWeight:800,
                          display:"flex", alignItems:"center", justifyContent:"center",
                          flexShrink:0 }}>
                          {u.avatar}
                        </div>
                        <div style={{ textAlign:"left" }}>
                          <div style={{ fontSize:11, fontWeight:700, color:col.label, lineHeight:1.2 }}>
                            {u.name.split(" ")[0]}
                          </div>
                          <div style={{ fontSize:9, color:"var(--text3)", lineHeight:1.2 }}>
                            {ROLE_LABELS[u.role]||u.role}
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SIDEBAR
// ============================================================
function Sidebar({ user, active, setActive, onLogout, onSwitchUser, requests, quoteBadge = 0, salesNotifCount = 0, onNotifClick, coachBadge = 0, rsvpBadge = 0, onRsvpClick, totalNotifCount = 0, calCentralBadge = 0, onCalCentralClick, managerRsvpCount = 0, onManagerNotifClick }) {
  const isSales   = user.role === ROLES.SALES;
  const isManager = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role);
  const isCentral = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(user.role);
  const isFinance = user.role === ROLES.FINANCE;

  // ── คำนวณ badge count ตาม role ──
  const todayStr = new Date().toISOString().split("T")[0];
  const next7 = new Date(); next7.setDate(next7.getDate() + 7);
  const next7Str = next7.toISOString().split("T")[0];

  const reqBadge = (() => {
    if (!requests) return 0;
    if (isManager || isFinance) {
      const pendingApproval = requests.filter(r => ["submitted","manager_review"].includes(r.status)).length;
      // รวม auto-approved ที่ยังไม่รับทราบ
      const autoAck = requests.filter(r =>
        r.autoApproved && r.needsAck &&
        r.requestedBy !== user.id &&
        !(r.ackedBy||[]).includes(user.id)
      ).length;
      return pendingApproval + autoAck;
    }
    if (isCentral)
      return requests.filter(r => r.status === "approved" && !r.assignedTo).length;
    if (isSales)
      return requests.filter(r => r.requestedBy === user.id && r.status === "need_info").length;
    return 0;
  })();

  // ปฏิทิน badge — งานที่จะถึงใน 7 วัน (Admin เห็นของตัวเอง, Manager เห็นทีม)
  const calBadge = (() => {
    if (!requests) return 0;
    const active = requests.filter(r =>
      r.eventDate && r.eventDate >= todayStr && r.eventDate <= next7Str &&
      ["approved","in_progress"].includes(r.status)
    );
    if (isCentral)  return active.filter(r => r.assignedTo === user.id).length;
    if (isManager)  return active.length;
    return 0;
  })();

  const menus = [
    { id: "dashboard",       icon: "📊", label: "Dashboard",               show: true },
    { id: "leads",           icon: "🏫", label: "Leads & โรงเรียน",        show: true,        badge: isSales ? coachBadge : 0 },
    { id: "pipeline",        icon: "🔄", label: "Opportunity Pipeline",     show: true },
    { id: "tasks",           icon: "✅", label: "งาน & นัดหมาย",           show: true,        badge: rsvpBadge },
    { id: "shared_calendar", icon: "🗓", label: "ปฏิทินกลาง",                show: true,        badge: calCentralBadge, onBadgeClick: onCalCentralClick },
    { id: "ai_input",        icon: "🤖", label: "AI บันทึกด้วยการคุย",     show: isSales },
    { id: "team",            icon: "👥", label: "ภาพรวมทีม",               show: isManager,   badge: isManager ? coachBadge : 0 },
    { id: "activity_report", icon: "📅", label: "รายงานกิจกรรม",           show: true },
    { id: "catalog",         icon: "🏷️", label: "สินค้า & ราคา",           show: isManager },
    { id: "settings",        icon: "🎚️", label: "ตั้งค่าส่วนลด",           show: isManager },
    { id: "user_management", icon: "👥", label: "จัดการ Users & Roles",     show: [ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role) },
    { id: "admin_calendar",  icon: "📅", label: "ปฏิทินงาน Admin",         show: isManager || isCentral, badge: calBadge },
    { id: "finance",         icon: "💼", label: "Finance — ใบเสนอราคา",    show: isManager || isFinance || isSales, badge: quoteBadge },
    { id: "requests",        icon: "📋", label: "Requests",                 show: true, badge: reqBadge },
  ].filter(m => m.show);

  return (
    <div className="sidebar">
      <div className="s-brand">
        <div className="s-brand-name">⚡ Nextgen CRM</div>
        <div className="s-brand-sub">v2.0 — Education Sales</div>
      </div>
      <div className="s-section">
        <div className="s-label">เมนู</div>
        {menus.map(m => (
          <div key={m.id} className={`nav-item ${active === m.id ? "active" : ""}`} onClick={() => setActive(m.id)}
            style={{ position: "relative" }}>
            <span className="nav-icon">{m.icon}</span>
            <span style={{ flex: 1 }}>{m.label}</span>
            {m.badge > 0 && (
              <span
                onClick={e => { if(m.onBadgeClick){ e.stopPropagation(); m.onBadgeClick(); } }}
                style={{
                  minWidth: 18, height: 18, borderRadius: 9,
                  background: m.id === "leads" || m.id === "team" ? "#7c3aed" : m.id === "tasks" ? "#f59e0b" : m.id === "shared_calendar" ? "#06b6d4" : "var(--red)",
                  color: "#fff",
                  fontSize: 10, fontWeight: 800,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  padding: "0 5px", flexShrink: 0,
                  animation: "badgePulse 2s infinite",
                  cursor: m.onBadgeClick ? "pointer" : "default",
                }}>{m.badge}</span>
            )}
          </div>
        ))}
      </div>
      <div className="s-user">
        {/* RSVP response bell — Manager/Exec */}
        {isManager && managerRsvpCount > 0 && onManagerNotifClick && (
          <div onClick={onManagerNotifClick} style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            background:"rgba(0,229,160,0.06)", border:"1px solid rgba(0,229,160,0.15)",
            borderRadius:8, padding:"7px 10px", marginBottom:6, cursor:"pointer",
          }}>
            <span style={{ fontSize:12, color:"var(--accent)", fontWeight:700 }}>📬 การตอบรับกิจกรรม</span>
            <span style={{ minWidth:18, height:18, borderRadius:9, background:"var(--accent)", color:"#000",
              fontSize:10, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center",
              padding:"0 5px", animation:"badgePulse 1.5s infinite"
            }}>{managerRsvpCount}</span>
          </div>
        )}
        {/* RSVP bell — Manager/Exec */}
        {isManager && rsvpBadge > 0 && onRsvpClick && (
          <div onClick={onRsvpClick} style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.2)",
            borderRadius:8, padding:"7px 10px", marginBottom:6, cursor:"pointer",
          }}>
            <span style={{ fontSize:12, color:"#f59e0b", fontWeight:700 }}>📅 นัดหมายรอตอบ</span>
            <span style={{ minWidth:18, height:18, borderRadius:9, background:"#f59e0b", color:"#000",
              fontSize:10, fontWeight:800, display:"flex", alignItems:"center", justifyContent:"center",
              padding:"0 5px", animation:"badgePulse 1.5s infinite"
            }}>{rsvpBadge}</span>
          </div>
        )}
        {/* notification bell — เฉพาะ Sales */}
        {isSales && onNotifClick && (
          <div onClick={onNotifClick} style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"8px 12px", marginBottom:4, borderRadius:8, cursor:"pointer",
            background: salesNotifCount>0 ? "rgba(0,229,160,0.08)" : totalNotifCount>0 ? "rgba(255,255,255,0.02)" : "transparent",
            border: salesNotifCount>0 ? "1px solid rgba(0,229,160,0.2)" : totalNotifCount>0 ? "1px solid var(--border)" : "1px solid transparent",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <span style={{ fontSize:16 }}>🔔</span>
              <span style={{ fontSize:12, color: salesNotifCount>0 ? "var(--accent)" : "var(--text3)", fontWeight: salesNotifCount>0 ? 700 : 400 }}>
                การแจ้งเตือน
              </span>
              {/* total (อ่านแล้ว) */}
              {totalNotifCount > 0 && salesNotifCount === 0 && (
                <span style={{ fontSize:9, color:"var(--text3)", fontFamily:"IBM Plex Mono" }}>({totalNotifCount})</span>
              )}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:4 }}>
              {/* unread badge — แดง animate */}
              {salesNotifCount > 0 && (
                <span style={{
                  minWidth:18, height:18, borderRadius:9, background:"#ef4444", color:"#fff",
                  fontSize:10, fontWeight:800, display:"flex", alignItems:"center",
                  justifyContent:"center", padding:"0 5px", animation:"badgePulse 1.5s infinite",
                }}>{salesNotifCount}</span>
              )}
              {/* total indicator สีเทา */}
              {totalNotifCount > 0 && salesNotifCount > 0 && salesNotifCount < totalNotifCount && (
                <span style={{ fontSize:9, color:"var(--text3)", fontFamily:"IBM Plex Mono" }}>/{totalNotifCount}</span>
              )}
            </div>
          </div>
        )}
        {/* ── Quick User Switcher ── */}
        <div style={{ padding:"8px 12px 6px", borderTop:"1px solid var(--border)" }}>
          <div style={{ fontSize:9, color:"var(--text3)", fontWeight:700, marginBottom:5, textTransform:"uppercase", letterSpacing:"0.8px" }}>⚡ สลับผู้ใช้</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
            {USERS.filter(u => u.id !== user.id).map(u => {
              const col = USER_COLORS[u.id] || { bg:"#6b7280", light:"rgba(107,114,128,0.12)", label:"#9ca3af" };
              return (
                <button key={u.id} title={`${u.name} — ${ROLE_LABELS[u.role]||u.role}`}
                  onClick={() => onSwitchUser && onSwitchUser(u)}
                  style={{ width:28, height:28, borderRadius:"50%", border:`2px solid ${col.bg}`,
                    background:col.light, color:col.label, fontSize:8, fontWeight:800,
                    cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                    transition:"all 0.12s", fontFamily:"inherit" }}
                  onMouseEnter={e=>{ e.currentTarget.style.transform="scale(1.18)"; e.currentTarget.style.boxShadow=`0 0 0 2px ${col.bg}55`; }}
                  onMouseLeave={e=>{ e.currentTarget.style.transform="scale(1)"; e.currentTarget.style.boxShadow="none"; }}>
                  {u.avatar}
                </button>
              );
            })}
          </div>
        </div>
        <div className="s-user-row">
          <span className="av av-sm">{user.avatar}</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="s-user-name">{user.name}</div>
            <div className="s-user-role">{ROLE_LABELS[user.role]}{user.zone ? ` · ${user.zone}` : ""}</div>
          </div>
          <button className="s-logout" onClick={onLogout} title="ออก">⏻</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD — clickable everywhere
// ============================================================
function Dashboard({ user, leads, opps, tasks, onViewLead }) {
  const myLeads = [ROLES.EXEC, ROLES.EXEC_ASST, ROLES.MANAGER].includes(user.role) ? leads : leads.filter(l => l.assignedTo === user.id);
  const myOpps = user.role === ROLES.SALES ? opps.filter(o => o.assignedTo === user.id) : opps;
  const isManager2 = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(user.role);
  const myTasks = [ROLES.SALES, ROLES.ACADEMIC, ROLES.PRODUCTION, ROLES.CENTRAL, ROLES.FINANCE].includes(user.role)
    ? tasks.filter(t => t.assignedTo === user.id || (t.joinedBy||[]).includes(user.id) || (t.acknowledgedBy||[]).includes(user.id))
    : isManager2
      ? tasks.filter(t => t.assignedTo === user.id || (t.joinedBy||[]).includes(user.id) || (t.acknowledgedBy||[]).includes(user.id) || t.visibleToAll)
      : tasks;

  const totalPipeline = myOpps.filter(o => !["Won", "Lost"].includes(o.stage)).reduce((s, o) => s + o.value, 0);
  const wonValue = myOpps.filter(o => o.stage === "Won").reduce((s, o) => s + o.value, 0);
  const hotLeads = myLeads.filter(l => l.status === "Hot").length;
  const overdueT = myTasks.filter(t => !t.completed && new Date(t.dueDate) < new Date()).length;

  const statusData = LEAD_STATUS.map(s => ({ s, n: myLeads.filter(l => l.status === s).length, leads: myLeads.filter(l => l.status === s) }));
  const maxN = Math.max(...statusData.map(d => d.n), 1);

  const recentActs = myLeads.flatMap(l => (l.activities || []).map(a => ({ ...a, schoolName: l.schoolName, lead: l }))).sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);

  const actIcon = { โทร: "📞", ประชุม: "🤝", Demo: "💻", ส่งเอกสาร: "📄", ติดตาม: "🔔" };

  const [funnelFilter, setFunnelFilter] = useState(null); // status string or null
  const funnelLeads = funnelFilter ? myLeads.filter(l => l.status === funnelFilter) : [];

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">สวัสดี, {user.name.split(" ")[0]} 👋</div>
          <div className="ph-sub">ภาพรวมการขาย · {new Date().toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}</div>
        </div>
      </div>

      <div className="stats">
        {[
          { label: "Pipeline (Active)", val: fmtCurrency(totalPipeline), sub: `${myOpps.filter(o => !["Won", "Lost"].includes(o.stage)).length} deals`, color: "#00e5a0" },
          { label: "ปิดการขาย (Won)", val: fmtCurrency(wonValue), sub: `${myOpps.filter(o => o.stage === "Won").length} deals`, color: "#10b981" },
          { label: "Hot Leads", val: hotLeads, sub: `จาก ${myLeads.length} Leads ทั้งหมด`, color: "#ef4444" },
          { label: "งานเกินกำหนด", val: overdueT, sub: "ต้องดำเนินการด่วน", color: overdueT > 0 ? "#f59e0b" : "#3b82f6" },
        ].map((s, i) => (
          <div className="stat" key={i}>
            <div className="stat-accent" style={{ background: s.color }} />
            <div className="stat-val" style={{ color: s.color }}>{s.val}</div>
            <div className="stat-lbl">{s.label}</div>
            <div className="stat-sub" style={{ color: "var(--text3)" }}>{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="g2">
        {/* Funnel — คลิกแถวเพื่อดู leads ในสถานะนั้น */}
        <div className="card card-p">
          <div className="card-head">
            <span className="card-title">Lead Status Funnel</span>
            {funnelFilter && <button className="btn btn-xs btn-ghost" onClick={() => setFunnelFilter(null)}>✕ ปิด</button>}
          </div>
          <div className="funnel">
            {statusData.map(d => (
              <div key={d.s}>
                <div className="funnel-row" style={{ cursor: d.n > 0 ? "pointer" : "default" }}
                  onClick={() => d.n > 0 && setFunnelFilter(funnelFilter === d.s ? null : d.s)}>
                  <div className="funnel-label" style={{ color: funnelFilter === d.s ? STATUS_COLORS[d.s]?.text : "var(--text2)", fontWeight: funnelFilter === d.s ? 700 : 400 }}>{d.s}</div>
                  <div className="funnel-track">
                    <div className="funnel-fill" style={{ width: `${(d.n / maxN) * 100}%`, background: STATUS_COLORS[d.s]?.text || "#666", opacity: funnelFilter && funnelFilter !== d.s ? 0.3 : 1 }}>
                      {d.n > 0 && d.n}
                    </div>
                  </div>
                  <div className="funnel-n">{d.n}</div>
                </div>
                {/* Expanded leads list */}
                {funnelFilter === d.s && funnelLeads.length > 0 && (
                  <div style={{ background: "var(--bg3)", borderRadius: 8, padding: "8px 10px", marginBottom: 6, marginTop: 2 }}>
                    {funnelLeads.map(l => (
                      <div key={l.id} onClick={() => onViewLead(l)}
                        style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 4px", cursor: "pointer", borderBottom: "1px solid var(--border)", borderRadius: 5 }}
                        onMouseEnter={e => e.currentTarget.style.background = "var(--bg2)"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <div>
                          <div style={{ fontSize: 12, fontWeight: 600 }}>{l.schoolName}</div>
                          <div style={{ fontSize: 10, color: "var(--text3)" }}>📍 {l.province} · Score: {l.leadScore}</div>
                        </div>
                        <UserBadge userId={l.assignedTo} />
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>

        {/* Activities — คลิกเพื่อดูโรงเรียน */}
        <div className="card card-p">
          <div className="card-head"><span className="card-title">กิจกรรมล่าสุด</span></div>
          {recentActs.length === 0 ? <div className="empty"><div className="empty-ico">📭</div><div className="empty-txt">ยังไม่มีกิจกรรม</div></div> : (
            recentActs.map(a => (
              <div className="act-item" key={a.id} style={{ cursor: "pointer" }} onClick={() => onViewLead(a.lead)}
                onMouseEnter={e => e.currentTarget.style.background = "var(--bg3)"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <div className="act-icon">{actIcon[a.type] || "📌"}</div>
                <div className="act-body">
                  <div className="act-sum">{a.summary}</div>
                  <div className="act-meta" style={{ color: "var(--accent)" }}>🏫 {a.schoolName} · {fmtDate(a.date)}</div>
                  {a.nextStep && <div className="act-next">→ {a.nextStep}</div>}
                </div>
                <span style={{ fontSize: 10, color: "var(--text3)" }}>ดู ›</span>
              </div>
            ))
          )}
        </div>
      </div>

      {/* Tasks — คลิกดูโรงเรียนที่เกี่ยวข้อง */}
      <div className="card card-p" style={{ marginTop: 16 }}>
        <div className="card-head"><span className="card-title">งานที่ต้องทำ (ใกล้กำหนด)</span></div>
        {myTasks.filter(t => !t.completed).slice(0, 5).map(t => {
          const dd = daysDiff(t.dueDate);
          const overdue = dd < 0;
          const relLead = leads.find(l => l.id === t.leadId);
          return (
            <div className="task-item" key={t.id} style={{ cursor: relLead ? "pointer" : "default", borderRadius: 6 }}
              onClick={() => relLead && onViewLead(relLead)}
              onMouseEnter={e => relLead && (e.currentTarget.style.background = "var(--bg3)")}
              onMouseLeave={e => (e.currentTarget.style.background = "transparent")}>
              <div className="task-check" />
              <div className="task-body">
                <div className="task-title">{t.title}</div>
                <div className="task-meta">
                  <span className={`task-date ${overdue ? "overdue" : ""}`}>
                    {overdue ? `⚠️ เกิน ${Math.abs(dd)} วัน` : dd === 0 ? "⚡ วันนี้" : `📅 อีก ${dd} วัน`}
                  </span>
                  <span className="task-pri" style={{ background: PRIORITY_COLOR[t.priority] + "25", color: PRIORITY_COLOR[t.priority] }}>{t.priority}</span>
                  {relLead && <span style={{ fontSize: 10, color: "var(--accent)" }}>🏫 {relLead.schoolName}</span>}
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <UserBadge userId={t.assignedTo} />
                {relLead && <span style={{ fontSize: 10, color: "var(--text3)" }}>ดู ›</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
// COACHING THREAD — Persistent per Lead (stored in lead.coaching[])
// Structure: { id, authorId, role, text, ts, readBy:[], actionItems:[], parentId }
// ============================================================
function CoachingThread({ lead, currentUser, onUpdate, notify, markSeen }) {
  const isCoach = [ROLES.MANAGER, ROLES.EXEC].includes(currentUser.role);
  const isSales = currentUser.role === ROLES.SALES;
  const threads = lead.coaching || [];

  const [text, setText] = useState("");
  const [replyTo, setReplyTo] = useState(null);
  const [addingAction, setAddingAction] = useState(null);
  const [exportMode, setExportMode] = useState(false);
  const chatEndRef = useRef(null);
  const actionInputRef = useRef(null); // uncontrolled — ป้องกัน re-render reset

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [threads.length]);

  // Mark all unread as read when any user opens coaching tab
  useEffect(() => {
    const unread = threads.filter(t =>
      t.authorId !== currentUser.id &&
      !(t.readBy || []).includes(currentUser.id)
    );
    if (unread.length === 0) return;
    // mark readBy ใน lead data
    onUpdate({
      ...lead,
      coaching: threads.map(t => ({
        ...t,
        readBy: [...new Set([...(t.readBy || []), currentUser.id])],
      })),
    });
    // mark seenNotifs สำหรับ Sales
    if (markSeen) {
      markSeen(unread.map(t => `coach:${t.id}:unread`));
    }
  }, []);

  const unreadCount = threads.filter(t => !(t.readBy || []).includes(currentUser.id) && t.authorId !== currentUser.id).length;

  const send = () => {
    if (!text.trim()) return;
    const msg = {
      id: Date.now(),
      authorId: currentUser.id,
      role: currentUser.role,
      text: text.trim(),
      ts: new Date().toISOString(),
      readBy: [currentUser.id],
      actionItems: [],
      parentId: replyTo?.id || null,
    };
    onUpdate({ ...lead, coaching: [...threads, msg] });
    setText("");
    setReplyTo(null);
    // แจ้ง toast สำหรับผู้ส่ง
    if (notify) {
      const recipientRole = isCoach ? "Sales" : "Manager";
      notify(`💬 ส่งข้อความถึง ${recipientRole} แล้ว`, "ok");
    }
  };

  const addActionItem = (threadId) => {
    if (!actionInputRef.current?.value?.trim()) return;
    const action = { id: Date.now(), text: actionInputRef.current.value.trim(), done: false, createdAt: new Date().toISOString().split("T")[0] };
    onUpdate({
      ...lead,
      coaching: threads.map(t => t.id === threadId ? { ...t, actionItems: [...(t.actionItems || []), action] } : t),
    });
    if (actionInputRef.current) actionInputRef.current.value = "";
    setAddingAction(null);
  };

  const toggleAction = (threadId, actionId) => {
    onUpdate({
      ...lead,
      coaching: threads.map(t => t.id === threadId
        ? { ...t, actionItems: t.actionItems.map(a => a.id === actionId ? { ...a, done: !a.done } : a) }
        : t),
    });
  };

  const deleteMsg = async (id) => {
    onUpdate({ ...lead, coaching: threads.filter(t => t.id !== id) });
  };

  const roleColor = { executive: "#f59e0b", sales_manager: "#8b5cf6", sales_rep: "#00e5a0", central_support: "#06b6d4", finance_admin: "#10b981" };
  const roleIcon = { executive: "👑", sales_manager: "📊", sales_rep: "🎯", central_support: "🛠", finance_admin: "💼" };

  // Group: top-level + replies
  const topLevel = threads.filter(t => !t.parentId);
  const getReplies = (id) => threads.filter(t => t.parentId === id);

  const [exportModal, setExportModal] = useState(false);
  const [exportText_, setExportText_] = useState("");

  const exportText = () => {
    const lines = [`=== Coaching Notes: ${lead.schoolName} ===`, `Sales: ${USERS.find(u=>u.id===lead.assignedTo)?.name || "-"}`, `Export: ${new Date().toLocaleDateString("th-TH")}`, "─".repeat(40), ""];
    topLevel.forEach(t => {
      const author = USERS.find(u => u.id === t.authorId);
      lines.push(`[${new Date(t.ts).toLocaleDateString("th-TH")}] ${author?.name || "-"} (${ROLE_LABELS[t.role] || t.role})`);
      lines.push(t.text);
      if (t.actionItems?.length) {
        lines.push("Action Items:");
        t.actionItems.forEach(a => lines.push(`  [${a.done ? "✓" : " "}] ${a.text}${a.dueDate ? " · " + fmtDate(a.dueDate) : ""}`));
      }
      getReplies(t.id).forEach(r => {
        const ra = USERS.find(u => u.id === r.authorId);
        lines.push(`  ↳ ${ra?.name || "-"}: ${r.text}`);
      });
      lines.push("");
    });
    const content = lines.join("\n");
    // Try clipboard first, fallback to modal
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(content)
        .then(() => alert("✅ คัดลอก Coaching Notes ไปยัง Clipboard แล้วครับ"))
        .catch(() => { setExportText_(content); setExportModal(true); });
    } else {
      setExportText_(content);
      setExportModal(true);
    }
  };

  const MsgBubble = ({ t, isReply = false }) => {
    const author = USERS.find(u => u.id === t.authorId);
    const isMe = t.authorId === currentUser.id;
    const isCoachMsg = [ROLES.MANAGER, ROLES.EXEC].includes(t.role);
    const readByAll = (t.readBy || []).length > 1;
    const replies = getReplies(t.id);

    return (
      <div style={{ marginBottom: isReply ? 6 : 16, marginLeft: isReply ? 36 : 0 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexDirection: isMe ? "row-reverse" : "row" }}>
          {/* Avatar */}
          <div style={{
            width: 30, height: 30, borderRadius: "50%", flexShrink: 0,
            background: roleColor[t.role] + "30", border: `2px solid ${roleColor[t.role]}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: 13,
          }}>{roleIcon[t.role]}</div>

          <div style={{ maxWidth: "75%", minWidth: 0 }}>
            {/* Header */}
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 3, flexDirection: isMe ? "row-reverse" : "row" }}>
              <span style={{ fontSize: 11, fontWeight: 700, color: roleColor[t.role] }}>{author?.name?.split(" ")[0] || "-"}</span>
              <span style={{ fontSize: 9, color: "var(--text3)" }}>{ROLE_LABELS[t.role]}</span>
              <span style={{ fontSize: 9, color: "var(--text3)" }}>{new Date(t.ts).toLocaleString("th-TH", { day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" })}</span>
              {isMe && isCoachMsg && (
                <span style={{ fontSize: 9, color: readByAll ? "var(--accent)" : "var(--text3)" }}>
                  {readByAll ? "✓✓ อ่านแล้ว" : "✓ ส่งแล้ว"}
                </span>
              )}
            </div>

            {/* Quote reply */}
            {t.parentId && (() => {
              const parent = threads.find(p => p.id === t.parentId);
              const parentAuthor = USERS.find(u => u.id === parent?.authorId);
              return parent ? (
                <div style={{ fontSize: 10, color: "var(--text3)", borderLeft: "3px solid var(--border)", paddingLeft: 7, marginBottom: 4, fontStyle: "italic" }}>
                  {parentAuthor?.name?.split(" ")[0]}: {parent.text.substring(0, 50)}{parent.text.length > 50 ? "..." : ""}
                </div>
              ) : null;
            })()}

            {/* Bubble */}
            <div style={{
              padding: "9px 13px", borderRadius: isMe ? "14px 4px 14px 14px" : "4px 14px 14px 14px",
              background: isMe
                ? isCoachMsg ? "rgba(139,92,246,0.2)" : "rgba(0,229,160,0.15)"
                : "var(--bg3)",
              border: `1px solid ${isMe ? (isCoachMsg ? "rgba(139,92,246,0.3)" : "rgba(0,229,160,0.2)") : "var(--border)"}`,
              fontSize: 13, lineHeight: 1.6, color: "var(--text)",
            }}>
              {isCoachMsg && !isMe && (
                <div style={{ fontSize: 9, fontWeight: 700, color: "#8b5cf6", textTransform: "uppercase", letterSpacing: "0.6px", marginBottom: 4 }}>
                  💡 คำแนะนำจากหัวหน้า
                </div>
              )}
              {t.text}
            </div>

            {/* Action Items */}
            {(t.actionItems || []).length > 0 && (
              <div style={{ marginTop: 6, background: "rgba(0,229,160,0.06)", border: "1px solid rgba(0,229,160,0.15)", borderRadius: 8, padding: "8px 11px" }}>
                <div style={{ fontSize: 10, color: "var(--accent)", fontWeight: 700, marginBottom: 5 }}>⚡ Action Items</div>
                {t.actionItems.map(a => (
                  <div key={a.id} style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 4 }}>
                    <div onClick={() => (isCoach || isSales) && toggleAction(t.id, a.id)}
                      style={{
                        width: 14, height: 14, borderRadius: 3, border: `2px solid ${a.done ? "var(--accent)" : "var(--border)"}`,
                        background: a.done ? "var(--accent)" : "transparent", cursor: "pointer", flexShrink: 0,
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>
                      {a.done && <span style={{ fontSize: 8, color: "#000", fontWeight: 700 }}>✓</span>}
                    </div>
                    <span style={{ fontSize: 11, color: a.done ? "var(--text3)" : "var(--text2)", textDecoration: a.done ? "line-through" : "none" }}>{a.text}</span>
                    <span style={{ fontSize: 9, color: "var(--text3)", marginLeft: "auto" }}>{a.createdAt}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Actions row */}
            {!isReply && (
              <div style={{ display: "flex", gap: 8, marginTop: 5, flexDirection: isMe ? "row-reverse" : "row" }}>
                <button className="btn btn-xs btn-ghost" style={{ fontSize: 9, padding: "2px 7px" }}
                  onClick={() => setReplyTo({ id: t.id, authorName: author?.name?.split(" ")[0] })}>↩ ตอบ</button>
                {isCoach && (
                  <button className="btn btn-xs btn-ghost" style={{ fontSize: 9, padding: "2px 7px" }}
                    onClick={() => setAddingAction(addingAction === t.id ? null : t.id)}>⚡ Action Item</button>
                )}
                {isMe && (
                  <button className="btn btn-xs btn-ghost" style={{ fontSize: 9, padding: "2px 7px", color: "var(--red)" }}
                    onClick={() => deleteMsg(t.id)}>🗑</button>
                )}
              </div>
            )}

            {/* Add action form — uncontrolled input ป้องกัน re-render reset */}
            {addingAction === t.id && (
              <div style={{ marginTop: 6, display: "flex", gap: 6 }}>
                <input
                  ref={actionInputRef}
                  className="finput"
                  defaultValue=""
                  autoFocus
                  onKeyDown={e => e.key === "Enter" && addActionItem(t.id)}
                  placeholder="ระบุ action ที่ต้องทำ..."
                  style={{ fontSize: 11, padding: "5px 9px" }}
                />
                <button className="btn btn-accent btn-xs" onClick={() => addActionItem(t.id)}>+ เพิ่ม</button>
                <button className="btn btn-ghost btn-xs" onClick={() => setAddingAction(null)}>✕</button>
              </div>
            )}
          </div>
        </div>

        {/* Replies */}
        {replies.map(r => <MsgBubble key={r.id} t={r} isReply={true} />)}
      </div>
    );
  };

  const allActions = threads.flatMap(t => (t.actionItems || []).map(a => ({ ...a, school: lead.schoolName, threadId: t.id })));
  const pendingActions = allActions.filter(a => !a.done);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      {/* Header bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <span style={{ fontSize: 12, fontWeight: 700 }}>💬 Coaching Thread</span>
          {unreadCount > 0 && (
            <span style={{ background: "var(--red)", color: "#fff", fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 10 }}>
              {unreadCount} ใหม่
            </span>
          )}
          {pendingActions.length > 0 && (
            <span style={{ background: "rgba(0,229,160,0.2)", color: "var(--accent)", fontSize: 9, fontWeight: 700, padding: "1px 7px", borderRadius: 10, border: "1px solid rgba(0,229,160,0.3)" }}>
              ⚡ {pendingActions.length} Action รอดำเนินการ
            </span>
          )}
        </div>
        <button className="btn btn-xs btn-ghost" onClick={exportText}>📥 Export</button>
      </div>

      {/* Thread */}
      <div style={{ flex: 1, overflowY: "auto", minHeight: 220, maxHeight: 380, marginBottom: 10 }}>
        {threads.length === 0 ? (
          <div className="empty" style={{ padding: "40px 0" }}>
            <div className="empty-ico">💬</div>
            <div className="empty-txt">
              {isCoach ? "เริ่มให้คำแนะนำสำหรับโรงเรียนนี้ได้เลยครับ" : "ยังไม่มีคำแนะนำจากหัวหน้า"}
            </div>
          </div>
        ) : (
          topLevel.map(t => <MsgBubble key={t.id} t={t} />)
        )}
        <div ref={chatEndRef} />
      </div>

      {/* Reply context */}
      {replyTo && (
        <div style={{ background: "var(--bg3)", borderRadius: 7, padding: "5px 10px", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: "3px solid var(--accent)" }}>
          <span style={{ fontSize: 11, color: "var(--text2)" }}>↩ ตอบ {replyTo.authorName}</span>
          <button onClick={() => setReplyTo(null)} style={{ background: "none", border: "none", color: "var(--text3)", cursor: "pointer", fontSize: 13 }}>✕</button>
        </div>
      )}

      {/* Input */}
      <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
        <div style={{ flex: 1 }}>
          {isCoach && (
            <div style={{ fontSize: 9, color: "#8b5cf6", fontWeight: 700, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.5px" }}>
              💡 ส่งคำแนะนำในฐานะ {ROLE_LABELS[currentUser.role]}
            </div>
          )}
          <textarea
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }}
            placeholder={isCoach
              ? "พิมพ์คำแนะนำ strategy, วิธีรับมือ, หรือ action ที่ต้องทำ... (Enter เพื่อส่ง)"
              : "ตอบกลับหรือ update สถานะให้หัวหน้าทราบ... (Enter เพื่อส่ง)"
            }
            style={{
              width: "100%", background: "var(--bg3)", border: `1px solid ${isCoach ? "rgba(139,92,246,0.3)" : "var(--border)"}`,
              borderRadius: 9, padding: "9px 12px", fontSize: 12, color: "var(--text)",
              resize: "none", outline: "none", lineHeight: 1.5, boxSizing: "border-box",
            }}
            rows={2}
          />
        </div>
        <button className="btn btn-accent btn-sm" onClick={send} disabled={!text.trim()}>ส่ง</button>
      </div>

      {/* Pending Action Items summary */}
      {pendingActions.length > 0 && (
        <div style={{ marginTop: 10, background: "rgba(0,229,160,0.06)", border: "1px solid rgba(0,229,160,0.15)", borderRadius: 9, padding: "10px 13px" }}>
          <div style={{ fontSize: 10, color: "var(--accent)", fontWeight: 700, marginBottom: 7 }}>⚡ Action Items ที่ยังรอดำเนินการ ({pendingActions.length})</div>
          {pendingActions.map(a => (
            <div key={a.id} style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 5 }}>
              <div onClick={() => toggleAction(a.threadId, a.id)}
                style={{ width: 14, height: 14, borderRadius: 3, border: "2px solid var(--border)", background: "transparent", cursor: "pointer", flexShrink: 0 }} />
              <span style={{ fontSize: 11, color: "var(--text2)" }}>{a.text}</span>
              <span style={{ fontSize: 9, color: "var(--text3)", marginLeft: "auto" }}>{a.createdAt}</span>
            </div>
          ))}
        </div>
      )}

      {/* Export preview modal */}
      {exportModal && (
        <div className="overlay" onClick={() => setExportModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 520 }}>
            <div className="modal-hd">
              <div className="modal-title">📥 Export Coaching Notes</div>
              <button className="modal-close" onClick={() => setExportModal(false)}>✕</button>
            </div>
            <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8 }}>
              คลิกในกล่องแล้วกด Ctrl+A → Ctrl+C เพื่อคัดลอกทั้งหมด
            </div>
            <textarea
              readOnly
              value={exportText_}
              onClick={e => e.target.select()}
              style={{
                width: "100%", height: 280, background: "var(--bg3)", border: "1px solid var(--border)",
                borderRadius: 8, padding: 12, fontSize: 11, color: "var(--text2)",
                fontFamily: "IBM Plex Mono, monospace", resize: "none", boxSizing: "border-box", lineHeight: 1.6,
              }}
            />
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={() => setExportModal(false)}>ปิด</button>
              <button className="btn btn-accent" onClick={() => {
                navigator.clipboard?.writeText(exportText_)
                  .then(() => { setExportModal(false); })
                  .catch(() => {});
              }}>📋 คัดลอก</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// LEAD DETAIL MODAL — 4 Tabs: ข้อมูล | ผู้ติดต่อ | กิจกรรม | คำแนะนำ
// ============================================================
function LeadDetailModal({ lead, onClose, onUpdate, currentUser, readOnly = false, onEdit, catalog = [], specialOffers = [], notify, markSeen, defaultTab }) {
  const [tab, setTab] = useState(defaultTab || lead?._defaultTab || "info");
  const [newAct, setNewAct] = useState({ type: "โทร", summary: "", nextStep: "", date: new Date().toISOString().split("T")[0] });
  const [addingAct, setAddingAct] = useState(false);
  const [editStatus, setEditStatus] = useState(lead.status);
  const [localLead, setLocalLead] = useState(lead);

  const isCoach = [ROLES.MANAGER, ROLES.EXEC].includes(currentUser.role);
  const coachingCount = (localLead.coaching || []).length;
  const unread = (localLead.coaching || []).filter(t => !(t.readBy || []).includes(currentUser.id) && t.authorId !== currentUser.id).length;

  const handleUpdate = (updated) => {
    setLocalLead(updated);
    onUpdate(updated);
  };

  // เปลี่ยนสถานะ + บันทึก activity log อัตโนมัติ
  const handleStatusChange = (newStatus) => {
    if (newStatus === localLead.status) return;
    const oldStatus = localLead.status;
    const logEntry = {
      id: Date.now(),
      type: "เปลี่ยนสถานะ",
      summary: `เปลี่ยนสถานะจาก "${oldStatus}" → "${newStatus}"`,
      nextStep: "",
      date: new Date().toISOString().split("T")[0],
      by: currentUser.id,
      isStatusChange: true,
    };
    const updated = {
      ...localLead,
      status: newStatus,
      activities: [...(localLead.activities || []), logEntry],
      updatedAt: new Date().toISOString().split("T")[0],
    };
    setEditStatus(newStatus);
    handleUpdate(updated);
  };

  const addActivity = () => {
    if (!newAct.summary) return;
    const updated = {
      ...localLead,
      activities: [...(localLead.activities || []), { ...newAct, id: Date.now(), by: currentUser.id }],
      status: editStatus,
      updatedAt: new Date().toISOString().split("T")[0],
    };
    handleUpdate(updated);
    setNewAct({ type: "โทร", summary: "", nextStep: "", date: new Date().toISOString().split("T")[0] });
    setAddingAct(false);
  };

  const acts = [...(localLead.activities || [])].reverse();
  const actIcon = { โทร: "📞", ประชุม: "🤝", Demo: "💻", ส่งเอกสาร: "📄", ติดตาม: "🔔", "Line/Chat": "💬" };

  // ── Tab badge: แสดงสิ่งที่ "ยังรอ" แทนจำนวนทั้งหมด ──
  const contacts = localLead.contacts || [];
  const activities = localLead.activities || [];
  const quotes = localLead.quotes || [];

  // ผู้ติดต่อ: กี่คนที่ยังไม่เคยติดต่อ (ไม่ปรากฏใน activities)
  const contactedIds = new Set(activities.map(a => a.contactId).filter(Boolean));
  const unreachedContacts = contacts.filter(c => !contactedIds.has(c.id)).length;

  // กิจกรรม: Next Step ที่ยังค้างอยู่ (activity ล่าสุดที่มี nextStep)
  const pendingNextSteps = activities.filter(a => a.nextStep && !a.nextStepDone).length;

  // ใบเสนอราคา: ที่ยังรออนุมัติ/ออกใบ (ไม่นับ issued/rejected)
  const pendingQuotes = quotes.filter(q => !["issued","rejected","draft"].includes(q.approvalStatus)).length;
  const draftQuotes   = quotes.filter(q => q.approvalStatus === "draft" || !q.approvalStatus).length;
  const totalPendingQ = pendingQuotes; // รอ Manager/Exec/Finance

  const tabDef = [
    { id: "info",       label: "ข้อมูล" },
    {
      id: "contacts",
      label: unreachedContacts > 0
        ? `ผู้ติดต่อ 🔴${unreachedContacts}`
        : `ผู้ติดต่อ${contacts.length > 0 ? ` (${contacts.length})` : ""}`,
    },
    {
      id: "activities",
      label: pendingNextSteps > 0
        ? `กิจกรรม ⏳${pendingNextSteps}`
        : `กิจกรรม${activities.length > 0 ? ` (${activities.length})` : ""}`,
    },
    {
      id: "quotes",
      label: totalPendingQ > 0
        ? `📄 ใบเสนอราคา 🟡${totalPendingQ}`
        : `📄 ใบเสนอราคา${quotes.length > 0 ? ` (${quotes.length})` : ""}`,
    },
    {
      id: "coaching",
      label: unread > 0
        ? `💬 คำแนะนำ 🔴${unread}`
        : `💬 คำแนะนำ${coachingCount > 0 ? ` (${coachingCount})` : ""}`,
    },
  ];

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 760 }}>
        <div className="modal-hd">
          <div>
            <div className="modal-title">🏫 {localLead.schoolName}</div>
            <div style={{ display: "flex", gap: 8, marginTop: 6, flexWrap: "wrap", alignItems: "center" }}>
              <StatusBadge status={localLead.status} />
              <span style={{ fontSize: 11, color: "var(--text3)" }}>{localLead.schoolType} · {localLead.province}{localLead.district ? ` · ${localLead.district}` : ""}</span>
              <LeadScore score={localLead.leadScore} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            {onEdit && (
              <button
                className="btn btn-sm"
                style={{ background: "var(--accent-dim)", color: "var(--accent)", borderColor: "rgba(0,229,160,0.3)", fontWeight: 700, whiteSpace: "nowrap" }}
                onClick={() => { onClose(); onEdit(localLead); }}
              >✏️ แก้ไข</button>
            )}
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
        </div>

        <div className="tabs" style={{ marginBottom: 16 }}>
          {tabDef.map(t => (
            <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}
              style={t.id === "coaching" && unread > 0 ? { color: "var(--red)" } : {}}>
              {t.label}
            </button>
          ))}
        </div>

        {tab === "info" && (
          <div className="g2">
            <div>
              <div className="sec-title">ข้อมูลโรงเรียน</div>
              {[
                ["ประเภท", localLead.schoolType],
                ["ภาค", localLead.zone || "-"],
                ["จังหวัด", localLead.province],
                ["อำเภอ", localLead.district || "-"],
                ["ตำบล", localLead.subdistrict || "-"],
                ["จำนวนนักเรียน", localLead.studentCount ? `${fmt(localLead.studentCount)} คน` : "-"],
                ["งบประมาณ", localLead.budget ? fmtCurrency(localLead.budget) : "ยังไม่ทราบ"],
                ["ช่องทางที่มา", localLead.source],
                ["ผลิตภัณฑ์ที่สนใจ", localLead.products?.join(", ") || "-"],
              ].map(([k, v]) => (
                <div className="detail-field" key={k}>
                  <div className="detail-field-label">{k}</div>
                  <div className="detail-field-value">{v}</div>
                </div>
              ))}
              <div className="detail-field">
                <div className="detail-field-label">หมายเหตุ</div>
                <div className="detail-field-value" style={{ color: "var(--text2)" }}>{localLead.notes || "-"}</div>
              </div>
            </div>
            <div>
              <div className="sec-title">{readOnly && !isCoach ? "สถานะปัจจุบัน" : "เปลี่ยนสถานะ"}</div>
              <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8 }}>
                {!(readOnly && !isCoach) ? "กดเลือกสถานะเพื่อบันทึกทันที — จะบันทึก activity log อัตโนมัติ" : ""}
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                {LEAD_STATUS.map(s => (
                  <button key={s} className="btn btn-xs" style={{
                    background: editStatus === s ? STATUS_COLORS[s]?.bg : "transparent",
                    color: editStatus === s ? STATUS_COLORS[s]?.text : "var(--text3)",
                    borderColor: editStatus === s ? STATUS_COLORS[s]?.border : "var(--border)",
                    fontWeight: editStatus === s ? 700 : 400,
                    cursor: readOnly && !isCoach ? "default" : "pointer",
                    opacity: readOnly && !isCoach && editStatus !== s ? 0.4 : 1,
                    transform: editStatus === s ? "scale(1.05)" : "scale(1)",
                    transition: "all 0.15s",
                  }} onClick={() => !(readOnly && !isCoach) && handleStatusChange(s)}>
                    {s} {editStatus === s ? "✓" : ""}
                  </button>
                ))}
              </div>
              {readOnly && !isCoach && (
                <div style={{ fontSize: 11, color: "var(--text3)", padding: "6px 10px", background: "var(--bg3)", borderRadius: 7, marginBottom: 8 }}>
                  👁️ ดูอย่างเดียว
                </div>
              )}
              <div className="sec-title" style={{ marginTop: 16 }}>มอบหมาย</div>
              <UserBadge userId={localLead.assignedTo} />
              <div className="sec-title" style={{ marginTop: 16 }}>วันที่สร้าง</div>
              <div style={{ fontSize: 12, color: "var(--text2)" }}>{fmtDate(localLead.createdAt)}</div>
              <div style={{ fontSize: 12, color: "var(--text2)", marginTop: 4 }}>อัปเดตล่าสุด: {fmtDate(localLead.updatedAt)}</div>
            </div>
          </div>
        )}

        {tab === "contacts" && (
          <div>
            {(localLead.contacts || []).length === 0
              ? <div className="empty"><div className="empty-ico">👤</div><div className="empty-txt">ยังไม่มีผู้ติดต่อ</div></div>
              : localLead.contacts.map(c => (
                <div className="contact-card" key={c.id}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    <div><div className="contact-name">{c.name}</div><div className="contact-role">{c.role}</div></div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 10, color: "var(--text3)" }}>อิทธิพล: <span style={{ color: "var(--text2)" }}>{c.influence}</span></div>
                      <div style={{ fontSize: 10, color: "var(--text3)" }}>ตัดสินใจ: <span style={{ color: "var(--text2)" }}>{c.decision}</span></div>
                    </div>
                  </div>
                  <div className="contact-row">
                    {c.phone && <span className="contact-info">📞 {c.phone}</span>}
                    {c.line && <span className="contact-info">💬 LINE: {c.line}</span>}
                    {c.email && <span className="contact-info">✉️ {c.email}</span>}
                  </div>
                </div>
              ))
            }
          </div>
        )}

        {tab === "activities" && (
          <div>
            {!readOnly && addingAct ? (
              <div style={{ background: "var(--bg3)", borderRadius: 10, padding: 16, marginBottom: 14 }}>
                <div className="sec-title">บันทึกกิจกรรมใหม่</div>
                <div className="frow">
                  <div className="fg">
                    <label className="flabel">ประเภท</label>
                    <select className="fselect" value={newAct.type} onChange={e => setNewAct(a => ({ ...a, type: e.target.value }))}>
                      {["โทร", "ประชุม", "Demo", "ส่งเอกสาร", "ติดตาม", "Line/Chat"].map(t => <option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="fg">
                    <label className="flabel">วันที่</label>
                    <input className="finput" type="date" value={newAct.date} onChange={e => setNewAct(a => ({ ...a, date: e.target.value }))} />
                  </div>
                </div>
                <div className="fg">
                  <label className="flabel">สรุปการคุย *</label>
                  <textarea className="ftextarea" value={newAct.summary} onChange={e => setNewAct(a => ({ ...a, summary: e.target.value }))} placeholder="สรุปสิ่งที่คุยกัน, ผลลัพธ์..." />
                </div>
                <div className="fg">
                  <label className="flabel">Next Step</label>
                  <input className="finput" value={newAct.nextStep} onChange={e => setNewAct(a => ({ ...a, nextStep: e.target.value }))} placeholder="สิ่งที่ต้องทำต่อ..." />
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <button className="btn btn-accent btn-sm" onClick={addActivity}>✓ บันทึก</button>
                  <button className="btn btn-ghost btn-sm" onClick={() => setAddingAct(false)}>ยกเลิก</button>
                </div>
              </div>
            ) : (
              !readOnly && <button className="btn btn-ghost btn-sm" style={{ marginBottom: 14 }} onClick={() => setAddingAct(true)}>+ บันทึกกิจกรรม</button>
            )}
            {acts.length === 0
              ? <div className="empty"><div className="empty-ico">📝</div><div className="empty-txt">ยังไม่มีกิจกรรม</div></div>
              : acts.map(a => {
                const byUser = USERS.find(u => u.id === a.by);
                const isStatusChange = a.isStatusChange;
                return (
                  <div className="act-item" key={a.id} style={isStatusChange ? {
                    background: "rgba(139,92,246,0.06)",
                    borderLeft: "3px solid #8b5cf6",
                    paddingLeft: 14,
                    borderRadius: 8,
                    marginBottom: 8,
                  } : {}}>
                    <div className="act-icon">{isStatusChange ? "🔄" : (actIcon[a.type] || "📌")}</div>
                    <div className="act-body">
                      <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 3, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: isStatusChange ? "#8b5cf6" : "var(--accent)" }}>
                          {isStatusChange ? "เปลี่ยนสถานะ" : a.type}
                        </span>
                        <span style={{ fontSize: 10, color: "var(--text3)" }}>{fmtDate(a.date)}</span>
                        {byUser && <span style={{ fontSize: 10, color: "var(--text3)" }}>โดย {byUser.name.split(" ")[0]}</span>}
                      </div>
                      <div className="act-sum" style={isStatusChange ? { color: "#a78bfa" } : {}}>{a.summary}</div>
                      {a.nextStep && <div className="act-next">→ {a.nextStep}</div>}
                    </div>
                  </div>
                );
              })
            }
          </div>
        )}

        {tab === "quotes" && (
          <QuoteBuilder
            lead={localLead}
            currentUser={currentUser}
            catalog={catalog}
            specialOffers={specialOffers}
            onUpdate={handleUpdate}
          />
        )}

        {tab === "coaching" && (
          <CoachingThread lead={localLead} currentUser={currentUser} onUpdate={handleUpdate} notify={notify} markSeen={markSeen} />
        )}
      </div>
    </div>
  );
}

// ============================================================
// LEAD FORM MODAL — ฟอร์มครบทุกฟิลด์ + Geo Autocomplete + Maps Parser
// ============================================================
function LeadFormModal({ lead, onSave, onClose, currentUser }) {
  const isEdit = !!lead?.id;
  const [f, setF] = useState(lead || {
    schoolName: "", schoolType: SCHOOL_TYPES[0],
    zone: "", province: "", district: "", subdistrict: "",
    lat: null, lng: null, googleMapsUrl: "",
    status: "Cold", leadScore: 10, source: LEAD_SOURCES[0],
    assignedTo: currentUser.id,
    studentCount: "", budget: "",
    products: [], contacts: [], activities: [], notes: "",
    createdAt: new Date().toISOString().split("T")[0],
    updatedAt: new Date().toISOString().split("T")[0],
  });
  const set = (k, v) => setF(x => ({ ...x, [k]: v }));
  const toggleProduct = (p) => setF(x => ({ ...x, products: x.products.includes(p) ? x.products.filter(q => q !== p) : [...x.products, p] }));

  // Geo state
  const [provSearch, setProvSearch] = useState(f.province || "");
  const [showProvDrop, setShowProvDrop] = useState(false);
  const [distSearch, setDistSearch] = useState(f.district || "");
  const [showDistDrop, setShowDistDrop] = useState(false);
  const [mapsLoading, setMapsLoading] = useState(false);
  const [mapsInput, setMapsInput] = useState("");
  const [geoMode, setGeoMode] = useState("search"); // search | dropdown | maps | manual

  // Contact state
  const [contacts, setContacts] = useState(f.contacts || []);
  const [addingContact, setAddingContact] = useState(false);
  const [newContact, setNewContact] = useState({ name: "", role: CONTACT_ROLES_LIST[0], phone: "", line: "", email: "", influence: "ปานกลาง", decision: "ปานกลาง" });

  // Appointment state — นัดหมาย
  const APPT_TYPES = ["โทรศัพท์","ประชุมออนไลน์","Demo ออนไลน์","Demo ที่โรงเรียน","ประชุมที่โรงเรียน","ส่งเอกสาร","อื่นๆ"];
  const MEET_PLATFORMS = ["Microsoft Teams","Zoom","Google Meet","LINE","อื่นๆ"];
  const APPT_REMINDER_OPTIONS = ["7 วัน","3 วัน","1 วัน","2 ชั่วโมง","30 นาที"];
  // TIME slots ทุก 30 นาที 00:00–23:30
  const TIME_SLOTS = Array.from({length:48},(_,i)=>{const h=Math.floor(i/2).toString().padStart(2,"0");const m=i%2===0?"00":"30";return `${h}:${m}`;});
  // Duration presets + custom
  const DURATION_PRESETS = ["30","45","60","90","120","180"];

  const [appts, setAppts] = useState([]);
  const [addingAppt, setAddingAppt] = useState(false);
  const [durationCustom, setDurationCustom] = useState(false);
  const [newAppt, setNewAppt] = useState({
    title: "", type: "Demo ออนไลน์",
    date: "", time: "09:00", duration: "60",
    platform: "Microsoft Teams", meetingLink: "",
    locationLink: "",
    description: "", priority: "สูง",
    reminders: ["1 วัน"],
    needSupport: false, supportNote: "",
  });
  const toggleApptReminder = (r) => setNewAppt(a => ({
    ...a, reminders: a.reminders.includes(r) ? a.reminders.filter(x => x !== r) : [...a.reminders, r]
  }));
  const isOnline  = (type) => ["ออนไลน์","LINE"].some(k => type.includes(k));
  const isOnsite  = (type) => ["โรงเรียน","ที่โรงเรียน","ประชุมที่"].some(k => type.includes(k));
  const addAppt = () => {
    if (!newAppt.title || !newAppt.date) return;
    const appt = { ...newAppt, id: Date.now() };
    setAppts(prev => [...prev, appt]);
    setNewAppt({ title:"", type:"Demo ออนไลน์", date:"", time:"09:00", duration:"60", platform:"Microsoft Teams", meetingLink:"", locationLink:"", description:"", priority:"สูง", reminders:["1 วัน"], needSupport:false, supportNote:"" });
    setDurationCustom(false);
    setAddingAppt(false);
  };
  const removeAppt = (id) => setAppts(prev => prev.filter(a => a.id !== id));

  const filteredProvs = PROVINCES.filter(p => p.includes(provSearch) || provSearch === "").slice(0, 12);
  const districts = getDistricts(f.province);
  const filteredDists = districts.filter(d => d.includes(distSearch) || distSearch === "").slice(0, 10);

  const selectProvince = (p) => {
    const zone = getZoneFromProvince(p);
    setF(x => ({ ...x, province: p, zone, district: "", subdistrict: "" }));
    setProvSearch(p);
    setDistSearch("");
    setShowProvDrop(false);
  };

  const selectDistrict = (d) => {
    set("district", d);
    setDistSearch(d);
    setShowDistDrop(false);
  };

  // Parse Google Maps URL/coordinates
  const parseMapsUrl = async () => {
    if (!mapsInput.trim()) return;
    setMapsLoading(true);
    try {
      // Extract lat/lng from Google Maps URL patterns
      let lat = null, lng = null, placeName = "";

      // Pattern: @lat,lng
      const atMatch = mapsInput.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (atMatch) { lat = parseFloat(atMatch[1]); lng = parseFloat(atMatch[2]); }

      // Pattern: q=lat,lng or place/lat,lng
      const qMatch = mapsInput.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);
      if (qMatch) { lat = parseFloat(qMatch[1]); lng = parseFloat(qMatch[2]); }

      // Extract place name from URL
      const placeMatch = mapsInput.match(/place\/([^/@]+)/);
      if (placeMatch) placeName = decodeURIComponent(placeMatch[1]).replace(/\+/g, " ");

      // Extract school name from URL if looks like school
      const schoolFromUrl = placeName.includes("โรงเรียน") ? placeName : "";

      if (lat && lng) {
        set("lat", lat);
        set("lng", lng);
        if (schoolFromUrl && !f.schoolName) set("schoolName", schoolFromUrl);

        // Use Claude API to reverse geocode and extract Thai province/district
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 300,
            messages: [{
              role: "user",
              content: `จาก URL Google Maps นี้: "${mapsInput}"
และพิกัด lat: ${lat}, lng: ${lng}

กรุณา extract ข้อมูลที่อยู่ในประเทศไทยเป็น JSON เท่านั้น ไม่มีข้อความอื่น:
{
  "province": "ชื่อจังหวัดภาษาไทย",
  "district": "ชื่ออำเภอภาษาไทย",
  "subdistrict": "ชื่อตำบลภาษาไทย",
  "schoolName": "ชื่อโรงเรียนถ้ามีในลิงก์"
}

ถ้าไม่แน่ใจให้ใส่ "" แต่ต้องตอบเป็น JSON เท่านั้น`
            }]
          })
        });
        const data = await res.json();
        const txt = data.content?.[0]?.text || "{}";
        const clean = txt.replace(/```json|```/g, "").trim();
        try {
          const geo = JSON.parse(clean);
          if (geo.province) {
            const zone = getZoneFromProvince(geo.province);
            setF(x => ({
              ...x,
              province: geo.province || x.province,
              zone: zone || x.zone,
              district: geo.district || x.district,
              subdistrict: geo.subdistrict || x.subdistrict,
              schoolName: geo.schoolName || x.schoolName,
              lat, lng,
            }));
            setProvSearch(geo.province || "");
            setDistSearch(geo.district || "");
          }
        } catch (e) { /* JSON parse failed, still have lat/lng */ }
      } else {
        // No coords found — try to parse as text location
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 200,
            messages: [{
              role: "user",
              content: `จาก URL/ข้อความ Google Maps: "${mapsInput}"
ระบุที่อยู่ในไทยเป็น JSON เท่านั้น:
{"province":"...","district":"...","subdistrict":"...","schoolName":""}`
            }]
          })
        });
        const data = await res.json();
        const txt = data.content?.[0]?.text || "{}";
        const clean = txt.replace(/```json|```/g, "").trim();
        try {
          const geo = JSON.parse(clean);
          if (geo.province) {
            const zone = getZoneFromProvince(geo.province);
            setF(x => ({ ...x, province: geo.province, zone, district: geo.district || "", subdistrict: geo.subdistrict || "", schoolName: geo.schoolName || x.schoolName }));
            setProvSearch(geo.province);
            setDistSearch(geo.district || "");
          }
        } catch (e) {}
      }
    } catch (e) { console.error(e); }
    setMapsLoading(false);
    setMapsInput("");
  };

  const addContact = () => {
    if (!newContact.name) return;
    const c = { ...newContact, id: Date.now() };
    setContacts(cs => [...cs, c]);
    setF(x => ({ ...x, contacts: [...(x.contacts || []), c] }));
    setNewContact({ name: "", role: CONTACT_ROLES_LIST[0], phone: "", line: "", email: "", influence: "ปานกลาง", decision: "ปานกลาง" });
    setAddingContact(false);
  };

  const removeContact = (id) => {
    setContacts(cs => cs.filter(c => c.id !== id));
    setF(x => ({ ...x, contacts: x.contacts.filter(c => c.id !== id) }));
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 700 }}>
        <div className="modal-hd">
          <div className="modal-title">{isEdit ? "✏️ แก้ไขข้อมูล Lead" : "🏫 เพิ่ม Lead ใหม่"}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* ── ข้อมูลโรงเรียน ── */}
        <div className="sec-title">ข้อมูลโรงเรียน</div>

        <div className="frow">
          <div className="fg">
            <label className="flabel">ชื่อโรงเรียน *</label>
            <input className="finput" value={f.schoolName} onChange={e => set("schoolName", e.target.value)} placeholder="โรงเรียน..." />
          </div>
          <div className="fg">
            <label className="flabel">ประเภทโรงเรียน</label>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {SCHOOL_TYPES.map(t => (
                <button key={t} className="btn btn-xs" onClick={() => set("schoolType", t)} style={{
                  background: f.schoolType === t ? "var(--accent-dim)" : "transparent",
                  color: f.schoolType === t ? "var(--accent)" : "var(--text3)",
                  borderColor: f.schoolType === t ? "rgba(0,229,160,0.3)" : "var(--border)",
                  fontWeight: f.schoolType === t ? 700 : 400,
                }}>{t}</button>
              ))}
            </div>
          </div>
        </div>

        {/* ── ที่อยู่ / Location ── */}
        <div className="sec-title">ที่อยู่ / Location</div>

        {/* Mode selector */}
        <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}>
          {[
            ["search", "🔍 Autocomplete"],
            ["dropdown", "📋 Dropdown ลำดับชั้น"],
            ["maps", "🗺️ วาง Google Maps Link"],
            ["manual", "✏️ พิมพ์เอง"],
          ].map(([m, l]) => (
            <button key={m} className="btn btn-xs" onClick={() => setGeoMode(m)} style={{
              background: geoMode === m ? "var(--accent-dim)" : "transparent",
              color: geoMode === m ? "var(--accent)" : "var(--text3)",
              borderColor: geoMode === m ? "rgba(0,229,160,0.3)" : "var(--border)",
              fontWeight: geoMode === m ? 700 : 400,
            }}>{l}</button>
          ))}
        </div>

        {/* Mode: Autocomplete */}
        {geoMode === "search" && (
          <div className="frow">
            <div className="fg" style={{ position: "relative" }}>
              <label className="flabel">จังหวัด</label>
              <input className="finput" value={provSearch}
                onChange={e => { setProvSearch(e.target.value); setShowProvDrop(true); }}
                onFocus={() => setShowProvDrop(true)}
                placeholder="พิมพ์ชื่อจังหวัด..." autoComplete="off" />
              {showProvDrop && provSearch && filteredProvs.length > 0 && (
                <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 8, zIndex: 100, maxHeight: 180, overflowY: "auto", boxShadow: "0 8px 24px rgba(0,0,0,0.4)" }}>
                  {filteredProvs.map(p => (
                    <div key={p} onMouseDown={() => selectProvince(p)}
                      style={{ padding: "8px 12px", cursor: "pointer", fontSize: 13 }}
                      onMouseEnter={e => e.currentTarget.style.background = "var(--bg3)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
