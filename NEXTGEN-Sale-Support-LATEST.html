                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 4 }}>
                      {(p.tiers || []).map((t, i) => (
                        <div key={i} style={{ fontSize: 10, background: "var(--bg3)", border: "1px solid var(--border)", borderRadius: 7, padding: "3px 10px", fontFamily: "IBM Plex Mono" }}>
                          <span style={{ color: "var(--text3)" }}>{t.minStudents}–{t.maxStudents >= 9999 ? "∞" : fmt(t.maxStudents)} คน: </span>
                          <span style={{ color: "var(--accent)", fontWeight: 700 }}>{fmtCurrency(t.pricePerUnit)}</span>
                          <span style={{ color: "var(--text3)" }}>/{p.unit}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ fontSize: 11, color: "var(--text3)" }}>
                      Floor: <span style={{ color: "#f87171", fontFamily: "IBM Plex Mono", fontWeight: 700 }}>{fmtCurrency(p.floorPrice)}</span>/{p.unit}
                      {p.expiryDate && <span style={{ marginLeft: 12 }}>วันหมดอายุ: {fmtDate(p.expiryDate)}</span>}
                    </div>
                  </div>
                  {canEdit && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0 }}>
                      <button className="btn btn-xs" style={{ background: "var(--accent-dim)", color: "var(--accent)", borderColor: "rgba(0,229,160,0.3)" }} onClick={() => { setEditProduct(p); setShowProductForm(true); }}>✏️ แก้ไข</button>
                      <button className="btn btn-xs btn-ghost" onClick={() => setCatalog(c => c.map(x => x.id === p.id ? { ...x, active: !x.active, changelog: [...(x.changelog||[]), { date: today, by: currentUser.name, note: x.active ? "ปิดใช้งาน" : "เปิดใช้งาน" }] } : x))}>
                        {p.active ? "🔒 ปิด" : "✓ เปิด"}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── OFFERS TAB ── */}
      {tab === "offers" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {specialOffers.length === 0 && <div className="card"><div className="empty" style={{ padding: 48 }}><div className="empty-ico">🎉</div><div className="empty-txt">ยังไม่มีโปรโมชัน</div></div></div>}
          {specialOffers.map(o => {
            const isActive = o.active && o.dateFrom <= today && today <= o.dateTo;
            const isPast = o.dateTo < today;
            const isFuture = o.dateFrom > today;
            return (
              <div key={o.id} className="card card-p" style={{ borderColor: isActive ? "rgba(0,229,160,0.4)" : undefined, opacity: isPast ? 0.6 : 1 }}>
                <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 4 }}>
                      <span style={{ fontWeight: 700, fontSize: 15 }}>{o.name}</span>
                      {isActive  && <span style={{ fontSize: 10, color: "var(--accent)", background: "rgba(0,229,160,0.1)", padding: "2px 8px", borderRadius: 10, fontWeight: 700 }}>🟢 ใช้งานอยู่</span>}
                      {isFuture  && <span style={{ fontSize: 10, color: "#f59e0b", background: "rgba(245,158,11,0.1)", padding: "2px 8px", borderRadius: 10 }}>⏳ กำลังจะมาถึง</span>}
                      {isPast    && <span style={{ fontSize: 10, color: "var(--text3)", background: "var(--bg3)", padding: "2px 8px", borderRadius: 10 }}>หมดอายุ</span>}
                      {!o.active && <span style={{ fontSize: 10, color: "var(--red)" }}>ปิดการใช้งาน</span>}
                    </div>
                    <div style={{ fontSize: 12, color: "var(--text2)", marginBottom: 6 }}>{o.description}</div>
                    <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8, fontFamily: "IBM Plex Mono" }}>📅 {fmtDate(o.dateFrom)} → {fmtDate(o.dateTo)}</div>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {(o.productOverrides || []).map(x => {
                        const prod = catalog.find(p => p.id === x.productId);
                        return prod ? (
                          <div key={x.productId} style={{ fontSize: 10, background: "rgba(0,229,160,0.07)", border: "1px solid rgba(0,229,160,0.2)", borderRadius: 7, padding: "3px 10px" }}>
                            <span style={{ fontWeight: 700, color: "var(--accent)" }}>{prod.name}</span>
                            <span style={{ color: "var(--text2)" }}> ลดเพิ่ม {x.extraDiscountPct}%</span>
                            {x.note && <span style={{ color: "var(--text3)" }}> — {x.note}</span>}
                          </div>
                        ) : null;
                      })}
                    </div>
                  </div>
                  {canEdit && (
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, flexShrink: 0 }}>
                      <button className="btn btn-xs" style={{ background: "var(--accent-dim)", color: "var(--accent)", borderColor: "rgba(0,229,160,0.3)" }} onClick={() => { setEditOffer(o); setShowOfferForm(true); }}>✏️ แก้ไข</button>
                      <button className="btn btn-xs btn-ghost" onClick={() => setSpecialOffers(s => s.map(x => x.id === o.id ? { ...x, active: !x.active } : x))}>{o.active ? "🔒 ปิด" : "✓ เปิด"}</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── CHANGELOG TAB ── */}
      {tab === "changelog" && (
        <div className="card card-p">
          {allChangelog.length === 0 && <div className="empty" style={{ padding: 32 }}><div className="empty-ico">📋</div><div className="empty-txt">ยังไม่มีประวัติ</div></div>}
          {allChangelog.map((c, i) => (
            <div key={i} style={{ display: "flex", gap: 12, padding: "9px 0", borderBottom: "1px solid var(--border)", alignItems: "flex-start" }}>
              <div style={{ fontSize: 10, color: "var(--text3)", fontFamily: "IBM Plex Mono", flexShrink: 0, width: 80 }}>{fmtDate(c.date)}</div>
              <div style={{ flex: 1 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: c.kind === "สินค้า" ? "var(--accent)" : "#f59e0b" }}>[{c.kind}] {c.itemName}</span>
                <span style={{ fontSize: 11, color: "var(--text2)", marginLeft: 8 }}>{c.note}</span>
              </div>
              <div style={{ fontSize: 10, color: "var(--text3)", flexShrink: 0 }}>{c.by}</div>
            </div>
          ))}
        </div>
      )}

      {showProductForm && <ProductFormModal product={editProduct} onSave={saveProduct} onClose={() => { setShowProductForm(false); setEditProduct(null); }} currentUser={currentUser} />}
      {showOfferForm   && <OfferFormModal   offer={editOffer}     catalog={catalog}  onSave={saveOffer}   onClose={() => { setShowOfferForm(false); setEditOffer(null); }}   currentUser={currentUser} />}
    </div>
  );
}

// ============================================================
// PRODUCT FORM MODAL
// ============================================================
function ProductFormModal({ product, onSave, onClose, currentUser }) {
  const isEdit = !!product?.id;

  const toStr = (v) => String(v ?? "");
  const toStrTiers = (tiers) => (tiers || []).map(t => ({
    minStudents: toStr(t.minStudents),
    maxStudents: toStr(t.maxStudents),
    pricePerUnit: toStr(t.pricePerUnit),
  }));
  const toStrBilling = (opts) => (opts || []).map(b => ({
    id: b.id, label: b.label, pricePerUnit: toStr(b.pricePerUnit),
  }));

  const defTier    = [{ minStudents: "1", maxStudents: "9999", pricePerUnit: "0" }];
  const defBilling = [];

  const [f, setF] = useState(product
    ? { ...product, tiers: toStrTiers(product.tiers), billingOptions: toStrBilling(product.billingOptions) }
    : { name: "", category: "Software", description: "", unit: "คน/ปี",
        pricePerUnit: "0", floorPrice: "0", expiryDate: "", active: true,
        defaultBilling: "", tiers: defTier, billingOptions: defBilling, changelog: [] }
  );
  const [changeNote, setChangeNote] = useState("");
  const set = (k, v) => setF(x => ({ ...x, [k]: v }));

  const hasBilling = f.billingOptions && f.billingOptions.length > 0;

  // Tier helpers
  const updTier    = (i, k, v) => setF(x => { const t=[...x.tiers]; t[i]={...t[i],[k]:v}; return {...x,tiers:t}; });
  const addTier    = () => setF(x => ({ ...x, tiers: [...x.tiers, { minStudents: "", maxStudents: "9999", pricePerUnit: "" }] }));
  const delTier    = (i) => setF(x => ({ ...x, tiers: x.tiers.filter((_, j) => j !== i) }));

  // Billing helpers
  const updBilling = (i, v) => setF(x => { const opts=[...x.billingOptions]; opts[i]={...opts[i],pricePerUnit:v}; return {...x,billingOptions:opts}; });

  const handleSave = () => {
    const numTiers = f.tiers.map(t => ({
      minStudents: Number(t.minStudents) || 0,
      maxStudents: Number(t.maxStudents) || 9999,
      pricePerUnit: Number(t.pricePerUnit) || 0,
    }));

    // billingOptions: parse price
    const numBilling = (f.billingOptions || []).map(b => ({
      ...b, pricePerUnit: Number(b.pricePerUnit) || 0,
    }));

    // ─── Single source of truth ───────────────────────────────────────────
    // top-level pricePerUnit = ราคาของ defaultBilling (หรือ billing แรก)
    // tiers (ราคาแตกต่างตามจำนวน) ใช้เป็น override ของ yearly เท่านั้น
    // ถ้ามี billing → sync tiers[].pricePerUnit ให้ตรงกับ defaultBilling price ด้วย (กรณี tier เดียว)
    const defaultBillingObj = numBilling.length > 0
      ? (numBilling.find(b => b.id === f.defaultBilling) || numBilling[0])
      : null;
    const topPrice = defaultBillingObj?.pricePerUnit ?? (Number(f.pricePerUnit) || 0);

    // ถ้า tier เดียว + มี billing → sync tier price ให้ = default billing price
    const syncedTiers = (numTiers.length === 1 && numBilling.length > 0)
      ? [{ ...numTiers[0], pricePerUnit: topPrice }]
      : numTiers;

    onSave({
      ...f,
      tiers: syncedTiers,
      billingOptions: numBilling,
      pricePerUnit: topPrice,
      floorPrice: Number(f.floorPrice) || 0,
      defaultBilling: f.defaultBilling || numBilling[0]?.id || "",
      _changeNote: changeNote || (isEdit ? "แก้ไขข้อมูล" : "เพิ่มสินค้าใหม่"),
    });
  };

  const canSave = f.name && (!isEdit || changeNote.trim());

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 660 }}>
        <div className="modal-hd">
          <div className="modal-title">{isEdit ? "✏️ แก้ไขสินค้า" : "➕ เพิ่มสินค้าใหม่"}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        {/* ── ข้อมูลพื้นฐาน ── */}
        <div className="frow">
          <div className="fg"><label className="flabel">ชื่อสินค้า *</label>
            <input className="finput" value={f.name} onChange={e => set("name", e.target.value)} placeholder="ชื่อสินค้า" /></div>
          <div className="fg">
            <label className="flabel">หมวดหมู่</label>
            <select className="fselect" value={f.category} onChange={e => set("category", e.target.value)}>
              {["Software","Hardware","Hardware+Software","Service","Bundle"].map(c => <option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div className="fg"><label className="flabel">รายละเอียด</label>
          <textarea className="ftextarea" value={f.description} onChange={e => set("description", e.target.value)} rows={2} placeholder="คุณสมบัติ รายละเอียด..." /></div>
        <div className="frow">
          <div className="fg"><label className="flabel">หน่วย</label>
            <input className="finput" value={f.unit} onChange={e => set("unit", e.target.value)} placeholder="คน/ปี, ชุด..." /></div>
          <div className="fg"><label className="flabel">Floor Price (บาท)</label>
            <input className="finput" type="number" value={f.floorPrice} onChange={e => set("floorPrice", e.target.value)} /></div>
          <div className="fg"><label className="flabel">วันหมดอายุ</label>
            <input className="finput" type="date" value={f.expiryDate} onChange={e => set("expiryDate", e.target.value)} /></div>
        </div>

        {/* ── ราคาตาม Billing (รายปี / รายเทอม / ฯลฯ) ── */}
        {hasBilling && (
          <>
            <div className="sec-title" style={{ marginTop: 8 }}>
              💳 ราคาตามรูปแบบชำระเงิน
              <span style={{ fontSize: 10, color: "var(--text3)", fontWeight: 400, marginLeft: 8 }}>
                แก้ราคาตรงนี้เพื่อให้ใบเสนอราคาใช้ราคาที่อัปเดต
              </span>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
              {f.billingOptions.map((b, i) => {
                const isDefault = b.id === f.defaultBilling || (i === 0 && !f.defaultBilling);
                return (
                  <div key={b.id} style={{
                    display: "flex", alignItems: "center", gap: 10,
                    padding: "10px 14px", borderRadius: 8,
                    background: isDefault ? "rgba(0,229,160,0.06)" : "var(--bg3)",
                    border: `1px solid ${isDefault ? "rgba(0,229,160,0.3)" : "var(--border)"}`,
                  }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: isDefault ? "var(--accent)" : "var(--text)" }}>
                        {b.label}
                        {isDefault && <span style={{ fontSize: 10, marginLeft: 6, opacity: 0.7 }}>(default)</span>}
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <label style={{ fontSize: 11, color: "var(--text3)" }}>ราคา / {f.unit || "หน่วย"}</label>
                      <div style={{ position: "relative" }}>
                        <input className="finput" type="text" inputMode="numeric"
                          value={b.pricePerUnit}
                          onChange={e => updBilling(i, e.target.value)}
                          style={{
                            width: 110, padding: "6px 36px 6px 10px",
                            fontSize: 15, fontWeight: 700, fontFamily: "IBM Plex Mono",
                            textAlign: "right",
                            borderColor: isDefault ? "rgba(0,229,160,0.4)" : undefined,
                            color: isDefault ? "var(--accent)" : "var(--text)",
                          }} />
                        <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: "var(--text3)", pointerEvents: "none" }}>฿/{f.unit?.split("/")[0] || "หน่วย"}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ── Tier Pricing (ตามจำนวนนักเรียน) ── */}
        <div className="sec-title" style={{ marginTop: hasBilling ? 4 : 8 }}>
          {hasBilling ? "📊 Tier Pricing (ตามจำนวนนักเรียน)" : "💰 ราคาสินค้า (Tier Pricing)"}
          <span style={{ fontSize: 10, color: "var(--text3)", fontWeight: 400, marginLeft: 8 }}>
            {hasBilling
              ? "ถ้ามี tier เดียว ระบบจะ sync ราคาอัตโนมัติจาก billing default"
              : "ใส่ 1 row = ราคาเดียว · หลาย row = ราคาต่างกันตามจำนวน"}
          </span>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 28px", gap: 6, fontSize: 10, color: "var(--text3)", padding: "0 2px", marginBottom: 4 }}>
          <span>นักเรียนตั้งแต่ (คน)</span><span>ถึง (9999=ไม่จำกัด)</span><span>ราคา / {f.unit || "หน่วย"}</span><span></span>
        </div>
        {f.tiers.map((t, i) => {
          const autoSync = hasBilling && f.tiers.length === 1;
          return (
            <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 28px", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input className="finput" type="text" inputMode="numeric" value={t.minStudents}
                onChange={e => updTier(i, "minStudents", e.target.value)} placeholder="1" style={{ padding: "6px 10px" }} />
              <input className="finput" type="text" inputMode="numeric" value={t.maxStudents}
                onChange={e => updTier(i, "maxStudents", e.target.value)} placeholder="9999" style={{ padding: "6px 10px" }} />
              <div style={{ position: "relative" }}>
                <input className="finput" type="text" inputMode="numeric" value={t.pricePerUnit}
                  onChange={e => updTier(i, "pricePerUnit", e.target.value)}
                  disabled={autoSync}
                  placeholder="0"
                  title={autoSync ? "ซิงค์อัตโนมัติจาก billing default" : ""}
                  style={{ padding: "6px 10px", width: "100%", opacity: autoSync ? 0.5 : 1, cursor: autoSync ? "not-allowed" : "text" }} />
                {autoSync && (
                  <span style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", fontSize: 10, color: "var(--text3)" }}>🔗</span>
                )}
              </div>
              {f.tiers.length > 1
                ? <button className="btn btn-xs btn-ghost" style={{ color: "var(--red)" }} onClick={() => delTier(i)}>🗑</button>
                : <span />}
            </div>
          );
        })}
        <button className="btn btn-ghost btn-xs" onClick={addTier} style={{ marginBottom: 14 }}>+ เพิ่ม Tier</button>

        {/* ── Change reason (edit only) ── */}
        {isEdit && (
          <div className="fg">
            <label className="flabel">
              เหตุผลการแก้ไข *
              {!changeNote && <span style={{ color: "var(--red)", fontSize: 10, marginLeft: 6 }}>← กรอกก่อนจึงจะบันทึกได้</span>}
            </label>
            <input className="finput" value={changeNote} onChange={e => setChangeNote(e.target.value)}
              placeholder="เช่น ปรับราคาตามต้นทุน Q2 2025"
              style={{ borderColor: !changeNote ? "rgba(239,68,68,0.5)" : undefined }} />
          </div>
        )}

        <div className="modal-ft">
          <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-accent" onClick={handleSave} disabled={!canSave}
            style={{ opacity: canSave ? 1 : 0.45 }}>
            {isEdit ? "✓ บันทึกการแก้ไข" : "✓ เพิ่มสินค้า"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// SPECIAL OFFER FORM MODAL
// ============================================================
function OfferFormModal({ offer, catalog, onSave, onClose }) {
  const isEdit = !!offer?.id;
  const [f, setF] = useState(offer || { name: "", description: "", dateFrom: "", dateTo: "", active: true, productOverrides: [], changelog: [] });
  const [changeNote, setChangeNote] = useState("");
  const set = (k, v) => setF(x => ({ ...x, [k]: v }));
  const toggleProd = (pid) => setF(x => {
    const has = x.productOverrides.some(o => o.productId === pid);
    return has ? { ...x, productOverrides: x.productOverrides.filter(o => o.productId !== pid) }
                : { ...x, productOverrides: [...x.productOverrides, { productId: pid, extraDiscountPct: 0, note: "" }] };
  });
  const setOv = (pid, k, v) => setF(x => ({ ...x, productOverrides: x.productOverrides.map(o => o.productId === pid ? { ...o, [k]: k === "extraDiscountPct" ? Number(v) : v } : o) }));

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{ maxWidth: 600 }}>
        <div className="modal-hd">
          <div className="modal-title">{isEdit ? "✏️ แก้ไขโปรโมชัน" : "🎉 เพิ่มโปรโมชันใหม่"}</div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="frow">
          <div className="fg" style={{ flex: 2 }}><label className="flabel">ชื่องาน/โปรโมชัน *</label><input className="finput" value={f.name} onChange={e => set("name", e.target.value)} placeholder="เช่น EDUCA 2025, Back to School..." /></div>
        </div>
        <div className="fg"><label className="flabel">รายละเอียด</label><input className="finput" value={f.description} onChange={e => set("description", e.target.value)} placeholder="รายละเอียดงาน/โปรโมชัน" /></div>
        <div className="frow">
          <div className="fg"><label className="flabel">วันเริ่ม *</label><input className="finput" type="date" value={f.dateFrom} onChange={e => set("dateFrom", e.target.value)} /></div>
          <div className="fg"><label className="flabel">วันสิ้นสุด *</label><input className="finput" type="date" value={f.dateTo} onChange={e => set("dateTo", e.target.value)} /></div>
        </div>
        <div className="sec-title" style={{ marginTop: 8 }}>สินค้าที่เข้าร่วม</div>
        <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 8 }}>ส่วนลดเพิ่มเติมจากราคา Tier ปกติในช่วงวันที่กำหนด</div>
        {catalog.filter(p => p.active).map(p => {
          const ov = f.productOverrides.find(o => o.productId === p.id);
          return (
            <div key={p.id} style={{ background: ov ? "rgba(0,229,160,0.05)" : "transparent", border: `1px solid ${ov ? "rgba(0,229,160,0.25)" : "var(--border)"}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: ov ? 8 : 0 }}>
                <div onClick={() => toggleProd(p.id)} style={{ width: 16, height: 16, borderRadius: 4, border: `2px solid ${ov ? "var(--accent)" : "var(--border)"}`, background: ov ? "var(--accent)" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  {ov && <span style={{ fontSize: 9, fontWeight: 900, color: "#000" }}>✓</span>}
                </div>
                <span style={{ fontWeight: 600, fontSize: 13 }}>{p.name}</span>
                <span style={{ fontSize: 10, color: "var(--text3)" }}>{p.category}</span>
              </div>
              {ov && (
                <div className="frow" style={{ marginLeft: 26 }}>
                  <div className="fg"><label className="flabel">ส่วนลดเพิ่ม (%)</label><input className="finput" type="number" min="0" max="50" value={ov.extraDiscountPct} onChange={e => setOv(p.id, "extraDiscountPct", e.target.value)} /></div>
                  <div className="fg" style={{ flex: 3 }}><label className="flabel">หมายเหตุ</label><input className="finput" value={ov.note} onChange={e => setOv(p.id, "note", e.target.value)} placeholder="เช่น โปรงาน EDUCA" /></div>
                </div>
              )}
            </div>
          );
        })}
        {isEdit && <div className="fg" style={{ marginTop: 10 }}><label className="flabel">เหตุผลการแก้ไข *</label><input className="finput" value={changeNote} onChange={e => setChangeNote(e.target.value)} placeholder="เหตุผล" /></div>}
        <div className="modal-ft">
          <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
          <button className="btn btn-accent" onClick={() => onSave({ ...f, _changeNote: changeNote || (isEdit ? "แก้ไขโปรโมชัน" : "เพิ่มโปรโมชันใหม่") })} disabled={!f.name || !f.dateFrom || !f.dateTo || (isEdit && !changeNote)}>
            {isEdit ? "✓ บันทึก" : "✓ สร้างโปรโมชัน"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// QUOTE BUILDER — Tab ใน LeadDetailModal
// ============================================================
function QuoteBuilder({ lead, currentUser, catalog, specialOffers, onUpdate }) {
  const isFinance   = currentUser.role === ROLES.FINANCE;
  const isManager   = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isExec      = [ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isSales     = currentUser.role === ROLES.SALES;
  const isCentral   = [ROLES.CENTRAL, ROLES.ACADEMIC, ROLES.PRODUCTION].includes(currentUser.role);
  const canCreate   = isSales || isManager;
  // myLimit: ถ้ามี per-user override ใช้ก่อน, ไม่มีใช้ role limit
  const roleLimit   = DISCOUNT_LIMITS[currentUser.role]?.max ?? 10;
  const myLimit     = (currentUser.role === ROLES.SALES && PER_USER_LIMITS[currentUser.id] != null)
    ? PER_USER_LIMITS[currentUser.id]
    : roleLimit;
  const quotes      = lead.quotes || [];
  const [showForm, setShowForm]     = useState(false);
  const [editQ, setEditQ]           = useState(null);
  const [printQ, setPrintQ]         = useState(null);
  const [shareMsg, setShareMsg]     = useState(null);
  const [rejectModal, setRejectModal] = useState(null); // { quoteId, note }
  const [approveModal, setApproveModal] = useState(null); // { quote, role } for manager/exec approve with note
  const today = new Date().toISOString().split("T")[0];

  const saveQuote = (q) => {
    const freshQuotes = lead.quotes || [];
    const existing = freshQuotes.find(x => x.id === q.id);
    const maxDisc  = Math.max(...(q.items || []).map(it => it.discountPct || 0), 0);
    const mgrLim   = DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20;
    const approvalStatus = existing
      ? (q.approvalStatus || "pending_manager")
      : "pending_manager";
    const next = existing
      ? freshQuotes.map(x => x.id === q.id ? { ...q, approvalStatus: q.approvalStatus || approvalStatus, updatedAt: today } : x)
      : [...freshQuotes, { ...q, id: Date.now(), createdAt: today, createdBy: currentUser.id, approvalStatus, updatedAt: today }];
    onUpdate({ ...lead, quotes: next });
    setShowForm(false); setEditQ(null);
    window.__discountReason = "";
  };

  // Manager อนุมัติ → pending_finance หรือ pending_exec ถ้า discount เกิน
  const managerApprove = (q, approveNote = "") => {
    if (!q) return;
    const maxDisc  = Math.max(...(q.items || []).map(it => it.discountPct || 0), 0);
    const needExec = maxDisc > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20);
    const next = quotes.map(x => x.id === q.id ? {
      ...x,
      approvalStatus: needExec ? "pending_exec" : "pending_finance",
      managerApprovedBy: currentUser.id,
      managerApprovedAt: today,
      managerNote: approveNote,
    } : x);
    onUpdate({ ...lead, quotes: next });
  };

  const execApprove = (q, approveNote = "") => {
    const next = quotes.map(x => x.id === q.id ? {
      ...x,
      approvalStatus: "pending_finance",
      execApprovedBy: currentUser.id,
      execApprovedAt: today,
      execNote: approveNote,
    } : x);
    onUpdate({ ...lead, quotes: next });
  };

  const rejectQuote = (q, note) => {
    if (!q) return; // guard: quote not found
    const next = quotes.map(x => x.id === q.id ? {
      ...x,
      approvalStatus: "rejected",
      rejectedBy: currentUser.id,
      rejectedAt: today,
      rejectNote: note,
    } : x);
    onUpdate({ ...lead, quotes: next });
    setRejectModal(null);
  };

  // Finance ออกใบ → issued
  const issueQuote = (q) => {
    const next = quotes.map(x => x.id === q.id ? {
      ...x,
      approvalStatus: "issued",
      issuedBy: currentUser.id,
      issuedAt: today,
    } : x);
    onUpdate({ ...lead, quotes: next });
  };

  // LINE share text สำหรับใบเสนอราคา
  const buildLineShareMsg = (q) => {
    const grandTotal = (q.items || []).reduce((s, it) => s + it.finalTotal, 0);
    const lines = [
      `📄 *ใบเสนอราคา #${String(q.id).slice(-6)}*`,
      `🏫 ${lead?.schoolName || ''}`,
      `📅 วันที่ออก: ${fmtDate(q.quoteDate || q.createdAt)}`,
      q.validUntil ? `⏱ ใช้ได้ถึง: ${fmtDate(q.validUntil)}${q.validDays ? ` (${q.validDays} วัน)` : ""}` : null,
      ``,
      `📦 รายการสินค้า:`,
      ...(q.items || []).map(it => {
        const disc = it.discountPct + (it.offerDiscountPct || 0);
        return `  • ${it.productName}${it.billingLabel ? ` (${it.billingLabel})` : ""} × ${it.qty} ${it.unit}${disc > 0 ? ` (-${disc}%)` : ""} = ${fmtCurrency(it.finalTotal)}`;
      }),
      ``,
      `💰 *รวมทั้งหมด: ${fmtCurrency(grandTotal)}*`,
      q.note ? `📝 หมายเหตุ: ${q.note}` : null,
      ``,
      `— Nextgen Education`,
    ].filter(l => l !== null).join("\n");
    return lines;
  };

  if (printQ) return <QuotePrint quote={printQ} lead={lead} onBack={() => setPrintQ(null)} />;

  // ── Sort quotes: pending ขึ้นก่อน ──
  const QPRIORITY = { pending_manager:0, pending_exec:1, pending_finance:2, draft:3, issued:4, rejected:5 };
  const sortedQuotes = [...quotes].sort((a,b) => {
    const pa = QPRIORITY[a.approvalStatus] ?? 9;
    const pb = QPRIORITY[b.approvalStatus] ?? 9;
    if (pa !== pb) return pa - pb;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  return (
    <div>
      {/* ── Reject Modal ── */}
      {rejectModal && (
        <div className="overlay" onClick={() => setRejectModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 420 }}>
            <div className="modal-hd">
              <div className="modal-title">✕ ไม่อนุมัติใบเสนอราคา #{String(rejectModal.quoteId).slice(-6)}</div>
              <button className="modal-close" onClick={() => setRejectModal(null)}>✕</button>
            </div>
            <div className="fg">
              <label className="flabel" style={{ color: "var(--red)" }}>เหตุผลที่ไม่อนุมัติ *</label>
              <textarea className="ftextarea" autoFocus
                value={rejectModal.note || ""}
                onChange={e => setRejectModal(m => ({ ...m, note: e.target.value }))}
                placeholder="เช่น ส่วนลดสูงเกินไป ต้องปรับใหม่, ต้องเปลี่ยน package, ยังไม่มีงบในไตรมาสนี้..."
                style={{ minHeight: 80 }} />
            </div>
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={() => setRejectModal(null)}>ยกเลิก</button>
              <button className="btn btn-red"
                disabled={!rejectModal.note?.trim()}
                onClick={() => rejectQuote(lead.quotes?.find(q => q.id === rejectModal.quoteId), rejectModal.note)}>
                ✕ ยืนยันไม่อนุมัติ
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Approve Modal (Manager/Exec) ── */}
      {approveModal && (
        <div className="overlay" onClick={() => setApproveModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 480 }}>
            <div className="modal-hd">
              <div className="modal-title">
                {approveModal.role === "exec" ? "👑 Exec อนุมัติ" : "📊 Manager อนุมัติ"}
                {" — "}ใบ #{String(approveModal.quote.id).slice(-6)}
              </div>
              <button className="modal-close" onClick={() => setApproveModal(null)}>✕</button>
            </div>
            {/* Quote summary */}
            <div style={{ background: "var(--bg3)", borderRadius: 8, padding: 12, marginBottom: 14 }}>
              <div style={{ display: "flex", gap: 10, marginBottom: 6 }}>
                <span style={{ fontWeight: 700, fontSize: 13 }}>🏫 {lead.schoolName}</span>
                <span style={{ fontFamily: "IBM Plex Mono", fontWeight: 700, color: "var(--accent)" }}>
                  {fmtCurrency((approveModal.quote.items||[]).reduce((s,it)=>s+it.finalTotal,0))}
                </span>
              </div>
              {(() => {
                const maxD = Math.max(...(approveModal.quote.items||[]).map(it=>it.discountPct||0), 0);
                const mgrLim = DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20;
                return maxD > 0 && (
                  <div style={{ fontSize: 11, color: maxD > mgrLim ? "#a78bfa" : "#f59e0b" }}>
                    ส่วนลดสูงสุด {maxD}%{maxD > mgrLim ? " (เกิน Manager limit — Exec ต้องอนุมัติ)" : ""}
                  </div>
                );
              })()}
              {approveModal.quote.discountReason && (
                <div style={{ fontSize: 11, color: "#f59e0b", marginTop: 6, fontStyle: "italic" }}>
                  💬 เหตุผลส่วนลด: "{approveModal.quote.discountReason}"
                </div>
              )}
            </div>
            <div className="fg">
              <label className="flabel">หมายเหตุ / เงื่อนไขเพิ่มเติม (ถ้ามี)</label>
              <textarea className="ftextarea"
                value={approveModal.note || ""}
                onChange={e => setApproveModal(m => ({ ...m, note: e.target.value }))}
                placeholder="เช่น อนุมัติตามที่ขอ, ให้ส่วนลดได้แต่ต้องปิดดีลภายใน Q1..."
                style={{ minHeight: 70 }} />
            </div>
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={() => setApproveModal(null)}>ยกเลิก</button>
              <button className="btn btn-red btn-sm"
                onClick={() => { setRejectModal({ quoteId: approveModal.quote.id, note: "" }); setApproveModal(null); }}>
                ✕ ไม่อนุมัติ
              </button>
              <button className="btn btn-accent"
                onClick={() => {
                  if (approveModal.role === "exec") execApprove(approveModal.quote, approveModal.note || "");
                  else managerApprove(approveModal.quote, approveModal.note || "");
                  setApproveModal(null);
                }}>
                ✓ {approveModal.role === "exec" ? "Exec อนุมัติ" : (() => {
                  const maxD = Math.max(...(approveModal.quote.items||[]).map(it=>it.discountPct||0), 0);
                  const needExec = maxD > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20);
                  return needExec ? "ส่งให้ Exec อนุมัติ" : "อนุมัติ → Finance";
                })()}
              </button>
            </div>
          </div>
        </div>
      )}
      {/* LINE share preview modal */}
      {shareMsg && (
        <LineShareModal msg={shareMsg} onClose={() => setShareMsg(null)} />
      )}

      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:12, color:"var(--text3)" }}>ใบเสนอราคา {quotes.length} ฉบับ</div>
        {canCreate && !showForm && (
          <button className="btn btn-accent btn-sm" onClick={() => { setEditQ(null); setShowForm(true); }}>
            + สร้างใบเสนอราคา
          </button>
        )}
      </div>

      {!showForm && (
        <>
          {sortedQuotes.length === 0 && (
            <div className="empty" style={{ padding:32 }}>
              <div className="empty-ico">📄</div>
              <div className="empty-txt">ยังไม่มีใบเสนอราคา</div>
            </div>
          )}
          {sortedQuotes.map(q => {
            const total    = (q.items || []).reduce((s,it) => s + it.finalTotal, 0);
            const creator  = USERS.find(u => u.id === q.createdBy);
            const qStatus  = getQuoteApprovalStatus(q);
            const maxDisc  = Math.max(...(q.items || []).map(it => it.discountPct || 0), 0);
            const needExec = maxDisc > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20);
            const isPendingMgr  = q.approvalStatus === "pending_manager";
            const isPendingExec = q.approvalStatus === "pending_exec";
            const isPendingFin  = q.approvalStatus === "pending_finance";
            const isIssued      = q.approvalStatus === "issued";
            const isRejected    = q.approvalStatus === "rejected";
            const rejecter      = USERS.find(u => u.id === q.rejectedBy);
            const issuer        = USERS.find(u => u.id === q.issuedBy);

            return (
              <div key={q.id} className="card card-p" style={{
                padding:14, marginBottom:10,
                borderColor: isPendingMgr||isPendingExec ? "rgba(245,158,11,0.4)" :
                             isPendingFin ? "rgba(59,130,246,0.4)" :
                             isIssued ? "rgba(0,229,160,0.3)" :
                             isRejected ? "rgba(239,68,68,0.3)" : "var(--border)",
              }}>
                {/* Header */}
                <div style={{ display:"flex", gap:8, alignItems:"flex-start", marginBottom:8 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", gap:7, alignItems:"center", flexWrap:"wrap", marginBottom:4 }}>
                      <span style={{ fontWeight:700 }}>ใบเสนอราคา #{String(q.id).slice(-6)}</span>
                      <QuoteStatusBadge q={q} />
                      {maxDisc > 0 && (
                        <span style={{ fontSize:9, color: maxDisc > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20) ? "#ef4444" : "#f59e0b",
                          background: maxDisc > (DISCOUNT_LIMITS[ROLES.MANAGER]?.max??20) ? "rgba(239,68,68,0.1)" : "rgba(245,158,11,0.1)",
                          padding:"2px 7px", borderRadius:10, fontWeight:700 }}>
                          ส่วนลดสูงสุด {maxDisc}%{needExec ? " ⚠️ ต้องขอ Exec" : ""}
                        </span>
                      )}
                    </div>
                    <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                      <span style={{ fontSize:11, color:"var(--text3)" }}>{fmtDate(q.createdAt)} · {creator?.name?.split(" ")[0]}</span>
                      <span style={{ fontSize:11, color:"var(--text3)" }}>{(q.items||[]).length} รายการ</span>
                      <span style={{ fontSize:13, fontWeight:700, color:"var(--accent)", fontFamily:"IBM Plex Mono" }}>
                        {fmtCurrency(total)}
                      </span>
                    </div>
                    {q.note && <div style={{ fontSize:11, color:"var(--text2)", marginTop:3 }}>📝 {q.note}</div>}
                    {q.discountReason && (
                      <div style={{ fontSize:10, color:"#f59e0b", marginTop:3, background:"rgba(245,158,11,0.07)", padding:"4px 8px", borderRadius:6, border:"1px solid rgba(245,158,11,0.2)" }}>
                        💬 เหตุผลส่วนลด: {q.discountReason}
                      </div>
                    )}
                    {q.validUntil && (
                      <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>
                        ⏱ ใช้ได้ถึง {fmtDate(q.validUntil)}{q.validDays ? ` (${q.validDays} วัน)` : ""}
                      </div>
                    )}
                    {isIssued && (
                      <div style={{ marginTop:6, padding:"7px 10px", borderRadius:8,
                        background:"rgba(0,229,160,0.10)", border:"1px solid rgba(0,229,160,0.3)" }}>
                        <div style={{ fontSize:11, color:"var(--accent)", fontWeight:700 }}>
                          ✅ Finance ออกใบแล้ว — พร้อมส่งลูกค้า
                        </div>
                        <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>
                          ออกโดย {issuer?.name?.split(" ")[0]} · {fmtDate(q.issuedAt)} · กด "💚 แชร์ลูกค้า" ได้เลย
                        </div>
                      </div>
                    )}
                    {isRejected && (
                      <div style={{ marginTop:6, padding:"7px 10px", borderRadius:8,
                        background:"rgba(239,68,68,0.08)", border:"1px solid rgba(239,68,68,0.3)" }}>
                        <div style={{ fontSize:11, color:"var(--red)", fontWeight:700 }}>
                          ❌ ถูกปฏิเสธ — กรุณาแก้ไขและส่งใหม่
                        </div>
                        {q.rejectNote && (
                          <div style={{ fontSize:10, color:"#fca5a5", marginTop:2 }}>
                            เหตุผล: "{q.rejectNote}"
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  {/* Action buttons */}
                  <div style={{ display:"flex", flexDirection:"column", gap:4, flexShrink:0, alignItems:"stretch", minWidth:118 }}>
                    {/* ดู PDF — ทุก role ทุก status */}
                    <button className="btn btn-xs btn-ghost" onClick={() => setPrintQ(q)}>🖨️ ดู/พิมพ์ PDF</button>

                    {/* Sales: แก้ไข (เฉพาะ draft/rejected) */}
                    {isSales && ["draft","rejected"].includes(q.approvalStatus || "draft") && (
                      <button className="btn btn-xs btn-ghost"
                        onClick={() => { setEditQ(q); setShowForm(true); }}>✏️ แก้ไข</button>
                    )}

                    {/* Manager อนุมัติ */}
                    {isManager && isPendingMgr && (
                      <>
                        <button className="btn btn-xs" style={{ background:"#064e3b", color:"#34d399", borderColor:"#059669", fontWeight:700 }}
                          onClick={() => setApproveModal({ quote: q, role: "manager", note: "" })}>📊 พิจารณา</button>
                        <button className="btn btn-xs btn-red"
                          onClick={() => setRejectModal({ quoteId: q.id, note: "" })}>✕ ปฏิเสธ</button>
                      </>
                    )}

                    {/* Exec อนุมัติ */}
                    {isExec && (isPendingExec || isPendingMgr) && (
                      <>
                        <button className="btn btn-xs" style={{ background:"#3b0764", color:"#c084fc", borderColor:"#7e22ce", fontWeight:700 }}
                          onClick={() => setApproveModal({ quote: q, role: isPendingExec?"exec":"manager", note: "" })}>👑 พิจารณา</button>
                        <button className="btn btn-xs btn-red"
                          onClick={() => setRejectModal({ quoteId: q.id, note: "" })}>✕ ปฏิเสธ</button>
                      </>
                    )}

                    {/* Finance ออกใบ */}
                    {isFinance && isPendingFin && (
                      <button className="btn btn-xs" style={{ background:"rgba(59,130,246,0.15)", color:"#3b82f6", borderColor:"rgba(59,130,246,0.4)", fontWeight:700 }}
                        onClick={() => issueQuote(q)}>📋 ออกใบ</button>
                    )}

                    {/* issued: แชร์ลูกค้า (Sales / Finance / Manager / Exec) */}
                    {isIssued && (
                      <button className="btn btn-xs" style={{ background:"rgba(0,200,81,0.12)", color:"#00c851", borderColor:"rgba(0,200,81,0.3)", fontWeight:700 }}
                        onClick={() => setShareMsg(buildLineShareMsg(q))}>💚 แชร์ลูกค้า</button>
                    )}
                  </div>
                </div>

                {/* Approval trail */}
                {(q.managerApprovedBy || q.execApprovedBy) && (
                  <div style={{ display:"flex", gap:10, borderTop:"1px solid var(--border)", paddingTop:7, marginTop:4, flexWrap:"wrap" }}>
                    {q.managerApprovedBy && (
                      <span style={{ fontSize:9, color:"var(--text3)" }}>
                        ✓ Manager: {USERS.find(u=>u.id===q.managerApprovedBy)?.name?.split(" ")[0]} · {fmtDate(q.managerApprovedAt)}
                      </span>
                    )}
                    {q.execApprovedBy && (
                      <span style={{ fontSize:9, color:"var(--text3)" }}>
                        ✓ Exec: {USERS.find(u=>u.id===q.execApprovedBy)?.name?.split(" ")[0]} · {fmtDate(q.execApprovedAt)}
                      </span>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}

      {showForm && (
        <QuoteForm quote={editQ} lead={lead} catalog={catalog} specialOffers={specialOffers}
          currentUser={currentUser} myLimit={myLimit}
          onSave={saveQuote} onCancel={() => { setShowForm(false); setEditQ(null); }} />
      )}
    </div>
  );
}

function QuoteForm({ quote, lead, catalog, specialOffers, currentUser, myLimit, onSave, onCancel }) {
  const today = new Date().toISOString().split("T")[0];
  const [items, setItems] = useState(quote?.items || []);
  const [note, setNote] = useState(quote?.note || "");
  const [quoteDate, setQuoteDate] = useState(quote?.quoteDate || today);
  const [discountReason, setDiscountReason] = useState(quote?.discountReason || ""); // ✅ proper state

  // ── ระบบวันหมดอายุ ──
  // validMode: "days" = ระบุระยะเวลา, "date" = ระบุวันที่เอง
  const QUICK_DAYS = [7, 15, 30, 45, 60, 90];
  const [validMode, setValidMode] = useState(() => {
    if (!quote?.validUntil) return "days";
    // ถ้ามี quote เดิม ตรวจดูว่าตรงกับ quick days ไหม
    if (quote.validDays && QUICK_DAYS.includes(Number(quote.validDays))) return "days";
    return "date";
  });
  const [validDays, setValidDays]   = useState(quote?.validDays || 30); // ระยะเวลา (วัน)
  const [validDate, setValidDate]   = useState(quote?.validUntil || ""); // วันที่กำหนดเอง

  // คำนวณ validUntil จริง ๆ ที่จะบันทึก
  const computedValidUntil = (() => {
    if (validMode === "date") return validDate;
    if (!quoteDate || !validDays) return "";
    const d = new Date(quoteDate);
    d.setDate(d.getDate() + Number(validDays));
    return d.toISOString().split("T")[0];
  })();

  const students = lead.studentCount || 0;

  // ── helpers: หาราคาจาก tiers ตามจำนวนนักเรียน ────────────────
  const getTierPrice = (p, qty) => {
    if (!p.tiers || p.tiers.length === 0) return null;
    const tier = p.tiers.find(t => qty >= t.minStudents && qty <= t.maxStudents);
    return tier ? tier.pricePerUnit : p.tiers[p.tiers.length - 1].pricePerUnit;
  };

  // สร้าง line item พร้อม billing option
  const addItem = (pid, billingId) => {
    const key = `${pid}__${billingId || "default"}`;
    if (items.find(i => i.itemKey === key)) return;
    const p = catalog.find(x => x.id === pid); if (!p) return;

    // หา billing option — ราคา billing เป็น base ก่อน
    const billing = p.billingOptions?.find(b => b.id === (billingId || p.defaultBilling))
      || { id: "default", label: "", pricePerUnit: p.pricePerUnit };

    // ถ้ามี tiers และ billing ใช้ราคาเดียวกันกับ defaultBilling
    // ให้ tiers override ราคาตามจำนวนนักเรียน (เฉพาะ billing ที่เป็น yearly/default)
    const isYearly = !billingId || billingId === p.defaultBilling || billingId === "yearly";
    const tierPrice = isYearly ? getTierPrice(p, students || 1) : null;
    const base = tierPrice ?? billing.pricePerUnit;

    const offer = getActiveOffer(specialOffers, pid, quoteDate);
    const offerDisc = getOfferDiscount(offer, pid);

    // qty: Hardware = 1, Software/Service/Bundle = จำนวนนักเรียน
    const isHardware = p.category === "Hardware";
    const defaultQty = isHardware ? 1 : (students || 1);

    setItems(prev => [...prev, {
      itemKey: key,
      productId: pid, productName: p.name,
      billingId: billing.id, billingLabel: billing.label,
      unit: p.unit, category: p.category,
      qty: defaultQty,
      basePrice: base, floorPrice: p.floorPrice,
      discountPct: 0, offerDiscountPct: offerDisc, offerName: offer?.name || "",
      bundleSubjects: p.bundleSubjects || 0,
      bundleCombo: p.bundleCombo || "",   // ตายตัวตาม SKU
      vrServiceNote: p.vrServiceNote || "",
      finalTotal: Math.round(base * defaultQty * (1 - offerDisc / 100)),
    }]);
  };

  const updItem = (i, field, val) => {
    setItems(prev => {
      const next = [...prev];
      const it = { ...next[i], [field]: field === "qty" || field === "discountPct" ? Number(val) : val };
      const totalDisc = Math.min(it.discountPct + (it.offerDiscountPct || 0), 100);
      it.finalTotal = Math.round(it.basePrice * it.qty * (1 - totalDisc / 100));
      next[i] = it; return next;
    });
  };

  const grandTotal = items.reduce((s, it) => s + it.finalTotal, 0);
  const hasOverLimit = items.some(it => it.discountPct > myLimit);
  const hasUnderFloor = items.some(it => it.floorPrice > 0 && it.basePrice * (1 - (it.discountPct + (it.offerDiscountPct||0)) / 100) < it.floorPrice);

  // กลุ่มสินค้าตาม category เพื่อแสดงปุ่มเพิ่มเป็น sections
  const catGroups = [
    { label: "📱 Software (Clever)", cats: ["Software"], showBilling: true },
    { label: "📦 Bundle (Clever)", cats: ["Bundle"], showBilling: false },
    { label: "🥽 VR Sci Lab — อุปกรณ์", cats: ["Hardware"], showBilling: false },
    { label: "🛠 VR Sci Lab — ค่าบริการ", cats: ["Service"], showBilling: false },
  ];

  return (
    <div style={{ background: "var(--bg3)", borderRadius: 12, padding: 16, border: "1px solid var(--border)" }}>
      <div className="sec-title" style={{ marginBottom: 10 }}>{quote ? "✏️ แก้ไขใบเสนอราคา" : "📄 สร้างใบเสนอราคา"}</div>

      <div style={{ marginBottom: 12 }}>
        {/* Row 1: วันที่ออก + วันหมดอายุ */}
        <div className="frow" style={{ marginBottom: 0, alignItems: "flex-end", gap: 10 }}>
          {/* วันที่ออก */}
          <div className="fg" style={{ flex: "0 0 150px", minWidth: 0 }}>
            <label className="flabel">วันที่ออกใบเสนอราคา</label>
            <input className="finput" type="date" value={quoteDate}
              onChange={e => setQuoteDate(e.target.value)} />
          </div>

          {/* ── Mode toggle ── */}
          <div className="fg" style={{ flex: 1, minWidth: 0 }}>
            <label className="flabel">ใช้ได้ถึง</label>
            <div style={{ display: "flex", gap: 0, borderRadius: 8, overflow: "hidden", border: "1px solid var(--border)", background: "var(--bg3)", width: "fit-content", marginBottom: 6 }}>
              {[["days", "⏱ ระยะเวลา"], ["date", "📅 วันที่ระบุ"]].map(([m, l]) => (
                <button key={m} onClick={() => setValidMode(m)} style={{
                  padding: "5px 14px", fontSize: 11, fontWeight: 700, cursor: "pointer",
                  background: validMode === m ? "var(--accent)" : "transparent",
                  color: validMode === m ? "#000" : "var(--text3)",
                  border: "none", transition: "all 0.12s",
                }}>{l}</button>
              ))}
            </div>

            {/* Days mode — quick select + custom */}
            {validMode === "days" && (
              <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                {QUICK_DAYS.map(d => (
                  <button key={d} onClick={() => setValidDays(d)} style={{
                    padding: "4px 11px", borderRadius: 6, fontSize: 11, fontWeight: 700,
                    cursor: "pointer", border: "1px solid",
                    background: validDays === d ? "var(--accent-dim)" : "var(--bg3)",
                    color: validDays === d ? "var(--accent)" : "var(--text2)",
                    borderColor: validDays === d ? "rgba(0,229,160,0.4)" : "var(--border)",
                    transition: "all 0.1s",
                  }}>{d} วัน</button>
                ))}
                {/* custom input */}
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <input type="text" inputMode="numeric"
                    value={QUICK_DAYS.includes(Number(validDays)) ? "" : validDays}
                    onChange={e => { const v = e.target.value.replace(/\D/g,""); if(v) setValidDays(Number(v)); }}
                    placeholder="กำหนดเอง"
                    style={{ width: 80, padding: "4px 8px", borderRadius: 6, fontSize: 11,
                      background: "var(--bg3)", border: "1px solid var(--border)", color: "var(--text)",
                      outline: "none" }} />
                  <span style={{ fontSize: 11, color: "var(--text3)" }}>วัน</span>
                </div>
              </div>
            )}

            {/* Date mode */}
            {validMode === "date" && (
              <input className="finput" type="date" value={validDate}
                min={quoteDate}
                onChange={e => setValidDate(e.target.value)}
                style={{ maxWidth: 180 }} />
            )}
          </div>

          {/* แสดงวันหมดอายุที่คำนวณแล้ว */}
          <div style={{ flex: "0 0 auto", paddingBottom: 2 }}>
            {computedValidUntil ? (
              <div style={{ background: "rgba(0,229,160,0.08)", border: "1px solid rgba(0,229,160,0.2)",
                borderRadius: 8, padding: "6px 12px", fontSize: 11, color: "var(--accent)", fontWeight: 700,
                fontFamily: "IBM Plex Mono", whiteSpace: "nowrap" }}>
                ✓ ถึง {fmtDate(computedValidUntil)}
              </div>
            ) : (
              <div style={{ fontSize: 10, color: "var(--text3)" }}>ยังไม่ระบุวันหมดอายุ</div>
            )}
          </div>
        </div>

        {/* Row 2: หมายเหตุ */}
        <div className="fg" style={{ marginTop: 12, marginBottom: 0 }}>
          <label className="flabel">หมายเหตุ</label>
          <input className="finput" value={note} onChange={e => setNote(e.target.value)} placeholder="หมายเหตุถึงโรงเรียน..." />
        </div>
      </div>

      {/* ── เพิ่มสินค้า แยกตาม category ── */}
      <label className="flabel" style={{ marginBottom: 6, display: "block" }}>เพิ่มสินค้า / รายการ</label>
      {catGroups.map(group => {
        const prods = catalog.filter(p => p.active && group.cats.includes(p.category));
        if (prods.length === 0) return null;
        return (
          <div key={group.label} style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 10, color: "var(--text3)", fontWeight: 700, marginBottom: 4 }}>{group.label}</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              {prods.map(p => {
                const offer = getActiveOffer(specialOffers, p.id, quoteDate);
                if (group.showBilling && p.billingOptions?.length > 1) {
                  // Software: แสดงปุ่มแยกตาม billing
                  return p.billingOptions.map(b => {
                    const key = `${p.id}__${b.id}`;
                    const already = items.find(it => it.itemKey === key);
                    return (
                      <button key={key} className="btn btn-xs btn-ghost"
                        style={{ opacity: already ? 0.35 : 1, borderColor: offer ? "rgba(0,229,160,0.4)" : undefined, pointerEvents: already ? "none" : "auto" }}
                        onClick={() => addItem(p.id, b.id)}>
                        + {p.name} ({b.label} · {fmtCurrency(b.pricePerUnit)}){offer ? " 🎉" : ""}
                      </button>
                    );
                  });
                } else {
                  const key = `${p.id}__${p.defaultBilling || "default"}`;
                  const already = items.find(it => it.itemKey === key);
                  return (
                    <button key={p.id} className="btn btn-xs btn-ghost"
                      style={{ opacity: already ? 0.35 : 1, borderColor: offer ? "rgba(0,229,160,0.4)" : undefined, pointerEvents: already ? "none" : "auto" }}
                      onClick={() => addItem(p.id, null)}>
                      + {p.name}{offer ? " 🎉" : ""}
                      {p.bundleSubjects ? ` (${p.bundleSubjects} วิชา · ${fmtCurrency(p.pricePerUnit)}/คน)` : ""}
                    </button>
                  );
                }
              })}
            </div>
          </div>
        );
      })}

      {/* ── รายการที่เพิ่มแล้ว ── */}
      {items.length > 0 && (
        <div style={{ marginTop: 14, marginBottom: 12 }}>
          <div style={{ fontSize: 10, color: "var(--text3)", display: "grid", gridTemplateColumns: "2.5fr 80px 1.2fr 90px 1.2fr 28px", gap: 6, marginBottom: 6, padding: "0 2px" }}>
            <span>สินค้า</span><span>จำนวน</span><span>ราคา/หน่วย</span><span>ส่วนลด %</span><span>รวม</span><span></span>
          </div>
          {items.map((it, i) => {
            const totalDisc = it.discountPct + (it.offerDiscountPct || 0);
            const overLimit = it.discountPct > myLimit;
            const underFloor = it.floorPrice > 0 && it.basePrice * (1 - totalDisc / 100) < it.floorPrice;
            return (
              <div key={it.itemKey || i} style={{ marginBottom: 8, background: "var(--bg2)", borderRadius: 8, padding: "10px 10px 6px" }}>
                <div style={{ display: "grid", gridTemplateColumns: "2.5fr 80px 1.2fr 90px 1.2fr 28px", gap: 6, alignItems: "center", marginBottom: 4 }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600 }}>{it.productName}</div>
                    {it.billingLabel && <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 1 }}>💳 {it.billingLabel}</div>}
                    {it.offerName && <div style={{ fontSize: 9, color: "var(--accent)" }}>🎉 {it.offerName} -{it.offerDiscountPct}%</div>}
                    {underFloor && <div style={{ fontSize: 9, color: "#f87171" }}>⚠️ ต่ำกว่า floor price</div>}
                    {it.vrServiceNote && <div style={{ fontSize: 9, color: "#f59e0b" }}>{it.vrServiceNote}</div>}
                  </div>
                  <input className="finput" type="number" min="1" value={it.qty}
                    onChange={e => updItem(i, "qty", e.target.value)} style={{ padding: "4px 6px", fontSize: 12 }} />
                  <div style={{ fontFamily: "IBM Plex Mono", fontSize: 11, color: "var(--text2)" }}>
                    {fmtCurrency(it.basePrice)}<span style={{ fontSize: 9, color: "var(--text3)" }}>/{it.unit}</span>
                    {it.floorPrice > 0 && <div style={{ fontSize: 9, color: "var(--text3)" }}>min: {fmtCurrency(it.floorPrice)}</div>}
                  </div>
                  <div>
                    <input className="finput" type="number" min="0" max="100" value={it.discountPct}
                      onChange={e => updItem(i, "discountPct", e.target.value)}
                      style={{ padding: "4px 6px", fontSize: 12, borderColor: overLimit || underFloor ? "rgba(239,68,68,0.5)" : undefined }} />
                    {overLimit && <div style={{ fontSize: 9, color: "var(--red)" }}>เกินสิทธิ์ {myLimit}%</div>}
                  </div>
                  <div style={{ fontFamily: "IBM Plex Mono", fontSize: 13, color: "var(--accent)", fontWeight: 700 }}>{fmtCurrency(it.finalTotal)}</div>
                  <button className="btn btn-xs btn-ghost" style={{ color: "var(--red)", padding: "2px 4px" }} onClick={() => setItems(prev => prev.filter((_, j) => j !== i))}>🗑</button>
                </div>
                {/* Bundle: แสดงวิชาที่กำหนดตายตัว */}
                {it.bundleCombo && (
                  <div style={{ marginTop: 4, padding: "5px 10px", background: "rgba(139,92,246,0.08)", borderRadius: 6, border: "1px solid rgba(139,92,246,0.2)", display: "inline-flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 10, color: "#a78bfa", fontWeight: 700 }}>📚 วิชาที่รวม:</span>
                    <span style={{ fontSize: 11, color: "#c4b5fd", fontWeight: 600 }}>{it.bundleCombo}</span>
                  </div>
                )}
              </div>
            );
          })}
          <div style={{ borderTop: "2px solid var(--border)", paddingTop: 10, display: "flex", justifyContent: "flex-end", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            {hasOverLimit  && <span style={{ fontSize: 11, color: "#f59e0b", background: "rgba(245,158,11,0.1)", padding: "4px 10px", borderRadius: 8 }}>⚠️ ส่วนลดเกินสิทธิ์ — ต้องให้ Manager/Exec อนุมัติ</span>}
            {hasUnderFloor && <span style={{ fontSize: 11, color: "var(--red)", background: "rgba(239,68,68,0.08)", padding: "4px 10px", borderRadius: 8 }}>🚫 ราคาต่ำกว่า Floor Price</span>}
            <span style={{ fontSize: 16, fontWeight: 700, color: "var(--accent)", fontFamily: "IBM Plex Mono" }}>รวม {fmtCurrency(grandTotal)}</span>
          </div>
        </div>
      )}

      {/* ── Approval path summary + discount reason ── */}
      {items.length > 0 && (() => {
        const maxDisc  = Math.max(...items.map(it => it.discountPct), 0);
        const creatorId  = quote?.createdBy || currentUser.id;
        const salesLim   = (PER_USER_LIMITS[creatorId] != null)
          ? PER_USER_LIMITS[creatorId]
          : (DISCOUNT_LIMITS[ROLES.SALES]?.max ?? 10);
        const mgrLim   = DISCOUNT_LIMITS[ROLES.MANAGER]?.max ?? 20;
        const needMgr  = maxDisc > salesLim;
        const needExec = maxDisc > mgrLim;
        return (
          <div style={{ background: needExec ? "rgba(139,92,246,0.08)" : needMgr ? "rgba(245,158,11,0.08)" : "rgba(0,229,160,0.06)",
            border: `1px solid ${needExec ? "rgba(139,92,246,0.3)" : needMgr ? "rgba(245,158,11,0.25)" : "rgba(0,229,160,0.2)"}`,
            borderRadius: 10, padding: 14, marginBottom: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700,
              color: needExec ? "#a78bfa" : needMgr ? "#f59e0b" : "var(--accent)",
              marginBottom: 8 }}>
              {needExec ? "🔴 ต้องขออนุมัติ Exec (ส่วนลดเกิน Manager limit)" :
               needMgr  ? "🟡 ต้องขออนุมัติ Manager (ส่วนลดเกิน Sales limit)" :
                          "✅ ส่วนลดอยู่ในสิทธิ์ของคุณ"}
            </div>
            {/* Approval flow steps */}
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", marginBottom: needMgr ? 12 : 0 }}>
              {[
                { label: "📝 Sales สร้าง", done: true },
                { label: needExec ? "📊 Manager ส่งต่อ" : "📊 Manager อนุมัติ", done: false, active: true },
                ...(needExec ? [{ label: "👑 Exec อนุมัติ", done: false, active: true }] : []),
                { label: "💼 Finance ออกใบ", done: false },
                { label: "📤 Sales รับ & แชร์", done: false },
              ].map((s, i, arr) => (
                <React.Fragment key={i}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <div style={{ width: 20, height: 20, borderRadius: "50%", fontSize: 9,
                      display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700,
                      background: s.done ? "var(--accent)" : s.active ? (needExec ? "#8b5cf6" : "#f59e0b") : "var(--bg3)",
                      color: s.done ? "#000" : s.active ? "#fff" : "var(--text3)",
                      border: `1px solid ${s.done ? "var(--accent)" : s.active ? (needExec ? "#8b5cf6" : "#f59e0b") : "var(--border)"}`,
                      flexShrink: 0 }}>
                      {s.done ? "✓" : i + 1}
                    </div>
                    <span style={{ fontSize: 10, color: s.done ? "var(--accent)" : s.active ? (needExec ? "#a78bfa" : "#f59e0b") : "var(--text3)", whiteSpace: "nowrap" }}>
                      {s.label}
                    </span>
                  </div>
                  {i < arr.length - 1 && <div style={{ width: 16, height: 1, background: "var(--border)", flexShrink: 0 }} />}
                </React.Fragment>
              ))}
            </div>
            {/* เหตุผลขอส่วนลด — บังคับเมื่อเกิน sales limit */}
            {needMgr && (
              <div>
                <label className="flabel" style={{ color: "#f59e0b" }}>
                  เหตุผลในการขอส่วนลด *{" "}
                  <span style={{ color: "var(--text3)", fontWeight: 400, textTransform: "none" }}>
                    (Manager/Exec ใช้ประกอบการพิจารณา)
                  </span>
                </label>
                <textarea className="ftextarea"
                  value={discountReason}
                  onChange={e => setDiscountReason(e.target.value)}
                  placeholder="เช่น ลูกค้า Hot ต้องการปิดดีลภายใน Q1, คู่แข่งเสนอราคาต่ำกว่า, โรงเรียนขนาดใหญ่เป็น reference case..."
                  style={{ minHeight: 72 }}
                />
                {!discountReason.trim() && (
                  <div style={{ fontSize: 10, color: "#f59e0b", marginTop: 3 }}>⚠️ กรุณาระบุเหตุผลก่อนส่ง</div>
                )}
              </div>
            )}
          </div>
        );
      })()}

      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <button className="btn btn-accent btn-sm"
          disabled={items.length === 0 || hasUnderFloor || ((() => {
            const maxDisc = Math.max(...items.map(it => it.discountPct), 0);
            return maxDisc > (DISCOUNT_LIMITS[ROLES.SALES]?.max ?? 10) && !discountReason.trim();
          })())}
          onClick={() => {
            onSave({ ...(quote || {}), items, note, quoteDate,
              validUntil: computedValidUntil,
              validDays: validMode === "days" ? validDays : null,
              validMode, discountReason });
          }}>
          📤 ส่งขออนุมัติ
        </button>
        <button className="btn btn-ghost btn-sm" onClick={onCancel}>ยกเลิก</button>
        {hasUnderFloor && <span style={{ fontSize: 11, color: "var(--red)" }}>🚫 แก้ราคาต่ำกว่า Floor ก่อน</span>}
      </div>
    </div>
  );
}

function QuotePrint({ quote, lead = {}, onBack }) {
  const [mode, setMode] = React.useState("customer"); // "customer" | "internal"

  const grandTotal = (quote.items || []).reduce((s, it) => s + it.finalTotal, 0);
  const creator    = USERS.find(u => u.id === quote.createdBy);

  // หา approver ที่มีสิทธิ์สูงสุดที่อนุมัติ
  const execApprover    = quote.execApprovedBy    ? USERS.find(u => u.id === quote.execApprovedBy)    : null;
  const managerApprover = quote.managerApprovedBy ? USERS.find(u => u.id === quote.managerApprovedBy) : null;
  const authorizedBy    = execApprover || managerApprover; // ลงชื่อ exec ก่อน ถ้าไม่มีใช้ manager
  const issuer          = quote.issuedBy ? USERS.find(u => u.id === quote.issuedBy) : null;
  const isIssued        = quote.approvalStatus === "issued";

  const totalDiscount   = grandTotal > 0
    ? (quote.items||[]).reduce((s,it) => s + (it.basePrice * it.qty * ((it.discountPct + (it.offerDiscountPct||0)) / 100)), 0)
    : 0;
  const originalTotal   = grandTotal + totalDiscount;

  // ── buildDocHTML: แปลง React data → HTML string สำหรับ iframe print ──
  const buildDocHTML = () => {
    const rows = (quote.items || []).map((it, i) => {
      const totalDisc = it.discountPct + (it.offerDiscountPct || 0);
      const bg = i % 2 === 0 ? "#fff" : "#f8fafc";
      return `
        <tr style="border-bottom:1px solid #e2e8f0;background:${bg}">
          <td style="padding:9px 10px;text-align:center;color:#888;font-size:11px">${i+1}</td>
          <td style="padding:9px 10px">
            <div style="font-weight:600;color:#111">${it.productName}</div>
            ${it.billingLabel ? `<div style="font-size:10px;color:#0d9488;margin-top:1px">💳 ${it.billingLabel}</div>` : ""}
            ${it.bundleCombo ? `<div style="font-size:10px;color:#6366f1;margin-top:1px">📚 วิชาที่รวม: ${it.bundleCombo}</div>` : ""}
            ${it.offerName ? `<div style="font-size:10px;color:#f59e0b;margin-top:1px">🎉 ${it.offerName} -${it.offerDiscountPct}%</div>` : ""}
          </td>
          <td style="padding:9px 10px;text-align:right">${fmt(it.qty)} ${it.unit}</td>

// ============================================================
// RSVP BANNER ITEM — แต่ละคำเชิญในปฏิทินกลาง
// แยกเป็น component เพื่อรองรับ useState สำหรับช่องหมายเหตุ
// ============================================================
function RsvpBannerItem({ item, user, rsvpAction, ROLE_RANK }) {
  const [pendingAction, setPendingAction] = useState(null); // "join"|"ack"|"decline"
  const [note, setNote]                   = useState("");

  const col     = USER_COLORS[item.createdBy||0] || { bg:"#6b7280", light:"rgba(107,114,128,0.12)", label:"#9ca3af" };
  const creator = USERS.find(u => u.id === item.createdBy);

  // ตรวจว่า user เป็นผู้ใต้บังคับบัญชาหรือไม่
  const creatorRank = ROLE_RANK[creator?.role] || 1;
  const userRank    = ROLE_RANK[user.role]     || 1;
  const isSubordinate = userRank < creatorRank;
  // บังคับเหตุผล: ใต้บัญชา+ปฏิเสธ / ทุก action ต้องการ note (optional ยกเว้น decline จากใต้บัญชา)
  const requireNote = pendingAction === "decline" && isSubordinate;

  const doConfirm = () => {
    if (requireNote && !note.trim()) return;
    rsvpAction(item.id, pendingAction, note.trim());
    setPendingAction(null);
    setNote("");
  };

  const actionLabel = { join:"✅ เข้าร่วม", ack:"📋 รับทราบ", decline:"❌ ปฏิเสธ" };
  const actionColor = { join:"#00e5a0", ack:"var(--text2)", decline:"var(--red)" };
  const notePlaceholder = {
    join:    "ข้อความเพิ่มเติม (เช่น จะเตรียมอะไรมาบ้าง)...",
    ack:     "เหตุผลที่รับทราบแต่ไม่ร่วม (เช่น ติดประชุม)...",
    decline: isSubordinate ? "กรุณาระบุเหตุผลที่ไม่สามารถเข้าร่วม *" : "เหตุผล (ไม่บังคับ)...",
  };

  return (
    <div style={{ borderRadius:10, background:"var(--bg3)", marginBottom:8,
      border:`1px solid ${(pendingAction?"var(--accent)":"var(--border)")}`,
      borderLeft:`4px solid ${pendingAction ? "#f59e0b" : col.bg || "#6b7280"}`,
      overflow:"hidden", transition:"border 0.15s" }}>

      {/* Main row */}
      <div style={{ display:"flex", gap:10, alignItems:"center", padding:"10px 12px" }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontWeight:700, fontSize:12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.title}</div>
          <div style={{ fontSize:10, color:"var(--text3)", marginTop:3, display:"flex", gap:6, flexWrap:"wrap" }}>
            {item.date && <span>📅 {item.date}{item.time?` · ${item.time} น.`:""}</span>}
            {creator && <span>👤 {creator.name.split(" ")[0]}</span>}
            {item.type && item.type !== "นัดหมาย" && <span style={{ color:"#a78bfa" }}>{item.type}</span>}
          </div>
        </div>

        {/* Buttons — แสดงถ้ายังไม่ได้กดเลือก action */}
        {!pendingAction && (
          <div style={{ display:"flex", gap:5, flexShrink:0 }}>
            <button className="btn btn-xs" style={{ background:"rgba(0,229,160,0.12)", color:"#00e5a0", borderColor:"rgba(0,229,160,0.4)", fontWeight:700, whiteSpace:"nowrap" }}
              onClick={() => setPendingAction("join")}>✅ เข้าร่วม</button>
            <button className="btn btn-xs btn-ghost" style={{ color:"var(--text2)", whiteSpace:"nowrap" }}
              onClick={() => setPendingAction("ack")}>📋 รับทราบ</button>
            <button className="btn btn-xs btn-ghost" style={{ color:"var(--red)", borderColor:"rgba(239,68,68,0.25)", whiteSpace:"nowrap" }}
              onClick={() => setPendingAction("decline")}>❌ ปฏิเสธ</button>
          </div>
        )}

        {/* สถานะที่กด แล้วยังไม่ยืนยัน */}
        {pendingAction && (
          <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
            <span style={{ fontSize:11, fontWeight:700, color:actionColor[pendingAction] }}>
              {actionLabel[pendingAction]}
            </span>
            <button className="btn btn-xs btn-ghost" style={{ fontSize:10, color:"var(--text3)", padding:"2px 6px" }}
              onClick={() => { setPendingAction(null); setNote(""); }}>← เปลี่ยน</button>
          </div>
        )}
      </div>

      {/* Note section — เปิดเมื่อกดปุ่มใดปุ่มหนึ่ง */}
      {pendingAction && (
        <div style={{ padding:"0 12px 12px" }}>
          <div style={{ fontSize:10, color:"var(--text3)", marginBottom:4 }}>
            {pendingAction === "decline" && isSubordinate
              ? "⚠️ กรุณาระบุเหตุผล (บังคับ)"
              : "💬 เพิ่มข้อความ / ชี้แจงให้ผู้สร้าง (ไม่บังคับ)"}
          </div>
          <textarea
            value={note}
            onChange={e => setNote(e.target.value)}
            placeholder={notePlaceholder[pendingAction]}
            style={{ width:"100%", minHeight: requireNote ? 70 : 56,
              padding:"7px 10px", borderRadius:8, resize:"none",
              background:"var(--bg2)", color:"var(--text)", fontSize:11, fontFamily:"inherit",
              border:`1px solid ${requireNote && !note.trim() ? "rgba(239,68,68,0.5)" : "var(--border)"}`,
              outline:"none" }}
            autoFocus
          />
          <div style={{ display:"flex", gap:8, marginTop:6 }}>
            <button
              className="btn btn-sm"
              style={{
                background: pendingAction==="join"
                  ? "rgba(0,229,160,0.15)" : pendingAction==="ack"
                  ? "var(--bg3)" : "rgba(239,68,68,0.12)",
                color: pendingAction==="join" ? "#00e5a0" : pendingAction==="ack" ? "var(--text2)" : "var(--red)",
                borderColor: pendingAction==="join" ? "rgba(0,229,160,0.4)" : pendingAction==="ack" ? "var(--border)" : "rgba(239,68,68,0.4)",
                fontWeight:700,
                opacity: requireNote && !note.trim() ? 0.4 : 1,
                cursor: requireNote && !note.trim() ? "not-allowed" : "pointer",
              }}
              onClick={doConfirm}
              disabled={requireNote && !note.trim()}>
              ยืนยัน {actionLabel[pendingAction]}
            </button>
            <button className="btn btn-ghost btn-sm" style={{ color:"var(--text3)" }}
              onClick={() => { setPendingAction(null); setNote(""); }}>ยกเลิก</button>
          </div>
          {requireNote && !note.trim() && (
            <div style={{ fontSize:10, color:"var(--red)", marginTop:4 }}>
              * การปฏิเสธคำเชิญจากผู้บังคับบัญชากำหนดให้ต้องระบุเหตุผล
            </div>
          )}
        </div>
      )}
    </div>
  );
}


// ============================================================
// EVENT RSVP BUTTONS — แยกออกมาเพื่อรองรับ useState (Rules of Hooks)
// ============================================================
function EventRsvpButtons({ item, user, rsvpAction, onClose, myStatus, creator }) {
  const [detailNote, setDetailNote]     = useState("");
  const [detailAction, setDetailAction] = useState(null);

  const creatorRankD = ROLE_RANK[creator?.role] || 1;
  const userRankD    = ROLE_RANK[user.role] || 1;
  const isSubD       = userRankD < creatorRankD;
  const requireNoteD = detailAction === "decline" && isSubD;

  const doAction = (act) => {
    if (detailAction === act) {
      if (requireNoteD && !detailNote.trim()) return;
      rsvpAction(item.id, act, detailNote.trim());
      onClose();
    } else {
      setDetailAction(act);
    }
  };

  return (
    <div className="modal-ft" style={{ flexDirection:"column", gap:8 }}>
      {myStatus && (
        <div style={{ fontSize:11, textAlign:"center", color:"var(--text3)" }}>
          สถานะปัจจุบัน: <span style={{ fontWeight:700,
            color:myStatus==="join"?"#00e5a0":myStatus==="decline"?"var(--red)":"var(--text2)" }}>
            {myStatus==="join"?"✅ เข้าร่วม":myStatus==="ack"?"📋 รับทราบ":"❌ ปฏิเสธ"}
          </span>
          {" (กดเพื่อเปลี่ยน)"}
        </div>
      )}
      <div style={{ display:"flex", gap:8, width:"100%" }}>
        {[["join","✅ เข้าร่วม","var(--accent)"],["ack","📋 รับทราบ","var(--text2)"],["decline","❌ ปฏิเสธ","var(--red)"]].map(([act,label,color])=>(
          <button key={act} className="btn btn-ghost" style={{ flex:1, color, fontWeight:detailAction===act?700:400,
            background:detailAction===act?"var(--bg2)":"transparent",
            borderColor:detailAction===act?color+"80":"var(--border)" }}
            onClick={()=>setDetailAction(detailAction===act?null:act)}>
            {label}
          </button>
        ))}
      </div>
      {detailAction && (
        <div style={{ width:"100%" }}>
          <div style={{ fontSize:10, color:"var(--text3)", marginBottom:4 }}>
            {requireNoteD ? "⚠️ กรุณาระบุเหตุผล (บังคับ)" : "💬 ข้อความชี้แจงให้ผู้สร้าง (ไม่บังคับ)"}
          </div>
          <textarea
            value={detailNote}
            onChange={e=>setDetailNote(e.target.value)}
            placeholder={
              detailAction==="join"  ? "เช่น จะเตรียมเอกสารมาด้วย..." :
              detailAction==="ack"   ? "เช่น รับทราบแต่ติดประชุมอื่น..." :
              isSubD ? "กรุณาระบุเหตุผลที่ไม่สามารถเข้าร่วม *" : "เหตุผล (ไม่บังคับ)..."
            }
            style={{ width:"100%", minHeight:64, padding:"7px 10px", borderRadius:8,
              background:"var(--bg3)", color:"var(--text)", fontSize:11, fontFamily:"inherit",
              border:`1px solid ${requireNoteD&&!detailNote.trim()?"rgba(239,68,68,0.5)":"var(--border)"}`,
              resize:"none" }}
            autoFocus
          />
          <div style={{ display:"flex", gap:8, marginTop:6 }}>
            <button className="btn btn-accent btn-sm" style={{ fontWeight:700,
              opacity: requireNoteD&&!detailNote.trim()?0.4:1,
              cursor: requireNoteD&&!detailNote.trim()?"not-allowed":"pointer" }}
              onClick={()=>doAction(detailAction)}
              disabled={requireNoteD&&!detailNote.trim()}>
              ยืนยัน
            </button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setDetailAction(null);setDetailNote("");}}>ยกเลิก</button>
          </div>
          {requireNoteD&&!detailNote.trim()&&(
            <div style={{ fontSize:10, color:"var(--red)", marginTop:3 }}>
              * การปฏิเสธคำเชิญจากผู้บังคับบัญชากำหนดให้ต้องระบุเหตุผล
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// สร้างสี HSL จาก hue angle ต่างกัน 30° ต่อคน
// ลำดับ hue: 270(ม่วง), 200(ฟ้า), 160(เขียว-ฟ้า), 40(เหลือง), 320(ชมพูม่วง), 0(แดง), 100(เหลืองเขียว), 230(น้ำเงิน), 280(ม่วงชมพู)...
const _HUE_LIST = [270, 200, 155, 38, 320, 0, 100, 225, 290, 170, 50, 340, 75, 185, 260, 15, 130, 350, 90, 210, 305, 55, 245, 10, 140, 330, 195, 355, 115, 240];
function _hsl2hex(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1-l);
  const f = n => { const k=(n+h/30)%12; const c=l-a*Math.max(-1,Math.min(k-3,9-k,1)); return Math.round(255*c).toString(16).padStart(2,"0"); };
  return "#"+f(0)+f(8)+f(4);
}
function _makeColor(hue) {
  const bg    = _hsl2hex(hue, 75, 55);
  const label = _hsl2hex(hue, 85, 72);
  const r = parseInt(bg.slice(1,3),16), g = parseInt(bg.slice(3,5),16), b = parseInt(bg.slice(5,7),16);
  const light = `rgba(${r},${g},${b},0.13)`;
  return { bg, light, label };
}

// Build USER_COLORS จาก USERS array (ใช้ index แทน hardcode)
const USER_COLORS = {};
USERS.forEach((u, i) => {
  const hue = _HUE_LIST[i % _HUE_LIST.length];
  USER_COLORS[u.id] = { ..._makeColor(hue), role: u.role };
});

const uc = (uid) => (uid && USER_COLORS[uid]) || { bg:"#6b7280", light:"rgba(107,114,128,0.12)", label:"#9ca3af", role:"" };

// helper: คืน CSS border string ตาม dept
const deptBorder = (uid) => {
  const col = uc(uid);
  const db  = DEPT_BORDER[col.role] || { style:"solid", width:2 };
  return `${db.width}px ${db.style} ${col.bg}`;
};
