    return (
      <div className="card card-p">
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
          {DAY_TH.map((d,i)=>(
            <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:i===0||i===6?"var(--red)":"var(--text3)" }}>{d}</div>
          ))}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
          {Array.from({length:firstDay}).map((_,i)=><div key={"e"+i}/>)}
          {Array.from({length:days}).map((_,i)=>{
            const day=i+1;
            const ds=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
            const dayItems=itemsOnDate(ds);
            const isToday=ds===todayStr;
            const dow=new Date(calYear,calMonth,day).getDay();
            return (
              <div key={day} onClick={()=>{const d=new Date(calYear,calMonth,day,12,0,0);setCalDate(d);setViewMode("day");}}
                style={{ minHeight:82, borderRadius:8, padding:"5px 6px", cursor:"pointer",
                  border:`1px solid ${isToday?"rgba(0,229,160,0.4)":"var(--border)"}`,
                  background:isToday?"rgba(0,229,160,0.04)":"var(--bg3)",
                }}
                onMouseEnter={e=>e.currentTarget.style.background="var(--bg2)"}
                onMouseLeave={e=>e.currentTarget.style.background=isToday?"rgba(0,229,160,0.04)":"var(--bg3)"}>
                <div style={{ fontSize:11, fontWeight:700, marginBottom:3,
                  color:isToday?"var(--accent)":dow===0||dow===6?"var(--red)":"var(--text2)" }}>{day}</div>
                {dayItems.slice(0,3).map(item=><EventChip key={item.id} item={item}/>)}
                {dayItems.length>3 && <div style={{ fontSize:8, color:"var(--text3)" }}>+{dayItems.length-3} อื่น</div>}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── Day View ──
  const DayView = () => {
    const ds       = toDS(calDate);
    const dayItems = itemsOnDate(ds).sort((a,b)=>(a.time||"00:00").localeCompare(b.time||"00:00"));
    const noTimeTasks = dayItems.filter(e=>!e.time);
    const HOURS    = Array.from({length:18},(_,i)=>i+6);
    const isToday  = ds===todayStr;
    return (
      <div>
        {/* ══ ROW 1: Summary + Mini Calendar (ด้านบน) ══ */}
        <div style={{ display:"grid", gridTemplateColumns:"1fr 200px", gap:16, marginBottom:16, alignItems:"start" }}>

          {/* Summary list */}
          <div className="card card-p">
            <div style={{ fontWeight:700, fontSize:13, marginBottom:8, color:"var(--text2)", display:"flex", justifyContent:"space-between" }}>
              <span>📋 สรุปกิจกรรมวันนี้</span>
              <span style={{ fontWeight:400, fontSize:11, color:"var(--text3)" }}>{dayItems.length} รายการ</span>
            </div>
            {dayItems.length===0
              ? <div style={{ fontSize:12, color:"var(--text3)", padding:"12px 0" }}>ไม่มีกิจกรรมในวันนี้</div>
              : dayItems.map(item=>{
                const col=itemColor(item);
                const myStatus=(item.joinedBy||[]).includes(user.id)?"join":(item.acknowledgedBy||[]).includes(user.id)?"ack":(item.declinedBy||[]).includes(user.id)?"decline":null;
                const owner=USERS.find(u=>u.id===itemOwner(item));
                return (
                  <div key={item.id} onClick={()=>setSelectedEvent(item)}
                    style={{ display:"flex", gap:10, alignItems:"center", padding:"8px 10px", marginBottom:6,
                      borderRadius:8, cursor:"pointer",
                      background: myStatus==="decline" ? "var(--bg3)" : col.light,
                      borderLeft:`3px solid ${myStatus==="decline"?"var(--text3)":col.bg}`,
                      border:`1px solid ${myStatus==="decline"?"var(--border)":col.bg+"30"}`,
                      opacity: myStatus==="decline" ? 0.4 : 1,
                    }}>
                    <div style={{ width:10, height:10, borderRadius:"50%", background:col.bg, flexShrink:0, border:`2px solid ${col.label}` }}/>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", color:myStatus==="decline"?"var(--text3)":col.label }}>
                        {item.time&&<span style={{ fontFamily:"IBM Plex Mono", fontSize:10, marginRight:6 }}>{item.time}</span>}
                        {item.title}
                      </div>
                      {isManager&&owner&&<div style={{ fontSize:10, color:col.label, opacity:0.8 }}>👤 {owner.name.split(" ")[0]}</div>}
                    </div>
                    <span style={{ fontSize:12, flexShrink:0 }}>
                      {myStatus==="join"?"✅":myStatus==="ack"?"📋":myStatus==="decline"?"❌":"⚪"}
                    </span>
                  </div>
                );
              })
            }
          </div>

          {/* Mini calendar */}
          <div className="card card-p">
            <div style={{ fontWeight:700, fontSize:11, marginBottom:8, color:"var(--text3)" }}>{MONTH_TH[calMonth]} {calYear+543}</div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:2 }}>
              {DAY_TH.map(d=><div key={d} style={{ textAlign:"center", fontSize:8, color:"var(--text3)" }}>{d}</div>)}
              {Array.from({length:new Date(calYear,calMonth,1).getDay()}).map((_,i)=><div key={"e"+i}/>)}
              {Array.from({length:new Date(calYear,calMonth+1,0).getDate()}).map((_,i)=>{
                const day=i+1;
                const dss=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
                const isT=dss===todayStr, isSel=dss===toDS(calDate), has=itemsOnDate(dss).length>0;
                return (
                  <div key={day} onClick={()=>setCalDate(new Date(calYear,calMonth,day,12,0,0))}
                    style={{ textAlign:"center", fontSize:9, padding:"3px 0", borderRadius:4, cursor:"pointer",
                      background:isSel?"var(--accent)":isT?"rgba(0,229,160,0.15)":"transparent",
                      color:isSel?"#000":isT?"var(--accent)":"var(--text3)", fontWeight:isSel||isT?700:400 }}>
                    {day}
                    {has&&!isSel&&<div style={{ width:3,height:3,borderRadius:"50%",background:isT?"var(--accent)":"var(--text3)",margin:"0 auto" }}/>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* ══ ROW 2: Time grid (ด้านล่าง) ══ */}
        <div className="card card-p" style={{ padding:"10px 0" }}>
          <div style={{ padding:"8px 16px 10px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontWeight:700, fontSize:14, color:isToday?"var(--accent)":"var(--text)" }}>
              {calDate.toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}{isToday?" (วันนี้)":""}
            </div>
            <div style={{ fontSize:12, color:"var(--text3)" }}>{dayItems.length} กิจกรรม</div>
          </div>

          {/* All-day strip */}
          {noTimeTasks.length>0&&(
            <div style={{ padding:"6px 16px 8px", borderBottom:"1px solid var(--border)" }}>
              <div style={{ fontSize:10, color:"var(--text3)", marginBottom:4 }}>📌 ทั้งวัน</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {noTimeTasks.map(item=><EventChip key={item.id} item={item}/>)}
              </div>
            </div>
          )}

          {/* Hourly rows */}
          <div style={{ overflowY:"auto", maxHeight:480 }}>
            {HOURS.map(h=>{
              const hStr=String(h).padStart(2,"0");
              const hItems=dayItems.filter(e=>e.time&&parseInt(e.time.split(":")[0])===h);
              const isCurr=isToday&&new Date().getHours()===h;
              if (!isCurr && hItems.length===0) return (
                <div key={h} style={{ display:"flex", minHeight:40, borderTop:"1px solid var(--border)" }}>
                  <div style={{ width:52, fontSize:10, color:"var(--text3)", padding:"4px 8px", flexShrink:0, fontFamily:"IBM Plex Mono" }}>{hStr}:00</div>
                  <div style={{ flex:1, borderLeft:"1px solid var(--border)" }}/>
                </div>
              );
              return (
                <div key={h} style={{ display:"flex", gap:0, minHeight:52, borderTop:"1px solid var(--border)", background:isCurr?"rgba(0,229,160,0.03)":"transparent" }}>
                  <div style={{ width:52, fontSize:10, color:isCurr?"var(--accent)":"var(--text3)", padding:"6px 8px", flexShrink:0, fontFamily:"IBM Plex Mono", fontWeight:isCurr?700:400 }}>{hStr}:00</div>
                  <div style={{ flex:1, padding:"4px 8px", borderLeft:"1px solid var(--border)" }}>
                    {hItems.map(item=>{
                      const col=itemColor(item);
                      const isDeclined=(item.declinedBy||[]).includes(user.id);
                      const isAcked=(item.acknowledgedBy||[]).includes(user.id)&&!(item.joinedBy||[]).includes(user.id);
                      const dur=Number(item.duration||60);
                      const [,mm]=(item.time||"00:00").split(":").map(Number);
                      const endMin=mm+dur; const endH=h+Math.floor(endMin/60); const endM=endMin%60;
                      const owner=USERS.find(u=>u.id===itemOwner(item));
                      if (isDeclined) return null; // ปฏิเสธแล้ว → ไม่แสดงใน time grid
                      return (
                        <div key={item.id} onClick={()=>setSelectedEvent(item)} style={{
                          padding:"6px 10px", borderRadius:8, marginBottom:4, cursor:"pointer",
                          background:col.light,
                          borderLeft:`4px solid ${col.bg}`,
                          border:`1px solid ${col.bg}44`,
                          opacity:isAcked?0.7:1,
                        }}>
                          <div style={{ fontWeight:700, fontSize:12, color:col.label }}>{item.title}</div>
                          <div style={{ fontSize:10, color:"var(--text3)", marginTop:2 }}>
                            {item.time} – {String(endH%24).padStart(2,"0")}:{String(endM).padStart(2,"0")} · {item.type}
                            {isManager&&owner&&<span style={{ color:col.label, marginLeft:4 }}>· {owner.name.split(" ")[0]}</span>}
                            {isAcked&&<span style={{ marginLeft:4 }}>· 📋 รับทราบ</span>}
                          </div>
                          {(item.meetingLink||item.locationLink)&&(
                            <div style={{ display:"flex", gap:8, marginTop:4 }}>
                              {item.meetingLink&&<a href={item.meetingLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{ fontSize:10, color:"#3b82f6", textDecoration:"none" }}>🔗 เข้าร่วม</a>}
                              {item.locationLink&&<a href={item.locationLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{ fontSize:10, color:"#10b981", textDecoration:"none" }}>📍 แผนที่</a>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  };

  // ── Agenda View ──
  const AgendaView = () => {
    const sorted = [...allItems].filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||"").localeCompare(b.time||""));
    const grouped = {};
    sorted.forEach(e=>{ if(!grouped[e.date]) grouped[e.date]=[]; grouped[e.date].push(e); });
    return (
      <div>
        {Object.entries(grouped).map(([date,its])=>(
          <div key={date} style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"var(--accent)", marginBottom:6, fontFamily:"IBM Plex Mono", display:"flex", alignItems:"center", gap:8 }}>
              {new Date(date+"T12:00:00").toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
              {date===todayStr&&<span style={{ background:"var(--accent)", color:"#000", fontSize:9, padding:"1px 7px", borderRadius:8, fontWeight:700 }}>วันนี้</span>}
            </div>
            {its.map(item=>{
              const col=itemColor(item);
              const owner=USERS.find(u=>u.id===itemOwner(item));
              const myStatus=(item.joinedBy||[]).includes(user.id)?"join":(item.acknowledgedBy||[]).includes(user.id)?"ack":(item.declinedBy||[]).includes(user.id)?"decline":null;
              return (
                <div key={item.id} onClick={()=>setSelectedEvent(item)}
                  style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"10px 14px", borderRadius:10, marginBottom:6, cursor:"pointer",
                    background:col.light, border:`1px solid ${col.bg}40`, borderLeft:`4px solid ${col.bg}`,
                    opacity:(item.declinedBy||[]).includes(user.id)?0.5:1 }}>
                  <div style={{ width:54, flexShrink:0 }}>
                    <div style={{ fontSize:11, fontWeight:700, fontFamily:"IBM Plex Mono", color:col.label }}>{item.time||"ทั้งวัน"}</div>
                    {item.duration&&<div style={{ fontSize:9, color:"var(--text3)" }}>{item.duration}น.</div>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontWeight:700, fontSize:13 }}>{item.title}</div>
                    <div style={{ display:"flex", gap:6, marginTop:3, flexWrap:"wrap", alignItems:"center" }}>
                      <span style={{ fontSize:9, padding:"1px 7px", borderRadius:6, background:col.bg+"22", color:col.label, fontWeight:700 }}>{item.type}</span>
                      {owner&&isManager&&<span style={{ fontSize:9, padding:"1px 7px", borderRadius:6, background:col.light, color:col.label }}>👤 {owner.name.split(" ")[0]}</span>}
                      {item.meetingLink&&<span style={{ fontSize:9, color:"#3b82f6" }}>🔗 Online</span>}
                      {item.locationLink&&<span style={{ fontSize:9, color:"#10b981" }}>📍 Onsite</span>}
                    </div>
                  </div>
                  <div style={{ flexShrink:0, textAlign:"right" }}>
                    {myStatus?<span>{myStatus==="join"?"✅":myStatus==="ack"?"📋":"❌"}</span>:item.createdBy!==user.id&&<span style={{ fontSize:10, color:"#f59e0b", fontWeight:700 }}>รอตอบ</span>}
                    <div style={{ display:"flex", gap:4, marginTop:4, justifyContent:"flex-end" }}>
                      <span style={{ fontSize:9, color:"#00e5a0" }}>✅{(item.joinedBy||[]).length}</span>
                      <span style={{ fontSize:9, color:"var(--text3)" }}>📋{(item.acknowledgedBy||[]).length}</span>
                      <span style={{ fontSize:9, color:"var(--red)" }}>❌{(item.declinedBy||[]).length}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        ))}
        {!Object.keys(grouped).length&&<div style={{ textAlign:"center", padding:"60px 0", color:"var(--text3)" }}>ไม่มีกิจกรรมที่จะมาถึง</div>}
      </div>
    );
  };

  // ── Dept/Person filter panel (Manager/Exec only) ──
  const FilterPanel = () => {
    const depts = [...new Set(USERS.filter(u=>u.id!==user.id).map(u=>u.role))];
    const ROLE_LABELS_SHORT = { executive:"ผู้บริหาร", sales_manager:"Manager", sales_rep:"Sales", central_support:"Admin", finance_admin:"Finance" };
    return (
      <div className="card card-p" style={{ marginBottom:14, padding:"12px 16px" }}>
        <div style={{ fontWeight:700, fontSize:12, marginBottom:10, color:"var(--text2)" }}>🎨 แสดงปฏิทินของ</div>
        {/* ตัวเอง */}
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10, padding:"6px 10px", borderRadius:8, background:uc(user.id).light, border:`1px solid ${uc(user.id).bg}40` }}>
          <div style={{ width:12, height:12, borderRadius:"50%", background:uc(user.id).bg, border:`2px solid ${uc(user.id).label}` }}/>
          <span style={{ fontSize:12, fontWeight:700, color:uc(user.id).label }}>👤 ของฉัน (แสดงเสมอ)</span>
        </div>
        {/* แยกตาม dept */}
        {depts.map(role=>{
          const deptUsers = USERS.filter(u=>u.role===role&&u.id!==user.id);
          const allOn = deptUsers.every(u=>isVisible(u.id));
          const someOn = deptUsers.some(u=>isVisible(u.id));
          return (
            <div key={role} style={{ marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                <button onClick={()=>toggleDept(role)} style={{
                  width:16, height:16, borderRadius:4, border:"2px solid var(--border)", cursor:"pointer",
                  background:allOn?"var(--accent)":someOn?"rgba(0,229,160,0.4)":"transparent",
                  flexShrink:0,
                }}/>
                <span style={{ fontSize:11, fontWeight:700, color:"var(--text2)" }}>{ROLE_LABELS_SHORT[role]||role}</span>
                <span style={{ fontSize:10, color:"var(--text3)" }}>({deptUsers.length} คน)</span>
              </div>
              <div style={{ paddingLeft:24, display:"flex", flexWrap:"wrap", gap:6 }}>
                {deptUsers.map(u=>{
                  const col=uc(u.id);
                  const on=isVisible(u.id);
                  return (
                    <button key={u.id} onClick={()=>toggleUser(u.id)}
                      style={{ display:"flex", alignItems:"center", gap:6, padding:"4px 10px", borderRadius:20, cursor:"pointer", border:`2px solid ${on?col.bg:"var(--border)"}`,
                        background:on?col.light:"transparent", transition:"all 0.15s" }}>
                      <div style={{ width:10, height:10, borderRadius:"50%", background:on?col.bg:"var(--border)", flexShrink:0 }}/>
                      <span style={{ fontSize:11, fontWeight:on?700:400, color:on?col.label:"var(--text3)" }}>
                        {u.avatar} {u.name.split(" ")[0]}
                        {u.zone&&<span style={{ fontSize:9, opacity:0.7 }}> ({u.zone})</span>}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  // ── Main Render ──
  return (
    <div className="page fade-up">
      {selectedEvent && <EventDetailModal item={selectedEvent} onClose={()=>setSelectedEvent(null)}/>}

      {/* Header */}
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">🗓 {isManager ? "ปฏิทินภาพรวมทีม" : "ปฏิทินของฉัน"}</div>
          <div className="ph-sub">
            {isManager
              ? `ภาพรวมกิจกรรมทีม · ${allItems.length} รายการ`
              : `กิจกรรมและนัดหมายที่เกี่ยวกับคุณ · ${allItems.length} รายการ`}
            {pendingMyRsvp.length>0 && <span style={{ marginLeft:10, color:"#f59e0b", fontWeight:700 }}>⚠️ รอตอบรับ {pendingMyRsvp.length} รายการ</span>}
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          {/* View toggle */}
          <div style={{ display:"flex", borderRadius:8, overflow:"hidden", border:"1px solid var(--border)" }}>
            {[["month","📅 เดือน"],["day","🗓 วัน"],["agenda","📋 รายการ"]].map(([v,l])=>(
              <button key={v} onClick={()=>setViewMode(v)} style={{
                padding:"6px 12px", border:"none", cursor:"pointer", fontSize:11, fontWeight:viewMode===v?700:400,
                background:viewMode===v?"var(--accent)":"var(--bg3)", color:viewMode===v?"#000":"var(--text2)",
                borderRight:"1px solid var(--border)",
              }}>{l}</button>
            ))}
          </div>
          <button className="btn btn-accent btn-sm" onClick={()=>setShowForm(true)}>+ เพิ่มกิจกรรม</button>
        </div>
      </div>

      {/* ── Pending RSVP Banner ── */}
      {pendingMyRsvp.length > 0 && (
        <div style={{ background:"rgba(245,158,11,0.08)", border:"1px solid rgba(245,158,11,0.3)",
          borderRadius:10, padding:"12px 16px", marginBottom:14 }}>
          <div style={{ fontWeight:700, fontSize:13, color:"#f59e0b", marginBottom:8 }}>
            📨 คำเชิญรอตอบรับ ({pendingMyRsvp.length} รายการ)
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:0 }}>
            {pendingMyRsvp.map(item => (
              <RsvpBannerItem
                key={item.id}
                item={item}
                user={user}
                rsvpAction={rsvpAction}
                ROLE_RANK={ROLE_RANK}
              />
            ))}
          </div>
        </div>
      )}

      {/* Color legend — แสดงสีประจำตัวแบบ compact */}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:14, alignItems:"center" }}>
        <span style={{ fontSize:10, color:"var(--text3)", fontWeight:700 }}>สี:</span>
        {USERS.filter(u=> isManager ? true : u.id===user.id).map(u=>{
          const col=uc(u.id); const isMe=u.id===user.id;
          return (
            <div key={u.id} style={{ display:"flex", alignItems:"center", gap:4, padding:"2px 8px", borderRadius:12,
              background:col.light, border:`1px solid ${col.bg}40`, opacity:(!isManager||isVisible(u.id)||isMe)?1:0.35 }}>
              <div style={{ width:8, height:8, borderRadius:"50%", background:col.bg }}/>
              <span style={{ fontSize:10, color:col.label, fontWeight:isMe?700:400 }}>
                {u.name.split(" ")[0]}{isMe?" (ฉัน)":""}
              </span>
            </div>
          );
        })}
      </div>

      {/* Filter Panel — Manager/Exec */}
      {isManager && <FilterPanel/>}

      {/* Calendar Nav */}
      {viewMode!=="agenda" && (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
          <button className="btn btn-ghost btn-sm" onClick={navPrev}>‹</button>
          <div style={{ flex:1, textAlign:"center", fontWeight:700, fontSize:14 }}>
            {viewMode==="month"?`${MONTH_TH[calMonth]} ${calYear+543}`:calDate.toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={navNext}>›</button>
          <button className="btn btn-ghost btn-sm" onClick={()=>setCalDate(new Date())} style={{ color:"var(--accent)", borderColor:"rgba(0,229,160,0.3)" }}>วันนี้</button>
          <select className="fselect" style={{ width:"auto", padding:"4px 8px", fontSize:11 }} value={calYear}
            onChange={e=>{const d=new Date(calDate);d.setFullYear(Number(e.target.value));setCalDate(d);}}>
            {Array.from({length:101},(_,i)=>new Date().getFullYear()-100+i).map(y=>(
              <option key={y} value={y}>{y+543}</option>
            ))}
          </select>
        </div>
      )}

      {viewMode==="month"  && <MonthView/>}
      {viewMode==="day"    && <DayView/>}
      {viewMode==="agenda" && <AgendaView/>}

      {/* Add Event Modal */}
      {showForm && (
        <div className="overlay" onClick={()=>setShowForm(false)}>
          <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{ maxWidth:560 }}>
            <div className="modal-hd">
              <div className="modal-title">🗓 เพิ่มกิจกรรม / นัดหมาย</div>
              <button className="modal-close" onClick={()=>setShowForm(false)}>✕</button>
            </div>
            <div className="frow">
              <div className="fg" style={{ flex:2 }}>
                <label className="flabel">ชื่อกิจกรรม *</label>
                <input className="finput" value={evtForm.title} onChange={e=>setEF("title",e.target.value)} placeholder="เช่น ประชุมทีม, Demo ลูกค้า, อบรม..." autoFocus />
              </div>
              <div className="fg">
                <label className="flabel">ประเภท</label>
                <select className="fselect" value={evtForm.type} onChange={e=>setEF("type",e.target.value)}>
                  {EVENT_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10 }}>
              <div className="fg">
                <label className="flabel">📅 วันที่ *</label>
                <input className="finput" type="date" value={evtForm.date} onChange={e=>setEF("date",e.target.value)} style={{ colorScheme:"dark" }}/>
              </div>
              <div className="fg">
                <label className="flabel">🕐 เวลา (24h)</label>
                <select className="fselect" value={evtForm.time} onChange={e=>setEF("time",e.target.value)}>
                  {Array.from({length:48},(_,i)=>{const h=Math.floor(i/2).toString().padStart(2,"0");const m=i%2===0?"00":"30";return `${h}:${m}`;}).map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="fg">
                <label className="flabel">⏱ ระยะเวลา</label>
                <select className="fselect" value={evtForm.duration} onChange={e=>setEF("duration",e.target.value)}>
                  {["30","45","60","90","120","180","240"].map(d=><option key={d} value={d}>{Number(d)<60?d+"น.":`${Math.floor(Number(d)/60)}ชม.`}</option>)}
                </select>
              </div>
            </div>
            <div className="fg">
              <label className="flabel">รายละเอียด</label>
              <textarea className="ftextarea" value={evtForm.description} onChange={e=>setEF("description",e.target.value)} placeholder="รายละเอียดกิจกรรม..." style={{ minHeight:60 }}/>
            </div>
            <div className="frow">
              <div className="fg">
                <label className="flabel">🔗 Meeting Link</label>
                <input className="finput" value={evtForm.meetingLink} onChange={e=>setEF("meetingLink",e.target.value)} placeholder="https://teams.microsoft.com/..."/>
              </div>
              <div className="fg">
                <label className="flabel">📍 Google Maps (Onsite)</label>
                <input className="finput" value={evtForm.locationLink} onChange={e=>setEF("locationLink",e.target.value)} placeholder="https://maps.google.com/..."/>
              </div>
            </div>
            {/* Invite */}
            <div style={{ background:"var(--bg3)", borderRadius:10, padding:12, marginBottom:8 }}>
              <div style={{ fontSize:12, fontWeight:700, color:"var(--text2)", marginBottom:8 }}>📨 เชิญผู้เข้าร่วม</div>
              <div style={{ fontSize:11, color:"var(--text3)", marginBottom:6 }}>เชิญทั้ง Role</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:10 }}>
                {Object.values(ROLES).map(r=>(
                  <button key={r} className="btn btn-xs" onClick={()=>toggleInviteRole(r)} style={{
                    background:evtForm.inviteRoles.includes(r)?"var(--accent-dim)":"transparent",
                    color:evtForm.inviteRoles.includes(r)?"var(--accent)":"var(--text3)",
                    borderColor:evtForm.inviteRoles.includes(r)?"rgba(0,229,160,0.3)":"var(--border)",
                  }}>{r}</button>
                ))}
              </div>
              <div style={{ fontSize:11, color:"var(--text3)", marginBottom:6 }}>เชิญรายคน</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {USERS.filter(u=>u.id!==user.id).map(u=>{
                  const col=uc(u.id); const on=evtForm.inviteUsers.includes(u.id);
                  return (
                    <button key={u.id} onClick={()=>toggleInviteUser(u.id)}
                      style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 10px", borderRadius:20, cursor:"pointer",
                        border:on?deptBorder(u.id):"2px solid var(--border)",
                        background:on?col.light:"transparent" }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", background:on?col.bg:"var(--border)" }}/>
                      <span style={{ fontSize:11, fontWeight:on?700:400, color:on?col.label:"var(--text3)" }}>
                        {u.avatar} {u.name.split(" ")[0]}
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
            <div className="modal-ft">
              <button className="btn btn-ghost" onClick={()=>setShowForm(false)}>ยกเลิก</button>
              <button className="btn btn-accent" onClick={saveEvent} disabled={!evtForm.title||!evtForm.date}>
                📅 สร้างกิจกรรม & ส่งคำเชิญ
              </button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}



// ============================================================
// USER MANAGEMENT PAGE
// ============================================================
function UserManagementPage({ customUsers, setCustomUsers, customRoles, setCustomRoles, currentUser, notify }) {
  const [tab, setTab]               = useState("users");      // "users" | "roles"
  const [showUserForm, setShowUserForm] = useState(false);
  const [editUser, setEditUser]     = useState(null);
  const [showRoleForm, setShowRoleForm] = useState(false);
  const [editRole, setEditRole]     = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);

  // เฉพาะ Exec และ Exec_Asst เท่านั้นที่จัดการ Users & Roles ได้
  const canManage = [ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role) ||
    (customRoles.find(r=>r.id===currentUser.role)?.perms||[]).includes("manage_users");
  if (!canManage) return (
    <div className="page fade-up">
      <div className="ph"><div className="ph-left"><div className="ph-title">👥 จัดการ Users & Roles</div></div></div>
      <div className="card card-p" style={{ textAlign:"center", padding:40 }}>
        <div style={{ fontSize:32, marginBottom:8 }}>🔒</div>
        <div style={{ color:"var(--text3)" }}>คุณไม่มีสิทธิ์เข้าถึงส่วนนี้</div>
      </div>
    </div>
  );

  // ── USER FORM ──
  const UserForm = ({ u, onClose }) => {
    const isNew = !u;
    const [form, setForm] = useState({
      id: u?.id || Date.now(),
      name: u?.name || "", email: u?.email || "", password: u?.password || "1234",
      role: u?.role || customRoles[0]?.id || "sales_rep",
      zone: u?.zone || "", avatar: u?.avatar || "", active: u?.active !== false,
    });
    const setF = (k,v) => setForm(f=>({...f,[k]:v}));
    const genAvatar = (name) => name.split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
    const save = () => {
      if (!form.name || !form.email) return;
      const avatar = form.avatar || genAvatar(form.name);
      if (isNew) {
        setCustomUsers(us=>[...us, {...form, avatar}]);
        notify(`เพิ่มผู้ใช้ ${form.name} เรียบร้อย ✓`, "ok");
      } else {
        setCustomUsers(us=>us.map(u2=>u2.id===form.id?{...form,avatar}:u2));
        notify(`แก้ไขข้อมูล ${form.name} เรียบร้อย ✓`, "ok");
      }
      onClose();
    };
    const role = customRoles.find(r=>r.id===form.role);
    return (
      <div className="overlay" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:480 }}>
          <div className="modal-hd">
            <div className="modal-title">{isNew?"➕ เพิ่มผู้ใช้ใหม่":"✏️ แก้ไขข้อมูลผู้ใช้"}</div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
          <div className="frow">
            <div className="fg" style={{ flex:2 }}>
              <label className="flabel">ชื่อ-นามสกุล *</label>
              <input className="finput" value={form.name} autoFocus
                onChange={e=>{ setF("name",e.target.value); if(!form.avatar) setF("avatar",genAvatar(e.target.value)); }}
                placeholder="เช่น สมศรี มีสุข" />
            </div>
            <div className="fg">
              <label className="flabel">Avatar (2 ตัว)</label>
              <input className="finput" value={form.avatar} maxLength={2}
                onChange={e=>setF("avatar",e.target.value.toUpperCase())}
                placeholder={genAvatar(form.name)||"สม"} />
            </div>
          </div>
          <div className="fg">
            <label className="flabel">อีเมล *</label>
            <input className="finput" type="email" value={form.email}
              onChange={e=>setF("email",e.target.value)} placeholder="user@company.co.th" />
          </div>
          <div className="frow">
            <div className="fg">
              <label className="flabel">รหัสผ่าน</label>
              <input className="finput" value={form.password}
                onChange={e=>setF("password",e.target.value)} placeholder="1234" />
            </div>
            <div className="fg">
              <label className="flabel">โซน/ภาค</label>
              <input className="finput" value={form.zone}
                onChange={e=>setF("zone",e.target.value)} placeholder="เช่น ภาคเหนือ" />
            </div>
          </div>
          <div className="fg">
            <label className="flabel">Role / ตำแหน่ง</label>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:8 }}>
              {customRoles.filter(r=>r.id).map(r=>{
                // exec_assistant — กำหนดได้โดย Exec เท่านั้น
                const isExecAsstRole = r.id === ROLES.EXEC_ASST || r.id === "exec_assistant";
                const canAssign = !isExecAsstRole || currentUser.role === ROLES.EXEC;
                return (
                  <button key={r.id}
                    onClick={()=>canAssign && setF("role",r.id)}
                    title={!canAssign?"เฉพาะผู้บริหาร (Exec) เท่านั้นที่กำหนดตำแหน่งนี้ได้":""}
                    style={{ padding:"5px 12px", borderRadius:20,
                      cursor:canAssign?"pointer":"not-allowed",
                      fontSize:11, fontWeight:form.role===r.id?700:400,
                      border:`2px solid ${form.role===r.id?r.color:canAssign?"var(--border)":"var(--border)"}`,
                      background:form.role===r.id?r.color+"22":"transparent",
                      color:form.role===r.id?r.color:canAssign?"var(--text3)":"var(--border)",
                      opacity:canAssign?1:0.4 }}>
                    {r.name}
                    <span style={{ marginLeft:4, fontSize:9, opacity:0.7 }}>Rank {r.rank}</span>
                    {isExecAsstRole && <span style={{ marginLeft:4, fontSize:8, color:"#f59e0b" }}>🔒Exec</span>}
                  </button>
                );
              })}
            </div>
            {role && (
              <div style={{ fontSize:10, color:"var(--text3)", padding:"6px 10px", borderRadius:6, background:"var(--bg3)", border:`1px solid ${role.color}30` }}>
                <span style={{ color:role.color, fontWeight:700 }}>Rank {role.rank}</span>
                {" — "}สิทธิ์ {role.perms?.length||0} รายการ
              </div>
            )}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
            <input type="checkbox" id="activeChk" checked={form.active}
              onChange={e=>setF("active",e.target.checked)} />
            <label htmlFor="activeChk" style={{ fontSize:12, cursor:"pointer" }}>เปิดใช้งาน (Active)</label>
          </div>
          <div className="modal-ft">
            <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
            <button className="btn btn-accent" onClick={save} disabled={!form.name||!form.email}>
              {isNew?"➕ เพิ่มผู้ใช้":"💾 บันทึก"}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── ROLE FORM ──
  const RoleForm = ({ r, onClose }) => {
    const isNew = !r;
    const [form, setForm] = useState({
      id: r?.id || "role_"+Date.now(),
      name: r?.name || "", color: r?.color || "#6b7280",
      rank: r?.rank || 2, preset: r?.preset || "rank2",
      perms: r?.perms || [...PERM_PRESETS.rank2.perms],
      isSystem: r?.isSystem || false,
    });
    const setF = (k,v) => setForm(f=>({...f,[k]:v}));
    const togglePerm = (pid) => setForm(f=>({...f,
      perms: f.perms.includes(pid) ? f.perms.filter(x=>x!==pid) : [...f.perms,pid]
    }));
    const applyPreset = (key) => {
      const p = PERM_PRESETS[key];
      if (p) setForm(f=>({...f, preset:key, rank:p.rank, perms:[...p.perms]}));
    };
    const save = () => {
      if (!form.name) return;
      if (isNew) {
        setCustomRoles(rs=>[...rs, form]);
        notify(`สร้าง Role "${form.name}" เรียบร้อย ✓`, "ok");
      } else {
        setCustomRoles(rs=>rs.map(r2=>r2.id===form.id?form:r2));
        notify(`แก้ไข Role "${form.name}" เรียบร้อย ✓`, "ok");
      }
      onClose();
    };
    const permGroups = [...new Set(ALL_PERMISSIONS.map(p=>p.group))];
    const COLORS = ["#7c3aed","#0ea5e9","#00e5a0","#f59e0b","#ec4899","#ef4444","#06b6d4","#8b5cf6","#10b981","#6b7280"];
    return (
      <div className="overlay" onClick={onClose}>
        <div className="modal modal-lg" onClick={e=>e.stopPropagation()} style={{ maxWidth:580, maxHeight:"90vh", overflowY:"auto" }}>
          <div className="modal-hd">
            <div className="modal-title">{isNew?"➕ สร้าง Role ใหม่":"✏️ แก้ไข Role"}</div>
            <button className="modal-close" onClick={onClose}>✕</button>
          </div>
          {/* Basic info */}
          <div className="frow">
            <div className="fg" style={{ flex:2 }}>
              <label className="flabel">ชื่อตำแหน่ง *</label>
              <input className="finput" value={form.name} autoFocus
                onChange={e=>setF("name",e.target.value)} placeholder="เช่น Pre-sales Consultant" />
            </div>
            <div className="fg">
              <label className="flabel">Rank (1–5)</label>
              <select className="fselect" value={form.rank} onChange={e=>setF("rank",Number(e.target.value))}>
                {[5,4,3,2,1].map(r=><option key={r} value={r}>Rank {r} — {PERM_PRESETS["rank"+r]?.label||r}</option>)}
              </select>
            </div>
          </div>
          {/* Color picker */}
          <div className="fg">
            <label className="flabel">สีประจำตำแหน่ง</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center" }}>
              {COLORS.map(c=>(
                <button key={c} onClick={()=>setF("color",c)}
                  style={{ width:24, height:24, borderRadius:"50%", background:c, border:`3px solid ${form.color===c?"#fff":"transparent"}`,
                    cursor:"pointer", outline:form.color===c?`2px solid ${c}`:"none" }}/>
              ))}
              <input type="color" value={form.color} onChange={e=>setF("color",e.target.value)}
                style={{ width:28, height:28, borderRadius:4, border:"1px solid var(--border)", cursor:"pointer", padding:2 }}/>
              <span style={{ fontSize:10, color:"var(--text3)" }}>เลือกสีเอง</span>
            </div>
          </div>
          {/* Preset buttons */}
          <div className="fg">
            <label className="flabel">เลือก Preset เริ่มต้น</label>
            <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
              {Object.entries(PERM_PRESETS).map(([key,p])=>(
                <button key={key} onClick={()=>applyPreset(key)}
                  style={{ padding:"4px 10px", borderRadius:12, fontSize:10, cursor:"pointer",
                    border:`1.5px solid ${form.preset===key?p.color:"var(--border)"}`,
                    background:form.preset===key?p.color+"22":"transparent",
                    color:form.preset===key?p.color:"var(--text3)", fontWeight:form.preset===key?700:400 }}>
                  {p.label}
                </button>
              ))}
            </div>
          </div>
          {/* Permission matrix */}
          <div className="fg">
            <label className="flabel">สิทธิ์การเข้าถึง ({form.perms.length}/{ALL_PERMISSIONS.length})</label>
            <div style={{ display:"flex", justifyContent:"flex-end", gap:6, marginBottom:8 }}>
              <button className="btn btn-xs btn-ghost" onClick={()=>setF("perms",[])}>ล้างทั้งหมด</button>
              <button className="btn btn-xs btn-accent" onClick={()=>setF("perms",ALL_PERMISSIONS.map(p=>p.id))}>เลือกทั้งหมด</button>
            </div>
            {permGroups.map(group=>{
              const groupPerms = ALL_PERMISSIONS.filter(p=>p.group===group);
              const allOn = groupPerms.every(p=>form.perms.includes(p.id));
              return (
                <div key={group} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:5 }}>
                    <button onClick={()=>{
                      const ids=groupPerms.map(p=>p.id);
                      setForm(f=>({...f, perms: allOn ? f.perms.filter(x=>!ids.includes(x)) : [...new Set([...f.perms,...ids])]}));
                    }} style={{ width:16,height:16,borderRadius:4,border:`2px solid ${allOn?form.color:"var(--border)"}`,
                      background:allOn?form.color:"transparent",cursor:"pointer",flexShrink:0 }}/>
                    <span style={{ fontSize:11, fontWeight:700, color:"var(--text2)" }}>{group}</span>
                  </div>
                  <div style={{ paddingLeft:22, display:"flex", flexWrap:"wrap", gap:5 }}>
                    {groupPerms.map(p=>{
                      const on=form.perms.includes(p.id);
                      return (
                        <button key={p.id} onClick={()=>togglePerm(p.id)}
                          style={{ padding:"3px 8px", borderRadius:8, fontSize:10, cursor:"pointer",
                            border:`1px solid ${on?form.color:"var(--border)"}`,
                            background:on?form.color+"22":"transparent",
                            color:on?form.color:"var(--text3)", fontWeight:on?700:400 }}>
                          {on?"✓ ":""}{p.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
          {/* Preview */}
          <div style={{ padding:"10px 12px", borderRadius:8, background:`${form.color}18`, border:`1px solid ${form.color}40`, marginBottom:8 }}>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:36,height:36,borderRadius:"50%",background:form.color,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#fff" }}>
                {form.name.slice(0,2)||"??"}
              </div>
              <div>
                <div style={{ fontWeight:700, color:form.color }}>{form.name||"ชื่อตำแหน่ง"}</div>
                <div style={{ fontSize:10, color:"var(--text3)" }}>Rank {form.rank} · {form.perms.length} สิทธิ์</div>
              </div>
            </div>
          </div>
          <div className="modal-ft">
            <button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button>
            <button className="btn btn-accent" onClick={save} disabled={!form.name}>
              {isNew?"➕ สร้าง Role":"💾 บันทึก Role"}
            </button>
          </div>
        </div>
      </div>
    );
  };

  // ── MAIN RENDER ──
  return (
    <div className="page fade-up">
      {showUserForm && <UserForm u={editUser} onClose={()=>{setShowUserForm(false);setEditUser(null);}} />}
      {showRoleForm && <RoleForm r={editRole} onClose={()=>{setShowRoleForm(false);setEditRole(null);}} />}
      {confirmDel && (
        <div className="overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{ maxWidth:360, textAlign:"center" }}>
            <div style={{ fontSize:36, marginBottom:8 }}>🗑</div>
            <div style={{ fontWeight:700, fontSize:15, marginBottom:6 }}>{confirmDel.msg}</div>
            <div style={{ fontSize:12, color:"var(--text3)", marginBottom:16 }}>{confirmDel.sub}</div>
            <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
              <button className="btn btn-ghost" onClick={()=>setConfirmDel(null)}>ยกเลิก</button>
              <button className="btn btn-red" onClick={()=>{confirmDel.onConfirm();setConfirmDel(null);}}>ลบ</button>
            </div>
          </div>
        </div>
      )}

      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">👥 จัดการ Users & Roles</div>
          <div className="ph-sub">{customUsers.length} ผู้ใช้ · {customRoles.length} ตำแหน่ง</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs" style={{ marginBottom:16 }}>
        <button className={`tab ${tab==="users"?"active":""}`} onClick={()=>setTab("users")}>
          👤 ผู้ใช้งาน <span style={{ opacity:0.6 }}>({customUsers.length})</span>
        </button>
        <button className={`tab ${tab==="roles"?"active":""}`} onClick={()=>setTab("roles")}>
          🎭 Roles & สิทธิ์ <span style={{ opacity:0.6 }}>({customRoles.length})</span>
        </button>
      </div>

      {/* ── USERS TAB ── */}
      {tab==="users" && (
        <div>
          <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:12 }}>
            <button className="btn btn-accent" onClick={()=>{setEditUser(null);setShowUserForm(true);}}>
              ➕ เพิ่มผู้ใช้
            </button>
          </div>
          {/* Group by role rank */}
          {[5,4,3,2,1].map(rank=>{
            const rankRoles = customRoles.filter(r=>r.rank===rank);
            const rankUsers = customUsers.filter(u=>rankRoles.some(r=>r.id===u.role));
            if (!rankUsers.length) return null;
            const rankPreset = PERM_PRESETS["rank"+rank];
            return (
              <div key={rank} style={{ marginBottom:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                  <div style={{ fontSize:11, fontWeight:700, color:rankPreset?.color||"var(--text3)",
                    textTransform:"uppercase", letterSpacing:"0.8px" }}>
                    ⭐ Rank {rank} — {rankPreset?.label?.split("—")[1]?.trim()||""}
                  </div>
                  <div style={{ flex:1, height:1, background:"var(--border)" }}/>
                  <span style={{ fontSize:10, color:"var(--text3)" }}>{rankUsers.length} คน</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:10 }}>
                  {rankUsers.map(u=>{
                    const role = customRoles.find(r=>r.id===u.role);
                    const col = role?.color || "#6b7280";
                    return (
                      <div key={u.id} style={{ padding:"12px 14px", borderRadius:10, background:"var(--bg3)",
                        border:`1px solid ${col}30`, borderLeft:`4px solid ${col}`,
                        opacity:u.active===false?0.55:1 }}>
                        <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:8 }}>
                          <div style={{ width:38,height:38,borderRadius:"50%",background:col+"30",
                            border:`2px solid ${col}`,display:"flex",alignItems:"center",
                            justifyContent:"center",fontSize:12,fontWeight:800,color:col,flexShrink:0 }}>
                            {u.avatar||u.name.slice(0,2)}
                          </div>
                          <div style={{ flex:1,minWidth:0 }}>
                            <div style={{ fontWeight:700, fontSize:13 }}>{u.name}</div>
                            <div style={{ fontSize:10, color:col }}>{role?.name||u.role}{u.zone?` · ${u.zone}`:""}</div>
                          </div>
                          {u.active===false && <span style={{ fontSize:9,padding:"1px 6px",borderRadius:8,background:"var(--bg2)",color:"var(--text3)" }}>ปิดใช้งาน</span>}
                        </div>
                        <div style={{ fontSize:10, color:"var(--text3)", marginBottom:8 }}>📧 {u.email}</div>
                        <div style={{ display:"flex", gap:6 }}>
                          <button className="btn btn-xs btn-ghost" style={{ flex:1 }}
                            onClick={()=>{setEditUser(u);setShowUserForm(true);}}>✏️ แก้ไข</button>
                          {u.id !== currentUser.id && (
                            <button className="btn btn-xs btn-ghost" style={{ color:"var(--red)", borderColor:"rgba(239,68,68,0.3)" }}
                              onClick={()=>setConfirmDel({
                                msg:"ลบผู้ใช้นี้?", sub:u.name,
                                onConfirm:()=>{ setCustomUsers(us=>us.filter(x=>x.id!==u.id)); notify(`ลบ ${u.name} แล้ว`,"ok"); }
                              })}>🗑</button>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── ROLES TAB ── */}
      {tab==="roles" && (
        <div>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div style={{ fontSize:12, color:"var(--text3)" }}>กำหนด Role และสิทธิ์การเข้าถึงแต่ละส่วน</div>
            <button className="btn btn-accent" onClick={()=>{setEditRole(null);setShowRoleForm(true);}}>
              ➕ สร้าง Role ใหม่
            </button>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))", gap:12 }}>
            {[5,4,3,2,1].flatMap(rank=>customRoles.filter(r=>r.rank===rank)).map(role=>{
              const usersInRole = customUsers.filter(u=>u.role===role.id);
              const permGroups = [...new Set(ALL_PERMISSIONS.map(p=>p.group))];
              return (
                <div key={role.id} style={{ padding:14, borderRadius:10, background:"var(--bg3)",
                  border:`1px solid ${role.color}40`, borderTop:`3px solid ${role.color}` }}>
                  <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:10 }}>
                    <div style={{ width:32,height:32,borderRadius:"50%",background:role.color,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#fff",flexShrink:0 }}>
                      {role.rank}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:role.color }}>{role.name}</div>
                      <div style={{ fontSize:10, color:"var(--text3)" }}>
                        Rank {role.rank} · {role.perms?.length||0} สิทธิ์ · {usersInRole.length} คน
                        {role.isSystem && <span style={{ marginLeft:4, color:"#f59e0b" }}>⚙️ System</span>}
                      </div>
                    </div>
                    <button className="btn btn-xs btn-ghost"
                      onClick={()=>{setEditRole(role);setShowRoleForm(true);}}>✏️</button>
                    {!role.isSystem && usersInRole.length===0 && (
                      <button className="btn btn-xs btn-ghost" style={{ color:"var(--red)", borderColor:"rgba(239,68,68,0.3)" }}
                        onClick={()=>setConfirmDel({
                          msg:`ลบ Role "${role.name}"?`, sub:"Role ที่ลบแล้วไม่สามารถกู้คืนได้",
                          onConfirm:()=>{ setCustomRoles(rs=>rs.filter(r=>r.id!==role.id)); notify(`ลบ Role ${role.name} แล้ว`,"ok"); }
                        })}>🗑</button>
                    )}
                  </div>
                  {/* Permission summary by group */}
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                    {permGroups.map(group=>{
                      const groupPerms = ALL_PERMISSIONS.filter(p=>p.group===group);
                      const hasSome = groupPerms.some(p=>(role.perms||[]).includes(p.id));
                      const hasAll  = groupPerms.every(p=>(role.perms||[]).includes(p.id));
                      if (!hasSome) return null;
                      return (
                        <span key={group} style={{ fontSize:9, padding:"2px 7px", borderRadius:8,
                          background:hasAll?role.color+"22":"rgba(107,114,128,0.12)",
                          color:hasAll?role.color:"var(--text3)",
                          border:`1px solid ${hasAll?role.color+"40":"var(--border)"}` }}>
                          {hasAll?"✓":"++"} {group}
                        </span>
                      );
                    })}
                  </div>
                  {/* Users in role */}
                  {usersInRole.length > 0 && (
                    <div style={{ marginTop:8, display:"flex", gap:4, flexWrap:"wrap" }}>
                      {usersInRole.map(u=>(
                        <span key={u.id} style={{ fontSize:9, padding:"2px 6px", borderRadius:10,
                          background:"var(--bg2)", color:"var(--text3)", border:"1px solid var(--border)" }}>
                          {u.avatar||u.name.slice(0,2)} {u.name.split(" ")[0]}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function SettingsPage({ discountLimits, setDiscountLimits, perUserLimits, setPerUserLimits, currentUser, notify }) {
  const isExec    = [ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const isManager = [ROLES.MANAGER, ROLES.EXEC, ROLES.EXEC_ASST].includes(currentUser.role);
  const canEditAny   = isExec;
  const canEditSales = isManager;
  const salesUsers = USERS.filter(u => u.role === ROLES.SALES);

  // ── Tab ──
  const [tab, setTab] = useState('role');
  const [saved, setSaved] = useState(false);
  const [changelog, setChangelog] = useState(() => {
    try { return JSON.parse(localStorage.getItem('discount_changelog') || '[]'); } catch(e) { return []; }
  });
  const [draft, setDraft] = useState({
    [ROLES.SALES]:   String(discountLimits[ROLES.SALES]?.max   ?? 10),
    [ROLES.MANAGER]: String(discountLimits[ROLES.MANAGER]?.max ?? 20),
    [ROLES.EXEC]:    String(discountLimits[ROLES.EXEC]?.max    ?? 100),
  });

  const defaultPersonal = () => {
    const d = {};
    salesUsers.forEach(u => {
      d[u.id] = String(perUserLimits[u.id] ?? discountLimits[ROLES.SALES]?.max ?? 10);
    });
    return d;
  };
  const [personalDraft, setPersonalDraft] = useState(defaultPersonal);
  const [personalSaved, setPersonalSaved] = useState(false);
  const [applyAllVal, setApplyAllVal] = useState(String(discountLimits[ROLES.SALES]?.max ?? 10));

  const setPersonalVal = (userId, v) => setPersonalDraft(d => ({ ...d, [userId]: v }));

  const handleApplyAll = () => {
    const v = Math.max(0, Math.min(100, Number(applyAllVal) || 0));
    const d = {};
        salesUsers.forEach(u => { d[u.id] = String(v); });
    setPersonalDraft(d);
  };

  const handleSavePersonal = () => {
    const mgrLim = discountLimits[ROLES.MANAGER]?.max ?? 20;
    const next = {};
    let err = null;
    salesUsers.forEach(u => {
      const v = Math.max(0, Math.min(100, Number(personalDraft[u.id]) || 0));
      if (v > mgrLim) { err = `${u.name.split(" ")[0]} เกิน Manager limit (${mgrLim}%)`; }
      next[u.id] = v;
    });
    if (err) { notify("⚠️ " + err, "err"); return; }
    setPerUserLimits(next);
    setPersonalSaved(true);
    notify("บันทึกสิทธิ์ส่วนลดรายบุคคลแล้ว ✓", "ok");
    setTimeout(() => setPersonalSaved(false), 2000);
  };

  const handleResetPersonal = (userId) => {
    const roleDefault = discountLimits[ROLES.SALES]?.max ?? 10;
    setPersonalDraft(d => ({ ...d, [userId]: String(roleDefault) }));
  };

  const handleClearAllPersonal = () => {
    setPersonalDraft(defaultPersonal());
    const emptyNext = {};
    salesUsers.forEach(u => { emptyNext[u.id] = discountLimits[ROLES.SALES]?.max ?? 10; });
    setPerUserLimits(emptyNext);
    notify("รีเซ็ตเป็น Role limit ทุกคนแล้ว", "ok");
  };

  // ── Role tab handlers ──
  const setVal = (role, v) => setDraft(d => ({ ...d, [role]: v }));

  const handleSave = () => {
    const salesMax   = Math.max(0, Math.min(100, Number(draft[ROLES.SALES])   || 0));
    const managerMax = canEditAny ? Math.max(0, Math.min(100, Number(draft[ROLES.MANAGER]) || 0)) : (discountLimits[ROLES.MANAGER]?.max ?? 20);
    const execMax    = canEditAny ? Math.max(0, Math.min(100, Number(draft[ROLES.EXEC])    || 100)) : (discountLimits[ROLES.EXEC]?.max ?? 100);

    if (managerMax < salesMax) { notify("Manager ต้องมีสิทธิ์ ≥ Sales", "err"); return; }
    if (execMax    < managerMax) { notify("Exec ต้องมีสิทธิ์ ≥ Manager", "err"); return; }

    const next = {
      [ROLES.SALES]:   { max: salesMax,   label: "Sales" },
      [ROLES.MANAGER]: { max: managerMax, label: "Manager" },
      [ROLES.EXEC]:    { max: execMax,    label: "Exec" },
    };
    setDiscountLimits(next);

    const entry = {
      date: new Date().toISOString().split("T")[0],
      by: currentUser.name,
      prev: { sales: discountLimits[ROLES.SALES]?.max, manager: discountLimits[ROLES.MANAGER]?.max, exec: discountLimits[ROLES.EXEC]?.max },
      next: { sales: salesMax, manager: managerMax, exec: execMax },
    };
    const newLog = [entry, ...changelog].slice(0, 50);
    setChangelog(newLog);
    try { localStorage.setItem("discount_changelog", JSON.stringify(newLog)); } catch(e) {}

    setSaved(true);
    notify("บันทึกการตั้งค่าส่วนลดแล้ว ✓", "ok");
    setTimeout(() => setSaved(false), 2000);
  };

  const roleConfig = [
    { role: ROLES.SALES,   label: "Sales Rep",       color: "#00e5a0", ico: "🎯", desc: "สิทธิ์ Default สำหรับ Sales — ใช้เมื่อไม่มีการตั้งค่ารายบุคคล" },
    { role: ROLES.MANAGER, label: "Sales Manager",   color: "#8b5cf6", ico: "📊", desc: "อนุมัติส่วนลดเกิน Sales — กำหนดได้โดย Exec เท่านั้น" },
    { role: ROLES.EXEC,    label: "ผู้บริหาร (Exec)", color: "#f59e0b", ico: "👑", desc: "อำนาจสูงสุด สามารถอนุมัติส่วนลดพิเศษทุกกรณี — กำหนดได้โดย Exec เท่านั้น" },
  ];

  const salesMax   = Number(draft[ROLES.SALES])   || 0;
  const managerMax = Number(draft[ROLES.MANAGER]) || 0;
  const execMax    = Number(draft[ROLES.EXEC])    || 0;
  const managerErr = managerMax < salesMax;
  const execErr    = execMax    < managerMax;
  const hasChange  =
    String(discountLimits[ROLES.SALES]?.max)   !== draft[ROLES.SALES]   ||
    String(discountLimits[ROLES.MANAGER]?.max) !== draft[ROLES.MANAGER] ||
    String(discountLimits[ROLES.EXEC]?.max)    !== draft[ROLES.EXEC];

  // check if personal has override
  const mgrLimVal = discountLimits[ROLES.MANAGER]?.max ?? 20;
  const hasPersonalOverride = salesUsers.some(u => perUserLimits[u.id] != null &&
    perUserLimits[u.id] !== (discountLimits[ROLES.SALES]?.max ?? 10));

  return (
    <div className="page fade-up">
      <div className="ph">
        <div className="ph-left">
          <div className="ph-title">🎚️ ตั้งค่าส่วนลด</div>
          <div className="ph-sub">จัดการสิทธิ์ให้ส่วนลด · ตาม Role หรือรายบุคคล</div>
        </div>
      </div>

      {/* ── Tab toggle ── */}
      <div style={{ display: "flex", gap: 0, marginBottom: 16, borderRadius: 10, overflow: "hidden", border: "1px solid var(--border)", width: "fit-content" }}>
        {[
          ["role",     "📊 ตาม Role",        "กำหนด default ตาม Manager/Sales/Exec"],
          ["personal", "👤 รายบุคคล",        `Sales ${salesUsers.length} คน`],
        ].map(([v, label, sub]) => (
          <button key={v} onClick={() => setTab(v)} style={{
            padding: "10px 20px", border: "none", cursor: "pointer", textAlign: "left",
            background: tab === v ? "var(--accent)" : "var(--bg3)",
            color: tab === v ? "#000" : "var(--text2)",
            borderRight: "1px solid var(--border)",
          }}>
            <div style={{ fontSize: 13, fontWeight: 700 }}>{label}</div>
            <div style={{ fontSize: 10, opacity: 0.7, marginTop: 1 }}>{sub}</div>
          </button>
        ))}
      </div>

      {/* ══════════════════════ TAB: ROLE ══════════════════════ */}
      {tab === "role" && (
        <>
          <div className="card card-p" style={{ marginBottom: 16 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 15, fontWeight: 700 }}>💰 สิทธิ์ให้ส่วนลดสูงสุดตาม Role</div>
              {hasPersonalOverride && (
                <div style={{ fontSize: 10, padding: "3px 8px", background: "rgba(0,229,160,0.1)", borderRadius: 6, color: "var(--accent)", border: "1px solid rgba(0,229,160,0.2)" }}>
                  ⚡ มีการตั้งค่ารายบุคคล (override)
                </div>
              )}
            </div>

            {/* Visualization bar */}
            <div style={{ marginBottom: 20, padding: "12px 16px", background: "var(--bg3)", borderRadius: 10, border: "1px solid var(--border)" }}>
              <div style={{ fontSize: 11, color: "var(--text3)", marginBottom: 10, fontWeight: 600 }}>📊 ภาพรวมสิทธิ์ส่วนลด</div>
              {roleConfig.map(({ role, label, color, ico }) => {
                const pct = Math.min(100, Number(draft[role]) || 0);
                return (
                  <div key={role} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                      <span style={{ fontSize: 11, color, fontWeight: 700 }}>{ico} {label}</span>
                      <span style={{ fontSize: 11, fontFamily: "IBM Plex Mono", color, fontWeight: 700 }}>
                        {pct === 100 ? "ไม่จำกัด" : `≤ ${pct}%`}
                      </span>
                    </div>
                    <div style={{ height: 6, background: "var(--bg2)", borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: color, borderRadius: 3, transition: "width 0.3s ease" }} />
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Input fields */}
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {roleConfig.map(({ role, label, color, ico, desc }) => {
                const isManagerRole = role === ROLES.MANAGER;
  const isExecRole    = [ROLES.EXEC, ROLES.EXEC_ASST].includes(role);
                const hasErr = (isManagerRole && managerErr) || (isExecRole && execErr);
                const fieldEditable = role === ROLES.SALES ? canEditSales : canEditAny;
                const locked = !fieldEditable;
                return (
                  <div key={role} style={{ display: "flex", gap: 12, alignItems: "center", padding: "12px 14px", background: "var(--bg3)", borderRadius: 10, border: `1px solid ${hasErr ? "rgba(239,68,68,0.4)" : "var(--border)"}` }}>
                    <div style={{ width: 38, height: 38, borderRadius: 10, background: color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>{ico}</div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, color }}>{label}</div>
                      <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 1 }}>{desc}</div>
                      {hasErr && <div style={{ fontSize: 10, color: "var(--red)", marginTop: 2, fontWeight: 600 }}>⚠️ {isManagerRole ? `ต้องมากกว่า Sales (${salesMax}%)` : `ต้องมากกว่า Manager (${managerMax}%)`}</div>}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                      <div style={{ fontSize: 11, color: "var(--text3)" }}>สูงสุด</div>
                      <div style={{ position: "relative" }}>
                        <input className="finput" type="text" inputMode="numeric"
                          value={draft[role]}
                          onChange={e => !locked && setVal(role, e.target.value)}
                          disabled={locked}
                          style={{ width: 68, padding: "6px 22px 6px 8px", fontSize: 15, fontWeight: 700, fontFamily: "IBM Plex Mono", textAlign: "right",
                            borderColor: hasErr ? "rgba(239,68,68,0.5)" : color + "60",
                            color: locked ? "var(--text3)" : color,
                            background: locked ? "var(--bg3)" : color + "0d",
                            opacity: locked ? 0.55 : 1, cursor: locked ? "not-allowed" : "text" }} />
                        <span style={{ position: "absolute", right: 7, top: "50%", transform: "translateY(-50%)", fontSize: locked ? 11 : 13, color: locked ? "var(--text3)" : color, fontWeight: 700, pointerEvents: "none" }}>{locked ? "🔒" : "%"}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {canEditSales && (
              <div style={{ marginTop: 14, display: "flex", gap: 8, alignItems: "center", justifyContent: "flex-end" }}>
                {hasChange && !saved && <span style={{ fontSize: 11, color: "#f59e0b" }}>⚠️ มีการเปลี่ยนแปลงที่ยังไม่บันทึก</span>}
                {saved && <span style={{ fontSize: 11, color: "var(--accent)", fontWeight: 700 }}>✓ บันทึกแล้ว</span>}
                <button className="btn btn-ghost btn-sm" onClick={() => setDraft({
                  [ROLES.SALES]: String(discountLimits[ROLES.SALES]?.max),
                  [ROLES.MANAGER]: String(discountLimits[ROLES.MANAGER]?.max),
                  [ROLES.EXEC]: String(discountLimits[ROLES.EXEC]?.max),
                })}>↩ รีเซ็ต</button>
                <button className="btn btn-accent btn-sm" disabled={managerErr || execErr} onClick={handleSave}>✓ บันทึก</button>
              </div>
            )}
            {!canEditSales && (
              <div style={{ marginTop: 10, padding: "7px 12px", background: "rgba(245,158,11,0.08)", borderRadius: 8, fontSize: 11, color: "#f59e0b" }}>
                🔒 เฉพาะ Manager (Sales limit) และ Exec (ทุก limit) เท่านั้นที่แก้ไขได้
              </div>
            )}
            {isManager && !isExec && (
              <div style={{ marginTop: 6, padding: "5px 12px", background: "rgba(139,92,246,0.07)", borderRadius: 8, fontSize: 11, color: "#a78bfa" }}>
                📊 คุณแก้ไขได้เฉพาะ Sales limit — Manager/Exec limit กำหนดโดย Exec เท่านั้น
              </div>
            )}
          </div>

          {/* Approval flow */}
          <div className="card card-p" style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10 }}>🔄 ขั้นตอนการอนุมัติส่วนลด</div>
            <div style={{ display: "flex", gap: 0, alignItems: "stretch", flexWrap: "wrap" }}>
              {[
                { who: "Sales", color: "#00e5a0", ico: "🎯", desc: `ให้ส่วนลดได้เอง ≤ ${discountLimits[ROLES.SALES]?.max ?? 10}%` },
                { arrow: true },
                { who: "Manager", color: "#8b5cf6", ico: "📊", desc: `อนุมัติ ≤ ${discountLimits[ROLES.MANAGER]?.max ?? 20}%` },
                { arrow: true },
                { who: "Exec", color: "#f59e0b", ico: "👑", desc: `อนุมัติสูงสุด${(discountLimits[ROLES.EXEC]?.max ?? 100) >= 100 ? " (ไม่จำกัด)" : ` ≤ ${discountLimits[ROLES.EXEC]?.max}%`}` },
              ].map((item, i) => item.arrow ? (
                <div key={i} style={{ display: "flex", alignItems: "center", padding: "0 8px", color: "var(--text3)", fontSize: 18 }}>→</div>
              ) : (
                <div key={i} style={{ flex: 1, minWidth: 100, padding: "10px 14px", background: item.color + "10", border: `1px solid ${item.color}30`, borderRadius: 10, textAlign: "center" }}>
                  <div style={{ fontSize: 20, marginBottom: 3 }}>{item.ico}</div>
                  <div style={{ fontSize: 12, fontWeight: 700, color: item.color }}>{item.who}</div>
                  <div style={{ fontSize: 10, color: "var(--text2)", marginTop: 2 }}>{item.desc}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Changelog */}
          {changelog.length > 0 && (
            <div className="card card-p">
              <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>📋 ประวัติการแก้ไขสิทธิ์</div>
              {changelog.slice(0, 8).map((c, i) => (
                <div key={i} style={{ display: "flex", gap: 10, padding: "7px 0", borderBottom: "1px solid var(--border)", alignItems: "center", fontSize: 11 }}>
                  <div style={{ color: "var(--text3)", fontFamily: "IBM Plex Mono", flexShrink: 0, width: 80 }}>{fmtDate(c.date)}</div>
                  <div style={{ flex: 1 }}>
                    <span style={{ color: "var(--text2)" }}>
                      Sales: <b style={{ color: "#00e5a0" }}>{c.prev?.sales}% → {c.next?.sales}%</b>
                      {" · "}Manager: <b style={{ color: "#8b5cf6" }}>{c.prev?.manager}% → {c.next?.manager}%</b>
                      {" · "}Exec: <b style={{ color: "#f59e0b" }}>{c.prev?.exec === 100 ? "∞" : c.prev?.exec + "%"} → {c.next?.exec === 100 ? "∞" : c.next?.exec + "%"}</b>
                    </span>
                  </div>
                  <div style={{ color: "var(--text3)", flexShrink: 0 }}>{c.by}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* ══════════════════════ TAB: PERSONAL ══════════════════════ */}
      {tab === "personal" && (
        <div className="card card-p">
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 4 }}>👤 ตั้งค่าส่วนลดรายบุคคล — Sales</div>
            <div style={{ fontSize: 12, color: "var(--text3)" }}>
              กำหนดสิทธิ์ให้ Sales แต่ละคนต่างกันได้ • ค่าที่ตั้งจะ override Role limit ของคนนั้น
            </div>
          </div>

          {/* Apply all block */}
          {canEditSales && (
            <div style={{ padding: "12px 14px", background: "rgba(0,229,160,0.06)", borderRadius: 10, border: "1px solid rgba(0,229,160,0.18)", marginBottom: 16, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: "var(--accent)", flexShrink: 0 }}>⚡ ใช้ค่าเดียวกันทุกคน</span>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <div style={{ position: "relative" }}>
                  <input className="finput" type="text" inputMode="numeric"
                    value={applyAllVal}
                    onChange={e => setApplyAllVal(e.target.value)}
                    style={{ width: 64, padding: "5px 20px 5px 8px", fontSize: 14, fontWeight: 700, fontFamily: "IBM Plex Mono", textAlign: "right", color: "#00e5a0", background: "rgba(0,229,160,0.06)", borderColor: "rgba(0,229,160,0.3)" }} />
                  <span style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", fontSize: 12, color: "#00e5a0", fontWeight: 700, pointerEvents: "none" }}>%</span>
                </div>
                <button className="btn btn-accent btn-sm" onClick={handleApplyAll}>→ ใช้ทุกคน</button>
              </div>
              <span style={{ fontSize: 10, color: "var(--text3)" }}>ตั้งค่าแล้วกด "บันทึก" ด้านล่าง</span>
            </div>
          )}
